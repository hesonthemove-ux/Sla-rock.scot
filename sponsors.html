<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Sponsors | ROCK.SCOT | Supporting Local Business</title>
    <meta name="description" content="Meet the brands supporting the West's rock scene. View our network partners across Inverclyde, Ayrshire, and Lanarkshire.">
    
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    
    <style>
        main { transition: opacity 0.2s ease-in-out; opacity: 1; }
        .eq-container { display: flex; align-items: flex-end; gap: 2px; height: 20px; }
        .eq-bar { width: 3px; background: #ff3e00; height: 10px; }
    </style>
</head>
<body>

    <div id="master-player" style="background: #050505; border-bottom: 1px solid #111; padding: 10px 0; position: sticky; top: 0; z-index: 1000;">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <div id="now-playing" style="display: flex; align-items: center; gap: 15px;">
                <div class="eq-container">
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                </div>
                <div>
                    <span style="display: block; font-size: 0.6rem; color: #ff3e00; text-transform: uppercase; letter-spacing: 2px;">Live Now</span>
                    <span id="track-title" style="font-weight: 700; text-transform: uppercase; font-size: 0.9rem;">Scotland's Rock Station</span>
                </div>
            </div>
            <button id="play-btn" style="background: transparent; border: 1px solid #ff3e00; color: #ff3e00; padding: 5px 15px; font-family: 'Oswald'; cursor: pointer; text-transform: uppercase; font-weight: 700;">Listen Live</button>
        </div>
    </div>

    <header>
        <div class="container">
            <img src="logo.png" alt="ROCK.SCOT" class="logo-main">
            <nav class="nav-menu">
                <a href="index.html">Listen</a>
                <a href="sponsors.html" class="active">Sponsors</a>
                <a href="advertise.html">Advertise</a>
                <a href="mailto:studio@rock.scot">Contact</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <section class="section-tight" style="border-top: none; text-align: center;">
                <h1 class="hero-title">OUR PARTNERS</h1>
                <span class="sub-glow">Supporting the West's Rock Scene</span>
            </section>

            <section class="section-tight">
                <span style="color: #444; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 3px; display: block; border-bottom: 1px solid #111; padding-bottom: 5px; margin-bottom: 20px;">Network Partners</span>
                <div class="grid-layout">
                    <div class="card-dark" style="height: 160px; display: flex; align-items: center; justify-content: center;">
                        <span style="color:#222; font-size:0.8rem;">PARTNER LOGO 1</span>
                    </div>
                    <div class="card-dark" style="height: 160px; display: flex; align-items: center; justify-content: center;">
                        <span style="color:#222; font-size:0.8rem;">PARTNER LOGO 2</span>
                    </div>
                </div>
            </section>

            <section class="section-tight" style="text-align: center; background: #050505; margin-top: 40px; padding: 40px;">
                <h2 style="text-transform: uppercase; margin-bottom: 10px;">Join the Network</h2>
                <p style="color: #888; margin-bottom: 20px;">Align your brand with Scotland's Rock Station.</p>
                <a href="advertise.html" class="cta-btn" style="display: inline-block; background: #ff3e00; color: #000; text-decoration: none; padding: 10px 30px; font-weight: 700; text-transform: uppercase;">Become a Sponsor</a>
            </section>
        </div>
    </main>

    <footer><div class="container">&copy; 2026 ROCK.SCOT | THE WEST'S ROCK STATION</div></footer>

    <script src="player.js"></script>
    <script src="router.js"></script>
</body>
</html>
