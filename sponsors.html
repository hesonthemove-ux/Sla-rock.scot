<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sponsors | ROCK.SCOT | Our Partners</title>
    <meta name="description" content="Supporting the West's rock scene. View our network partners in Inverclyde, Ayrshire, and Lanarkshire.">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="master-player" style="background: #050505; border-bottom: 1px solid #111; padding: 10px 0; position: sticky; top: 0; z-index: 1000;">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <div id="now-playing" style="display: flex; align-items: center; gap: 15px;">
                <div class="eq-container"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>
                <div>
                    <span style="display: block; font-size: 0.6rem; color: #ff3e00; text-transform: uppercase; letter-spacing: 2px;">Live Now</span>
                    <span id="track-title" style="font-weight: 700; text-transform: uppercase; font-size: 0.9rem;">Scotland's Rock Station</span>
                </div>
            </div>
            <button id="play-btn" style="background: transparent; border: 1px solid #ff3e00; color: #ff3e00; padding: 5px 15px; font-family: 'Oswald'; cursor: pointer; text-transform: uppercase; font-weight: 700;">Listen Live</button>
        </div>
    </div>

    <header>
        <div class="container">
            <img src="logo.png" alt="ROCK.SCOT" class="logo-main">
            <nav class="nav-menu">
                <a href="index.html">Listen</a>
                <a href="sponsors.html" class="active">Sponsors</a>
                <a href="advertise.html">Advertise</a>
                <a href="mailto:studio@rock.scot">Contact</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <section class="section-tight" style="border-top: none; text-align: center;">
                <h1 class="hero-title">OUR PARTNERS</h1>
                <span class="sub-glow">Inverclyde • Ayrshire • Lanarkshire</span>
            </section>
            <section class="section-tight">
                <div class="grid-layout">
                    <div class="card-dark" style="height: 150px; display: flex; align-items: center; justify-content: center;">
                        <span style="color: #222;">PARTNER LOGO SLOT</span>
                    </div>
                    <div class="card-dark" style="height: 150px; display: flex; align-items: center; justify-content: center;">
                        <span style="color: #222;">PARTNER LOGO SLOT</span>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <footer><div class="container">&copy; 2026 ROCK.SCOT | THE WEST'S ROCK STATION</div></footer>
    <script src="player.js"></script>
    <script src="router.js"></script>
</body>
</html>
