<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Music | Sla-rock.scot</title>
    <style>
        :root { --primary: #ff3e00; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Inter', Arial, sans-serif; margin: 0; background-color: var(--bg); color: #fff; line-height: 1.6; }
        
        header { background: #000; padding: 40px 20px; text-align: center; border-bottom: 4px solid var(--primary); }
        #logo { width: 280px; height: auto; }
        .tagline { font-size: 2rem; color: var(--primary); font-weight: 900; text-transform: uppercase; letter-spacing: 5px; margin-top: 10px; }

        nav { background: #0a0a0a; text-align: center; padding: 20px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #1a1a1a; }
        nav a { color: #fff; margin: 0 15px; text-decoration: none; font-weight: 700; text-transform: uppercase; transition: 0.3s; font-size: 0.9rem; }
        nav a:hover { color: var(--primary); }

        .stream-bar { background: #111; border-bottom: 2px solid #222; padding: 25px; display: flex; align-items: center; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .on-air-status { display: flex; align-items: center; gap: 10px; font-weight: 900; letter-spacing: 1px; }
        .dot { width: 10px; height: 10px; background: var(--primary); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .container { max-width: 800px; margin: 0 auto; padding: 60px 20px; }
        .form-card { background: var(--glass); border: 1px solid #222; padding: 40px; }
        label { display: block; text-transform: uppercase; font-size: 0.75rem; color: var(--primary); font-weight: 900; margin-bottom: 10px; letter-spacing: 1px; }
        input, textarea { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: #fff; margin-bottom: 25px; box-sizing: border-box; }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; }
        .submit-btn { background: var(--primary); color: #000; border: none; width: 100%; padding: 20px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; font-size: 1.1rem; }
        .submit-btn:hover { background: #fff; }

        footer { text-align: center; padding: 60px; color: #333; font-weight: 900; border-top: 1px solid #111; }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="Sla-rock.scot" id="logo">
    <div class="tagline">Rockin' Scotland</div>
</header>

<nav>
    <a href="index.html">On Air</a>
    <a href="gig-calendar.html">Gigs</a>
    <a href="venues.html">Venues</a>
    <a href="submit.html" style="color: var(--primary);">Submit</a>
    <a href="advertising.html">Advertise</a>
</nav>

<section class="stream-bar">
    <div class="on-air-status"><div class="dot"></div> LIVE NOW</div>
    <audio controls style="filter: invert(1); width: 350px; height: 35px;">
        <source src="https://uk3.broadcast.radio/8118/stream" type="audio/mpeg">
    </audio>
</section>

<div class="container">
    <h1 style="font-size: 3rem; text-transform: uppercase; margin-bottom: 10px;">Send Your <span style="color: var(--primary);">Assets</span></h1>
    <p style="color: #888; margin-bottom: 40px;">Direct distribution to the Sla-rock.scot broadcast team.</p>

    <div class="form-card">
        <form action="success.html">
            <label>Artist / Band Name</label>
            <input type="text" required>
            
            <label>Region (Central Belt)</label>
            <input type="text" placeholder="e.g. Glasgow / Falkirk / Edinburgh" required>
            
            <label>Track Link (Soundcloud / Dropbox)</label>
            <input type="url" required>
            
            <label>Brief Bio</label>
            <textarea rows="4"></textarea>
            
            <button type="submit" class="submit-btn">Submit for Airplay</button>
        </form>
    </div>
</div>

<footer>&copy; 2026 Sla-rock.scot | Rockin' Scotland</footer>
</body>
</html>
