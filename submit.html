<main>
    <style>
        .header-box { text-align: center; padding: 40px 0 20px 0; }
        .header-box h1 { font-size: 3rem; text-transform: uppercase; color: #ff3e00; margin: 0; }
        .header-box p { color: #888; text-transform: uppercase; letter-spacing: 2px; }

        .form-container { max-width: 600px; margin: 40px auto; background: #0a0a0a; border: 1px solid #1a1a1a; padding: 40px; }
        .form-group { margin-bottom: 25px; width: 100%; }
        .form-group label { display: block; text-transform: uppercase; font-size: 0.75rem; color: #ff3e00; margin-bottom: 8px; font-weight: 700; }
        .form-group input, .form-group textarea {
            width: 100%;
            background: #111;
            border: 1px solid #222;
            padding: 15px;
            color: #fff;
            font-family: 'Oswald';
            display: block;
        }
        
        .submit-btn {
            background: #ff3e00;
            color: #000;
            border: none;
            width: 100%;
            padding: 18px;
            font-family: 'Oswald';
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 1.1rem;
        }
    </style>

    <div class="container">
        <section class="header-box">
            <h1>Local Talent</h1>
            <p>Direct Submission Architecture</p>
        </section>

        <div class="form-container">
            <form action="#" method="POST">
                <div class="form-group">
                    <label>Band / Artist Identity</label>
                    <input type="text" placeholder="Project Name" required>
                </div>
                <div class="form-group">
                    <label>Regional Origin</label>
                    <input type="text" placeholder="e.g. Johnstone / Glasgow / Edinburgh" required>
                </div>
                <div class="form-group">
                    <label>Sonic Asset Link</label>
                    <input type="url" placeholder="Soundcloud / Spotify / YouTube" required>
                </div>
                <div class="form-group">
                    <label>Creative Narrative</label>
                    <textarea rows="4" placeholder="Brief bio and context"></textarea>
                </div>
                <button type="submit" class="submit-btn">Submit for Airplay</button>
            </form>
        </div>
    </div>
</main>
