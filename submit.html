<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Band Submission | ROCK.SCOT</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Global fix for alignment */
        * { box-sizing: border-box; }
        
        body { background-color: #000; color: #fff; margin: 0; padding: 0; font-family: 'Oswald', sans-serif; overflow-x: hidden; }
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        
        #master-player { background: #000; border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; z-index: 2000; width: 100%; }
        .logo-main { width: 100%; max-width: 500px; height: auto; display: block; margin: 0 auto; }
        .nav-menu { margin-top: 15px; display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; }
        .nav-menu a { color: #fff; text-decoration: none; text-transform: uppercase; font-weight: 700; font-size: 0.85rem; }
        .nav-menu a.active { color: #ff3e00; border-bottom: 2px solid #ff3e00; }
        
        .header-box { text-align: center; padding: 40px 0 20px 0; }
        .header-box h1 { font-size: 3rem; text-transform: uppercase; color: #ff3e00; margin: 0; }
        .header-box p { color: #888; text-transform: uppercase; letter-spacing: 2px; }

        /* FIXED FORM ALIGNMENT */
        .form-container { 
            max-width: 600px; 
            margin: 40px auto; 
            background: #0a0a0a; 
            border: 1px solid #1a1a1a; 
            padding: 40px; 
        }
        .form-group { margin-bottom: 25px; width: 100%; }
        .form-group label { 
            display: block; 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            color: #ff3e00; 
            margin-bottom: 8px; 
            font-weight: 700; 
            letter-spacing: 1px;
        }
        .form-group input, 
        .form-group textarea {
            width: 100%; /* Now stays inside thanks to border-box */
            background: #111;
            border: 1px solid #222;
            padding: 15px;
            color: #fff;
            font-family: 'Oswald';
            font-size: 1rem;
            display: block;
        }
        .form-group input:focus, 
        .form-group textarea:focus { 
            border-color: #ff3e00; 
            outline: none; 
            background: #161616;
        }
        
        .submit-btn {
            background: #ff3e00;
            color: #000;
            border: none;
            width: 100%;
            padding: 18px;
            font-family: 'Oswald';
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 1.1rem;
            margin-top: 10px;
        }
        .submit-btn:hover { background: #fff; }

        /* BOTTOM PRICING ROW */
        .grid-ads { display: flex; gap: 8px; margin: 40px 0; }
        .grid-ads .card-ad { flex: 1; background: #0a0a0a; border: 1px solid #1a1a1a; padding: 10px 5px; text-align: center; }
        .ad-label { text-transform: uppercase; font-size: 0.6rem; color: #888; margin: 0; }
        .ad-price { font-size: 1rem; font-weight: 700; color: #ff3e00; margin: 2px 0; }
        
        button#play-btn { background: #ff3e00; color: #000; border: none; padding: 6px 12px; font-family: 'Oswald'; font-weight: 700; text-transform: uppercase; cursor: pointer; font-size: 0.7rem; }
    </style>
</head>
<body>
    <div id="master-player">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span id="track-title" style="font-weight: 700; text-transform: uppercase; font-size: 0.65rem;">Ready to Rock</span>
            </div>
            <button id="play-btn">Listen</button>
        </div>
    </div>

    <header style="padding: 15px 0;">
        <div class="container">
            <img src="logo.png" alt="ROCK.SCOT" class="logo-main">
            <nav class="nav-menu">
                <a href="index.html">Listen</a>
                <a href="news.html">News</a>
                <a href="about.html">About</a>
                <a href="advertise.html">Advertise</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="header-box">
            <h1>Local Talent</h1>
            <p>Direct Submission Architecture</p>
        </section>

        <div class="form-container">
            <form action="#" method="POST">
                <div class="form-group">
                    <label>Band / Artist Identity</label>
                    <input type="text" placeholder="Project Name" required>
                </div>
                <div class="form-group">
                    <label>Regional Origin</label>
                    <input type="text" placeholder="e.g. Johnstone / Glasgow / Paisley" required>
                </div>
                <div class="form-group">
                    <label>Sonic Asset Link (Soundcloud / Spotify)</label>
                    <input type="url" placeholder="https://..." required>
                </div>
                <div class="form-group">
                    <label>Creative Narrative</label>
                    <textarea rows="4" placeholder="Brief biography and track context"></textarea>
                </div>
                <button type="submit" class="submit-btn">Submit for Airplay</button>
            </form>
        </div>

        <div class="grid-ads">
            <div class="card-ad"><p class="ad-label">Regional</p><p class="ad-price">£199</p></div>
            <div class="card-ad"><p class="ad-label">Multi</p><p class="ad-price">£349</p></div>
            <div class="card-ad"><p class="ad-label">Creative</p><p class="ad-price">£195</p></div>
        </div>
    </main>

    <footer style="padding: 20px 0; text-align: center; color: #222; font-size: 0.6rem;">&copy; 2026 ROCK.SCOT</footer>

    <script src="player.js"></script>
</body>
</html>
