<main>
    <style>
        .home-grid { display: grid; grid-template-columns: 1fr 350px; gap: 30px; padding: 20px 0; }
        .hero-box { text-align: left; }
        .hero-box h2 { font-size: 5rem; line-height: 0.8; margin: 0; text-transform: uppercase; }
        .hero-box h2 span { color: #ff3e00; }
        
        .sidebar { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 20px; }
        .sidebar h3 { color: #ff3e00; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 10px; margin-top: 0; }
        
        ul#recent-tracks { list-style: none; padding: 0; margin: 0; }
        ul#recent-tracks li { padding: 12px 0; border-bottom: 1px solid #111; line-height: 1.2; }
        
        @media (max-width: 900px) {
            .home-grid { grid-template-columns: 1fr; }
        }
    </style>

    <div class="container home-grid">
        <div class="hero-box">
            <h2>SCOTLAND'S<br><span>PURE ROCK</span></h2>
            <p style="font-size: 1.5rem; letter-spacing: 2px; color: #888;">ALL GENRES. ALL ROCK. SERVING THE PUBLIC.</p>
            <div style="margin-top: 40px;">
                <p>Welcome to Rockin' Scotland. From the legends of the Central Belt to the newest unsigned talent breaking out of Glasgow and Edinburgh, we play it all.</p>
            </div>
        </div>

        <div class="sidebar">
            <h3>Recently Played</h3>
            <ul id="recent-tracks">
                <li>Loading history...</li>
            </ul>
        </div>
    </div>
</main>
