<main>
    <style>
        .schedule-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 40px 0; }
        .show-card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 20px; border-left: 5px solid #ff3e00; }
        .show-time { color: #ff3e00; font-weight: 700; text-transform: uppercase; font-size: 0.9rem; }
        .show-title { font-size: 1.8rem; margin: 10px 0; text-transform: uppercase; }
        .presenter-name { color: #888; letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem; }
        .recent-box { background: #111; padding: 20px; margin-top: 40px; text-align: left; }
        .recent-box h4 { border-bottom: 1px solid #ff3e00; padding-bottom: 10px; text-transform: uppercase; }
        ul#recent-tracks { list-style: none; padding: 0; }
        ul#recent-tracks li { padding: 8px 0; border-bottom: 1px solid #222; font-size: 0.9rem; }
    </style>

    <div class="container">
        <h2>SHOW <span>SCHEDULE</span></h2>
        
        <div class="schedule-grid">
            <div class="show-card">
                <p class="show-time">Weeknights 6PM - 8PM</p>
                <h3 class="show-title">The UK Rock Show</h3>
                <p class="presenter-name">With RJ</p>
            </div>
            <div class="show-card">
                <p class="show-time">Saturdays 8PM</p>
                <h3 class="show-title">Tom Russell Rock Show</h3>
                <p class="presenter-name">The Best in Rock</p>
            </div>
            <div class="show-card">
                <p class="show-time">Daily 10AM - 2PM</p>
                <h3 class="show-title">Rockin' Scotland Daytime</h3>
                <p class="presenter-name">Non-Stop Pure Rock</p>
            </div>
        </div>

        <div class="recent-box">
            <h4>Recently Played</h4>
            <ul id="recent-tracks">
                <li>Loading history...</li>
            </ul>
        </div>
    </div>
</main>
