<!DOCTYPE html>
<html>
<head>
    <title>ROCK.SCOT | Live Stream</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Oswald', sans-serif; text-align: center; margin: 0; padding: 40px 20px; }
        .logo { width: 200px; margin-bottom: 30px; }
        .status { color: #ff3e00; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 10px; }
        #track { font-size: 1.5rem; font-weight: 700; text-transform: uppercase; margin-bottom: 30px; line-height: 1.2; }
        .controls button { 
            background: #ff3e00; border: none; color: #000; padding: 20px 60px; 
            font-family: 'Oswald'; font-weight: 700; font-size: 1.2rem; cursor: pointer; text-transform: uppercase;
        }
        .controls button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <img src="logo.png" class="logo">
    <div class="status">Now Playing</div>
    <div id="track">Connecting to Stream...</div>
    <div class="controls">
        <button id="btn">Stop</button>
    </div>

    <script>
        const stream = new Audio("HTTPS://uksouth.streaming.broadcast.radio/stream/16641/caledonia-tx-ltd");
        const btn = document.getElementById('btn');
        const track = document.getElementById('track');
        let playing = true;

        stream.play().catch(() => {
            btn.innerText = "Play";
            playing = false;
        });

        btn.onclick = () => {
            if(playing) {
                stream.pause();
                btn.innerText = "Play";
            } else {
                stream.play();
                btn.innerText = "Stop";
            }
            playing = !playing;
        };

        // Sync metadata
        async function fetchMeta() {
            try {
                const res = await fetch("https://corsproxy.io/?https%3A%2F%2Fapi.broadcast.radio%2Fapi%2Fnowplaying%2F16641");
                const data = await res.json();
                if(data.body?.now_playing) {
                    track.innerText = `${data.body.now_playing.artist} - ${data.body.now_playing.title}`;
                }
            } catch(e) {}
        }
        setInterval(fetchMeta, 20000);
        fetchMeta();
    </script>
</body>
</html>
