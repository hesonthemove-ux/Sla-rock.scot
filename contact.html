<main>
    <style>
        .contact-header { text-align: center; padding: 40px 0 20px 0; }
        .contact-header h1 { font-size: 3rem; text-transform: uppercase; color: #ff3e00; margin: 0; }
        .contact-header p { color: #888; text-transform: uppercase; letter-spacing: 2px; }

        .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; margin: 40px 0; }
        .form-card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 30px; }
        .info-card h2 { color: #ff3e00; text-transform: uppercase; margin-top: 0; }
        .info-card p { color: #ccc; font-size: 1.1rem; line-height: 1.6; }

        .form-group { margin-bottom: 20px; width: 100%; }
        .form-group label { display: block; text-transform: uppercase; font-size: 0.75rem; color: #ff3e00; margin-bottom: 5px; font-weight: 700; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            background: #111;
            border: 1px solid #222;
            padding: 12px;
            color: #fff;
            font-family: 'Oswald';
            display: block;
        }
        
        .submit-btn {
            background: #ff3e00;
            color: #000;
            border: none;
            width: 100%;
            padding: 15px;
            font-family: 'Oswald';
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>

    <div class="container">
        <section class="contact-header">
            <h1>Connect</h1>
            <p>Direct Access to the Station</p>
        </section>

        <div class="contact-grid">
            <div class="info-card">
                <h2>Get in Touch</h2>
                <p>Whether you're looking for Regional Market Penetration or you're a local band—this is the place.</p>
                <div style="margin-top: 30px;">
                    <p style="color: #ff3e00; font-weight: 700; margin-bottom: 5px;">STUDIO LINE</p>
                    <p style="font-size: 1.5rem; margin-top: 0;">0141 ROCK SCOT</p>
                </div>
            </div>

            <div class="form-card">
                <form action="#" method="POST">
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" placeholder="Full Name" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="email@company.com" required>
                    </div>
                    <div class="form-group">
                        <label>Nature of Inquiry</label>
                        <select>
                            <option>General Inquiry</option>
                            <option>Regional Airtime (£199)</option>
                            <option>Multi-Regional Airtime (£349)</option>
                            <option>Creative/Production (£195)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea rows="5" placeholder="How can we help?"></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </div>
    </div>
</main>
