<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Sla-rock.scot</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; background-color: #121212; color: #eeeeee; line-height: 1.6; }
        header { background-color: #000; padding: 30px 20px; text-align: center; border-bottom: 4px solid #cc0000; }
        #logo { width: 250px; height: auto; display: block; margin: 0 auto; }
        .tagline { font-size: 1.8rem; color: #cc0000; font-weight: 800; text-transform: uppercase; margin-top: 15px; letter-spacing: 2px; }
        nav { background: #222; text-align: center; padding: 10px; }
        nav a { color: #fff; margin: 0 15px; text-decoration: none; font-weight: bold; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        .contact-form { background: #1e1e1e; padding: 30px; border-radius: 15px; border: 1px solid #333; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #333; border: 1px solid #444; color: #fff; border-radius: 5px; }
        button { background: #cc0000; color: #fff; border: none; padding: 15px 30px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        footer { text-align: center; padding: 40px; background: #000; color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="Sla-rock.scot" id="logo">
    <div class="tagline">Rockin' Scotland</div>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="advertising.html">Advertising</a>
    <a href="contact.html" style="color:#cc0000;">Contact</a>
</nav>

<div class="container">
    <h1>Get In Touch</h1>
    <div class="contact-form">
        <p>Interested in our £299 Regional airtime packages or need help with a creative project? Drop us a line below.</p>
        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea rows="5" placeholder="Your Message"></textarea>
            <button type="submit">Send Message</button>
        </form>
    </div>

    <h3 style="margin-top: 40px;">Our Standard Rates</h3>
    <div id="pricing-component"></div>
</div>

<footer>
    <p>&copy; 2026 Sla-rock.scot</p>
</footer>

<script src="pricing.js"></script>
</body>
</html>
