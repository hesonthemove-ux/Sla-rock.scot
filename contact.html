<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | ROCK.SCOT</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="master-player">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 12px 0;">
            <div id="now-playing" style="display: flex; align-items: center; gap: 15px;">
                <div class="eq-container"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>
                <div>
                    <span style="display: block; font-size: 0.6rem; color: #ff3e00; text-transform: uppercase; letter-spacing: 2px;">Live Now</span>
                    <span id="track-title" style="font-weight: 700; text-transform: uppercase; font-size: 0.9rem;">Connecting...</span>
                </div>
            </div>
            <button id="play-btn">Listen Live</button>
        </div>
    </div>

    <header>
        <div class="container">
            <img src="logo.png" alt="ROCK.SCOT" class="logo-main">
            <nav class="nav-menu">
                <a href="index.html">Listen</a>
                <a href="sponsors.html">Sponsors</a>
                <a href="advertise.html">Advertise</a>
                <a href="contact.html" class="active">Contact</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section style="text-align: center; padding: 40px 0;">
            <h1 class="hero-title">GET IN<br>TOUCH</h1>
            <span class="sub-glow">Studio Hotline & Advertising</span>
        </section>

        <img src="contact-studio.jpg" class="img-feature" alt="Rock Scot Studio Team">

        <div class="grid-layout" style="margin-top: 40px;">
            <div class="card-dark">
                <h3>STATION CONTACT</h3>
                <p>WhatsApp the studio or email us for shoutouts and track requests.</p>
                <p style="color: #ff3e00; font-weight: bold;">studio@rock.scot</p>
            </div>

            <div class="card-dark">
                <h3>ADVERTISING INQUIRY</h3>
                <form action="#" style="display: flex; flex-direction: column; gap: 10px;">
                    <input type="text" placeholder="Name" style="padding: 10px; background: #111; border: 1px solid #333; color: white;">
                    <select style="padding: 10px; background: #111; border: 1px solid #333; color: white;">
                        <option>Select a Package...</option>
                        <option>Regional Airtime - £199</option>
                        <option>Multi-Regional Airtime - £349</option>
                        <option>Creative Production - £195</option>
                    </select>
                    <textarea placeholder="Message" rows="4" style="padding: 10px; background: #111; border: 1px solid #333; color: white;"></textarea>
                    <button type="submit" style="background: #ff3e00; color: black; border: none; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase;">Send Inquiry</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container" style="text-align: center; padding: 40px 0; color: #444;">
            <p>&copy; 2026 ROCK.SCOT | Built for the West</p>
        </div>
    </footer>

    <script src="player.js"></script>
</body>
</html>
