<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music News | ROCK.SCOT</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; margin: 0; padding: 0; font-family: 'Oswald', sans-serif; overflow-x: hidden; }
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 15px; box-sizing: border-box; }
        #master-player { background: #000; border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; z-index: 2000; width: 100%; }
        .logo-main { width: 100%; max-width: 500px; height: auto; display: block; margin: 0 auto; }
        .nav-menu { margin-top: 15px; display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; }
        .nav-menu a { color: #fff; text-decoration: none; text-transform: uppercase; font-weight: 700; font-size: 0.85rem; }
        .nav-menu a.active { color: #ff3e00; border-bottom: 2px solid #ff3e00; }
        
        /* TICKER STYLES - SLOWED DOWN */
        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            background-color: #111;
            border-bottom: 1px solid #ff3e00;
            padding: 8px 0;
            margin-top: 15px;
        }
        .ticker {
            display: inline-block;
            white-space: nowrap;
            animation: ticker 120s linear infinite; /* SLOWED TO 120 SECONDS */
        }
        .ticker-item {
            display: inline-block;
            padding: 0 50px;
            font-size: 0.85rem;
            color: #fff;
            text-transform: uppercase;
        }
        .ticker-item span { color: #ff3e00; font-weight: 700; margin-right: 10px; }
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); } /* Halfway because we duplicate items for seamless loop */
        }

        .news-header { text-align: center; padding: 20px 0 10px 0; }
        .news-header h1 { font-size: 2.5rem; text-transform: uppercase; margin: 0; color: #ff3e00; }
        .news-article { background: #0a0a0a; border-left: 3px solid #ff3e00; padding: 15px; margin-bottom: 15px; }
        .news-article h2 { text-transform: uppercase; margin: 0 0 5px 0; font-size: 1.2rem; line-height: 1.2; }
        .news-article h2 a { color: #fff; text-decoration: none; }
        .news-date { color: #ff3e00; font-size: 0.7rem; text-transform: uppercase; display: block; margin-bottom: 5px; font-weight: 700; }
        .news-content { font-size: 0.9rem; line-height: 1.3; color: #ccc; }

        .grid-ads { display: flex; gap: 8px; margin: 30px 0; }
        .grid-ads .card-ad { flex: 1; background: #0a0a0a; border: 1px solid #1a1a1a; padding: 10px 5px; text-align: center; }
        .ad-label { text-transform: uppercase; font-size: 0.6rem; color: #888; margin: 0; }
        .ad-price { font-size: 1rem; font-weight: 700; color: #ff3e00; margin: 2px 0; }
        button#play-btn { background: #ff3e00; color: #000; border: none; padding: 6px 12px; font-family: 'Oswald'; font-weight: 700; text-transform: uppercase; cursor: pointer; font-size: 0.7rem; }
    </style>
</head>
<body>
    <div id="master-player">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span style="display: block; font-size: 0.45rem; color: #ff3e00; text-transform: uppercase;">Live Now</span>
                <span id="track-title" style="font-weight: 700; text-transform: uppercase; font-size: 0.65rem;">Ready to Rock</span>
            </div>
            <button id="play-btn">Listen</button>
        </div>
    </div>

    <header style="padding: 10px 0;">
        <div class="container">
            <img src="logo.png" alt="ROCK.SCOT" class="logo-main">
            <nav class="nav-menu">
                <a href="index.html">Listen</a>
                <a href="news.html" class="active">News</a>
                <a href="about.html">About</a>
                <a href="advertise.html">Advertise</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
        <div class="ticker-wrap">
            <div class="ticker" id="album-ticker">
                <div class="ticker-item"><span>NEW RELEASES</span> Loading Scottish Album Ticker...</div>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="news-header"><h1>Music News</h1></section>
        <div id="news-feed-container">
            <p style="text-align:center; color:#444; padding: 40px 0;">Loading Central Scotland Music Feed...</p>
        </div>

        <div class="grid-ads">
            <div class="card-ad"><p class="ad-label">Regional</p><p class="ad-price">£199</p></div>
            <div class="card-ad"><p class="ad-label">Multi</p><p class="ad-price">£349</p></div>
            <div class="card-ad"><p class="ad-label">Creative</p><p class="ad-price">£195</p></div>
        </div>
    </main>

    <footer style="padding: 15px 0; text-align: center; color: #222; font-size: 0.6rem;">&copy; 2026 ROCK.SCOT</footer>

    <script src="player.js"></script>
    <script>
        const proxy = "https://corsproxy.io/?";

        async function loadTicker() {
            const releaseFeed = "https://www.scottishmusicnetwork.co.uk/category/new-album-releases/feed/";
            const ticker = document.getElementById('album-ticker');
            try {
                const res = await fetch(proxy + encodeURIComponent(releaseFeed));
                const text = await res.text();
                const parser = new DOMParser();
                const xml = parser.parseFromString(text, "text/xml");
                const items = xml.querySelectorAll("item");
                if(items.length > 0) {
                    let content = '';
                    items.forEach(item => {
                        const title = item.querySelector("title").textContent;
                        content += `<div class="ticker-item"><span>NEW RELEASE:</span> ${title}</div>`;
                    });
                    // Double the content for a seamless infinite loop
                    ticker.innerHTML = content + content;
                }
            } catch (e) { 
                ticker.innerHTML = '<div class="ticker-item"><span>ROCK.SCOT</span> Scottish Music News Loading...</div>'; 
            }
        }

        async function loadNews() {
            const feedUrl = "https://isthismusic.com/feed"; 
            const container = document.getElementById('news-feed-container');
            try {
                const res = await fetch(proxy + encodeURIComponent(feedUrl));
                const text = await res.text();
                const parser = new DOMParser();
                const xml = parser.parseFromString(text, "text/xml");
                const items = xml.querySelectorAll("item");
                
                if(items.length > 0) {
                    container.innerHTML = '';
                    items.forEach((item, index) => {
                        if (index < 6) {
                            const title = item.querySelector("title").textContent;
                            const link = item.querySelector("link").textContent;
                            let desc = item.querySelector("description") ? item.querySelector("description").textContent : "";
                            desc = desc.replace(/<[^>]*>?/gm, '').substring(0, 160);
                            const date = new Date(item.querySelector("pubDate").textContent).toLocaleDateString('en-GB');
                            
                            const article = document.createElement('article');
                            article.className = 'news-article';
                            article.innerHTML = `<span class="news-date">${date}</span><h2><a href="${link}" target="_blank">${title}</a></h2><div class="news-content">${desc}...</div>`;
                            container.appendChild(article);
                        }
                    });
                }
            } catch (e) { 
                container.innerHTML = '<p style="color:#444; text-align:center; padding: 40px 0;">Music Feed Temporarily Offline.</p>'; 
            }
        }
        
        loadTicker();
        loadNews();
    </script>
</body>
</html>
