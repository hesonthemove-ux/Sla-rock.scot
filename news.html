<main>
    <style>
        /* Ticker specific to this view */
        .ticker-wrap { width: 100%; overflow: hidden; background: #111; border-bottom: 1px solid #ff3e00; padding: 8px 0; }
        .ticker { display: inline-block; white-space: nowrap; animation: ticker 120s linear infinite; }
        .ticker-item { display: inline-block; padding: 0 50px; font-size: 0.85rem; text-transform: uppercase; }
        .ticker-item span { color: #ff3e00; font-weight: 700; margin-right: 10px; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .news-header { text-align: center; padding: 20px 0; }
        .news-header h1 { font-size: 2.5rem; text-transform: uppercase; color: #ff3e00; margin: 0; }
        .news-article { background: #0a0a0a; border-left: 3px solid #ff3e00; padding: 15px; margin-bottom: 15px; }
        .news-article h2 { text-transform: uppercase; margin: 0 0 5px 0; font-size: 1.2rem; }
        .news-article h2 a { color: #fff; text-decoration: none; }
        .news-date { color: #ff3e00; font-size: 0.7rem; text-transform: uppercase; display: block; font-weight: 700; }
        .news-content { font-size: 0.9rem; color: #ccc; }
    </style>

    <div class="ticker-wrap">
        <div class="ticker" id="album-ticker">
            <div class="ticker-item"><span>NEW RELEASES</span> Syncing Scottish Album Ticker...</div>
        </div>
    </div>

    <div class="container">
        <section class="news-header"><h1>Music News</h1></section>
        <div id="news-feed-container">
            <p style="text-align:center; color:#444; padding: 40px 0;">Loading Central Scotland Music Feed...</p>
        </div>
    </div>

    <script>
        (function() {
            const proxy = "https://corsproxy.io/?";
            
            async function loadTicker() {
                const releaseFeed = "https://www.scottishmusicnetwork.co.uk/category/new-album-releases/feed/";
                const ticker = document.getElementById('album-ticker');
                try {
                    const res = await fetch(proxy + encodeURIComponent(releaseFeed));
                    const text = await res.text();
                    const xml = new DOMParser().parseFromString(text, "text/xml");
                    const items = xml.querySelectorAll("item");
                    if(items.length > 0) {
                        let content = '';
                        items.forEach(item => {
                            content += `<div class="ticker-item"><span>NEW RELEASE:</span> ${item.querySelector("title").textContent}</div>`;
                        });
                        ticker.innerHTML = content + content;
                    }
                } catch (e) { ticker.innerHTML = '<div class="ticker-item"><span>ROCK.SCOT</span> Local Music News Loading...</div>'; }
            }

            async function loadNews() {
                const feedUrl = "https://isthismusic.com/feed"; 
                const container = document.getElementById('news-feed-container');
                try {
                    const res = await fetch(proxy + encodeURIComponent(feedUrl));
                    const text = await res.text();
                    const xml = new DOMParser().parseFromString(text, "text/xml");
                    const items = xml.querySelectorAll("item");
                    if(items.length > 0) {
                        container.innerHTML = '';
                        items.forEach((item, index) => {
                            if (index < 6) {
                                const title = item.querySelector("title").textContent;
                                const link = item.querySelector("link").textContent;
                                let desc = item.querySelector("description") ? item.querySelector("description").textContent : "";
                                desc = desc.replace(/<[^>]*>?/gm, '').substring(0, 160);
                                const date = new Date(item.querySelector("pubDate").textContent).toLocaleDateString('en-GB');
                                container.innerHTML += `<article class="news-article"><span class="news-date">${date}</span><h2><a href="${link}" target="_blank">${title}</a></h2><div class="news-content">${desc}...</div></article>`;
                            }
                        });
                    }
                } catch (e) { container.innerHTML = '<p style="text-align:center; padding: 40px 0;">Feed Temporarily Offline.</p>'; }
            }
            loadTicker();
            loadNews();
        })();
    </script>
</main>
