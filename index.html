<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rock.Scot | Universal Authority</title>
    <link rel="stylesheet" href="style.css?v=1769105996">
</head>
<body>
    <div id="bg-layer"></div>
    <div class="master-container">
        <header><img src="assets/branding/logo.png" alt="Rock.Scot"></header>
        <nav>
            <button onclick="tab('live')">Live</button>
            <button onclick="tab('wire')">The Wire</button>
            <button onclick="tab('rates')">Rates</button>
        </nav>
        <main>
            <section id="live" style="display:block;">
                <div class="glass-card">
                    <div id="clock">00:00:00</div>
                    <p>CENTRAL SCOTLAND AUTHORITY</p>
                    <a href="#" class="btn-live">LISTEN LIVE</a>
                </div>
            </section>
        </main>
    </div>
    <script>
        function updateClock() {
            document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0];
            requestAnimationFrame(updateClock);
        }
        updateClock();
    </script>
</body>
</html>
