<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rock.Scot | Scottish Rock Authority</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --orange: #FF6B00; }
        * { box-sizing: border-box; border-radius: 0 !important; }
        body { background: #000; color: #fff; font-family: 'Impact', sans-serif; margin: 0; overflow-x: hidden; }

        /* DESKTOP OPTIMIZATION: Maximize Logo & Graphics */
        @media (min-width: 1024px) {
            header img { width: 80% !important; max-width: 1000px; opacity: 0.3 !important; }
            main { max-width: 1200px; margin: 0 auto; }
            nav { height: 80px; }
            nav button { font-size: 1.2rem !important; }
        }

        header { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; opacity: 0.15; display: flex; align-items: center; justify-content: center; }
        header img { width: 140%; transform: rotate(-5deg); filter: grayscale(1); transition: 0.5s; }

        nav { position: sticky; top: 0; z-index: 1000; background: #000; border-bottom: 5px solid var(--orange); display: grid; grid-template-columns: repeat(4, 1fr); }
        nav button { background: #000; color: #fff; border: 1px solid #222; padding: 15px 2px; font-size: 0.8rem; cursor: pointer; text-transform: uppercase; font-family: 'Impact', sans-serif; }
        nav button.active { background: var(--orange); color: #000; }

        main { position: relative; z-index: 10; padding: 15px; }
        .section { display: none; }
        .section.active { display: block; }
        
        .card { background: #fff; color: #000; padding: 20px; border: 8px solid #000; box-shadow: 10px 10px 0px var(--orange); margin-bottom: 25px; }
        .wire-item { cursor: pointer; border-bottom: 2px solid #000; padding: 15px 0; font-size: 1.1rem; }
        .wire-item:hover { background: #eee; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; padding: 15px; }
        .modal-content { background: var(--orange); color: #000; width: 100%; max-width: 600px; padding: 30px; border: 12px solid #000; }
        
        .crew-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .crew-card { background: #fff; border: 5px solid #000; padding: 10px; color: #000; text-align: center; }
        .crew-card img { width: 100%; filter: grayscale(1); aspect-ratio: 1/1; object-fit: cover; border: 3px solid #000; }
    </style>
</head>
<body>
    <header><img src="./assets/branding/logo.png"></header>
    <nav>
        <button onclick="tab('live')" id="btn-live" class="active">ON AIR</button>
        <button onclick="tab('wire')" id="btn-wire">ROCK WIRE</button>
        <button onclick="tab('crew')" id="btn-crew">THE CREW</button>
        <button onclick="tab('ads')" id="btn-ads">ADVERTISE</button>
    </nav>

    <main>
        <section id="live" class="section active">
            <h1 id="clock" style="font-size: 5rem; text-align: center; margin: 10px 0; color: var(--orange); text-shadow: 4px 4px #000;">00:00:00</h1>
            <div class="card">
                <h2 style="margin-top:0;">SCOTTISH GIGS</h2>
                <div id="gig-list">SYNCING AUTHORITY DATA...</div>
            </div>
        </section>

        <section id="wire" class="section">
            <div class="card" style="background:var(--orange);">
                <h2 style="margin-top:0;">SCOTTISH ROCK WIRE</h2>
                <div id="wire-content">FETCHING INTEL...</div>
            </div>
        </section>

        <section id="crew" class="section">
            <div class="crew-grid" id="crew-list"></div>
        </section>

        <section id="ads" class="section">
            <div id="ads-list"></div>
        </section>
    </main>

    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="m-head" style="font-size: 2rem; line-height: 1; margin: 0 0 15px 0;"></h2>
            <p id="m-body" style="font-family: sans-serif; font-size: 1.1rem; font-weight: bold; line-height: 1.5;"></p>
            <div id="m-footer"></div>
            <button onclick="closeModal()" style="width:100%; padding:15px; background:#000; color:#fff; border:none; margin-top:20px; font-family:'Impact'; cursor:pointer;">BACK TO FEED</button>
        </div>
    </div>

    <script>
        const _sb = supabase.createClient('https://figcmwjdbeurhjopxknp.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpZ2Ntd2pkYmV1cmhqb3B4a25wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4ODI5MDYsImV4cCI6MjA4NDQ1ODkwNn0.iiE65zB0lAsEkJE6lotNU1lORpL94oxZ7-ebHhJ3FgY');

        function tab(t) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.getElementById('btn-'+t).classList.add('active');
            if(t==='live') loadGigs(); if(t==='wire') loadWire(); if(t==='crew') loadCrew(); if(t==='ads') loadAds();
        }

        async function loadGigs() {
            const { data } = await _sb.from('gigs').select('*').order('date', {ascending:true});
            const list = document.getElementById('gig-list');
            list.innerHTML = data && data.length ? data.map(g => `<div style="border-bottom:2px dashed #000; padding:10px 0;"><strong>${g.date}</strong>: ${g.venue} <br> <span style="color:var(--orange); font-size:1.4rem;">${g.act}</span></div>`).join('') : "NO GIGS LOGGED";
        }

        async function loadWire() {
            const { data } = await _sb.from('news_wire').select('*').order('created_at', {ascending:false});
            const cont = document.getElementById('wire-content');
            cont.innerHTML = data ? data.map(n => `
                <div class="wire-item" onclick="openModal('${n.source_name}', '${n.headline.replace(/'/g, "\\'")}', '${n.summary ? n.summary.replace(/'/g, "\\'") : ""}', '${n.source_url}')">
                    <span style="background:#000; color:#fff; padding:2px 5px; font-size:0.8rem;">${n.source_name}</span><br>
                    <strong>${n.headline}</strong>
                </div>
            `).join('') : "WIRE SILENT";
        }

        async function loadAds() {
            const { data } = await _sb.from('ads').select('*');
            document.getElementById('ads-list').innerHTML = data ? data.map(a => `
                <div class="card">
                    <h2 style="margin:0;">${a.title}</h2>
                    <p style="font-family:sans-serif;">${a.description}</p>
                    <div style="background:#000; color:var(--orange); display:inline-block; padding:5px 15px; font-size:1.5rem;">${a.price}</div>
                </div>
            `).join('') : "";
        }

        function loadCrew() {
            const crew = ["Andy","Alex","Stevie","Mhairi","Jude","Chris","Cal","Blue"];
            document.getElementById('crew-list').innerHTML = crew.map(c => `
                <div class="crew-card">
                    <img src="./assets/crew/${c.toLowerCase()}.jpg" onerror="this.src='./assets/branding/logo.png'">
                    <p style="margin:5px 0 0 0;">${c}</p>
                </div>
            `).join('');
        }

        function openModal(title, head, body, link) {
            document.getElementById('m-head').innerText = title + ": " + head;
            document.getElementById('m-body').innerText = body || "Full story available at source.";
            document.getElementById('m-footer').innerHTML = `<a href="${link}" target="_blank" style="color:#000; text-decoration:underline;">READ FULL ARTICLE</a>`;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0]; }, 1000);
        loadGigs();
    </script>
</body>
</html>
