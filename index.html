<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title id="meta-title">ROCK.SCOT | Central Scotland's Loudest Rock Station</title>
    <meta name="description" id="meta-desc" content="Broadcasting the best rock and metal across Central Scotland. Regional airtime and professional sonic identity services.">
    
    <meta property="og:type" content="music.radio_station">
    <meta property="og:title" id="og-title" content="ROCK.SCOT | Central Scotland's Loudest">
    <meta property="og:description" id="og-desc" content="Broadcasting the best rock and metal across Central Scotland.">
    <meta property="og:image" content="https://yourdomain.com/og-image.jpg"> <meta property="og:url" content="https://yourdomain.com">
    <meta property="og:site_name" content="ROCK.SCOT">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" id="tw-title" content="ROCK.SCOT | Central Scotland's Loudest">
    <meta name="twitter:description" id="tw-desc" content="Broadcasting the best rock and metal across Central Scotland.">
    <meta name="twitter:image" content="https://yourdomain.com/og-image.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { background-color: #000; color: #fff; margin: 0; padding: 0; font-family: 'Oswald', sans-serif; overflow-x: hidden; }
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        
        #master-player { background: #000; border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; z-index: 2000; width: 100%; }
        
        /* FIXED BRANDING IDENTITY */
        .logo-main { width: 100%; max-width: 600px; height: auto; display: block; margin: 0 auto; }
        
        .nav-menu { margin-top: 15px; display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; padding-bottom: 10px; }
        .nav-menu a { color: #fff; text-decoration: none; text-transform: uppercase; font-weight: 700; font-size: 0.85rem; cursor: pointer; border-bottom: 2px solid transparent; }
        .nav-menu a.active { color: #ff3e00; border-bottom: 2px solid #ff3e00; }

        #page-content { min-height: 60vh; padding-top: 20px; }

        /* FIXED PRICING TIERS */
        .grid-ads { display: flex; gap: 8px; margin: 40px 0; width: 100%; }
        .grid-ads .card-ad { flex: 1; background: #0a0a0a; border: 1px solid #1a1a1a; padding: 10px 5px; text-align: center; }
        .ad-label { text-transform: uppercase; font-size: 0.6rem; color: #888; margin: 0; }
        .ad-price { font-size: 1rem; font-weight: 700; color: #ff3e00; margin: 2px 0; }
        
        button#play-btn { background: #ff3e00; color: #000; border: none; padding: 6px 12px; font-family: 'Oswald'; font-weight: 700; text-transform: uppercase; cursor: pointer; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="master-player">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span id="track-title" style="font-weight: 700; text-transform: uppercase; font-size: 0.65rem;">Ready to Rock</span>
            </div>
            <button id="play-btn">Listen</button>
        </div>
    </div>

    <header style="padding: 15px 0 0 0;">
        <div class="container">
            <img src="logo.png" alt="ROCK.SCOT" class="logo-main">
            <nav class="nav-menu" id="main-nav">
                <a onclick="loadPage('home.html', this)" id="home-link">Home</a>
                <a onclick="loadPage('news.html', this)">News</a>
                <a onclick="loadPage('about.html', this)">About</a>
                <a onclick="loadPage('advertise.html', this)">Advertise</a>
                <a onclick="loadPage('submit.html', this)">Submit</a>
            </nav>
        </div>
    </header>

    <main id="page-content"></main>

    <footer class="container" style="padding: 20px 0; text-align: center; color: #222; font-size: 0.6rem;">
        <div class="grid-ads">
            <div class="card-ad"><p class="ad-label">Regional</p><p class="ad-price">£199</p></div>
            <div class="card-ad"><p class="ad-label">Multi</p><p class="ad-price">£349</p></div>
            <div class="card-ad"><p class="ad-label">Creative</p><p class="ad-price">£195</p></div>
        </div>
        &copy; 2026 ROCK.SCOT | All Rights Reserved.
    </footer>

    <script src="player.js"></script>
    <script>
        // MASTER SEO & SOCIAL MAPPINGS
        const seoData = {
            'home.html': { title: 'ROCK.SCOT | Central Scotland\'s Loudest Rock Station', desc: 'Stream live Scottish rock. Local news, album releases, and regional advertising.' },
            'news.html': { title: 'Music News | Central Scotland Music Feeds | ROCK.SCOT', desc: 'The latest album releases and music news from across Central Scotland.' },
            'about.html': { title: 'About Us | The Voice of Scottish Rock | ROCK.SCOT', desc: 'Connecting Central Scotland through rock music and supporting local talent.' },
            'advertise.html': { title: 'Advertise | Regional Market Penetration | ROCK.SCOT', desc: 'Regional airtime from £199. Multi-regional from £349. Custom creative for £195.' },
            'submit.html': { title: 'Submit Music | Local Talent Architecture | ROCK.SCOT', desc: 'Get your band on the air. Direct submission architecture for Scottish artists.' }
        };

        async function loadPage(page, element) {
            try {
                const response = await fetch(page);
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const newContent = doc.querySelector('main').innerHTML;
                
                document.getElementById('page-content').innerHTML = newContent;
                document.querySelectorAll('#main-nav a').forEach(a => a.classList.remove('active'));
                if(element) element.classList.add('active');

                // DYNAMIC SEO & SOCIAL UPDATE
                if (seoData[page]) {
                    const data = seoData[page];
                    // Update Title Tags
                    document.title = data.title;
                    document.getElementById('og-title').setAttribute('content', data.title);
                    document.getElementById('tw-title').setAttribute('content', data.title);
                    
                    // Update Descriptions
                    document.getElementById('meta-desc').setAttribute('content', data.desc);
                    document.getElementById('og-desc').setAttribute('content', data.desc);
                    document.getElementById('tw-desc').setAttribute('content', data.desc);
                }

                doc.querySelectorAll('script').forEach(oldScript => {
                    const newScript = document.createElement("script");
                    if (oldScript.src) newScript.src = oldScript.src;
                    else newScript.textContent = oldScript.textContent;
                    document.body.appendChild(newScript);
                });
                window.scrollTo(0,0);
            } catch (err) { console.error("SPA Error:", err); }
        }
        window.onload = () => { loadPage('home.html', document.getElementById('home-link')); };
    </script>
</body>
</html>
