
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock.Scot | Central Scotland’s Rock Authority</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Bebas+Neue&family=Inter:wght@300;400;700;900&displayBASE STYLES -->
<style>
:root {
  --rock-orange: #ff4d00;
  --rock-bg: #000;
  --rock-panel: #0a0a0a;
  --rock-light: #ffffff;
  --rock-dark: #000000;
}

/* DARK MODE (AUTO + MANUAL) */
@media (prefers-color-scheme: light) {
  :root {
    --rock-bg: #fafafa;
    --rock-light: #000;
   rock-light);
  font-family: 'Inter', sans-serif;
}

/* HEADER */
header {
  text-align: center;
  padding-top: 20px;
}
header img {
  width: 100%;
  max-width: 1100px;
  height: auto;
}

/* TICKER */
#ticker {
  width: 100%;
  overflow: hidden;
  white-space: nowrap;
  background: var(--rock-dark);
  border-top: 1px solid #333;
  border-bottom: 1px solid #333;
  padding: 10px 0;
  font-family: 'Oswald';
  color: var(--rock-orange);
}
#ticker span {
  display: inline-block;
  padding-left: 100%;
  animation: tickmove 22s linear infinite;
}
@keyframes tickmove { from {transform: translateX(0);} to {transform: translateX(-100%);} }

/* NAV */
nav {
  display: flex;
  background: #050505;
  border-bottom: 3px solid var(--rock-orange);
}
nav button {
  flex: 1;
  background: transparent;
  border: none;
  color: #aaa;
  font-family: 'Bebas Neue';
  font-size: 1.4rem;
  padding: 16px 0;
  cursor: pointer;
}
nav .active {
  color: var(--rock-orange);
  background: rgba(255,80,0,0.1);
}

/* SECTIONS */
section { display: none; padding: 25px 10px; max-width: 1100px; margin: auto; }
section.active { display: block; }

/* LIVE PANEL */
.live-box {
  background: var(--rock-panel);
  border: 2px solid #222;
  padding: 40px;
  text-align: center;
}
#track-title {
  font-family: 'Bebas Neue';
  font-size: 3rem;
  color: var(--rock-orange);
  margin-bottom: 30px;
}

/* DJ GRID */
.dj-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}
@media(max-width:700px){
  .dj-grid { grid-template-columns: 1fr; }
}
.dj-card {
  position: relative;
  border: 1px solid #333;
  background: #111;
  overflow: hidden;
  cursor: pointer;
}
.dj-card img {
  width: 100%; height: 300px; object-fit: cover;
  filter: grayscale(100%); transition: .4s;
}
.dj-card:hover img {
  filter: grayscale(0%) brightness(1.1);
  transform: scale(1.05);
}
.dj-name {
  position: absolute; bottom: 0; width: 100%;
  background: linear-gradient(0deg, #000, transparent);
  padding: 20px;
  font-family: 'Bebas Neue';
  font-size: 2rem;
  color: var(--rock-light);
}

/* MODAL */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.8);
  display: none; justify-content: center; align-items: center;
}
.modal {
  width: 90%; max-width: 600px;
  background: #111;
  padding: 30px;
  border-left: 5px solid var(--rock-orange);
}
.close-modal {
  float:right; font-size:2rem; cursor:pointer;
}

/* CALCULATOR */
.calc-panel {
  background: #111; padding: 20px;
  border-left: 4px solid var(--rock-orange);
}

/* CONTACT FORM */
.contact-box {
  background:#111; padding:20px; border-left:4px solid var(--rock-orange);
}
.contact-box input, .contact-box textarea {
  width:100%; padding:12px; margin-bottom:10px;
  background:#000; border:1px solid #333; color:#fff;
}

/* BUTTON */
.btn-rock {
  background: linear-gradient(180deg, var(--rock-orange), #992200);
  border: none;
  padding: 14px 20px;
  font-family: 'Bebas Neue';
  font-size: 1.4rem;
  width: 100%;
  cursor: pointer;
  color: #fff;
}

/* DARK MODE TOGGLE */
#dark-toggle {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #111;
  border: 1px solid #666;
  padding: 10px 15px;
  color: #fff;
  font-family:'Bebas Neue';
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  top_banner.png
</header>

<div id="ticker">
  <span>AUTHORITY WIRE // SCANNING CENTRAL SCOTLAND // INITIALIZING LIVE ROCK FEED // STANDBY...</span>
</div>

<nav>
  <button class="active" onclick="showPage('live', this)">LIVE</button>
  <button onclick="showPage('crew', this)">CREW</button>
  <button onclick="showPage('submit', this)">SUBMIT</button>
  <button onclick="showPage('advertise', this)">ADVERTISE</button>
  <button onclick="showPage('contact', this)">CONTACT</button>
</nav>

<!-- LIVE -->
<section id="live" class="active">
  <div class="live-box">
    <div id="track-title">SIGNAL STANDBY</div>
    <button class="btn-rock" onclick="toggleStream()" id="stream-btn">ENGAGE SIGNAL</button>
  </div>
</section>

<!-- CREW -->
<section id="crew">
  <div class="dj-grid" id="djGrid"></div>
</section>

<!-- SUBMIT -->
<section id="submit">
  <div class="contact-box">
    <h2 style="font-family:'Bebas Neue'; font-size:2.4rem;">SUBMIT YOUR TRACK</h2>
    <input type="text" placeholder="Band Name">
    <input type="text" placeholder="Streaming Link">
    <textarea placeholder="Tell us about your track..." rows="4"></textarea>
    <button class="btn-rock">TRANSMIT</button>
  </div>
</section>

<!-- ADVERTISE -->
<section id="advertise">
  <div class="calc-panel">
    <h2 style="font-family:'Bebas Neue'; font-size:2.4rem;">ADVERTISING CALCULATOR</h2>
    <select id="pkg" class="calc-input">
      <option value="299">Regional (£299/28 days)</option>
      <option value="449">Multi-Regional (£449/28 days)</option>
    </select>
    <input type="date" id="start">
    <input type="date" id="end">
    <button class="btn-rock" onclick="calc()">CALCULATE</button>
    <p id="result" style="margin-top:10px; font-weight:bold;"></p>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <div class="contact-box">
    <h2 style="font-family:'Bebas Neue'; font-size:2.4rem;">CONTACT STUDIO</h2>
    <input id="cname" type="text" placeholder="Your Name">
    <input id="cemail" type="email" placeholder="Your Email">
    <textarea id="cmsg" placeholder="Message..." rows="4"></textarea>
    <button class="btn-rock" onclick="sendContact()">SEND MESSAGE</button>
    <p id="cresponse" style="margin-top:10px;"></p>
  </div>
</section>

<!-- MODAL -->
<div class="modal-bg" id="bioModal">
  <div class="modal">
    <div class="close-modal" onclick="closeBio()">×</div>
    <h2 id="bioName" style="font-family:'Bebas Neue';"></h2>
    <p id="bioRole"></p>
    <p id="bioText"></p>
    <p><strong>BAND:</strong> <span id="bioBand"></span></p>
    <p><strong>VENUE:</strong> <span id="bioVenue"></span></p>
    <p><strong>FACT:</strong> <span id="bioFact"></span></p>
  </div>
</div>

<!-- DARK MODE TOGGLE -->
<div id="dark-toggle" onclick="toggleDark()">🌙 MODE</div>

<script>
// NAVIGATION
function showPage(id, btn){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  window.scrollTo(0,0);
}

// STREAM
const stream = new Audio("https://uksoutha.streaming.broadcast.radio/stream/16641/caledonia-tx-ltd");
function toggleStream(){
  const t=document.getElementById("track-title");
  const b=document.getElementById("stream-btn");
  if(stream.paused){
    stream.play();
    t.innerText="LIVE: CENTRAL SCOTLAND’S ROCK";
    b.innerText="TERMINATE SIGNAL";
  } else {
    stream.pause();
    t.innerText="SIGNAL STANDBY";
    b.innerText="ENGAGE SIGNAL";
  }
}

// CREW
const crew = [
  {id:"dj_andy", name:"Andy", role:"Rock Rebel", bio:"High‑energy playlists", band:"Biffy Clyro", venue:"King Tuts", fact:"Once crowd‑surfed in a kilt."},
  {id:"dj_blue", name:"Blue", role:"Blues Maverick", bio:"Coastal riffs expert", band:"Nazareth", venue:"Coats Paisley", fact:"Mistaken for a Mogwai roadie."},
  {id:"dj_mhairi", name:"Mhairi", role:"Hard Rock Queen", bio:"Champion of Scottish indie", band:"JAMC", venue:"Kilmarnock Grand Hall", fact:"Tattoo artist."},
  {id:"dj_stevie", name:"Stevie", role:"Headbanger", bio:"AC/DC purist", band:"Big Country", venue:"Beacon Arts Centre", fact:"High‑fived Angus Young."}
];

function loadCrew(){
  let html="";
  crew.forEach(c=>{
    html+=`
      <div class="dj-card" onclick="openBio('${c.id}')">
        ${c.id}.jpg
        <div class="dj-name">${c.name}</div>
      </div>
    `;
  });
  document.getElementById("djGrid").innerHTML = html;
}

// BIO MODAL
function openBio(id){
  const c = crew.find(x=>x.id===id);
  document.getElementById("bioName").innerText=c.name;
  document.getElementById("bioRole").innerText=c.role;
  document.getElementById("bioText").innerText=c.bio;
  document.getElementById("bioBand").innerText=c.band;
  document.getElementById("bioVenue").innerText=c.venue;
  document.getElementById("bioFact").innerText=c.fact;
  document.getElementById("bioModal").style.display="flex";
}
function closeBio(){ document.getElementById("bioModal").style.display="none"; }

// CALCULATOR
function calc(){
  const base=parseFloat(document.getElementById("pkg").value);
  const s=new Date(document.getElementById("start").value);
  const e=new Date(document.getElementById("end").value);
  if(e<=s){document.getElementById("result").innerText="Invalid dates.";return;}
  const days=(e-s)/(1000*60*60*24);
  let cost=(base/28)*days;
  if(days<28) cost*=1.3;
  document.getElementById("result").innerText="£"+cost.toFixed(2);
}

// CONTACT
function sendContact(){
  document.getElementById("cresponse").innerText="Message sent! We’ll be in touch.";
}

// DARK MODE
function toggleDark(){
  document.body.classList.toggle("dark-mode");
}

// INIT
loadCrew();
</script>

</body>
</html>
