<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rock.Scot | Central Scotland's Rock Authority</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --authority-orange: #ff5500; 
            --phantom-glass: rgba(0, 0, 0, 0.08); /* Extreme Transparency */
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* FIXED HEADER - Solid to ensure legibility of branding */
        header { 
            position: sticky; top: 0; z-index: 9999; 
            background: #000; width: 100%;
            display: flex; flex-direction: column; align-items: center;
        }
        
        .hdr-logo { 
            width: 100%; max-width: 450px; height: auto; 
            padding: 15px 0; display: block;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.8));
        }

        .nav-strip { 
            width: 100%; background: rgba(0,0,0,0.95); 
            border-bottom: 4px solid var(--authority-orange);
            display: flex; height: 60px;
        }

        .nav-btn { flex: 1; background: transparent; border: none; color: #777; font-family: 'Bebas Neue'; font-size: 1.2rem; cursor: pointer; }
        .nav-btn.active { color: var(--authority-orange); background: rgba(255,85,0,0.1); }

        /* ATMOSPHERIC BACKGROUNDS */
        .view { 
            display: none; min-height: 100vh; width: 100%; padding: 40px 20px; 
            background-size: cover; background-position: center; background-attachment: fixed;
            transition: background-image 0.5s ease-in-out;
        }
        .view.active { display: flex; flex-direction: column; align-items: center; }

        /* PHANTOM GLASS OVERLAYS - Let the news.jpg images be seen */
        .uniform-card { 
            width: 320px; height: 480px; 
            background: var(--phantom-glass);
            backdrop-filter: blur(60px); -webkit-backdrop-filter: blur(60px);
            border: 1px solid var(--glass-border); 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 30px; text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5); /* Lighter shadow for transparency */
        }

        /* WIRE GRID (Center Aligned) */
        #rss-feed { 
            display: grid; grid-template-columns: repeat(auto-fill, 320px); gap: 25px; 
            width: 100%; max-width: 1400px; padding: 40px; justify-content: center; 
        }
        .wire-item {
            background: rgba(0,0,0,0.4); /* Transparent enough to see news.jpg behind it */
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            cursor: pointer;
        }

        /* CREW ALIGNMENT */
        .crew-container { 
            display: flex; gap: 20px; overflow-x: auto; width: 100%; 
            padding: 20px 50px; scrollbar-width: none; 
            -webkit-overflow-scrolling: touch;
        }
        .crew-card { min-width: 320px; height: 480px; background: #000; border: 1px solid #222; position: relative; cursor: pointer; filter: grayscale(100%); transition: 0.5s; }
        .crew-card.active-color { filter: grayscale(0%); border: 3px solid var(--authority-orange); transform: scale(1.05); z-index: 5; }
        .crew-label { position: absolute; bottom: 0; width: 100%; background: linear-gradient(0deg, #000 20%, transparent 100%); padding: 30px; font-family: 'Bebas Neue'; font-size: 2.2rem; text-align: center; }

        /* MODAL (ONE PAGE RULE + TRANSPARENCY) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; display: none; padding: 20px; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .mag-layout { 
            max-width: 500px; border: 10px solid #fff; padding: 30px; 
            background: rgba(0,0,0,0.9); /* Darker for content reading */
            width: 95%; max-height: 85vh; overflow-y: auto; 
        }
        .mag-inner h2 { font-family: 'Oswald'; font-size: 2.2rem; line-height: 1; text-transform: uppercase; margin-bottom: 15px; }

        .std-input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; font-family: 'Oswald'; margin-bottom: 10px; }
        .btn-authority { width: 100%; padding: 18px; background: var(--authority-orange); border: none; color: #fff; font-family: 'Bebas Neue'; font-size: 1.6rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="mag-modal" class="modal-overlay" onclick="this.classList.remove('open')">
        <div class="mag-layout" onclick="event.stopPropagation()">
            <div style="font-family:'Bebas Neue'; color:var(--authority-orange); letter-spacing:2px;">AUTHORITY DOSSIER</div>
            <h2 id="mag-name"></h2>
            <div id="mag-content" style="border-top:1px solid #333; padding-top:15px; word-wrap: break-word;"></div>
        </div>
    </div>

    <header>
        <img src="top_banner.png" class="hdr-logo" alt="Rock.Scot">
        <nav class="nav-strip">
            <button class="nav-btn active" onclick="showTab('live')">LIVE</button>
            <button class="nav-btn" onclick="showTab('wire')">WIRE</button>
            <button class="nav-btn" onclick="showTab('crew')">CREW</button>
            <button class="nav-btn" onclick="showTab('rates')">RATES</button>
            <button class="nav-btn" onclick="showTab('submit')">SUBMIT</button>
        </nav>
    </header>

    <main>
        <section id="v-live" class="view active">
            <div class="uniform-card">
                <div id="live-clock" style="font-family:'Bebas Neue'; font-size:5.5rem; line-height:0.9;">00:00</div>
                <div id="clock-tag" style="font-family:'Oswald'; color:var(--authority-orange); letter-spacing:5px; margin-bottom:15px;">ROCKIN' SCOTLAND</div>
                <button class="btn-authority" onclick="window.open('https://player.broadcast.radio/caledonia-tx-ltd')">ENGAGE SIGNAL</button>
            </div>
        </section>

        <section id="v-wire" class="view">
            <div id="rss-feed"></div>
        </section>

        <section id="v-crew" class="view">
            <div class="crew-container" id="crew-rolodex"></div>
        </section>

        <section id="v-rates" class="view">
            <div class="uniform-card">
                <h2 style="font-family:'Bebas Neue'; font-size:3.5rem; color:var(--authority-orange);">RATES</h2>
                <button class="btn-authority" onclick="openRates()">VIEW PACKS</button>
            </div>
        </section>

        <section id="v-submit" class="view">
            <div class="uniform-card">
                <h2 style="font-family:'Bebas Neue'; font-size:3.5rem; color:var(--authority-orange);">SUBMIT</h2>
                <button class="btn-authority" onclick="openSubmit()">OPEN PORTAL</button>
            </div>
        </section>
    </main>

<script>
    const feeds = ["https://www.theskinny.co.uk/rss/music", "https://podcart.co/feed/", "https://discoverymusicscotland.com/feed/", "https://jockrock.org/feed/"];

    const crewData = [
        { id: "andy", name: "ANDY", bio: "Hailing from East Kilbride, Andy grew up blasting Biffy Clyro anthems. He started pirate radio in his garage before joining the Authority.", band: "Biffy Clyro", gig: "Franz Ferdinand @ Barrowlands", venue: "King Tut's", fact: "Lost a shoe crowd-surfing.", img: "dj_andy.jpg", clicks: 0 },
        { id: "alex", name: "ALEX", bio: "Johnstone spirit. Alex discovered rock via his dad's Nazareth collection and spent years hunting for rare vinyl in Glasgow.", band: "Nazareth", gig: "Texas @ SEC Armadillo", venue: "Barrowland", fact: "Has a signed Deacon Blue vinyl.", img: "dj_alex.jpg", clicks: 0 },
        { id: "stevie", name: "STEVIE", bio: "Port Glasgow shipbuilding heart. Stevie was raised on Clyde rockers and believes rock music is the only true Scottish export.", band: "Big Country", gig: "Mogwai @ Òran Mór", venue: "Beacon Arts", fact: "High-fived Angus Young.", img: "dj_stevie.jpg", clicks: 0 },
        { id: "mhairi", name: "MHAIRI", bio: "Hamilton born and bred. Mhairi is obsessed with distortion pedals and finding the loudest tracks in Central Scotland.", band: "Jesus and Mary Chain", gig: "Teenage Fanclub @ King Tut's", venue: "Grand Hall", fact: "Qualified tattoo artist.", img: "dj_mhairi.jpg", clicks: 0 },
        { id: "jude", name: "JUDE", bio: "North Ayrshire stomp. Jude climbed the ranks from local open mics to championing the newest acts on the Scottish rock scene.", band: "Travis", gig: "Idlewild @ Barrowlands", venue: "Harbour Arts", fact: "Hitchhiked for Franz Ferdinand.", img: "dj_jude.jpg", clicks: 0 },
        { id: "chris", name: "CHRIS", bio: "Greenock bred on Primal Scream. Chris joined Rock.Scot to bring pure, unfiltered energy to the West Coast airwaves.", band: "Primal Scream", gig: "Simple Minds @ OVO Hydro", venue: "Cathouse", fact: "Owns every Big Country album.", img: "dj_chris.jpg", clicks: 0 },
        { id: "cal", name: "CAL", bio: "Kilmarnock heartlands specialist. Cal lives for the sound of a roaring crowd and the smell of a muddy festival field.", band: "Biffy Clyro", gig: "The Fratellis @ Grand Hall", venue: "Palace Theatre", fact: "Air guitar champion 2018.", img: "dj_cal.jpg", clicks: 0 },
        { id: "blue", name: "BLUE", bio: "Gourock seaside charm. Blue blends bluesy riffs with modern rock energy for the perfect evening drive.", band: "Nazareth", gig: "Texas @ Paisley Arts", venue: "Coats Paisley", fact: "Once mistaken for a roadie.", img: "dj_blue.jpg", clicks: 0 }
    ];

    function showTab(name) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        const activeView = document.getElementById('v-' + name);
        activeView.style.display = 'flex';
        
        // Ensure background images (news1-7) are visible as atmospheric backdrops
        const randomBg = `news${Math.floor(Math.random()*7)+1}.jpg`;
        activeView.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('${randomBg}')`;
        
        event.currentTarget.classList.add('active');
        if(name === 'wire') fetchMultiRSS();
        if(name === 'crew') renderCrew();
    }

    async function fetchMultiRSS() {
        const container = document.getElementById('rss-feed');
        container.innerHTML = "<p>SYNCING WIRE...</p>";
        let allItems = [];
        for (const url of feeds) {
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&t=${Date.now()}`);
                const data = await res.json();
                if(data.items) allItems = [...allItems, ...data.items];
            } catch(e) {}
        }
        allItems.sort(() => Math.random() - 0.5);
        container.innerHTML = allItems.slice(0,12).map(item => {
            let thumb = item.thumbnail || item.enclosure.link || (item.description.match(/<img[^>]+src="([^">]+)"/) ? item.description.match(/<img[^>]+src="([^">]+)"/)[1] : "logo.png");
            return `<div class="wire-item" onclick="window.open('${item.link}')">
                <img src="${thumb}" style="width:100%; height:200px; object-fit:cover; border-bottom:1px solid #222;" onerror="this.src='logo.png'">
                <div style="padding:15px;"><h3 style="font-family:'Oswald'; font-size:1rem; line-height:1.2;">${item.title}</h3></div>
            </div>`;
        }).join('');
    }

    function renderCrew() {
        const container = document.getElementById('crew-rolodex');
        container.innerHTML = crewData.map(dj => `
            <div class="crew-card" id="card-${dj.id}" onclick="handleCrewClick('${dj.id}')">
                <img src="${dj.img}" style="width:100%; height:100%; object-fit:cover;" onerror="this.src='logo.png'">
                <div class="crew-label">${dj.name}</div>
            </div>`).join('');
    }

    function handleCrewClick(id) {
        const dj = crewData.find(d => d.id === id);
        dj.clicks++;
        const card = document.getElementById('card-' + id);
        if(dj.clicks === 1) {
            document.querySelectorAll('.crew-card').forEach(c => c.classList.remove('active-color'));
            card.classList.add('active-color');
            setTimeout(() => { if(dj.clicks === 1) dj.clicks = 0; }, 2500);
        } else if(dj.clicks === 2) {
            document.getElementById('mag-name').innerText = dj.name;
            document.getElementById('mag-content').innerHTML = `
                <p style="font-size:1.1rem; line-height:1.4; color:#ccc;">${dj.bio}</p>
                <div style="margin-top:15px; font-family:Oswald; color:var(--authority-orange); text-transform:uppercase; font-size:0.95rem;">
                <p>FAV BAND: ${dj.band}</p><p>BEST GIG: ${dj.gig}</p><p>FAV VENUE: ${dj.venue}</p><p>FACT: ${dj.fact}</p></div>`;
            document.getElementById('mag-modal').classList.add('open');
            dj.clicks = 0; card.classList.remove('active-color');
        }
    }

    function openRates() {
        document.getElementById('mag-name').innerText = "ADVERTISING";
        document.getElementById('mag-content').innerHTML = `
            <div style="font-family:Oswald; font-size:1.2rem; line-height:1.6;">
                <p>REGIONAL: <span style="color:var(--authority-orange);">£299</span></p>
                <p>MULTI-REGIONAL: <span style="color:var(--authority-orange);">£449</span></p>
                <p>PRODUCTION: <span style="color:var(--authority-orange);">£195</span></p>
            </div>
            <button class="btn-authority" style="margin-top:20px;">BOOK NOW</button>`;
        document.getElementById('mag-modal').classList.add('open');
    }

    function openSubmit() {
        document.getElementById('mag-name').innerText = "TRANSMIT";
        document.getElementById('mag-content').innerHTML = `
            <input type="text" placeholder="BAND NAME" class="std-input">
            <input type="text" placeholder="TRACK LINK" class="std-input">
            <textarea placeholder="PITCH THE SIGNAL..." class="std-input" style="height:100px;"></textarea>
            <button class="btn-authority">SEND SIGNAL</button>`;
        document.getElementById('mag-modal').classList.add('open');
    }

    function updateLiveUI() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
    }

    setInterval(updateLiveUI, 5000);
    window.onload = updateLiveUI;
</script>
</body>
</html>
