<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rock.Scot | Central Scotland's Rock Authority</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --authority-orange: #ff5500; 
            --phantom-glass: rgba(255, 255, 255, 0.05); 
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        header { 
            position: sticky; top: 0; z-index: 9999; 
            background: #000; width: 100%;
            display: flex; flex-direction: column; align-items: center;
        }
        
        .hdr-logo { 
            width: 100%; max-width: 450px; height: auto; 
            padding: 15px 0; display: block;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.8));
        }

        .nav-strip { 
            width: 100%; background: rgba(0,0,0,0.95); 
            border-bottom: 4px solid var(--authority-orange);
            display: flex; height: 60px;
        }

        .nav-btn { flex: 1; background: transparent; border: none; color: #777; font-family: 'Bebas Neue'; font-size: 1.2rem; cursor: pointer; }
        .nav-btn.active { color: var(--authority-orange); background: rgba(255,85,0,0.1); }

        .view { 
            display: none; min-height: 100vh; width: 100%; padding: 40px 20px; 
            background-size: cover; background-position: center; background-attachment: fixed;
            transition: background-image 0.8s ease-in-out;
        }
        .view.active { display: flex; flex-direction: column; align-items: center; }

        .uniform-card { 
            width: 320px; height: 480px; 
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        /* 3D ARCHIVE VIEWPORT */
        .archive-viewport {
            perspective: 1500px;
            width: 100%;
            height: 600px;
            display: flex;
            align-items: center;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 0 35%;
            scrollbar-width: none;
        }
        .archive-viewport::-webkit-scrollbar { display: none; }

        .crew-card-3d {
            min-width: 280px;
            height: 420px;
            margin: 0 -50px;
            background: var(--phantom-glass);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), filter 0.5s;
            filter: grayscale(100%) brightness(0.4);
            cursor: pointer;
            -webkit-box-reflect: below 2px linear-gradient(transparent, rgba(0,0,0,0.15));
        }

        .crew-card-3d.focus {
            filter: grayscale(0%) brightness(1.2);
            transform: translateZ(150px) rotateY(0deg) !important;
            z-index: 100;
            border-color: var(--authority-orange);
            box-shadow: 0 0 30px rgba(255,85,0,0.3);
        }

        .crew-label-3d {
            position: absolute; bottom: 0; width: 100%;
            padding: 25px; background: linear-gradient(transparent, rgba(0,0,0,0.9));
            font-family: 'Bebas Neue'; font-size: 2.2rem; text-align: center;
            text-shadow: var(--text-shadow);
        }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; display: none; padding: 20px; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .mag-layout { max-width: 500px; border: 8px solid #fff; padding: 30px; background: #000; width: 95%; max-height: 85vh; overflow-y: auto; }

        .btn-authority { width: 100%; padding: 18px; background: var(--authority-orange); border: none; color: #fff; font-family: 'Bebas Neue'; font-size: 1.6rem; cursor: pointer; }
        .std-input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; font-family: 'Oswald'; margin-bottom: 10px; }
        .std-label { display: block; font-family: 'Oswald'; font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        
        .on-air {
            display: inline-block; width: 10px; height: 10px;
            background: #ff0000; border-radius: 50%;
            margin-right: 8px; vertical-align: middle;
            box-shadow: 0 0 10px #ff0000;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="mag-modal" class="modal-overlay" onclick="this.classList.remove('open')">
        <div class="mag-layout" onclick="event.stopPropagation()">
            <div style="font-family:'Bebas Neue'; color:var(--authority-orange); letter-spacing:2px;">AUTHORITY DOSSIER</div>
            <h2 id="mag-name" style="font-family:'Oswald'; font-size:2.5rem; text-transform:uppercase;"></h2>
            <div id="mag-content" style="border-top:1px solid #333; padding-top:15px; font-family:'Inter'; line-height:1.6; color:#ccc;"></div>
        </div>
    </div>

    <header>
        <img src="top_banner.png" class="hdr-logo" alt="Rock.Scot">
        <nav class="nav-strip">
            <button class="nav-btn active" onclick="showTab('live')">LIVE</button>
            <button class="nav-btn" onclick="showTab('wire')">WIRE</button>
            <button class="nav-btn" onclick="showTab('crew')">CREW</button>
            <button class="nav-btn" onclick="showTab('rates')">RATES</button>
            <button class="nav-btn" onclick="showTab('submit')">SUBMIT</button>
        </nav>
    </header>

    <main>
        <section id="v-live" class="view active">
            <div class="uniform-card">
                <div id="live-clock" style="font-family:'Bebas Neue'; font-size:4.5rem; line-height:0.9;">00:00</div>
                <div id="clock-tag" style="font-family:'Oswald'; color:var(--authority-orange); letter-spacing:5px; margin-bottom:15px;">
                    <span class="on-air"></span>ROCKIN' SCOTLAND
                </div>
                <iframe src="https://player.broadcast.radio/caledonia-tx-ltd" style="width:100%; height:260px; border:none; background:transparent;" allow="autoplay" allowtransparency="true"></iframe>
            </div>
        </section>

        <section id="v-wire" class="view">
            <div id="rss-feed" style="display: grid; grid-template-columns: repeat(auto-fill, 320px); gap: 25px; width:100%; justify-content: center;"></div>
        </section>

        <section id="v-crew" class="view">
            <div class="archive-viewport" id="crew-3d-wrap" onscroll="animate3D()"></div>
        </section>

        <section id="v-rates" class="view">
            <div class="uniform-card">
                <h2 style="font-family:'Bebas Neue'; font-size:3.5rem; color:var(--authority-orange);">RATES</h2>
                <p style="font-family:'Oswald'; letter-spacing:1px; margin-bottom:20px; color:#888;">ADVERTISING PORTAL</p>
                <button class="btn-authority" onclick="openRates()">OPEN AD PORTAL</button>
            </div>
        </section>

        <section id="v-submit" class="view">
            <div class="uniform-card" id="submit-card-content">
                <h2 style="font-family:'Bebas Neue'; font-size:3.5rem; color:var(--authority-orange);">SUBMIT</h2>
                <button class="btn-authority" onclick="openSubmit()">SEND SIGNAL</button>
            </div>
        </section>
    </main>

<script>
    const crewData = [
        { id: "andy", name: "ANDY", bio: "Hailing from East Kilbride. Biffy Clyro fanatic.", band: "Biffy Clyro", gig: "Franz Ferdinand @ Barrowlands", img: "dj_andy.jpg" },
        { id: "alex", name: "ALEX", bio: "Johnstone spirit. Nazareth collector.", band: "Nazareth", gig: "Texas @ SEC Armadillo", img: "dj_alex.jpg" },
        { id: "stevie", name: "STEVIE", bio: "Port Glasgow shipbuilding heart.", band: "Big Country", gig: "Mogwai @ Òran Mór", img: "dj_stevie.jpg" },
        { id: "mhairi", name: "MHAIRI", bio: "Hamilton born and bred. Pedal obsessed.", band: "Jesus and Mary Chain", gig: "Teenage Fanclub @ King Tut's", img: "dj_mhairi.jpg" },
        { id: "jude", name: "JUDE", bio: "North Ayrshire stomp.", band: "Travis", gig: "Idlewild @ Barrowlands", img: "dj_jude.jpg" },
        { id: "chris", name: "CHRIS", bio: "Greenock bred on Primal Scream.", band: "Primal Scream", gig: "Simple Minds @ OVO Hydro", img: "dj_chris.jpg" },
        { id: "cal", name: "CAL", bio: "Kilmarnock heartlands specialist.", band: "Biffy Clyro", gig: "The Fratellis @ Grand Hall", img: "dj_cal.jpg" },
        { id: "blue", name: "BLUE", bio: "Gourock seaside charm.", band: "Nazareth", gig: "Texas @ Paisley Arts", img: "dj_blue.jpg" }
    ];

    function showTab(name) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        const activeView = document.getElementById('v-' + name);
        activeView.style.display = 'flex';
        activeView.style.backgroundImage = `url('news${Math.floor(Math.random()*7)+1}.jpg')`;
        event.currentTarget.classList.add('active');
        if(name === 'crew') { render3DCrew(); setTimeout(animate3D, 100); }
    }

    function render3DCrew() {
        const wrap = document.getElementById('crew-3d-wrap');
        wrap.innerHTML = crewData.map(dj => `
            <div class="crew-card-3d" id="c3d-${dj.id}" onclick="handle3DClick('${dj.id}')">
                <img src="${dj.img}" style="width:100%; height:100%; object-fit:cover;" onerror="this.src='logo.png'">
                <div class="crew-label-3d">${dj.name}</div>
            </div>`).join('');
    }

    function animate3D() {
        const wrap = document.getElementById('crew-3d-wrap');
        const cards = document.querySelectorAll('.crew-card-3d');
        const centerX = wrap.scrollLeft + (wrap.offsetWidth / 2);

        cards.forEach(card => {
            const cardCenter = card.offsetLeft + (card.offsetWidth / 2);
            const distance = cardCenter - centerX;
            const angle = distance / 12;
            const absDist = Math.abs(distance);
            
            card.style.transform = `rotateY(${angle}deg) translateZ(${-absDist/1.5}px)`;
            card.classList.toggle('focus', absDist < 100);
        });
    }

    function handle3DClick(id) {
        const dj = crewData.find(d => d.id === id);
        const card = document.getElementById('c3d-' + id);
        if(!card.classList.contains('focus')) {
            card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            return;
        }
        document.getElementById('mag-name').innerText = dj.name;
        document.getElementById('mag-content').innerHTML = `
            <p style="margin-bottom:15px;">${dj.bio}</p>
            <div style="font-family:Oswald; text-transform:uppercase; color:var(--authority-orange);">
                <p>ULTIMATE BAND: ${dj.band}</p>
                <p>BEST GIG: ${dj.gig}</p>
            </div>`;
        document.getElementById('mag-modal').classList.add('open');
    }

    /* AD ENGINE - LOCKED LOGIC */
    const baseRates = { regional: 299, multi: 449 };
    const CREATIVE_FEE = 195;

    function openRates() {
        document.getElementById('mag-name').innerText = "ADVERTISING PORTAL";
        document.getElementById('mag-content').innerHTML = `
            <select id="rate-select" class="std-input" onchange="updateCalc()">
                <option value="regional">REGIONAL (£299 / 28 days)</option>
                <option value="multi">MULTI-REGIONAL (£449 / 28 days)</option>
            </select>
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label class="std-label">Start Date</label><input type="date" id="rate-date" class="std-input"></div>
                <div style="flex:1;"><label class="std-label">Days Total</label><input type="number" id="rate-days" class="std-input" value="28" onchange="updateCalc()"></div>
            </div>
            <div style="background:#111; padding:10px; border:1px solid #333; margin-bottom:10px; display:flex; align-items:center; gap:10px;">
                <input type="checkbox" id="creative-addon" onchange="updateCalc()">
                <label class="std-label" style="margin:0;">ADD CREATIVE PACKAGE (+£195)</label>
            </div>
            <div style="background:#050505; padding:20px; border:1px solid var(--authority-orange); text-align:right;">
                <div id="surcharge-msg" style="color:var(--authority-orange); font-size:0.75rem; font-family:Oswald; margin-bottom:5px; display:none;">+30% SHORT-TERM SURCHARGE APPLIED</div>
                <h3 id="calc-total" style="font-family:'Oswald'; font-size:2.2rem; color:var(--authority-orange);">£299</h3>
            </div>
            <button class="btn-authority" style="margin-top:10px;" onclick="sendSignal()">SEND BOOKING SIGNAL</button>`;
        document.getElementById('mag-modal').classList.add('open');
    }

    function updateCalc() {
        const type = document.getElementById('rate-select').value;
        const days = parseInt(document.getElementById('rate-days').value) || 0;
        const creative = document.getElementById('creative-addon').checked;
        let base = (baseRates[type] / 28) * days;
        if (days < 28 && days > 0) {
            base *= 1.30;
            document.getElementById('surcharge-msg').style.display = 'block';
        } else {
            document.getElementById('surcharge-msg').style.display = 'none';
        }
        document.getElementById('calc-total').innerText = `£${Math.round(base + (creative ? CREATIVE_FEE : 0))}`;
    }

    function sendSignal() {
        const total = document.getElementById('calc-total').innerText;
        window.location.href = `mailto:sales@rock.scot?subject=Booking Signal&body=Total Quote: ${total}`;
    }

    function openSubmit() {
        document.getElementById('mag-name').innerText = "TRANSMIT TRACK";
        document.getElementById('mag-content').innerHTML = `
            <input type="text" id="sub-name" placeholder="BAND NAME" class="std-input">
            <input type="text" id="sub-link" placeholder="TRACK LINK" class="std-input">
            <button class="btn-authority" onclick="handleSubmission()">SEND SIGNAL</button>`;
        document.getElementById('mag-modal').classList.add('open');
    }

    function handleSubmission() {
        document.getElementById('mag-modal').classList.remove('open');
        document.getElementById('submit-card-content').innerHTML = `<h2 style="font-family:'Bebas Neue'; font-size:2.5rem; color:var(--authority-orange);">SIGNAL RECEIVED</h2>`;
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
    }
    setInterval(updateClock, 5000);
    window.onload = updateClock;
</script>
</body>
</html>
