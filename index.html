<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCK.SCOT | Rockin' Scotland</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { background-color: #000; color: #fff; margin: 0; padding: 0; font-family: 'Oswald', sans-serif; text-align: center; }
        
        /* Fixed position logo as requested */
        header { padding: 40px 0; border-bottom: 1px solid #1a1a1a; background: #000; }
        .logo-main { width: 100%; max-width: 500px; height: auto; display: block; margin: 0 auto; }
        
        .tagline { text-transform: uppercase; color: #ff3e00; letter-spacing: 5px; font-weight: 700; margin-top: 15px; font-size: 1.2rem; }
        
        .hero { padding: 100px 20px; }
        .hero h1 { font-size: clamp(3.5rem, 12vw, 7rem); margin: 0; line-height: 0.8; text-transform: uppercase; font-weight: 700; }
        .hero h1 span { color: #ff3e00; }

        .pricing-grid { display: flex; justify-content: center; gap: 20px; margin-top: 60px; flex-wrap: wrap; }
        .price-card { background: #080808; border: 1px solid #222; padding: 25px; min-width: 220px; }
        .price-card h3 { margin: 0; font-size: 0.8rem; color: #888; text-transform: uppercase; }
        .price-card p { font-size: 2rem; font-weight: 700; color: #ff3e00; margin: 10px 0; }
        
        footer { padding: 60px 0; color: #333; font-size: 0.8rem; border-top: 1px solid #1a1a1a; margin-top: 50px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <img src="logo.png" alt="ROCK.SCOT" class="logo-main">
            <div class="tagline">Rockin' Scotland</div>
        </div>
    </header>

    <main class="hero">
        <div class="container">
            <h1>ROCKIN'<br><span>SCOTLAND</span></h1>
            <div class="pricing-grid">
                <div class="price-card"><h3>Regional</h3><p>£199</p></div>
                <div class="price-card"><h3>Multi-Regional</h3><p>£349</p></div>
                <div class="price-card"><h3>Creative</h3><p>£195</p></div>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 ROCK.SCOT | Rockin' Scotland
    </footer>
</body>
</html>
