<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sla-rock.scot | Rockin' Scotland | Central Scotland Rock Radio</title>
    <style>
        :root { --primary: #ff3e00; --bg: #050505; --glass: rgba(255, 255, 255, 0.08); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        #app-shell { display: flex; flex-direction: column; height: 100vh; }
        
        header { background: #000; padding: 30px 20px; text-align: center; border-bottom: 4px solid var(--primary); flex-shrink: 0; position: relative; }
        #logo { width: 100%; max-width: 550px; height: auto; transition: 0.3s; }
        .tagline { font-size: 1.8rem; color: var(--primary); font-weight: 900; text-transform: uppercase; letter-spacing: 8px; margin-top: 10px; }
        #next-show-timer { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #fff; padding: 5px 15px; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; border-radius: 20px; z-index: 10; white-space: nowrap; }

        nav { background: #0a0a0a; padding: 25px 15px 15px; text-align: center; border-bottom: 1px solid #222; flex-shrink: 0; overflow-x: auto; white-space: nowrap; }
        nav a { color: #fff; margin: 0 10px; text-decoration: none; font-weight: 700; text-transform: uppercase; cursor: pointer; font-size: 0.7rem; letter-spacing: 1px; padding: 8px 10px; border-radius: 4px; }
        nav a:hover { background: var(--glass); color: var(--primary); }

        #content-window { flex-grow: 1; overflow-y: auto; padding: 40px; padding-bottom: 140px; }

        /* GIG MAP STYLES */
        .venue-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .venue-card { background: var(--glass); border-left: 4px solid var(--primary); padding: 20px; transition: 0.3s; text-decoration: none; color: inherit; display: block; }
        .venue-card:hover { background: rgba(255, 255, 255, 0.15); transform: translateX(5px); }
        .venue-card h4 { margin: 0 0 5px 0; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .venue-card span { font-size: 0.75rem; color: var(--primary); font-weight: 800; text-transform: uppercase; }
        .region-tag { font-size: 0.6rem; background: #222; padding: 3px 8px; border-radius: 10px; margin-left: 10px; vertical-align: middle; }

        footer#master-player { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; border-top: 3px solid var(--primary); padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; z-index: 9999; }
        .player-frame { width: 400px; height: 60px; border: none; }

        @media (max-width: 768px) {
            #logo { max-width: 240px; }
            .tagline { font-size: 1rem; letter-spacing: 4px; }
            footer#master-player { flex-direction: column; padding: 10px; }
            .player-frame { width: 100%; }
        }
    </style>
</head>
<body>

<div id="app-shell">
    <header>
        <img src="logo.png" alt="Sla-rock.scot" id="logo">
        <div class="tagline">Rockin' Scotland</div>
        <div id="next-show-timer">Next Show: Syncing...</div>
    </header>

    <nav>
        <a onclick="spa.load('home')">On Air</a>
        <a onclick="spa.load('venues')">Rock Radar</a>
        <a onclick="spa.load('community')">Pit Photos</a>
        <a onclick="spa.load('djs')">The Crew</a>
    </nav>

    <div id="content-window">
        <div id="page-content"></div>
    </div>

    <footer id="master-player">
        <iframe class="player-frame" src="https://player.broadcast.radio/caledonia-tx-ltd" allow="autoplay"></iframe>
        <div id="track-info" style="color:#888; font-weight:bold; font-size:0.8rem; margin-left:20px;">SLA-ROCK.SCOT | ROCKIN' SCOTLAND</div>
    </footer>
</div>

<script>
    const schedule = [
        { hr: 7, name: "Morning Chaos", dj: "Cal" },
        { hr: 10, name: "The Wall of Sound", dj: "Alex" },
        { hr: 14, name: "EK Rock Voyager", dj: "Andy" },
        { hr: 18, name: "Friday Night Rock", dj: "Tom" },
        { hr: 22, name: "Highland Hammer", dj: "Mhairi" }
    ];

    function updateCountdown() {
        const now = new Date();
        const currentHr = now.getHours();
        const currentMin = now.getMinutes();
        const currentSec = now.getSeconds();
        let nextShow = schedule.find(s => s.hr > currentHr) || schedule[0];
        let targetHr = nextShow.hr <= currentHr ? nextShow.hr + 24 : nextShow.hr;
        let diffSec = ((targetHr * 3600) - (currentHr * 3600 + currentMin * 60 + currentSec));
        const h = Math.floor(diffSec / 3600), m = Math.floor((diffSec % 3600) / 60), s = diffSec % 60;
        document.getElementById('next-show-timer').innerHTML = `Next: ${nextShow.name} in ${h}h ${m}m ${s}s`;
    }

    const spa = {
        pages: {
            home: `<h2 style="text-transform:uppercase;">Live <span style="color:var(--primary)">Now</span></h2><p>Broadcasting the loudest feed from the heart of Scotland.</p>`,
            venues: `
                <h2 style="text-transform:uppercase; font-size:2rem;">Rock <span style="color:var(--primary)">Radar</span></h2>
                <p>The definitive guide to the Central Scotland gig circuit.</p>
                <div class="venue-grid">
                    <a href="https://www.google.com/maps?q=King+Tuts+Glasgow" target="_blank" class="venue-card">
                        <span>Legendary</span><span class="region-tag">Glasgow</span>
                        <h4>King Tut's Wah Wah Hut</h4>
                        <p style="font-size:0.8rem; color:#888; margin:0;">The world's most famous basement stage.</p>
                    </a>
                    <a href="https://www.google.com/maps?q=Barrowland+Ballroom" target="_blank" class="venue-card">
                        <span>Iconic</span><span class="region-tag">Glasgow</span>
                        <h4>Barrowland Ballroom</h4>
                        <p style="font-size:0.8rem; color:#888; margin:0;">The best atmosphere in live music. Period.</p>
                    </a>
                    <a href="https://www.google.com/maps?q=Harleys+Ayr" target="_blank" class="venue-card">
                        <span>Ayrshire Hub</span><span class="region-tag">North Ayrshire</span>
                        <h4>Harleys Ayr</h4>
                        <p style="font-size:0.8rem; color:#888; margin:0;">The coast's premier rock and metal bar.</p>
                    </a>
                    <a href="https://www.google.com/maps?q=Girdwoods+Wishaw" target="_blank" class="venue-card">
                        <span>Hard Hitting</span><span class="region-tag">South Lanarkshire</span>
                        <h4>Girdwoods Bar</h4>
                        <p style="font-size:0.8rem; color:#888; margin:0;">Home of the Lanarkshire metal scene.</p>
                    </a>
                    <a href="https://www.google.com/maps?q=Beacon+Arts+Centre+Greenock" target="_blank" class="venue-card">
                        <span>Modern</span><span class="region-tag">Inverclyde</span>
                        <h4>Beacon Arts Centre</h4>
                        <p style="font-size:0.8rem; color:#888; margin:0;">Riverside arena-grade production in Greenock.</p>
                    </a>
                </div>
            `,
            community: `<h2>Pit Photos</h2><p>Upload your gig shots here.</p>`,
            djs: `<h2>The Crew</h2><p>Meet the team in the Crew tab.</p>`
        },
        load: function(id) {
            document.getElementById('page-content').innerHTML = this.pages[id] || this.pages['home'];
            window.location.hash = id;
            document.getElementById('content-window').scrollTop = 0;
        }
    };

    window.onload = () => {
        spa.load(window.location.hash.replace('#', '') || 'home');
        setInterval(updateCountdown, 1000);
        updateCountdown();
    };
</script>
</body>
</html>
