<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rock.Scot | Central Scotland's Rock Authority</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --authority-orange: #ff5500; 
            --panel-bg: #0a0a0a;
        }

        /* 1. GLOBAL RESET & SCROLL LOCK */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; color: #fff; font-family: 'Inter', sans-serif; 
            min-height: 100vh; width: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch;
            position: relative; padding-top: env(safe-area-inset-top, 12px);
        }

        /* 2. HEADER SECTION */
        header {
            position: sticky; top: 0; left: 0; width: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.8), rgba(0,0,0,0.4));
            z-index: 200;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding-bottom: 0px;
        }

        .hdr-logo {
            width: 85%; max-width: 450px; height: auto;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.9));
            margin: 10px auto -20px auto; 
            z-index: 220; display: block;
            pointer-events: auto;
        }

        .grit-control { position: absolute; top: calc(env(safe-area-inset-top, 12px) + 8px); right: 12px; z-index: 230; }
        .toggle-switch { 
            width: 50px; height: 26px; appearance: none; background: rgba(0,0,0,0.6); 
            border: 2px solid #555; border-radius: 13px; position: relative; outline: none; cursor: pointer;
        }
        .toggle-switch:checked { background: var(--authority-orange); border-color: #fff; }
        .toggle-switch::before { 
            content: ''; position: absolute; width: 18px; height: 18px; 
            background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; 
        }
        .toggle-switch:checked::before { left: 26px; }

        .nav-strip {
            width: 100%; background: rgba(0,0,0,0.95); 
            backdrop-filter: blur(10px); 
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 3px solid var(--authority-orange);
            display: flex; height: 55px; z-index: 210; position: relative;
        }
        .nav-btn { 
            flex: 1; background: transparent; border: none; 
            color: #aaa; font-family: 'Bebas Neue'; font-size: 1.1rem; 
            cursor: pointer; text-transform: uppercase; transition: 0.2s; letter-spacing: 1px;
        }
        .nav-btn.active { color: var(--authority-orange); background: rgba(255,85,0,0.1); }

        /* 3. MAIN CONTENT AREA */
        main { position: relative; width: 100%; background: #050505; z-index: 50; }

        .view {
            width: 100%; display: none; 
            flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.25s ease;
            min-height: calc(100vh - 160px);
        }
        .view.active { display: flex; opacity: 1; }

        /* OPTIMIZED LIVE VIEW: Replaced studio1.jpg with high-perf CSS */
        .studio-frame {
            width: 100%; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            position: relative; display: flex; flex-direction: column; justify-content: center;
            min-height: 65vh; overflow: hidden;
        }
        /* Artificial "Studio Light" atmosphere */
        .studio-frame::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,85,0,0.05) 0%, transparent 50%);
            animation: pulse 8s infinite alternate;
        }
        @keyframes pulse { 0% { opacity: 0.3; } 100% { opacity: 0.7; } }

        .studio-overlay {
            position: relative; z-index: 2;
            padding: 40px; text-align: center;
        }
        .clock-widget {
            font-family: 'Bebas Neue'; font-size: 6rem; line-height: 0.9; color: #fff;
            text-shadow: 0 0 30px rgba(255,85,0,0.6);
        }
        .clock-sub { color: var(--authority-orange); font-family: 'Oswald'; font-size: 1.4rem; margin-bottom: 25px; letter-spacing: 3px; }
        .btn-play {
            width: 100%; max-width: 420px; padding: 20px 30px; 
            background: linear-gradient(180deg, #ff5500, #aa3300);
            border: 2px solid #fff; color: #fff; font-family: 'Bebas Neue'; font-size: 1.8rem;
            cursor: pointer; border-radius: 8px; margin: 15px auto 0 auto; display: block;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        /* WIRE VIEW */
        .wire-container { width: 100%; padding: 20px; background: #0a0a0a; }
        .wire-header { font-family: 'Bebas Neue'; color: var(--authority-orange); font-size: 2.2rem; text-align: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .news-grid { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 1100px; margin: 0 auto; }
        .news-card { background: #111; border: 1px solid #222; display: flex; flex-direction: column; text-decoration: none; color: inherit; overflow: hidden; transition: 0.3s; }
        .news-card:hover { border-color: var(--authority-orange); }
        .news-thumb { width: 100%; height: 200px; background: #222; object-fit: cover; border-bottom: 2px solid var(--authority-orange); filter: grayscale(1); transition: 0.4s; }
        .news-card:hover .news-thumb { filter: grayscale(0); }
        .news-content { padding: 15px; }
        .news-title { font-family: 'Oswald'; font-size: 1.1rem; color: #fff; margin-bottom: 8px; }
        .news-meta { font-size: 0.75rem; color: #666; display: flex; justify-content: space-between; text-transform: uppercase; }

        /* CAROUSEL */
        .carousel-wrap { width: 100%; min-height: 60vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; background: #000; }
        .crew-track { display:flex; transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1); width:100%; }
        .crew-card { min-width: 100%; height: 100%; display: flex; flex-direction: column; }
        .crew-img-area { height: 350px; width: 100%; background: #111; }
        .crew-img { width: 100%; height: 100%; object-fit: cover; }
        .crew-info-area { padding: 25px; background: #0a0a0a; text-align: center; border-top: 4px solid var(--authority-orange); }
        .nav-arrow { position: absolute; top: 40%; transform: translateY(-50%); font-size: 2.5rem; color: #fff; background: rgba(0,0,0,0.7); padding: 10px 15px; z-index: 10; cursor: pointer; }
        .arr-left { left: 10px; } .arr-right { right: 10px; }

        /* FORMS */
        .scroll-panel { width: 100%; padding: 25px; max-width: 800px; margin: 0 auto; }
        .std-input { width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: #fff; font-family: 'Inter'; margin-bottom: 15px; border-radius: 4px; }
        .calc-display { border: 2px solid var(--authority-orange); background: rgba(255,85,0,0.05); padding: 30px; text-align: center; margin: 25px 0; }

        /* MODALS */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); backdrop-filter: blur(10px); z-index: 5000; display: none; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal-content { width: 92%; max-width: 650px; background: #050505; border: 1px solid var(--authority-orange); position: relative; }
        .modal-header { padding: 15px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        .modal-body { padding: 25px; max-height: 70vh; overflow-y: auto; }
        .close-modal { font-family: 'Bebas Neue'; color: #888; cursor: pointer; border: 1px solid #444; padding: 5px 15px; }
        .stat-box { background: #111; padding: 20px; margin-top: 20px; border-left: 4px solid var(--authority-orange); }

        /* DESKTOP OPTIMIZATIONS */
        @media (min-width: 900px) {
            .hdr-logo { max-width: 580px; margin-bottom: -30px; }
            .nav-strip { height: 65px; }
            .nav-btn { font-size: 1.3rem; }
            .news-grid { grid-template-columns: 1fr 1fr; }
            .crew-card { min-width: 50%; }
            .studio-frame { min-height: 75vh; }
            .clock-widget { font-size: 8rem; }
        }
    </style>
</head>
<body>

    <div id="bio-modal" class="modal-overlay" onclick="closeModal('bio-modal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span style="color:var(--authority-orange); font-family:'Bebas Neue';">CREW DOSSIER</span>
                <span class="close-modal" onclick="closeModal('bio-modal')">X</span>
            </div>
            <div class="modal-body">
                <h2 id="bio-name" style="font-family:'Bebas Neue'; font-size:2.5rem;"></h2>
                <div id="bio-role" style="font-family:'Oswald'; color:var(--authority-orange); text-transform:uppercase; margin-bottom:15px;"></div>
                <p id="bio-text" style="line-height:1.7; color:#bbb;"></p>
                <div class="stat-box">
                    <p><strong>BAND:</strong> <span id="bio-band"></span></p>
                    <p><strong>VENUE:</strong> <span id="bio-venue"></span></p>
                    <p><strong>FACT:</strong> <span id="bio-fact"></span></p>
                </div>
            </div>
        </div>
    </div>

    <div id="news-modal" class="modal-overlay" onclick="closeModal('news-modal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span style="color:var(--authority-orange); font-family:'Bebas Neue';">TRANSMISSION</span>
                <span class="close-modal" onclick="closeModal('news-modal')">X</span>
            </div>
            <div class="modal-body" style="text-align:center;">
                <h2 id="news-title-display" style="font-family:'Oswald'; margin-bottom:20px;"></h2>
                <p style="color:#666; margin-bottom:25px;">Connecting to Authority News Feed...</p>
                <a id="news-link-btn" href="#" target="_blank" class="btn-play" style="text-decoration:none;">OPEN FULL REPORT</a>
            </div>
        </div>
    </div>

    <header>
        <div class="grit-control">
            <input id="grit-toggle" type="checkbox" class="toggle-switch" checked onchange="document.body.classList.toggle('grit-mode')">
        </div>
        <img src="top_banner.png" class="hdr-logo" alt="Rock.Scot">
        <nav class="nav-strip">
            <button class="nav-btn active" data-view="live">LIVE</button>
            <button class="nav-btn" data-view="wire">WIRE</button>
            <button class="nav-btn" data-view="crew">CREW</button>
            <button class="nav-btn" data-view="rates">RATES</button>
            <button class="nav-btn" data-view="submit">SUBMIT</button>
        </nav>
    </header>

    <main>
        <section id="v-live" class="view active">
            <div class="studio-frame">
                <div class="studio-overlay">
                    <div class="clock-widget" id="live-clock">00:00</div>
                    <div class="clock-sub">CENTRAL SCOTLAND'S ROCK AUTHORITY</div>
                    <button class="btn-play" id="play-btn">ENGAGE SIGNAL</button>
                </div>
            </div>
        </section>

        <section id="v-wire" class="view">
            <div class="wire-container">
                <div class="wire-header">LOCAL ROCK WIRE</div>
                <div id="news-grid" class="news-grid"></div>
            </div>
        </section>

        <section id="v-crew" class="view">
            <div class="carousel-wrap">
                <div class="nav-arrow arr-left" onclick="moveSlide(-1)">&#10094;</div>
                <div id="crew-track" class="crew-track"></div>
                <div class="nav-arrow arr-right" onclick="moveSlide(1)">&#10095;</div>
            </div>
        </section>

        <section id="v-rates" class="view">
            <div class="scroll-panel">
                <h2 style="font-family:'Bebas Neue'; font-size:3rem; color:var(--authority-orange);">ADVERTISING RATES</h2>
                <input type="text" id="cust-name" placeholder="Business Name" class="std-input">
                <select id="calc-package" class="std-input" onchange="calc()">
                    <option value="299">Regional Airtime (£299 / 28 Days)</option>
                    <option value="449">Multi-Regional (£449 / 28 Days)</option>
                </select>
                <div style="display:flex; gap:10px;">
                    <input type="date" id="date-start" class="std-input" onchange="calc()">
                    <input type="date" id="date-end" class="std-input" onchange="calc()">
                </div>
                <div class="calc-display">
                    <div id="total-price" style="font-family:'Bebas Neue'; font-size:3.5rem; color:var(--authority-orange);">£0.00</div>
                    <div id="calc-notes" style="font-size:0.9rem; color:#666;">Select dates to calculate budget</div>
                </div>
                <button class="btn-play" onclick="sendSalesEmail()">REQUEST QUOTE</button>
            </div>
        </section>

        <section id="v-submit" class="view">
            <div class="scroll-panel">
                <h2 style="font-family:'Bebas Neue'; font-size:3rem; color:var(--authority-orange); text-align:center;">SUBMIT YOUR TRACK</h2>
                <input id="submit-artist" type="text" placeholder="BAND NAME" class="std-input">
                <input id="submit-link" type="text" placeholder="STREAMING LINK" class="std-input">
                <textarea id="submit-pitch" placeholder="TELL US ABOUT THE TRACK..." class="std-input" style="height:120px;"></textarea>
                <button class="btn-play" onclick="submitTrack()">TRANSMIT TO STUDIO</button>
            </div>
        </section>
    </main>

<script>
    const stream = new Audio("https://uksoutha.streaming.broadcast.radio/stream/16641/caledonia-tx-ltd");
    stream.crossOrigin = "anonymous";

    const crewData = [
        { id: "dj_andy", name: "Andy", role: "East Kilbride Rebel", bio: "Hailing from EK, Andy brings the heaviest hits from South Lanarkshire.", band: "Biffy Clyro", venue: "King Tut's", fact: "Once played 40 hours of vinyl straight." },
        { id: "dj_alex", name: "Alex", role: "Johnstone Viking", bio: "The master of Renfrewshire rock and rare vinyl deep cuts.", band: "Nazareth", venue: "The Barrowlands", fact: "Has a collection of 5000+ records." }
    ];

    const sampleNews = [
        { title: "Glasgow Venues Announce Summer Lineup", source: "RockWire", link: "#" },
        { title: "EK Band Hits #1 on Indie Charts", source: "LocalBeat", link: "#" }
    ];

    function showViewByName(name) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelector('#v-' + name).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.view === name));
        window.scrollTo(0,0);
    }

    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.onclick = () => showViewByName(btn.dataset.view);
    });

    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').textContent = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    }
    setInterval(updateClock, 1000); updateClock();

    const playBtn = document.getElementById('play-btn');
    let isPlaying = false;
    playBtn.onclick = () => {
        if(!isPlaying) {
            stream.play();
            playBtn.textContent = "STOP SIGNAL";
            isPlaying = true;
        } else {
            stream.pause();
            playBtn.textContent = "ENGAGE SIGNAL";
            isPlaying = false;
        }
    };

    function populateCrew() {
        const track = document.getElementById('crew-track');
        crewData.forEach(c => {
            const card = document.createElement('div');
            card.className = 'crew-card';
            card.innerHTML = `<div class="crew-img-area"></div><div class="crew-info-area"><div style="font-family:'Bebas Neue'; font-size:2rem;">${c.name}</div><button class="btn-play" style="font-size:1rem; max-width:200px;" onclick="openBio('${c.id}')">BIO</button></div>`;
            track.appendChild(card);
        });
    }

    function populateNews() {
        const grid = document.getElementById('news-grid');
        sampleNews.forEach(n => {
            const card = document.createElement('div');
            card.className = 'news-card';
            card.innerHTML = `<div class="news-thumb"></div><div class="news-content"><div class="news-title">${n.title}</div><div class="news-meta"><span>${n.source}</span><span>TODAY</span></div></div>`;
            card.onclick = () => { document.getElementById('news-title-display').textContent = n.title; document.getElementById('news-modal').classList.add('open'); };
            grid.appendChild(card);
        });
    }

    let slideIdx = 0;
    function moveSlide(d) {
        const t = document.getElementById('crew-track');
        slideIdx = (slideIdx + d + crewData.length) % crewData.length;
        t.style.transform = `translateX(-${slideIdx * 100}%)`;
    }

    function openBio(id) {
        const c = crewData.find(x => x.id === id);
        document.getElementById('bio-name').textContent = c.name;
        document.getElementById('bio-role').textContent = c.role;
        document.getElementById('bio-text').textContent = c.bio;
        document.getElementById('bio-band').textContent = c.band;
        document.getElementById('bio-venue').textContent = c.venue;
        document.getElementById('bio-fact').textContent = c.fact;
        document.getElementById('bio-modal').classList.add('open');
    }

    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    function calc() {
        const p = parseFloat(document.getElementById('calc-package').value);
        const s = new Date(document.getElementById('date-start').value);
        const e = new Date(document.getElementById('date-end').value);
        if(s && e && e > s) {
            const days = Math.ceil((e - s) / (86400000));
            const total = (p / 28) * days;
            document.getElementById('total-price').textContent = `£${total.toFixed(2)}`;
            document.getElementById('calc-notes').textContent = `${days} Day Campaign`;
        }
    }

    function sendSalesEmail() {
        const body = `Quote Request for ${document.getElementById('cust-name').value}. Total: ${document.getElementById('total-price').textContent}`;
        window.location.href = `mailto:sales@rock.scot?subject=Ad Quote&body=${encodeURIComponent(body)}`;
    }

    function submitTrack() { alert("Transmission Received. Our scouts will listen shortly."); }

    window.onload = () => { populateCrew(); populateNews(); };
</script>
</body>
</html>
