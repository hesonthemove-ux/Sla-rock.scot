<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock.Scot | Scottish Rock Authority</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --cyan: #00f2ff;
            --red: #ff003c;
            --glass: rgba(0, 0, 0, 0.85);
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html { 
            margin: 0; padding: 0; min-height: 100vh;
            background: #000; color: #fff; 
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }

        .master-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('assets/backgrounds/bg1.jpg') no-repeat center center;
            background-size: cover; z-index: -2;
        }

        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, black 140%);
            z-index: -1; pointer-events: none;
        }

        header { padding: 40px 20px; text-align: center; }
        header img { width: 100%; max-width: 550px; filter: drop-shadow(0 0 15px var(--cyan)); }

        nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--red);
            display: flex; justify-content: center;
        }

        nav button {
            background: transparent; border: none; color: #888;
            padding: 20px 25px; cursor: pointer;
            font-family: 'Syncopate', sans-serif; font-weight: 700;
            font-size: 0.75rem; text-transform: uppercase;
            letter-spacing: 3px; transition: 0.3s;
        }

        nav button.active { color: #fff; box-shadow: inset 0 -4px 0 var(--cyan); }

        main { padding: 40px 20px; max-width: 1200px; margin: 0 auto; }

        .pro-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            padding: 30px; margin-bottom: 30px;
            position: relative;
        }

        h2 { 
            font-family: 'Syncopate', sans-serif; font-size: 1.5rem;
            text-transform: uppercase; margin-top: 0; letter-spacing: 4px;
            color: var(--cyan); border-left: 4px solid var(--red); padding-left: 15px;
        }

        /* CREW GRID */
        .crew-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 25px;
        }

        .crew-member {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 10px; text-align: center;
            transition: 0.4s; position: relative;
        }

        .crew-member:hover {
            border-color: var(--cyan);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.2);
        }

        .crew-member img {
            width: 100%; aspect-ratio: 1/1; object-fit: cover;
            filter: grayscale(0.2) contrast(1.1);
            border-bottom: 3px solid var(--red);
        }

        .crew-name {
            font-family: 'Syncopate', sans-serif; font-weight: 700;
            display: block; margin-top: 15px; letter-spacing: 2px;
            color: #fff; font-size: 0.9rem;
        }

        .glow-btn {
            display: block; width: 100%; padding: 20px; margin-bottom: 15px;
            background: transparent; border: 1px solid var(--cyan);
            color: var(--cyan); text-decoration: none; text-align: center;
            font-family: 'Syncopate', sans-serif; font-weight: 700;
            letter-spacing: 3px; transition: 0.3s;
        }

        .glow-btn:hover { background: var(--cyan); color: #000; box-shadow: 0 0 25px var(--cyan); }

        .section { display: none; }
        .section.active { display: block; animation: fadeInUp 0.5s ease; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        #clock { font-family: 'Syncopate', sans-serif; font-size: 3rem; text-align: center; margin-bottom: 30px; color: #fff; text-shadow: 0 0 15px var(--red); }

        @media (max-width: 600px) {
            nav button { padding: 15px 10px; font-size: 0.6rem; }
            .crew-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="master-bg"></div>
    <div class="vignette"></div>

    <header><img src="assets/branding/logo.png" alt="ROCK.SCOT"></header>

    <nav>
        <button onclick="tab('live')" id="btn-live" class="active">Gigs</button>
        <button onclick="tab('wire')" id="btn-wire">Wire</button>
        <button onclick="tab('team')" id="btn-team">Crew</button>
        <button onclick="tab('ads')" id="btn-ads">Ads</button>
    </nav>

    <main>
        <section id="live" class="section active">
            <div id="clock">00:00:00</div>
            <div class="pro-card">
                <h2>Verified Gigs</h2>
                <a href="https://www.skiddle.com/whats-on/scotland/gigs/" target="_blank" class="glow-btn">SKIDDLE SCOTLAND</a>
                <a href="https://www.ticketmaster.co.uk/browse/rock-and-pop-catid-73/music-atid-10001/scotland-rid-10005" target="_blank" class="glow-btn">TICKETMASTER ROCK</a>
            </div>
        </section>

        <section id="wire" class="section">
            <div class="pro-card">
                <h2>The Rock Wire</h2>
                <div id="wire-content"></div>
            </div>
        </section>

        <section id="team" class="section">
            <div class="crew-grid" id="crew-list"></div>
        </section>

        <section id="ads" class="section">
            <div id="ads-list"></div>
        </section>
    </main>

    <script>
        const _sb = supabase.createClient('https://figcmwjdbeurhqopxknp.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpZ2Ntd2pkYmV1cmhqb3B4a25wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4ODI5MDYsImV4cCI6MjA4NDQ1ODkwNn0.iiE65zB0lAsEkJE6lotNU1lORpL94oxZ7-ebHhJ3FgY');

        function tab(t) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.getElementById('btn-'+t).classList.add('active');
            if(t==='wire') loadWire(); if(t==='team') loadCrew(); if(t==='ads') loadAds();
        }

        async function loadWire() {
            const { data } = await _sb.from('news_wire').select('*').order('created_at', {ascending:false}).limit(12);
            document.getElementById('wire-content').innerHTML = data ? data.map(n => `
                <div style="padding:15px 0; border-bottom:1px solid var(--border); cursor:pointer;" onclick="window.open('${n.source_url}', '_blank')">
                    <span style="color:var(--red); font-weight:700; font-size:0.7rem; text-transform:uppercase;">${n.source_name}</span>
                    <h3 style="margin:5px 0 0 0; font-family:'Syncopate'; font-size:1.1rem;">${n.headline}</h3>
                </div>`).join('') : "";
        }

        function loadCrew() {
            const crew = [
                {n:"Andy", i:"dj1.jpg"}, {n:"Alex", i:"dj2.jpg"}, 
                {n:"Stevie", i:"dj3.jpg"}, {n:"Mhairi", i:"dj4.jpg"},
                {n:"Jude", i:"dj5.jpg"}, {n:"Chris", i:"dj6.jpg"}, 
                {n:"Cal", i:"dj7.jpg"}, {n:"Blue", i:"dj8.jpg"}
            ];
            document.getElementById('crew-list').innerHTML = crew.map(c => `
                <div class="crew-member">
                    <img src="assets/crew/${c.i}" onerror="this.src='assets/branding/logo.png'">
                    <span class="crew-name">${c.n}</span>
                </div>
            `).join('');
        }

        async function loadAds() {
            const { data } = await _sb.from('ads').select('*');
            document.getElementById('ads-list').innerHTML = data ? data.map(a => `
                <div class="pro-card">
                    <h3 style="color:var(--cyan); font-family:'Syncopate'; margin:0;">${a.title}</h3>
                    <p style="opacity:0.8; font-size:1.1rem;">${a.description}</p>
                    <span style="color:var(--red); font-weight:bold; font-family:'Syncopate';">${a.price}</span>
                </div>`).join('') : "";
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0]; }, 1000);
        tab('live');
    </script>
</body>
</html>
