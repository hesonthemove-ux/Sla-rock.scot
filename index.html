<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rock.Scot | Central Scotland's Rock Authority</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --authority-orange: #ff5500; 
            --glass: rgba(0, 0, 0, 0.75); /* Increased transparency as requested */
        }

        /* GLOBAL RESET */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* HEADER OVERLAP SYSTEM */
        header {
            position: sticky; top: 0; z-index: 1000;
            display: flex; flex-direction: column; align-items: center;
        }
        .hdr-logo {
            width: 85%; max-width: 450px; height: auto;
            margin-bottom: -35px; /* Overlaps the menu */
            z-index: 1010; position: relative;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.8));
        }
        .nav-strip {
            width: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--authority-orange);
            display: flex; height: 60px; padding-top: 15px; /* Spacing for the overlap */
        }
        .nav-btn { 
            flex: 1; background: transparent; border: none; 
            color: #666; font-family: 'Bebas Neue'; font-size: 1.1rem; cursor: pointer;
        }
        .nav-btn.active { color: var(--authority-orange); background: rgba(255,85,0,0.1); }

        /* VIEW ENGINE */
        .view { display: none; min-height: calc(100vh - 120px); width: 100%; padding: 40px 20px; background-size: cover; background-position: center; background-attachment: fixed; }
        .view.active { display: flex; flex-direction: column; align-items: center; }

        /* MAGAZINE MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 5000; display: none;
            overflow-y: auto; padding: 40px 20px;
        }
        .modal-overlay.open { display: block; }
        .mag-layout { max-width: 800px; margin: 0 auto; border: 5px solid #fff; padding: 40px; background: #111; position: relative; }

        /* CREW ROLODEX */
        .crew-container { display: flex; gap: 20px; overflow-x: auto; width: 100%; padding: 20px; scroll-snap-type: x mandatory; }
        .crew-card {
            min-width: 280px; height: 400px; background: #111; border: 1px solid #333;
            scroll-snap-align: center; position: relative; cursor: pointer;
            filter: grayscale(100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .crew-card.active-color { filter: grayscale(0%); border: 2px solid var(--authority-orange); transform: scale(1.05); }
        .crew-img { width: 100%; height: 100%; object-fit: cover; }
        .crew-label { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 10px; font-family: 'Bebas Neue'; font-size: 1.5rem; text-align: center; }

        /* TICKER TAPE */
        .ticker-wrap { width: 100%; background: var(--authority-orange); color: #000; overflow: hidden; white-space: nowrap; padding: 10px 0; font-family: 'Oswald'; font-weight: bold; }
        .ticker-move { display: inline-block; animation: ticker 30s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* GLASS PANELS */
        .glass-panel { background: var(--glass); backdrop-filter: blur(20px); padding: 30px; width: 100%; max-width: 600px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="mag-modal" class="modal-overlay" onclick="this.classList.remove('open')">
        <div class="mag-layout" onclick="event.stopPropagation()">
            <div style="font-family:'Bebas Neue'; font-size:1.2rem; color:var(--authority-orange);">ROCK.SCOT EXCLUSIVE</div>
            <h2 id="mag-name" style="font-family:'Oswald'; font-size:4rem; text-transform:uppercase; line-height:1; margin-bottom:20px;"></h2>
            <p id="mag-text" style="font-size:1.1rem; line-height:1.6; border-top:1px solid #fff; padding-top:20px;"></p>
            <div style="margin-top:30px; font-family:'Bebas Neue'; color:#888;">SCENE STATS: <span id="mag-stats" style="color:#fff;"></span></div>
            <button onclick="document.getElementById('mag-modal').classList.remove('open')" style="margin-top:20px; background:#fff; color:#000; border:none; padding:10px 20px; font-family:'Bebas Neue';">CLOSE ISSUE</button>
        </div>
    </div>

    <header>
        <img src="top_banner.png" class="hdr-logo" alt="Rock.Scot">
        <nav class="nav-strip">
            <button class="nav-btn active" onclick="showTab('live')">LIVE</button>
            <button class="nav-btn" onclick="showTab('wire')">WIRE</button>
            <button class="nav-btn" onclick="showTab('crew')">CREW</button>
            <button class="nav-btn" onclick="showTab('rates')">RATES</button>
            <button class="nav-btn" onclick="showTab('submit')">SUBMIT</button>
        </nav>
    </header>

    <main>
        <section id="v-live" class="view active">
            <div class="glass-panel" style="text-align:center; margin-top:100px;">
                <h1 style="font-family:'Bebas Neue'; font-size:5rem;">LIVE SIGNAL</h1>
                <button class="btn-play" style="width:100%; padding:20px; background:var(--authority-orange); border:none; color:#fff; font-family:'Bebas Neue'; font-size:2rem;" onclick="toggleAudio()">ENGAGE</button>
            </div>
            <div class="ticker-wrap" style="position:fixed; bottom:0;">
                <div class="ticker-move" id="album-ticker">LOADING ROCK LAUNCHES...</div>
            </div>
        </section>

        <section id="v-wire" class="view">
            <div id="rss-feed" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:20px; width:100%; max-width:1200px;"></div>
        </section>

        <section id="v-crew" class="view">
            <div class="crew-container" id="crew-rolodex"></div>
        </section>

        <section id="v-rates" class="view">
            <div class="glass-panel">
                <h2 style="font-family:'Bebas Neue'; font-size:3rem;">AD RATES</h2>
                <div style="padding:20px; border:1px solid #fff;">Regional: £299</div>
            </div>
        </section>

        <section id="v-submit" class="view">
            <div class="glass-panel">
                <h2 style="font-family:'Bebas Neue'; font-size:3rem;">TRANSMIT TRACK</h2>
                <input type="text" placeholder="BAND" style="width:100%; padding:15px; background:transparent; border:1px solid #fff; color:#fff; margin-bottom:10px;">
                <textarea placeholder="PITCH" style="width:100%; height:150px; background:transparent; border:1px solid #fff; color:#fff;"></textarea>
            </div>
        </section>
    </main>

<script>
    const stream = new Audio("https://uksoutha.streaming.broadcast.radio/stream/16641/caledonia-tx-ltd");
    
    const crewData = [
        { id: "andy", name: "Andy", role: "East Kilbride Rebel", bio: "The voice of South Lanarkshire rock. Andy brings the grit of the local scene directly to your speakers.", img: "crew_dj_andy.jpg", clicks: 0 },
        { id: "alex", name: "Alex", role: "Johnstone Viking", bio: "The vinyl hunter. If it's rare, loud, and Scottish, Alex has played it.", img: "crew_dj_alex.jpg", clicks: 0 },
        { id: "mhairi", name: "Mhairi", role: "Highland Heavyweight", bio: "Bringing the thunder from the north. Specialist in alt-rock and new releases.", img: "crew_dj_mhairi.jpg", clicks: 0 },
        { id: "dougie", name: "Dougie", role: "Barrowland Beast", bio: "A legend of the Glasgow scene. He's seen it all and plays it all.", img: "crew_dj_dougie.jpg", clicks: 0 }
    ];

    function showTab(name) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('v-' + name).classList.add('active');
        document.getElementById('v-' + name).style.backgroundImage = `url('news${Math.floor(Math.random()*7)+1}.jpg')`;
        if(name === 'wire') fetchRSS();
        if(name === 'crew') renderCrew();
    }

    async function fetchRSS() {
        const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.theskinny.co.uk/rss/music');
        const data = await res.json();
        document.getElementById('rss-feed').innerHTML = data.items.slice(0,6).map(item => `
            <div class="glass-panel" style="max-width:100%; cursor:pointer;" onclick="window.open('${item.link}')">
                <img src="${item.enclosure.link || 'news1.jpg'}" style="width:100%; height:200px; object-fit:cover;">
                <h3 style="font-family:'Oswald'; margin-top:10px;">${item.title}</h3>
            </div>
        `).join('');
    }

    function renderCrew() {
        const container = document.getElementById('crew-rolodex');
        container.innerHTML = crewData.map(dj => `
            <div class="crew-card" id="card-${dj.id}" onclick="handleCrewClick('${dj.id}')">
                <img src="${dj.img}" class="crew-img">
                <div class="crew-label">${dj.name}</div>
            </div>
        `).join('');
    }

    function handleCrewClick(id) {
        const dj = crewData.find(d => d.id === id);
        dj.clicks++;
        const card = document.getElementById('card-' + id);
        
        if(dj.clicks === 1) {
            document.querySelectorAll('.crew-card').forEach(c => c.classList.remove('active-color'));
            card.classList.add('active-color');
        } else if(dj.clicks === 2) {
            openMag(dj);
            dj.clicks = 0; // Reset
            card.classList.remove('active-color');
        }
    }

    function openMag(dj) {
        document.getElementById('mag-name').innerText = dj.name;
        document.getElementById('mag-text').innerText = dj.bio;
        document.getElementById('mag-stats').innerText = dj.role;
        document.getElementById('mag-modal').classList.add('open');
    }

    function loadTicker() {
        const albums = ["BIFFY CLYRO - NEW SINGLE OUT MON", "THE SNUTS - GLASGOW GIG ANNOUNCED", "MOGWAI - ALBUM LAUNCH FEB 12", "FRANZ FERDINAND - WORLD TOUR STARTING"];
        document.getElementById('album-ticker').innerText = albums.join(" • ") + " • " + albums.join(" • ");
    }

    function toggleAudio() {
        if(stream.paused) stream.play(); else stream.pause();
    }

    window.onload = loadTicker;
</script>
</body>
</html>
