<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rock.Scot | Central Scotland Authority</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    /* CRUSH THE CONTAINER */
    html, body, .main-container, .wrapper, #app { 
        background: #000 !important; 
        max-width: 100vw !important;
        margin: 0 !important; 
        padding: 0 !important;
        overflow-x: hidden !important;
    }

    /* CARSON TYPOGRAPHY: FORCED COLLISION */
    h1, h2, .site-title {
        font-family: 'Impact', sans-serif !important;
        text-transform: uppercase !important;
        line-height: 0.7 !important;
        letter-spacing: -5px !important;
        word-spacing: -10px !important;
        transform: rotate(-5deg) scale(1.1) !important;
        color: #fff !important;
        mix-blend-mode: difference !important;
        margin-bottom: -20px !important;
        display: block !important;
    }

    /* FAIREY PROPAGANDA: POPUPS & BOXES */
    .public-info-box, .modal-content, div[class*="popup"], .booking-form, .team-card {
        background: #FF6B00 !important;
        border: 20px solid #000 !important;
        box-shadow: 20px 20px 0px #fff !important;
        transform: rotate(2deg) !important;
        color: #000 !important;
        padding: 30px !important;
    }

    /* VICTORE RAWNESS: BUTTONS & INPUTS */
    button, .btn, .intel-submit {
        background: #000 !important;
        color: #FF6B00 !important;
        border: none !important;
        font-size: 3rem !important;
        transform: rotate(-3deg) !important;
        padding: 10px 40px !important;
        cursor: crosshair !important;
    }

    /* THE GIG WIRE: RIPPED OVERLAY */
    .gig-wire {
        background: #fff !important;
        width: 120vw !important;
        margin-left: -10vw !important;
        padding: 100px 50px !important;
        transform: rotate(-1.5deg) !important;
        border-top: 20px solid #000 !important;
        z-index: 999 !important;
    }
</style>
<style>
    /* THE FINAL OVERRIDE */
    :root { --main-orange: #FF6B00; }
    
    body { 
        background-color: #000 !important; 
        padding: 0 !important; 
        margin: 0 !important; 
        display: block !important; 
    }

    /* ALL WRAPPERS MUST DIE */
    div, section, main { 
        max-width: none !important; 
        width: auto !important; 
        margin: 0 !important;
        border-radius: 0 !important;
    }

    /* THE CARSON REBELLION */
    h1 {
        font-size: 30vw !important;
        position: absolute !important;
        top: 20px;
        left: -5%;
        z-index: 0 !important;
        pointer-events: none;
    }

    /* THE FAIREY POPUPS */
    .public-info-box, .booking-form, [role="dialog"] {
        position: fixed !important;
        top: 10% !important;
        left: 5% !important;
        width: 90% !important;
        background: var(--main-orange) !important;
        border: 25px solid #000 !important;
        z-index: 9999 !important;
        transform: rotate(-1deg) !important;
    }
</style>
</head>
<body>
    <header id="site-header"><img src="./assets/branding/logo.png" alt="ROCK.SCOT"></header>
    <nav>
        <button onclick="tab('live')">ON AIR</button>
        <button onclick="tab('crew')">TEAM</button>
        <button onclick="tab('wire')">WIRE</button>
        <button onclick="tab('rates')">ADVERTISE</button>
        <button onclick="tab('public')">PUBLIC INFO</button>
    </nav>
    <main id="main-content">
        <section id="live" class="section active">
            <div class="gig-wire"> 
                <h2>GIG WIRE</h2> 
                <div id="gig-list"></div> 
            </div>
            <div class="grunge-card">
                <h1 id="clock">00:00:00</h1>
                <iframe src="https://player.broadcast.radio/caledonia-tx-ltd" style="width:100%; height:180px; border:10px solid #000;"></iframe>
            </div>
        </section>
        <section id="crew" class="section"><div class="crew-grid" id="crew-list"></div></section>
        <section id="wire" class="section"><div id="wire-content"></div></section>
        <section id="rates" class="section">
             <div class="intel-form">
                <h2>SUBMIT INTEL</h2>
                <form id="submission-form">
                    <input type="text" placeholder="NAME / BRAND" class="intel-input" required>
                    <input type="email" placeholder="EMAIL" class="intel-input" required>
                    <textarea placeholder="MESSAGE" class="intel-input" rows="3"></textarea>
                    <button type="submit" class="intel-submit">SEND IT</button>
                </form>
            </div>
        </section>
    </main>

    <div id="modal" class="modal-bg" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="m-name"></h2>
            <div id="m-body"></div>
            <button onclick="closeModal()" class="close-bio">CLOSE</button>
        </div>
    </div>
    <script>
        function tab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function updateClock() { 
            const clock = document.getElementById('clock');
            if(clock) clock.innerText = new Date().toTimeString().split(' ')[0]; 
            requestAnimationFrame(updateClock); 
        }
        updateClock();
    </script>
</body>
</html>
