<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rock.Scot | Central Scotland Authority</title>
    <link rel="stylesheet" href="style.css?v=1769127006">
</head>
<body>
    <div id="stage"></div>
    <div class="viewport">
        <header><img src="./assets/branding/logo.png" alt="ROCK.SCOT"></header>
        <nav>
            <button onclick="tab('live')">LIVE</button>
            <button onclick="tab('crew')">CREW</button>
            <button onclick="tab('wire')">WIRE</button>
            <button onclick="tab('rates')">ADVERTISE</button>
        </nav>
        <main>
            <section id="live" class="section active">
                <div class="grunge-card">
                    <iframe src="https://player.broadcast.radio/caledonia-tx-ltd" style="width:100%; height:180px; border:2px solid var(--orange);"></iframe>
                </div>
            </section>

            <section id="crew" class="section">
                <div class="crew-grid" id="crew-list"></div>
            </section>

            <section id="wire" class="section">
                <div id="wire-content"></div>
            </section>

            <section id="rates" class="section">
                </section>
        </main>
    </div>

    <script>
        function tab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'wire') fetchWire();
        }

        const crew = [
            { n: "Andy", f: "dj_andy.jpg" }, { n: "Alex", f: "dj_alex.jpg" },
            { n: "Stevie", f: "dj_stevie.jpg" }, { n: "Mhairi", f: "dj_mhairi.jpg" },
            { n: "Jude", f: "dj_jude.jpg" }, { n: "Chris", f: "dj_chris.jpg" },
            { n: "Cal", f: "dj_cal.jpg" }, { n: "Blue", f: "dj_blue.jpg" }
        ];

        // FIXED PATHING: Ensuring ./assets/crew/ is used
        const cList = document.getElementById('crew-list');
        crew.forEach(p => {
            cList.innerHTML += `
                <div class="grunge-card" style="text-align:center;">
                    <img src="./assets/crew/${p.f}" onerror="this.src='./assets/branding/logo.png'" style="width:100%; filter:grayscale(100%);">
                    <p style="margin-top:10px; font-weight:bold;">${p.n}</p>
                </div>`;
        });

        // FIXED WIRE: Central Scotland Music News Fallback
        function fetchWire() {
            const content = document.getElementById('wire-content');
            content.innerHTML = '<p>FETCHING LATEST NEWS...</p>';
            
            const feeds = [
                { t: "Barrowlands Sold Out", d: "Major Scottish rock act announces third date." },
                { t: "King Tuts Discovery", d: "New band from Johnstone making waves." },
                { t: "Hydro Rock Fest", d: "Central Scotland's biggest indoor fest returns." }
            ];

            content.innerHTML = '';
            feeds.forEach(f => {
                content.innerHTML += `
                    <div class="wire-item">
                        <h4>${f.t}</h4>
                        <p style="font-size:0.8rem;">${f.d}</p>
                    </div>`;
            });
        }
    </script>
</body>
</html>
