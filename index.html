<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rock.Scot | Central Scotland's Rock Authority</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --authority-orange: #ff5500; 
            --phantom-glass: rgba(0, 0, 0, 0.4); 
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        header { 
            position: sticky; top: 0; z-index: 9999; 
            background: #000; width: 100%;
            display: flex; flex-direction: column; align-items: center;
        }
        
        .hdr-logo { 
            width: 100%; max-width: 600px; height: auto; 
            padding: 10px 0; display: block;
            filter: drop-shadow(0 5px 15px rgba(255,85,0,0.3));
        }

        .nav-strip { 
            width: 100%; background: #000; 
            border-bottom: 4px solid var(--authority-orange);
            display: flex; height: 60px;
        }

        .nav-btn { flex: 1; background: transparent; border: none; color: #777; font-family: 'Bebas Neue'; font-size: 1.2rem; cursor: pointer; }
        .nav-btn.active { color: var(--authority-orange); background: rgba(255,85,0,0.1); }

        .view { 
            display: none; min-height: 100vh; width: 100%; padding: 40px 20px; 
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        .view.active { display: flex; flex-direction: column; align-items: center; }

        .uniform-card { 
            width: 320px; height: 480px; 
            background: var(--phantom-glass);
            border: 1px solid var(--glass-border); 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 25px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            position: relative;
        }

        .archive-viewport {
            perspective: 1200px; width: 100%; height: 600px;
            display: flex; align-items: center; overflow-x: auto; overflow-y: hidden;
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        .crew-track { display: flex; align-items: center; padding: 0 100px; }

        .crew-card-3d {
            min-width: 280px; height: 420px; margin: 0 -40px;
            background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); 
            transform-style: preserve-3d; will-change: transform;
            filter: grayscale(100%) brightness(0.4); transition: 0.5s;
            -webkit-box-reflect: below 2px linear-gradient(transparent, rgba(0,0,0,0.1));
        }
        .crew-card-3d.focus { filter: grayscale(0%) brightness(1.1); z-index: 100; border-color: var(--authority-orange); }
        .crew-label-3d { position: absolute; bottom: 0; width: 100%; padding: 25px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); font-family: 'Bebas Neue'; font-size: 2.2rem; text-align: center; }

        .tuner-bar { display: flex; gap: 10px; margin-bottom: 25px; width: 100%; max-width: 1200px; overflow-x: auto; padding: 15px; scrollbar-width: none; }
        .tuner-chip { padding: 10px 20px; background: #222; border: 1px solid #444; color: #fff; font-family: 'Oswald'; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .tuner-chip.active { border-color: var(--authority-orange); color: var(--authority-orange); background: rgba(255,85,0,0.1); }

        #rss-feed { display: grid; grid-template-columns: repeat(auto-fill, 320px); gap: 25px; width:100%; justify-content: center; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: none; padding: 20px; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .mag-layout { max-width: 550px; border: 8px solid #fff; padding: 30px; background: #000; width: 95%; max-height: 85vh; overflow-y: auto; }

        .btn-authority { width: 100%; padding: 18px; background: var(--authority-orange); border: none; color: #fff; font-family: 'Bebas Neue'; font-size: 1.6rem; cursor: pointer; }
        .std-input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; font-family: 'Oswald'; margin-bottom: 10px; }
        .std-label { display: block; font-family: 'Oswald'; font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        
        .bio-text { text-align: left; font-size: 0.95rem; line-height: 1.6; color: #ccc; }
        .bio-text b { color: var(--authority-orange); font-family: 'Oswald'; text-transform: uppercase; }
        .bio-block { margin-top: 15px; padding-top: 15px; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <div id="mag-modal" class="modal-overlay" onclick="this.classList.remove('open')">
        <div class="mag-layout" onclick="event.stopPropagation()">
            <div id="mag-tag" style="font-family:'Bebas Neue'; color:var(--authority-orange); letter-spacing:2px;">AUTHORITY DOSSIER</div>
            <h2 id="mag-name" style="font-family:'Oswald'; font-size:2.8rem; text-transform:uppercase; line-height:1;"></h2>
            <div id="mag-content"></div>
        </div>
    </div>

    <header>
        <img src="top_banner.png" class="hdr-logo" alt="Rock.Scot">
        <nav class="nav-strip">
            <button class="nav-btn active" onclick="showTab('live')">LIVE</button>
            <button class="nav-btn" onclick="showTab('wire')">WIRE</button>
            <button class="nav-btn" onclick="showTab('crew')">CREW</button>
            <button class="nav-btn" onclick="showTab('rates')">RATES</button>
            <button class="nav-btn" onclick="showTab('submit')">SUBMIT</button>
        </nav>
    </header>

    <main>
        <section id="v-live" class="view active">
            <div class="uniform-card">
                <div id="live-clock" style="font-family:'Bebas Neue'; font-size:4.5rem; line-height:0.9;">00:00</div>
                <div style="font-family:'Oswald'; color:var(--authority-orange); letter-spacing:5px; margin-bottom:15px;">CENTRAL SCOTLAND</div>
                <iframe src="https://player.broadcast.radio/caledonia-tx-ltd" style="width:100%; height:260px; border:none; background:transparent;" allow="autoplay" allowtransparency="true"></iframe>
            </div>
        </section>

        <section id="v-wire" class="view">
            <div class="tuner-bar" id="tuner-list"></div>
            <div id="rss-feed"></div>
        </section>

        <section id="v-crew" class="view">
            <div class="archive-viewport" id="crew-3d-wrap" onscroll="handleInfiniteScroll()">
                <div class="crew-track" id="crew-track"></div>
            </div>
        </section>

        <section id="v-rates" class="view">
            <div class="uniform-card">
                <h2 style="font-family:'Bebas Neue'; font-size:3.5rem; color:var(--authority-orange);">RATES</h2>
                <button class="btn-authority" onclick="openRates()">AD PORTAL</button>
            </div>
        </section>

        <section id="v-submit" class="view">
            <div class="uniform-card" id="submit-card-content">
                <h2 style="font-family:'Bebas Neue'; font-size:3.5rem; color:var(--authority-orange);">SUBMIT</h2>
                <button class="btn-authority" onclick="openSubmit()">SEND TRACK</button>
            </div>
        </section>
    </main>

<script>
    const crewData = [
        { id: "andy", name: "ANDY", title: "East Kilbride's Rock Rebel", bio: "Hailing from East Kilbride in South Lanarkshire, Andy grew up blasting Biffy Clyro anthems from his bedroom in the new town suburbs. His dad dragged him to his first gig at a local pub, where a cover band nailed Simple Minds' \"Don't You (Forget About Me)\", and that was it—rock hooked him for life. He started pirate radio in his garage before landing at Rock.Scot, bringing high-energy playlists to listeners across Inverclyde, South Lanarkshire, and North Ayrshire.", band: "Biffy Clyro", gig: "Franz Ferdinand @ Barrowlands", venue: "King Tut's", fact: "Lost a shoe crowd-surfing in Hamilton.", img: "dj_andy.jpg" },
        { id: "alex", name: "ALEX", title: "Johnstone's Vinyl Viking", bio: "Born and bred in Johnstone, Alex discovered rock digging through his uncle's record collection—Nazareth's \"Hair of the Dog\" changed everything. He spent his teens sneaking into gigs in nearby Paisley and Glasgow, then built his own decks to spin rock classics. Now he rocks the airwaves on Rock.Scot with deep cuts and local shout-outs.", band: "Nazareth", gig: "Texas @ SEC", venue: "Barrowland Ballroom", fact: "Owns signed Deacon Blue vinyl.", img: "dj_alex.jpg" },
        { id: "stevie", name: "STEVIE", title: "Port Glasgow's Headbanger", bio: "From the shipbuilding heart of Port Glasgow in Inverclyde, Stevie was raised on tales of Clyde rockers and first fell for rock hearing AC/DC (via Bon Scott's Scottish roots) at a family barbecue. He formed a garage band in his teens, playing covers at local pubs before switching to DJing. His late-night shows on Rock.Scot keep Inverclyde headbanging from Greenock to Gourock.", band: "Big Country", gig: "Mogwai @ Òran Mór", venue: "Beacon Arts Centre", fact: "Claims he high-fived Angus Young.", img: "dj_stevie.jpg" },
        { id: "mhairi", name: "MHAIRI", title: "Hamilton's Hard Rock Queen", bio: "Hamilton in South Lanarkshire gave Mhairi her first taste of live rock at a school battle of the bands featuring The Jesus and Mary Chain covers. She was instantly obsessed, trading pop for distortion pedals and building a massive CD collection. Her witty banter and killer playlists now light up Rock.Scot for listeners in Hamilton, East Kilbride, and beyond.", band: "The Jesus and Mary Chain", gig: "Teenage Fanclub @ King Tut's", venue: "Grand Hall Kilmarnock", fact: "Specialises in rock band tattoos.", img: "dj_mhairi.jpg" },
        { id: "jude", name: "JUDE", title: "Irvine's Indie Rock Icon", bio: "North Ayrshire's Irvine is Jude's stomping ground, where beach walks with Travis on headphones sparked a lifelong love for melodic rock. She volunteered at local open mics, then climbed the ranks to Rock.Scot, championing emerging Scottish acts alongside classics.", band: "Travis", gig: "Idlewild @ Barrowland", venue: "Harbour Arts Centre", fact: "Hitchhiked to a Franz Ferdinand gig.", img: "dj_jude.jpg" },
        { id: "chris", name: "CHRIS", title: "Greenock's Guitar Guru", bio: "Greenock in Inverclyde bred Chris on tales of shipyard workers rocking out to Primal Scream. His first gig was Biffy Clyro in Glasgow, and he never looked back—starting as a pub DJ before joining Rock.Scot to blast rock across the Firth of Clyde.", band: "Primal Scream", gig: "Simple Minds @ OVO Hydro", venue: "Cathouse Rock Club", fact: "Owns every Big Country album on vinyl.", img: "dj_chris.jpg" },
        { id: "cal", name: "CAL", title: "Kilmarnock's Classic Rocker", bio: "Straight out of Kilmarnock in the Ayrshire heartlands, Cal grew up on Biffy Clyro (fellow Killie lads) and The Sensational Alex Harvey Band. He DJ'd school discos before going pro, now delivering timeless rock to Rock.Scot fans in Kilmarnock, Irvine, and North Ayrshire.", band: "Biffy Clyro", gig: "The Fratellis @ Grand Hall", venue: "Palace Theatre", fact: "Won an air guitar contest.", img: "dj_cal.jpg" },
        { id: "blue", name: "BLUE", title: "Gourock's Bluesy Rock Maverick", bio: "From the seaside charm of Gourock in Inverclyde, Blue got into rock via his grandad's Nazareth and Gerry Rafferty records. He blended bluesy riffs with rock energy, DJing beach parties before hitting Rock.Scot waves for listeners from Gourock to Wemyss Bay.", band: "Nazareth", gig: "Texas @ Paisley Arts", venue: "Coats Paisley", fact: "Mistaken for a roadie at Mogwai.", img: "dj_blue.jpg" }
    ];

    const sources = [
        { name: "MASTER MIX", url: "ALL" },
        { name: "SNACK", url: "https://snackmag.co.uk/category/music/feed" },
        { name: "PODCART", url: "https://podcart.co/feed/" },
        { name: "IS THIS MUSIC", url: "https://isthismusic.com/feed" },
        { name: "DISCOVERY", url: "https://discoverymusicscotland.com/feed" },
        { name: "RAVECHILD", url: "https://ravechild.co.uk/feed" },
        { name: "JOCKROCK", url: "https://jockrock.org/feed" },
        { name: "NATIONAL", url: "https://www.thenational.scot/culture/music/rss/" }
    ];

    let spinInterval, isInteracting = false, interactionTimer;

    function showTab(name) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        const activeView = document.getElementById('v-' + name);
        activeView.style.display = 'flex';
        activeView.style.backgroundImage = `url('news${Math.floor(Math.random()*7)+1}.jpg')`;
        event.currentTarget.classList.add('active');
        if(name === 'crew') { initInfiniteCrew(); startAutoSpin(); } 
        else if(name === 'wire') { initTuner(); stopAutoSpin(); }
        else { stopAutoSpin(); }
    }

    function initTuner() {
        const list = document.getElementById('tuner-list');
        list.innerHTML = sources.map((s, i) => `
            <button class="tuner-chip ${i === 0 ? 'active' : ''}" onclick="tuneWire(${i}, this)">${s.name}</button>
        `).join('');
        fetchWire(0);
    }

    function tuneWire(idx, btn) {
        document.querySelectorAll('.tuner-chip').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        fetchWire(idx);
    }

    async function fetchWire(idx) {
        const feedContainer = document.getElementById('rss-feed');
        feedContainer.innerHTML = '<div class="uniform-card"><h3>DECODING SIGNAL...</h3></div>';
        const proxy = "https://api.rss2json.com/v1/api.json?rss_url=";
        let finalItems = [];

        try {
            if (sources[idx].url === "ALL") {
                const mixSources = sources.slice(1, 5);
                const promises = mixSources.map(s => fetch(proxy + encodeURIComponent(s.url)).then(r => r.json()));
                const results = await Promise.all(promises);
                results.forEach(res => { if(res.status === 'ok') finalItems = [...finalItems, ...res.items]; });
                finalItems.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
            } else {
                const res = await fetch(proxy + encodeURIComponent(sources[idx].url));
                const data = await res.json();
                if (data.status === 'ok') finalItems = data.items;
            }

            if (finalItems.length > 0) {
                feedContainer.innerHTML = finalItems.slice(0, 12).map(item => `
                    <div class="uniform-card">
                        <h3 style="font-family:'Oswald'; color:var(--authority-orange); line-height:1.1;">${item.title.toUpperCase()}</h3>
                        <p style="font-size:0.8rem; margin:15px 0; color:#aaa;">${item.description.replace(/<[^>]*>?/gm, '').substring(0,90)}...</p>
                        <button class="btn-authority" style="font-size:1rem; padding:10px;" onclick="window.open('${item.link}')">OPEN WIRE</button>
                    </div>`).join('');
            } else { throw new Error(); }
        } catch (e) {
            feedContainer.innerHTML = `<div class="uniform-card"><h3>SIGNAL LOST</h3><button class="btn-authority" onclick="fetchWire(${idx})">RESCAN</button></div>`;
        }
    }

    function initInfiniteCrew() {
        const track = document.getElementById('crew-track');
        const wrap = document.getElementById('crew-3d-wrap');
        const tripleData = [...crewData, ...crewData, ...crewData];
        track.innerHTML = tripleData.map(dj => `
            <div class="crew-card-3d" onclick="handle3DClick(this, '${dj.id}')">
                <img src="${dj.img}" style="width:100%; height:100%; object-fit:cover;" onerror="this.src='logo.png'">
                <div class="crew-label-3d">${dj.name}</div>
            </div>`).join('');
        wrap.scrollLeft = track.scrollWidth / 3;
        animate3D();
        wrap.onmousedown = wrap.ontouchstart = () => { isInteracting = true; stopAutoSpin(); };
        wrap.onmouseup = wrap.ontouchend = () => { clearTimeout(interactionTimer); interactionTimer = setTimeout(() => { isInteracting = false; startAutoSpin(); }, 3000); };
    }

    function startAutoSpin() {
        if (spinInterval) clearInterval(spinInterval);
        spinInterval = setInterval(() => { if (!isInteracting) document.getElementById('crew-3d-wrap').scrollLeft += 1.2; }, 16);
    }
    function stopAutoSpin() { clearInterval(spinInterval); spinInterval = null; }

    function handleInfiniteScroll() {
        const wrap = document.getElementById('crew-3d-wrap');
        const sw = document.getElementById('crew-track').scrollWidth / 3;
        if (wrap.scrollLeft <= 0) wrap.scrollLeft = sw;
        else if (wrap.scrollLeft >= sw * 2) wrap.scrollLeft = sw;
        requestAnimationFrame(animate3D);
    }

    function animate3D() {
        const wrap = document.getElementById('crew-3d-wrap');
        const centerX = wrap.scrollLeft + (wrap.offsetWidth / 2);
        document.querySelectorAll('.crew-card-3d').forEach(card => {
            const dist = (card.offsetLeft + (card.offsetWidth / 2)) - centerX;
            const abs = Math.abs(dist);
            card.style.transform = `rotateY(${dist/20}deg) translateZ(${-abs/2.5}px)`;
            card.classList.toggle('focus', abs < 80);
        });
    }

    function handle3DClick(el, id) {
        const dj = crewData.find(d => d.id === id);
        if(!el.classList.contains('focus')) { el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }); return; }
        document.getElementById('mag-name').innerText = dj.name;
        document.getElementById('mag-content').innerHTML = `
            <div class="bio-text">
                <p style="color:var(--authority-orange); font-family:'Oswald'; margin-bottom:10px;">${dj.title.toUpperCase()}</p>
                <p>${dj.bio}</p>
                <div class="bio-block">
                    <p><b>BAND:</b> ${dj.band}</p>
                    <p><b>GIG:</b> ${dj.gig}</p>
                    <p><b>FACT:</b> ${dj.fact}</p>
                </div>
            </div>`;
        document.getElementById('mag-modal').classList.add('open');
    }

    function openRates() {
        document.getElementById('mag-name').innerText = "AD PORTAL";
        document.getElementById('mag-content').innerHTML = `
            <select id="rate-select" class="std-input" onchange="updateCalc()">
                <option value="299">REGIONAL (£299)</option>
                <option value="449">MULTI-REGIONAL (£449)</option>
            </select>
            <div style="background:#111; padding:12px; margin-bottom:10px; border:1px solid #333;">
                <input type="checkbox" id="creative-chk" onchange="updateCalc()"> <label class="std-label" style="display:inline;">CREATIVE PKG (+£195)</label>
            </div>
            <h3 id="rate-total" style="font-family:'Oswald'; font-size:2.2rem; color:var(--authority-orange);">£299</h3>
            <button class="btn-authority" onclick="window.location.href='mailto:sales@rock.scot'">BOOK NOW</button>`;
        document.getElementById('mag-modal').classList.add('open');
    }

    function updateCalc() {
        const base = parseInt(document.getElementById('rate-select').value);
        const creative = document.getElementById('creative-chk').checked ? 195 : 0;
        document.getElementById('rate-total').innerText = "£" + (base + creative);
    }

    function openSubmit() {
        document.getElementById('mag-name').innerText = "TRANSMIT";
        document.getElementById('mag-content').innerHTML = `
            <input type="text" placeholder="BAND NAME" class="std-input">
            <input type="text" placeholder="TRACK LINK" class="std-input">
            <button class="btn-authority" onclick="document.getElementById('mag-modal').classList.remove('open')">SEND</button>`;
        document.getElementById('mag-modal').classList.add('open');
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
    }
    setInterval(updateClock, 10000);
    window.onload = updateClock;
</script>
</body>
</html>
