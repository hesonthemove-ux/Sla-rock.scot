<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sla-rock.scot | Rockin' Scotland</title>
    <style>
        :root { --primary: #ff3e00; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); }
        body { font-family: 'Inter', Arial, sans-serif; margin: 0; background-color: var(--bg); color: #fff; line-height: 1.6; }
        
        header { background: #000; padding: 30px; text-align: center; border-bottom: 4px solid var(--primary); }
        #logo { width: 250px; height: auto; }
        .tagline { font-size: 1.8rem; color: var(--primary); font-weight: 900; text-transform: uppercase; letter-spacing: 4px; margin-top: 10px; }

        nav { background: #0a0a0a; text-align: center; padding: 15px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #1a1a1a; }
        nav a { color: #888; margin: 0 15px; text-decoration: none; font-weight: 700; text-transform: uppercase; transition: 0.3s; font-size: 0.85rem; }
        nav a:hover { color: var(--primary); }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        /* News Section Styles */
        .news-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .live-indicator { background: red; color: white; padding: 2px 8px; border-radius: 3px; font-size: 0.7rem; font-weight: 900; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .feed-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .rss-item { background: var(--glass); border: 1px solid #222; padding: 25px; transition: 0.3s; }
        .rss-item:hover { border-color: var(--primary); }
        .rss-item h4 { margin: 0 0 10px 0; color: var(--primary); font-size: 1.1rem; text-transform: uppercase; line-height: 1.2; }
        .rss-item p { font-size: 0.85rem; color: #aaa; margin-bottom: 15px; }
        .rss-link { color: #fff; text-decoration: none; font-weight: 900; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--primary); }

        footer { text-align: center; padding: 80px 20px; color: #444; border-top: 1px solid #111; }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="Sla-rock.scot" id="logo">
    <div class="tagline">Rockin' Scotland</div>
</header>

<nav>
    <a href="index.html" style="color: var(--primary);">On Air</a>
    <a href="gig-calendar.html">Gigs</a>
    <a href="submit.html">Submit</a>
    <a href="advertising.html">Advertise</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">
    <div class="news-header">
        <h2 style="text-transform: uppercase; margin:0;">Central Scotland <span style="color: var(--primary);">Music News</span></h2>
        <div class="live-indicator">LIVE FEED</div>
    </div>

    <div id="rss-feed" class="feed-grid">
        <p style="color: #444;">Fetching latest rock news from Central Scotland...</p>
    </div>

    <div id="pricing-component" style="margin-top: 60px;"></div>
</div>

<footer>
    <p>&copy; 2026 Sla-rock.scot | Rockin' Scotland</p>
</footer>

<script>
    // RSS to JSON Proxy (using rss2json service)
    const RSS_URL = `https://scottishmusicnetwork.co.uk/feed/`;
    const API_KEY = 'YOUR_FREE_API_KEY'; // You can use it without a key for low volume

    async function fetchNews() {
        try {
            const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`);
            const data = await response.json();
            
            const feedContainer = document.getElementById('rss-feed');
            feedContainer.innerHTML = '';

            data.items.slice(0, 6).forEach(item => {
                const article = document.createElement('div');
                article.className = 'rss-item';
                
                // Remove HTML tags from summary
                const cleanSummary = item.description.replace(/<\/?[^>]+(>|$)/g, "").substring(0, 120) + "...";

                article.innerHTML = `
                    <h4>${item.title}</h4>
                    <p>${cleanSummary}</p>
                    <a href="${item.link}" target="_blank" class="rss-link">Read Full Report</a>
                `;
                feedContainer.appendChild(article);
            });
        } catch (error) {
            console.error('Error fetching RSS:', error);
            document.getElementById('rss-feed').innerHTML = '<p>Feed temporarily unavailable. Check back soon for the latest Rockin\' Scotland updates.</p>';
        }
    }

    fetchNews();
</script>

<script src="pricing.js"></script>
</body>
</html>
