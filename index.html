<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rock.Scot | Central Scotland's Rock Authority</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=New+Rocker&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #ff3e00; 
            --bg: #050505; 
            --header-h: clamp(90px, 12vh, 130px);
            --nav-h: 60px;
            --footer-h: 80px;
        }

        /* RESET & BASE */
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { 
            background: var(--bg) url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            height: 100dvh; 
            display: grid;
            grid-template-rows: var(--header-h) var(--nav-h) 1fr var(--footer-h);
            overflow: hidden;
        }

        /* HEADER: CENTERED LOGO.JPG */
        header { 
            background: rgba(0,0,0,0.95);
            border-bottom: 3px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            will-change: transform;
        }
        .hdr-logo { 
            height: 70%; 
            width: auto; 
            filter: drop-shadow(0 0 15px rgba(255,62,0,0.4));
        }

        /* NAV: INDUSTRIAL SWITCHES */
        nav { 
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            background: #000;
            gap: 2px;
            border-bottom: 1px solid #222;
        }
        .nav-btn {
            background: #111;
            border: none;
            color: #555;
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-btn.active { 
            color: #fff; 
            background: #1a1a1a;
            box-shadow: inset 0 -3px 0 var(--primary);
        }

        /* CONTENT AREA */
        main { 
            overflow-y: auto;
            padding: 20px;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }
        .view { display: none; max-width: 1200px; margin: 0 auto; animation: fade 0.3s ease; }
        .view.active { display: block; }

        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        /* REPURPOSED LOGO.PNG SECTION */
        .hero-unit {
            background: rgba(15,15,15,0.8);
            border: 1px solid #222;
            padding: clamp(30px, 8vh, 60px) 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .body-logo { width: 100%; max-width: 450px; height: auto; margin-bottom: 20px; }

        .grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        
        .card {
            background: rgba(25,25,25,0.5);
            padding: 25px;
            border-left: 4px solid var(--primary);
            transition: 0.3s;
        }
        .card:hover { background: rgba(35,35,35,0.8); transform: translateY(-3px); }

        /* FOOTER */
        footer { 
            background: #000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            border-top: 4px solid var(--primary);
        }
        .play-trigger {
            background: var(--primary);
            color: #fff;
            font-family: 'Oswald';
            font-weight: 900;
            padding: 10px 25px;
            border: none;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            cursor: pointer;
        }
        .station-id { font-family: 'New Rocker'; font-size: 1.3rem; color: #fff; text-shadow: 0 0 10px var(--primary); }

        @media (min-width: 1024px) {
            .grid-layout { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

<header>
    <img src="logo.jpg" alt="Rock.Scot" class="hdr-logo">
</header>

<nav id="main-nav">
    <button class="nav-btn active" onclick="tab('radio')">Live</button>
    <button class="nav-btn" onclick="tab('wire')">Wire</button>
    <button class="nav-btn" onclick="tab('crew')">Crew</button>
    <button class="nav-btn" onclick="tab('ads')">Ads</button>
</nav>

<main id="scroll-container">
    <section id="v-radio" class="view active">
        <div class="hero-unit">
            <img src="logo.png" alt="Rockin Scotland" class="body-logo">
            <h1 style="font-family:'Oswald'; letter-spacing:8px; font-size:1rem; color:var(--primary);">CENTRAL SCOTLAND AUTHORITY</h1>
        </div>
        <div style="height:300px; background:url('studio-main.jpg') center/cover; border:1px solid #333;"></div>
    </section>

    <section id="v-wire" class="view">
        <h2 style="font-family:'Oswald'; margin-bottom:20px; font-size:2rem; font-style:italic;">THE WIRE</h2>
        <div id="feed-target" class="grid-layout"></div>
    </section>

    <section id="v-crew" class="view">
        <div class="card">
            <h3 style="font-family:'Oswald'; font-size:2rem; color:var(--primary);">STATION CREW</h3>
            <p style="margin-top:10px; color:#888;">Broadcasting the loudest rock across the Central Belt 24/7.</p>
        </div>
    </section>

    <section id="v-ads" class="view">
        <h2 style="font-family:'Oswald'; margin-bottom:20px; font-size:2rem;">PARTNER WITH US</h2>
        <div class="grid-layout">
            <div class="card">
                <h4 style="font-family:'Oswald'; color:var(--primary);">REGIONAL AIRTIME</h4>
                <p>Reach the heart of Scotland. £299</p>
            </div>
            <div class="card">
                <h4 style="font-family:'Oswald'; color:var(--primary);">STUDIO CREATIVE</h4>
                <p>Pro-grade ad production. £195</p>
            </div>
        </div>
    </section>
</main>

<footer>
    <button class="play-trigger" id="master-play" onclick="streamToggle()">LISTEN LIVE</button>
    <div class="station-id">Rock.Scot</div>
</footer>

<script>
    function tab(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('v-' + id).classList.add('active');
        event.currentTarget.classList.add('active');
        document.getElementById('scroll-container').scrollTop = 0;
    }

    const player = new Audio("https://uksoutha.streaming.broadcast.radio/stream/16641/caledonia-tx-ltd");
    let isPlaying = false;
    function streamToggle() {
        const btn = document.getElementById('master-play');
        if(!isPlaying) { player.play(); btn.innerText = "STOP FEED"; isPlaying = true; }
        else { player.pause(); btn.innerText = "LISTEN LIVE"; isPlaying = false; }
    }

    async function getNews() {
        const rss = "https://api.rss2json.com/v1/api.json?rss_url=https://www.theskinny.co.uk/rss/music";
        try {
            const r = await fetch(rss);
            const d = await r.json();
            let h = '';
            d.items.slice(0, 9).forEach(i => {
                h += `<div class="card">
                    <h5 style="font-family:'Oswald'; color:var(--primary); font-size:1.1rem; margin-bottom:10px;">${i.title}</h5>
                    <p style="font-size:0.85rem; color:#888; line-height:1.4;">${i.description.substring(0, 110).replace(/<[^>]*>?/gm, '')}...</p>
                </div>`;
            });
            document.getElementById('feed-target').innerHTML = h;
        } catch(e) { document.getElementById('feed-target').innerHTML = '<div class="card">Wire Connection Active.</div>'; }
    }
    window.onload = getNews;
</script>
</body>
</html>
