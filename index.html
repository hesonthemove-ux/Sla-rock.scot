<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rock.Scot | Central Scotland's Rock Authority</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --authority-orange: #ff5500; 
            --phantom-glass: rgba(0, 0, 0, 0.4); 
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-shadow: 2px 2px 5px rgba(0,0,0,0.9);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #000; color: #fff; font-family: 'Inter', sans-serif; 
            overflow-x: hidden; min-height: 100vh;
        }

        header { 
            position: sticky; top: 0; z-index: 9999; 
            background: #000; width: 100%;
            display: flex; flex-direction: column; align-items: center;
        }
        
        .hdr-logo { 
            width: 100%; max-width: 450px; height: auto; 
            padding: 15px 0; display: block;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.8));
        }

        .nav-strip { 
            width: 100%; background: #000; 
            border-bottom: 4px solid var(--authority-orange);
            display: flex; height: 60px;
        }

        .nav-btn { flex: 1; background: transparent; border: none; color: #777; font-family: 'Bebas Neue'; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: var(--authority-orange); background: rgba(255,85,0,0.1); }

        .view { 
            display: none; min-height: 100vh; width: 100%; padding: 40px 20px; 
            background-size: cover; background-position: center; background-attachment: fixed;
            background-color: #000;
        }
        .view.active { display: flex; flex-direction: column; align-items: center; }

        .uniform-card { 
            width: 320px; height: 480px; 
            background: var(--phantom-glass);
            border: 1px solid var(--glass-border); 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
        }

        .archive-viewport {
            perspective: 1200px; width: 100%; height: 600px;
            display: flex; align-items: center;
            overflow-x: auto; overflow-y: hidden;
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        .archive-viewport::-webkit-scrollbar { display: none; }
        .crew-track { display: flex; align-items: center; padding: 0 100px; }

        .crew-card-3d {
            min-width: 280px; height: 420px; margin: 0 -40px;
            background: rgba(0,0,0,0.6); 
            border: 1px solid var(--glass-border); position: relative;
            transform-style: preserve-3d; will-change: transform;
            filter: grayscale(100%) brightness(0.4); transition: filter 0.5s;
        }
        .crew-card-3d.focus { filter: grayscale(0%) brightness(1.1); z-index: 100; border-color: var(--authority-orange); }
        .crew-label-3d { position: absolute; bottom: 0; width: 100%; padding: 25px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); font-family: 'Bebas Neue'; font-size: 2.2rem; text-align: center; }

        #rss-feed { display: grid; grid-template-columns: repeat(auto-fill, 320px); gap: 25px; width:100%; justify-content: center; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: none; padding: 20px; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .mag-layout { max-width: 550px; border: 8px solid #fff; padding: 30px; background: #000; width: 95%; max-height: 85vh; overflow-y: auto; }

        .btn-authority { width: 100%; padding: 18px; background: var(--authority-orange); border: none; color: #fff; font-family: 'Bebas Neue'; font-size: 1.6rem; cursor: pointer; }
        .std-input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; font-family: 'Oswald'; margin-bottom: 10px; }
        .std-label { display: block; font-family: 'Oswald'; font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        
        .bio-text { font-family: 'Inter'; font-size: 0.95rem; line-height: 1.6; color: #ddd; text-align: left; }
        .bio-text b { color: var(--authority-orange); font-family: 'Oswald'; text-transform: uppercase; }
        .bio-highlight { background: rgba(255,85,0,0.1); border-left: 3px solid var(--authority-orange); padding: 15px; margin: 15px 0; }
    </style>
</head>
<body onload="initApp()">

    <div id="mag-modal" class="modal-overlay" onclick="closeModal()">
        <div class="mag-layout" onclick="event.stopPropagation()">
            <div style="font-family:'Bebas Neue'; color:var(--authority-orange); letter-spacing:2px; font-size: 1.2rem;">CREW DOSSIER</div>
            <h2 id="mag-name" style="font-family:'Oswald'; font-size:2.8rem; text-transform:uppercase; line-height: 1;"></h2>
            <div id="mag-content" style="border-top:1px solid #333; padding-top:20px; margin-top: 10px;"></div>
        </div>
    </div>

    <header>
        <img src="logo.png" class="hdr-logo" alt="Rock.Scot">
        <nav class="nav-strip">
            <button class="nav-btn active" onclick="showTab('live', this)">LIVE</button>
            <button class="nav-btn" onclick="showTab('wire', this)">WIRE</button>
            <button class="nav-btn" onclick="showTab('crew', this)">CREW</button>
            <button class="nav-btn" onclick="showTab('rates', this)">RATES</button>
            <button class="nav-btn" onclick="showTab('submit', this)">SUBMIT</button>
        </nav>
    </header>

    <main>
        <section id="v-live" class="view active">
            <div class="uniform-card">
                <div id="live-clock" style="font-family:'Bebas Neue'; font-size:4.5rem; line-height:0.9;">00:00:00</div>
                <div style="font-family:'Oswald'; color:var(--authority-orange); letter-spacing:5px; margin-bottom:15px;">CENTRAL SCOTLAND</div>
                <iframe src="https://player.broadcast.radio/caledonia-tx-ltd" style="width:100%; height:260px; border:none; background:transparent;" allow="autoplay" allowtransparency="true"></iframe>
            </div>
        </section>

        <section id="v-wire" class="view">
            <div id="rss-feed"></div>
        </section>

        <section id="v-crew" class="view">
            <div class="archive-viewport" id="crew-3d-wrap" onscroll="handleInfiniteScroll()">
                <div class="crew-track" id="crew-track"></div>
            </div>
        </section>

        <section id="v-rates" class="view">
            <div class="uniform-card">
                <h2 style="font-family:'Bebas Neue'; font-size:3.5rem; color:var(--authority-orange);">RATES</h2>
                <button class="btn-authority" onclick="openRates()">AD PORTAL</button>
            </div>
        </section>

        <section id="v-submit" class="view">
            <div class="uniform-card" id="submit-card-content">
                <h2 style="font-family:'Bebas Neue'; font-size:3.5rem; color:var(--authority-orange);">SUBMIT</h2>
                <button class="btn-authority" onclick="openSubmit()">SEND TRACK</button>
            </div>
        </section>
    </main>

<script>
    const crewData = [
        { id: "andy", name: "ANDY", tagline: "East Kilbride's Rock Rebel", bio: "Hailing from East Kilbride in South Lanarkshire, Andy grew up blasting Biffy Clyro anthems from his bedroom in the new town suburbs. His dad dragged him to his first gig at a local pub, where a cover band nailed Simple Minds' \"Don't You (Forget About Me)\", and that was it—rock hooked him for life. He started pirate radio in his garage before landing at Rock.Scot, bringing high-energy playlists to listeners across Inverclyde, South Lanarkshire, and North Ayrshire.", band: "Biffy Clyro", gig: "Franz Ferdinand @ Barrowlands", venue: "King Tut's", fact: "Lost a shoe crowd-surfing in Hamilton.", img: "dj_andy.jpg" },
        { id: "alex", name: "ALEX", tagline: "Johnstone's Vinyl Viking", bio: "Born and bred in Johnstone, Alex discovered rock digging through his uncle's record collection—Nazareth's \"Hair of the Dog\" changed everything. He spent his teens sneaking into gigs in nearby Paisley and Glasgow, then built his own decks to spin rock classics. Now he rocks the airwaves on Rock.Scot with deep cuts and local shout-outs.", band: "Nazareth", gig: "Texas @ SEC", venue: "Barrowland Ballroom", fact: "Owns signed Deacon Blue vinyl.", img: "dj_alex.jpg" },
        { id: "stevie", name: "STEVIE", tagline: "Port Glasgow's Headbanger", bio: "From the shipbuilding heart of Port Glasgow in Inverclyde, Stevie was raised on tales of Clyde rockers. He formed a garage band in his teens, playing covers at local pubs before switching to DJing. His late-night shows on Rock.Scot keep Inverclyde headbanging from Greenock to Gourock.", band: "Big Country", gig: "Mogwai @ Òran Mór", venue: "Beacon Arts Centre", fact: "Claims he high-fived Angus Young.", img: "dj_stevie.jpg" },
        { id: "mhairi", name: "MHAIRI", tagline: "Hamilton's Hard Rock Queen", bio: "Hamilton gave Mhairi her first taste of live rock at a school battle of the bands. She was instantly obsessed, trading pop for distortion pedals and building a massive CD collection. Her witty banter and killer playlists now light up Rock.Scot for listeners in Hamilton and East Kilbride.", band: "Jesus and Mary Chain", gig: "Teenage Fanclub @ King Tut's", venue: "Grand Hall Kilmarnock", fact: "Moonlights as a tattoo artist.", img: "dj_mhairi.jpg" },
        { id: "jude", name: "JUDE", tagline: "Irvine's Indie Rock Icon", bio: "North Ayrshire's Irvine is Jude's stomping ground, where beach walks with Travis sparked a lifelong love for melodic rock. She climbed the ranks to Rock.Scot, championing emerging Scottish acts alongside classics.", band: "Travis", gig: "Idlewild @ Barrowland", venue: "Harbour Arts Centre", fact: "Hitchhiked to a Franz Ferdinand gig.", img: "dj_jude.jpg" },
        { id: "chris", name: "CHRIS", tagline: "Greenock's Guitar Guru", bio: "Greenock bred Chris on shipyard rockers. Starting as a pub DJ before joining Rock.Scot to blast rock across the Firth of Clyde.", band: "Primal Scream", gig: "Simple Minds @ OVO Hydro", venue: "Cathouse Rock Club", fact: "Owns every Big Country album.", img: "dj_chris.jpg" },
        { id: "cal", name: "CAL", tagline: "Kilmarnock Classic Rocker", bio: "Straight out of Kilmarnock, Cal grew up on fellow Killie lads Biffy Clyro. He DJ'd school discos before going pro, delivering timeless rock to Ayrshire.", band: "Biffy Clyro", gig: "The Fratellis @ Grand Hall", venue: "Palace Theatre", fact: "Won an air guitar contest.", img: "dj_cal.jpg" },
        { id: "blue", name: "BLUE", tagline: "Gourock's Bluesy Rock Maverick", bio: "From Gourock, Blue got into rock via his grandad's Nazareth records. He DJ'd beach parties before hitting Rock.Scot waves for Gourock and Wemyss Bay.", band: "Nazareth", gig: "Texas @ Paisley Arts", venue: "Coats Paisley", fact: "Mistaken for a Mogwai roadie.", img: "dj_blue.jpg" }
    ];

    let spinInterval, isInteracting = false, interactionTimer;

    function initApp() {
        updateClock();
        setInterval(updateClock, 1000);
        showTab('live', document.querySelector('.nav-btn'));
    }

    function updateClock() {
        const now = new Date();
        const clock = document.getElementById('live-clock');
        if(clock) clock.innerText = now.toLocaleTimeString('en-GB');
    }

    function showTab(name, btn) {
        // Handle views
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        
        const activeView = document.getElementById('v-' + name);
        activeView.classList.add('active');
        btn.classList.add('active');

        // Handle Backgrounds news1.jpg to news7.jpg
        const bgNum = Math.floor(Math.random() * 7) + 1;
        activeView.style.backgroundImage = `url('news${bgNum}.jpg')`;

        if(name === 'crew') { initInfiniteCrew(); startAutoSpin(); } 
        else if(name === 'wire') { fetchWire(); stopAutoSpin(); }
        else { stopAutoSpin(); }
    }

    /* WIRE LOGIC */
    async function fetchWire() {
        const container = document.getElementById('rss-feed');
        container.innerHTML = '<div class="uniform-card"><h3>SCANNING WIRE...</h3></div>';
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.theskinny.co.uk/rss/music')}`);
            const data = await res.json();
            container.innerHTML = data.items.map(item => `
                <div class="uniform-card">
                    <h3 style="font-family:'Oswald'; color:var(--authority-orange);">${item.title.toUpperCase()}</h3>
                    <p style="font-size:0.8rem; margin:15px 0;">${item.description.replace(/<[^>]*>?/gm, '').substring(0,100)}...</p>
                    <button class="btn-authority" style="font-size:1rem; padding:10px;" onclick="window.open('${item.link}')">READ WIRE</button>
                </div>`).join('');
        } catch (e) {
            container.innerHTML = Array.from({length:4}).map(() => `<div class="uniform-card"><h3>WIRE OFFLINE</h3><p>Redundant sync in progress.</p></div>`).join('');
        }
    }

    /* CREW LOGIC */
    function initInfiniteCrew() {
        const track = document.getElementById('crew-track');
        const wrap = document.getElementById('crew-3d-wrap');
        const tripleData = [...crewData, ...crewData, ...crewData];
        track.innerHTML = tripleData.map(dj => `
            <div class="crew-card-3d" onclick="handle3DClick(this, '${dj.id}')">
                <img src="${dj.img}" style="width:100%; height:100%; object-fit:cover;" onerror="this.src='logo.png'">
                <div class="crew-label-3d">${dj.name}</div>
            </div>`).join('');
        wrap.scrollLeft = track.scrollWidth / 3;
        animate3D();
        wrap.onmousedown = wrap.ontouchstart = () => { isInteracting = true; stopAutoSpin(); };
        wrap.onmouseup = wrap.ontouchend = () => { clearTimeout(interactionTimer); interactionTimer = setTimeout(() => { isInteracting = false; startAutoSpin(); }, 3000); };
    }

    function startAutoSpin() {
        if (spinInterval) clearInterval(spinInterval);
        spinInterval = setInterval(() => { if (!isInteracting) document.getElementById('crew-3d-wrap').scrollLeft += 1.2; }, 16);
    }
    function stopAutoSpin() { clearInterval(spinInterval); spinInterval = null; }

    function handleInfiniteScroll() {
        const wrap = document.getElementById('crew-3d-wrap');
        const sw = document.getElementById('crew-track').scrollWidth / 3;
        if (wrap.scrollLeft <= 0) wrap.scrollLeft = sw;
        else if (wrap.scrollLeft >= sw * 2) wrap.scrollLeft = sw;
        requestAnimationFrame(animate3D);
    }

    function animate3D() {
        const wrap = document.getElementById('crew-3d-wrap');
        const cards = document.querySelectorAll('.crew-card-3d');
        const centerX = wrap.scrollLeft + (wrap.offsetWidth / 2);
        cards.forEach(card => {
            const dist = (card.offsetLeft + (card.offsetWidth / 2)) - centerX;
            const abs = Math.abs(dist);
            card.style.transform = `rotateY(${dist/20}deg) translateZ(${-abs/2.5}px)`;
            card.classList.toggle('focus', abs < 80);
        });
    }

    function handle3DClick(el, id) {
        const dj = crewData.find(d => d.id === id);
        if(!el.classList.contains('focus')) { el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }); return; }
        document.getElementById('mag-name').innerText = dj.name;
        document.getElementById('mag-content').innerHTML = `
            <div class="bio-text">
                <p style="color:var(--authority-orange); font-family:'Oswald'; letter-spacing:1px; margin-bottom:10px;">${dj.tagline.toUpperCase()}</p>
                <p>${dj.bio}</p>
                <div class="bio-highlight">
                    <p><b>FAVOURITE BAND:</b> ${dj.band}</p>
                    <p><b>BEST GIG:</b> ${dj.gig}</p>
                    <p><b>DREAM VENUE:</b> ${dj.venue}</p>
                </div>
                <p><b>FUN FACT:</b> ${dj.fact}</p>
            </div>`;
        document.getElementById('mag-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('mag-modal').style.display = 'none'; }

    /* RATES LOGIC */
    const baseRates = { regional: 299, multi: 449 };
    const CREATIVE_FEE = 195;
    function openRates() {
        document.getElementById('mag-name').innerText = "AD PORTAL";
        document.getElementById('mag-content').innerHTML = `
            <select id="rate-select" class="std-input" onchange="updateCalc()">
                <option value="regional">REGIONAL (£299 / 28 days)</option>
                <option value="multi">MULTI-REGIONAL (£449 / 28 days)</option>
            </select>
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label class="std-label">Start Date</label><input type="date" id="rate-date" class="std-input"></div>
                <div style="flex:1;"><label class="std-label">Days</label><input type="number" id="rate-days" class="std-input" value="28" onchange="updateCalc()"></div>
            </div>
            <div style="background:#111; padding:12px; margin-bottom:10px; border:1px solid #333; display:flex; align-items:center; gap:10px;">
                <input type="checkbox" id="creative-addon" onchange="updateCalc()">
                <label class="std-label" style="margin:0;">CREATIVE PACKAGE (+£195)</label>
            </div>
            <div style="background:#050505; padding:20px; border:1px solid var(--authority-orange); text-align:right;">
                <div id="surcharge-msg" style="color:var(--authority-orange); font-size:0.75rem; font-family:Oswald; margin-bottom:5px; display:none;">+30% SHORT-TERM SURCHARGE</div>
                <h3 id="calc-total" style="font-family:'Oswald'; font-size:2.2rem; color:var(--authority-orange);">£299</h3>
            </div>
            <button class="btn-authority" style="margin-top:10px;" onclick="sendSignal()">SEND SIGNAL</button>`;
        document.getElementById('mag-modal').style.display = 'flex';
    }

    function updateCalc() {
        const type = document.getElementById('rate-select').value;
        const days = parseInt(document.getElementById('rate-days').value) || 0;
        const creative = document.getElementById('creative-addon').checked;
        let base = (baseRates[type] / 28) * days;
        if (days < 28 && days > 0) { base *= 1.30; document.getElementById('surcharge-msg').style.display = 'block'; }
        else { document.getElementById('surcharge-msg').style.display = 'none'; }
        document.getElementById('calc-total').innerText = `£${Math.round(base + (creative ? CREATIVE_FEE : 0))}`;
    }

    function sendSignal() { window.location.href = `mailto:sales@rock.scot?subject=Ad Booking&body=Total: ${document.getElementById('calc-total').innerText}`; }

    function openSubmit() {
        document.getElementById('mag-name').innerText = "TRANSMIT";
        document.getElementById('mag-content').innerHTML = `
            <input type="text" id="sub-name" placeholder="BAND NAM
