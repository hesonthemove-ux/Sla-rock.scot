<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sla-rock.scot | Rockin' Scotland | Central Scotland Rock Radio</title>
    <style>
        :root { --primary: #ff3e00; --bg: #050505; --glass: rgba(255, 255, 255, 0.08); }
        
        /* Core Reset & Performance */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        
        #app-shell { display: flex; flex-direction: column; height: 100vh; }
        
        /* Header - Desktop Emphasis on Logo */
        header { 
            background: #000; 
            padding: 40px 20px; 
            text-align: center; 
            border-bottom: 4px solid var(--primary); 
            flex-shrink: 0; 
            position: relative; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #logo { width: 100%; max-width: 600px; height: auto; transition: transform 0.3s ease; }
        .tagline { font-size: 1.8rem; color: var(--primary); font-weight: 900; text-transform: uppercase; letter-spacing: 8px; margin-top: 15px; }
        
        /* Next Show Sticker */
        #next-show-timer { 
            position: absolute; 
            bottom: -15px; 
            background: var(--primary); 
            color: #fff; 
            padding: 6px 20px; 
            font-size: 0.75rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            border-radius: 20px; 
            z-index: 100; 
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        /* Refined Mobile-First Nav */
        nav { 
            background: #0a0a0a; 
            padding: 20px 0 10px; 
            text-align: center; 
            border-bottom: 1px solid #222; 
            flex-shrink: 0; 
            overflow-x: auto; 
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; /* Hide scrollbar Firefox */
        }
        nav::-webkit-scrollbar { display: none; } /* Hide scrollbar Chrome/Safari */

        nav a { 
            display: inline-block;
            color: #fff; 
            margin: 0 12px; 
            text-decoration: none; 
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer; 
            font-size: 0.8rem; 
            letter-spacing: 1px; 
            padding: 12px 16px; 
            border-radius: 4px; 
            transition: 0.2s;
        }
        nav a:hover, nav a.active { background: var(--glass); color: var(--primary); }

        /* Main Content Window */
        #content-window { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 40px 20px; 
            padding-bottom: 160px; /* Space for fixed player */
            scroll-behavior: smooth;
        }

        /* News & Card Styles */
        .news-card { background: var(--glass); border-left: 4px solid #333; padding: 25px; margin-bottom: 20px; border-radius: 0 4px 4px 0; }
        .news-tag { color: var(--primary); font-size: 0.7rem; font-weight: 900; text-transform: uppercase; }

        /* Footer Player */
        footer#master-player { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: #000; 
            border-top: 3px solid var(--primary); 
            padding: 15px 30px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            z-index: 9999; 
        }
        .player-frame { width: 420px; height: 65px; border: none; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            header { padding: 25px 15px; }
            #logo { max-width: 280px; }
            .tagline { font-size: 1rem; letter-spacing: 4px; margin-top: 8px; }
            #next-show-timer { font-size: 0.65rem; padding: 4px 12px; }
            
            nav a { font-size: 0.75rem; margin: 0 5px; padding: 10px 12px; }
            
            footer#master-player { 
                flex-direction: column; 
                padding: 10px; 
                height: auto;
            }
            .player-frame { width: 100%; height: 80px; }
            #track-info { margin: 10px 0 0 0 !important; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<div id="app-shell">
    <header>
        <img src="logo.png" alt="Sla-rock.scot" id="logo">
        <div class="tagline">Rockin' Scotland</div>
        <div id="next-show-timer">Syncing Stream...</div>
    </header>

    <nav id="main-nav">
        <a onclick="spa.load('home')" id="nav-home">On Air</a>
        <a onclick="spa.load('news')" id="nav-news">News</a>
        <a onclick="spa.load('venues')" id="nav-venues">Rock Radar</a>
        <a onclick="spa.load('ads')" id="nav-ads">Advertise</a>
    </nav>

    <div id="content-window">
        <div id="page-content"></div>
    </div>

    <footer id="master-player">
        <iframe class="player-frame" src="https://player.broadcast.radio/caledonia-tx-ltd" allow="autoplay"></iframe>
        <div id="track-info" style="color:#888; font-weight:bold; font-size:0.8rem; margin-left:20px;">SLA-ROCK.SCOT | LIVE FROM CENTRAL SCOTLAND</div>
    </footer>
</div>
