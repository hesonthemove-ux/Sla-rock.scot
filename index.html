<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rock.Scot | Central Scotland's Rock Authority</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --authority-orange: #ff5500; 
            --panel-bg: #0a0a0a;
            --glass: rgba(0, 0, 0, 0.85);
        }

        /* 1. GLOBAL RESET & SCROLL LOCK */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; color: #fff; font-family: 'Inter', sans-serif; 
            min-height: 100vh; width: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch;
            position: relative; padding-top: env(safe-area-inset-top, 12px);
        }

        /* 2. HEADER & NAVIGATION */
        header {
            position: sticky; top: 0; left: 0; width: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.4), rgba(0,0,0,0.6));
            z-index: 200; display: flex; flex-direction: column; align-items: center; padding-bottom: 8px;
        }

        .hdr-logo {
            width: 80%; max-width: 420px; height: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.9));
            margin: 6px auto -36px auto; z-index: 220; display: block;
        }

        .nav-strip {
            width: 100%; background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(10px); border-bottom: 2px solid var(--authority-orange);
            display: flex; height: 50px; z-index: 210; position: relative;
        }
        .nav-btn { 
            flex: 1; background: transparent; border: none; 
            color: #888; font-family: 'Bebas Neue'; font-size: 1.05rem; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }
        .nav-btn.active { color: var(--authority-orange); background: rgba(255,85,0,0.1); }

        /* 3. MAIN CONTENT AREA */
        main { position: relative; width: 100%; background: #050505; z-index: 50; }
        .view { width: 100%; display: none; flex-direction: column; min-height: calc(100vh - 140px); opacity: 0; transition: opacity 0.3s; }
        .view.active { display: flex; opacity: 1; }

        /* 4. SECTIONS & BACKGROUNDS */
        .studio-frame {
            width: 100%; min-height: 65vh; position: relative; 
            display: flex; flex-direction: column; justify-content: flex-end;
            background-size: cover; background-position: center;
        }
        .studio-overlay {
            background: linear-gradient(0deg, rgba(0,0,0,1) 0%, rgba(0,0,0,0.2) 100%);
            padding: 40px 20px; text-align: center; border-top: 2px solid var(--authority-orange);
        }

        .scroll-panel { 
            width: 100%; padding: 40px 20px; background-size: cover; background-position: center;
            max-width: 900px; margin: 0 auto; min-height: 80vh;
        }
        .glass-inner { background: var(--glass); backdrop-filter: blur(15px); padding: 30px; border: 1px solid #333; }

        /* 5. COMPONENTS */
        .news-grid { display: grid; grid-template-columns: 1fr; gap: 15px; padding: 20px; max-width: 1100px; margin: 0 auto; }
        .news-card { background: #111; border: 1px solid #333; overflow: hidden; text-decoration: none; color: inherit; }
        .news-thumb { width: 100%; height: 200px; background-size: cover; background-position: center; filter: grayscale(100%); transition: 0.3s; }
        .news-card:hover .news-thumb { filter: grayscale(0%); border-bottom: 2px solid var(--authority-orange); }

        .btn-play {
            width: 100%; max-width: 400px; padding: 20px; 
            background: linear-gradient(180deg, #ff5500, #aa3300);
            border: 1px solid #fff; color: #fff; font-family: 'Bebas Neue'; font-size: 1.8rem;
            cursor: pointer; margin: 15px auto; display: block;
        }

        /* 6. MODALS */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); backdrop-filter: blur(15px);
            z-index: 5000; display: none; align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal-content {
            width: 95%; max-width: 700px; background: #111; 
            border: 1px solid var(--authority-orange); padding: 30px;
        }

        @media (min-width: 800px) { 
            .news-grid { grid-template-columns: 1fr 1fr; }
            .hdr-logo { max-width: 500px; margin-bottom: -44px; }
        }
    </style>
</head>
<body>

    <div id="bio-modal" class="modal-overlay" onclick="this.classList.remove('open')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="bio-name" style="font-family:'Bebas Neue'; font-size:3rem; color:var(--authority-orange);"></h2>
            <div id="bio-role" style="font-family:'Oswald'; color:#fff; margin-bottom:20px;"></div>
            <p id="bio-text" style="line-height:1.6; color:#ccc; margin-bottom:20px;"></p>
            <div style="background:#222; padding:15px; border-left:4px solid var(--authority-orange);">
                <p><strong>TOP BAND:</strong> <span id="bio-band"></span></p>
                <p><strong>FAVE GIG:</strong> <span id="bio-gig"></span></p>
                <p><strong>FACT:</strong> <span id="bio-fact"></span></p>
            </div>
        </div>
    </div>

    <header>
        <img src="top_banner.png" class="hdr-logo" alt="Rock.Scot">
        <nav class="nav-strip">
            <button class="nav-btn active" onclick="showTab('live')">LIVE</button>
            <button class="nav-btn" onclick="showTab('wire')">WIRE</button>
            <button class="nav-btn" onclick="showTab('crew')">CREW</button>
            <button class="nav-btn" onclick="showTab('rates')">RATES</button>
            <button class="nav-btn" onclick="showTab('submit')">SUBMIT</button>
        </nav>
    </header>

    <main>
        <section id="v-live" class="view active">
            <div id="live-bg" class="studio-frame">
                <div class="studio-overlay">
                    <div id="live-clock" style="font-family:'Bebas Neue'; font-size:6rem; line-height:1;">00:00</div>
                    <div style="color:var(--authority-orange); font-family:'Oswald'; letter-spacing:4px;">CENTRAL SCOTLAND AUTHORITY</div>
                    <button class="btn-play" id="play-btn" onclick="toggleAudio()">ENGAGE SIGNAL</button>
                </div>
            </div>
        </section>

        <section id="v-wire" class="view">
            <div id="news-grid" class="news-grid"></div>
        </section>

        <section id="v-crew" class="view">
            <div class="news-grid" id="crew-list"></div>
        </section>

        <section id="v-rates" class="view">
            <div id="rates-bg" class="scroll-panel">
                <div class="glass-inner">
                    <h2 style="font-family:'Bebas Neue'; font-size:3rem; color:var(--authority-orange);">ADVERTISING</h2>
                    <select id="calc-package" onchange="calc()" style="width:100%; padding:15px; background:#000; color:#fff; border:1px solid #333; margin-bottom:15px;">
                        <option value="299">Regional Airtime (£299/28 days)</option>
                        <option value="449">Multi-Regional Airtime (£449/28 days)</option>
                    </select>
                    <div id="total-price" style="font-family:'Bebas Neue'; font-size:3rem; text-align:center;">£299.00</div>
                    <button class="btn-play">BOOK NOW</button>
                </div>
            </div>
        </section>

        <section id="v-submit" class="view">
            <div id="submit-bg" class="scroll-panel">
                <div class="glass-inner">
                    <h2 style="font-family:'Bebas Neue'; font-size:3rem; color:var(--authority-orange);">SUBMIT TRACK</h2>
                    <input type="text" placeholder="ARTIST NAME" style="width:100%; padding:15px; margin-bottom:10px; background:#000; border:1px solid #333; color:#fff;">
                    <textarea placeholder="PITCH YOUR MUSIC..." style="width:100%; padding:15px; height:150px; background:#000; border:1px solid #333; color:#fff;"></textarea>
                    <button class="btn-play">TRANSMIT</button>
                </div>
            </div>
        </section>
    </main>

<script>
    const stream = new Audio("https://uksoutha.streaming.broadcast.radio/stream/16641/caledonia-tx-ltd");
    
    const crewData = [
        { id: "dj_andy", name: "Andy", role: "Rock Rebel", bio: "Raised on Biffy Clyro in East Kilbride.", band: "Biffy Clyro", gig: "Barrowlands", fact: "Lost a shoe crowd-surfing." },
        { id: "dj_alex", name: "Alex", role: "Vinyl Viking", bio: "Cutting his teeth on rare Nazareth vinyl.", band: "Nazareth", gig: "The Renfrew Sessions", fact: "Has 5000+ records." }
    ];

    function getRandomImg() { return `news${Math.floor(Math.random() * 7) + 1}.jpg`; }

    function showTab(name) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('v-' + name).classList.add('active');
        event.target.classList.add('active');
        refreshBackgrounds();
        if(name === 'wire') populateNews();
        if(name === 'crew') populateCrew();
    }

    function refreshBackgrounds() {
        document.getElementById('live-bg').style.backgroundImage = `url('${getRandomImg()}')`;
        document.getElementById('rates-bg').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('${getRandomImg()}')`;
        document.getElementById('submit-bg').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('${getRandomImg()}')`;
    }

    function populateNews() {
        const grid = document.getElementById('news-grid');
        grid.innerHTML = Array.from({length: 6}, (_, i) => `
            <div class="news-card">
                <div class="news-thumb" style="background-image:url('${getRandomImg()}')"></div>
                <div class="news-content">
                    <div style="font-family:'Oswald'; color:var(--authority-orange);">SIGNAL #${i+100}</div>
                    <div style="font-family:'Oswald';">Central Scotland Music Intelligence</div>
                </div>
            </div>
        `).join('');
    }

    function populateCrew() {
        const list = document.getElementById('crew-list');
        list.innerHTML = crewData.map(dj => `
            <div class="news-card" onclick="openBio('${dj.id}')">
                <div class="news-thumb" style="background-image:url('crew_${dj.id}.jpg')"></div>
                <div class="news-content">
                    <div style="font-family:'Bebas Neue'; font-size:1.5rem;">${dj.name}</div>
                    <div style="color:var(--authority-orange); font-family:'Oswald';">${dj.role}</div>
                </div>
            </div>
        `).join('');
    }

    function openBio(id) {
        const dj = crewData.find(d => d.id === id);
        document.getElementById('bio-name').innerText = dj.name;
        document.getElementById('bio-role').innerText = dj.role;
        document.getElementById('bio-text').innerText = dj.bio;
        document.getElementById('bio-band').innerText = dj.band;
        document.getElementById('bio-gig').innerText = dj.gig;
        document.getElementById('bio-fact').innerText = dj.fact;
        document.getElementById('bio-modal').classList.add('open');
    }

    function toggleAudio() {
        if(stream.paused) { stream.play(); document.getElementById('play-btn').innerText = "TERMINATE SIGNAL"; }
        else { stream.pause(); document.getElementById('play-btn').innerText = "ENGAGE SIGNAL"; }
    }

    setInterval(() => {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
    }, 1000);

    window.onload = () => { refreshBackgrounds(); };
</script>
</body>
</html>
