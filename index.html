<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock.Scot | Scottish Rock Authority</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        :root { 
            --sahb-red: #ff0000;
            --sahb-glow: rgba(255, 0, 0, 0.8);
            --paper: rgba(20, 20, 20, 0.9);
            --yellow: #fdfd96;
        }

        body, html { 
            margin: 0; padding: 0; min-height: 100vh;
            background: #000; color: var(--yellow);
            font-family: 'Permanent Marker', cursive;
            overflow-x: hidden;
        }

        /* THE MAIN IMAGE BG */
        .master-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('assets/backgrounds/bg1.jpg') no-repeat center center;
            background-size: cover; z-index: -2; filter: grayscale(0.4) contrast(1.2);
        }

        /* VINTAGE FILM GRAIN */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.4; z-index: -1; pointer-events: none;
        }

        header { padding: 30px; text-align: center; }
        header img { 
            width: 100%; max-width: 450px; 
            filter: drop-shadow(0 0 20px var(--sahb-red));
            transform: rotate(-2deg);
        }

        nav {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 10px; padding: 10px; position: sticky; top: 0; z-index: 100;
            background: rgba(0,0,0,0.8); border-bottom: 5px solid var(--sahb-red);
        }

        nav button {
            background: #222; border: 3px solid #444; color: #fff;
            padding: 15px 5px; cursor: pointer; font-family: 'Creepster', cursive;
            font-size: 1.2rem; letter-spacing: 2px; transition: 0.2s;
            text-shadow: 2px 2px #000;
        }

        nav button:hover, nav button.active {
            color: var(--sahb-red);
            border-color: var(--sahb-red);
            box-shadow: 0 0 20px var(--sahb-glow);
            transform: scale(1.05) rotate(1deg);
        }

        main { padding: 20px; max-width: 900px; margin: 0 auto; }

        .zine-card {
            background: var(--paper);
            border: 4px solid #333;
            padding: 30px; margin-bottom: 40px;
            box-shadow: 15px 15px 0px var(--sahb-red);
            transform: rotate(0.5deg);
        }

        h2 { 
            font-family: 'Creepster', cursive; font-size: 3rem; 
            color: var(--sahb-red); margin: 0 0 20px 0;
            text-transform: uppercase; letter-spacing: 5px;
            text-shadow: 3px 3px #000;
        }

        .glow-link {
            display: block; width: 100%; padding: 25px; margin-bottom: 20px;
            background: #000; border: 3px solid var(--sahb-red);
            color: var(--yellow); text-decoration: none; text-align: center;
            font-size: 1.5rem; text-transform: uppercase;
            box-shadow: inset 0 0 10px var(--sahb-glow);
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 5px var(--sahb-glow), inset 0 0 5px var(--sahb-glow); }
            50% { box-shadow: 0 0 25px var(--sahb-glow), inset 0 0 15px var(--sahb-glow); }
            100% { box-shadow: 0 0 5px var(--sahb-glow), inset 0 0 5px var(--sahb-glow); }
        }

        .wire-item {
            border-bottom: 2px dashed #444; padding: 20px 0;
            font-family: 'Permanent Marker', cursive;
        }

        .section { display: none; }
        .section.active { display: block; }

        #clock {
            font-size: 4rem; color: var(--sahb-red); text-align: center;
            text-shadow: 0 0 15px var(--sahb-red); margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="master-bg"></div>
    <div class="overlay"></div>

    <header><img src="assets/branding/logo.png" alt="ROCK.SCOT"></header>

    <nav>
        <button onclick="tab('live')" id="btn-live" class="active">GIGS</button>
        <button onclick="tab('wire')" id="btn-wire">WIRE</button>
        <button onclick="tab('team')" id="btn-team">CREW</button>
        <button onclick="tab('ads')" id="btn-ads">ADS</button>
    </nav>

    <main>
        <section id="live" class="section active">
            <div id="clock">00:00:00</div>
            <div class="zine-card">
                <h2>Verified Gigs</h2>
                <a href="https://www.skiddle.com/whats-on/scotland/gigs/" target="_blank" class="glow-link">SKIDDLE INTEL</a>
                <a href="https://www.ticketmaster.co.uk/browse/rock-and-pop-catid-73/music-atid-10001/scotland-rid-10005" target="_blank" class="glow-link">TICKETMASTER GIGS</a>
            </div>
        </section>

        <section id="wire" class="section">
            <div class="zine-card">
                <h2>The Rock Wire</h2>
                <div id="wire-content"></div>
            </div>
        </section>

        <section id="team" class="section">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;" id="crew-list"></div>
        </section>

        <section id="ads" class="section">
            <div class="zine-card" id="ads-list"></div>
        </section>
    </main>

    <script>
        const _sb = supabase.createClient('https://figcmwjdbeurhjopxknp.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpZ2Ntd2pkYmV1cmhqb3B4a25wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4ODI5MDYsImV4cCI6MjA4NDQ1ODkwNn0.iiE65zB0lAsEkJE6lotNU1lORpL94oxZ7-ebHhJ3FgY');

        function tab(t) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.getElementById('btn-'+t).classList.add('active');
            if(t==='wire') loadWire(); if(t==='team') loadCrew(); if(t==='ads') loadAds();
        }

        async function loadWire() {
            const { data } = await _sb.from('news_wire').select('*').order('created_at', {ascending:false}).limit(12);
            document.getElementById('wire-content').innerHTML = data ? data.map(n => `
                <div class="wire-item" onclick="window.open('${n.source_url}', '_blank')">
                    <span style="color:var(--sahb-red); text-decoration:underline; font-size:0.8rem;">${n.source_name}</span><br>
                    <span style="font-size:1.4rem;">${n.headline}</span>
                </div>
            `).join('') : "";
        }

        function loadCrew() {
            const crew = ["Andy","Alex","Stevie","Mhairi","Jude","Chris","Cal","Blue"];
            document.getElementById('crew-list').innerHTML = crew.map(c => `
                <div class="zine-card" style="margin:0; text-align:center; padding:15px;">
                    <div style="width:100%; height:120px; background:var(--sahb-red); margin-bottom:10px; filter: contrast(2);"></div>
                    <span style="font-size:1.5rem;">${c}</span>
                </div>
            `).join('');
        }

        async function loadAds() {
            const { data } = await _sb.from('ads').select('*');
            document.getElementById('ads-list').innerHTML = data ? data.map(a => `
                <div style="margin-bottom:25px; border-bottom:3px solid var(--sahb-red); padding-bottom:10px;">
                    <h3 style="color:var(--sahb-red); margin:0;">${a.title}</h3>
                    <p>${a.description}</p>
                    <div style="color:var(--yellow); font-size:1.5rem;">${a.price}</div>
                </div>
            `).join('') : "";
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0]; }, 1000);
        tab('live');
    </script>
</body>
</html>
