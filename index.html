<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock.Scot | Scottish Rock Authority</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --cyan: #00f2ff;
            --red: #ff003c;
            --glass: rgba(0, 0, 0, 0.4); /* Thinned out to show bg1.jpg */
            --border: rgba(0, 242, 255, 0.3);
        }

        body, html { 
            margin: 0; padding: 0; min-height: 100vh;
            background: #000; color: #fff; 
            font-family: 'Rajdhani', sans-serif;
        }

        /* FIXED FULL-SIZE BACKGROUND */
        .master-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('assets/backgrounds/bg1.jpg') no-repeat center center;
            background-size: cover; z-index: -2;
        }

        /* LIGHT VIGNETTE TO ENSURE CENTER READABILITY */
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.7) 150%);
            z-index: -1; pointer-events: none;
        }

        header { padding: 30px 20px; text-align: center; }
        header img { width: 100%; max-width: 500px; filter: drop-shadow(0 0 20px #000); }

        nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            border-bottom: 3px solid var(--red);
            display: flex; justify-content: center;
        }

        nav button {
            background: transparent; border: none; color: #eee;
            padding: 20px; cursor: pointer;
            font-family: 'Syncopate', sans-serif; font-weight: 700;
            font-size: 0.8rem; text-transform: uppercase;
            letter-spacing: 2px; text-shadow: 2px 2px 4px #000;
        }

        nav button.active { color: var(--cyan); border-bottom: 4px solid var(--cyan); }

        main { padding: 20px; max-width: 1000px; margin: 0 auto; }

        .pro-card {
            background: var(--glass);
            backdrop-filter: blur(8px);
            border: 2px solid var(--border);
            padding: 30px; margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { 
            font-family: 'Syncopate', sans-serif; font-size: 1.6rem;
            text-transform: uppercase; letter-spacing: 4px;
            color: #fff; text-shadow: 2px 2px var(--red);
            margin-bottom: 25px;
        }

        .crew-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }

        .crew-member {
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--border);
            padding: 8px; text-align: center;
            transition: 0.3s;
        }

        .crew-member img {
            width: 100%; aspect-ratio: 1/1; object-fit: cover;
            border-bottom: 4px solid var(--red);
            filter: grayscale(0.1);
        }

        .crew-name {
            font-family: 'Syncopate', sans-serif; font-weight: 700;
            display: block; margin-top: 10px; color: var(--cyan);
            font-size: 0.8rem; letter-spacing: 1px;
        }

        .glow-btn {
            display: block; width: 100%; padding: 20px; margin-bottom: 15px;
            background: rgba(0,0,0,0.7); border: 2px solid var(--cyan);
            color: var(--cyan); text-decoration: none; text-align: center;
            font-family: 'Syncopate', sans-serif; font-weight: 700;
            letter-spacing: 3px; box-shadow: 0 0 15px var(--cyan);
        }

        .section { display: none; }
        .section.active { display: block; }

        #clock { font-family: 'Syncopate', sans-serif; font-size: 3rem; text-align: center; color: #fff; text-shadow: 0 0 20px var(--red); margin-bottom: 20px; }

        @media (max-width: 600px) {
            .crew-grid { grid-template-columns: 1fr 1fr; }
            nav button { font-size: 0.6rem; padding: 15px 8px; }
        }
    </style>
</head>
<body>
    <div class="master-bg"></div>
    <div class="vignette"></div>

    <header><img src="assets/branding/logo.png" alt="ROCK.SCOT"></header>

    <nav>
        <button onclick="tab('live')" id="btn-live" class="active">Gigs</button>
        <button onclick="tab('wire')" id="btn-wire">Wire</button>
        <button onclick="tab('team')" id="btn-team">Crew</button>
        <button onclick="tab('ads')" id="btn-ads">Ads</button>
    </nav>

    <main>
        <section id="live" class="section active">
            <div id="clock">00:00:00</div>
            <div class="pro-card">
                <h2>Verified Gigs</h2>
                <a href="https://www.skiddle.com/whats-on/scotland/gigs/" target="_blank" class="glow-btn">SKIDDLE SCOTLAND</a>
                <a href="https://www.ticketmaster.co.uk/browse/rock-and-pop-catid-73/music-atid-10001/scotland-rid-10005" target="_blank" class="glow-btn">TICKETMASTER GIGS</a>
            </div>
        </section>

        <section id="wire" class="section">
            <div class="pro-card">
                <h2>Rock Wire</h2>
                <div id="wire-content"></div>
            </div>
        </section>

        <section id="team" class="section">
            <div class="crew-grid" id="crew-list"></div>
        </section>

        <section id="ads" class="section">
            <div id="ads-list"></div>
        </section>
    </main>

    <script>
        const _sb = supabase.createClient('https://figcmwjdbeurhjopxknp.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpZ2Ntd2pkYmV1cmhqb3B4a25wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4ODI5MDYsImV4cCI6MjA4NDQ1ODkwNn0.iiE65zB0lAsEkJE6lotNU1lORpL94oxZ7-ebHhJ3FgY');

        function tab(t) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.getElementById('btn-'+t).classList.add('active');
            if(t==='wire') loadWire(); if(t==='team') loadCrew(); if(t==='ads') loadAds();
        }

        async function loadWire() {
            const { data } = await _sb.from('news_wire').select('*').order('created_at', {ascending:false}).limit(10);
            document.getElementById('wire-content').innerHTML = data ? data.map(n => `
                <div style="padding:15px 0; border-bottom:1px solid rgba(255,255,255,0.1); cursor:pointer;" onclick="window.open('${n.source_url}', '_blank')">
                    <span style="color:var(--red); font-weight:700; font-size:0.7rem;">${n.source_name}</span>
                    <h3 style="margin:5px 0 0 0; font-family:'Syncopate'; font-size:1rem; text-shadow: 2px 2px #000;">${n.headline}</h3>
                </div>`).join('') : "";
        }

        function loadCrew() {
            const crew = [
                {n:"Andy", i:"dj1.jpg"}, {n:"Alex", i:"dj2.jpg"}, 
                {n:"Stevie", i:"dj3.jpg"}, {n:"Mhairi", i:"dj4.jpg"},
                {n:"Jude", i:"dj5.jpg"}, {n:"Chris", i:"dj6.jpg"}, 
                {n:"Cal", i:"dj7.jpg"}, {n:"Blue", i:"dj8.jpg"}
            ];
            document.getElementById('crew-list').innerHTML = crew.map(c => `
                <div class="crew-member">
                    <img src="assets/crew/${c.i}" onerror="this.src='assets/branding/logo.png'">
                    <span class="crew-name">${c.n}</span>
                </div>
            `).join('');
        }

        async function loadAds() {
            const { data } = await _sb.from('ads').select('*');
            document.getElementById('ads-list').innerHTML = data ? data.map(a => `
                <div class="pro-card">
                    <h3 style="color:var(--cyan); font-family:'Syncopate'; text-shadow: 2px 2px #000;">${a.title}</h3>
                    <p style="text-shadow: 1px 1px #000;">${a.description}</p>
                    <span style="color:var(--red); font-weight:bold; font-family:'Syncopate'; text-shadow: 2px 2px #000;">${a.price}</span>
                </div>`).join('') : "";
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0]; }, 1000);
        tab('live');
    </script>
</body>
</html>
