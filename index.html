<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock.Scot | Central Scotland Authority</title>
    <link rel="stylesheet" href="style.css?v=1769104780">
    <style>
        .news-item { border-bottom: 1px solid #333; padding: 10px 0; }
        .news-item h4 { color: #ff4500; margin: 0; }
    </style>
</head>
<body style="background:#000; color:#fff; font-family:sans-serif; margin:0; padding-bottom:80px;">
    <header style="text-align:center; padding:20px;">
        <img src="assets/branding/logo.png" style="width:90%; max-width:400px;" alt="Rock.Scot">
    </header>
    
    <nav style="display:flex; background:#111; border-bottom:2px solid #ff4500; position:sticky; top:0; z-index:100;">
        <button onclick="showTab('onair')" style="flex:1; background:none; border:none; color:#fff; padding:15px; font-weight:bold;">ON AIR</button>
        <button onclick="showTab('news')" style="flex:1; background:none; border:none; color:#fff; padding:15px; font-weight:bold;">NEWS</button>
        <button onclick="showTab('ads')" style="flex:1; background:none; border:none; color:#fff; padding:15px; font-weight:bold;">ADS</button>
    </nav>

    <main id="main-content" style="padding:20px;">
        <div id="onair">
            <div style="background:#ff4500; color:#fff; padding:12px; text-align:center; font-weight:bold; border-radius:8px;">NEXT GIG IN: LIVE NOW</div>
            <h2>Broadcasting From Central Scotland</h2>
        </div>
        <div id="news" style="display:none;">
            <h3>Central Scotland Music Wire</h3>
            <div id="feed-container">Loading local music news...</div>
        </div>
    </main>

    <footer style="position:fixed; bottom:0; width:100%; background:#111; padding:15px; text-align:center; border-top:1px solid #333;">
        <div style="font-size:10px; color:#555;">BUILD: v10.19_1769104780</div>
    </footer>

    <script>
        function showTab(id) {
            document.getElementById('onair').style.display = id === 'onair' ? 'block' : 'none';
            document.getElementById('news').style.display = id === 'news' ? 'block' : 'none';
            if(id === 'news') loadNews();
        }
        function loadNews() {
            const news = [
                {t: "Glasgow King Tut's: New Local Showcase", d: "Highlighting upcoming talent from across the belt."},
                {t: "Stirling Music Fest Update", d: "Final lineup announced for the summer rock stages."},
                {t: "Central Scotland Radio Shift", d: "Rock.Scot expanding local coverage zones."}
            ];
            document.getElementById('feed-container').innerHTML = news.map(n => 
                `<div class="news-item"><h4>${n.t}</h4><p>${n.d}</p></div>`).join('');
        }
    </script>
</body>
</html>
