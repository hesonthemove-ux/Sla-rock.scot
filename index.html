<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock.Scot | Scottish Rock Authority</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --cyan: #00f2ff;
            --red: #ff003c;
            --glass: rgba(0, 0, 0, 0.45);
        }

        body { 
            margin: 0; padding: 0; min-height: 100vh;
            background: url('assets/backgrounds/bg1.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff; 
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }

        /* VECTOR-STYLE LOGO TRANSFORM */
        header { 
            padding: 40px 20px; 
            text-align: center;
        }

        header img { 
            width: 100%; 
            max-width: 650px; 
            /* This removes the black background from your logo.png */
            mix-blend-mode: screen; 
            filter: drop-shadow(0 0 20px var(--cyan));
        }

        nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border-bottom: 3px solid var(--red);
            display: flex; justify-content: center;
        }

        nav button {
            background: transparent; border: none; color: #fff;
            padding: 20px; cursor: pointer;
            font-family: 'Syncopate', sans-serif; font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 2px 2px 4px #000;
        }

        nav button.active { color: var(--cyan); border-bottom: 3px solid var(--cyan); }

        main { padding: 25px; max-width: 1100px; margin: 0 auto; }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.5s ease; }

        .card {
            background: var(--glass);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-left: 5px solid var(--red);
            padding: 25px; margin-bottom: 20px;
            backdrop-filter: blur(4px);
        }

        .glow-btn {
            display: block; width: 100%; padding: 22px; margin-bottom: 15px;
            background: rgba(0,0,0,0.6); border: 2px solid var(--cyan);
            color: var(--cyan); text-decoration: none; text-align: center;
            font-family: 'Syncopate', sans-serif; font-size: 1rem;
            letter-spacing: 3px; box-shadow: 0 0 15px var(--cyan);
            text-transform: uppercase;
        }

        .glow-btn:hover { background: var(--cyan); color: #000; box-shadow: 0 0 35px var(--cyan); }

        .crew-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .crew-member { background: var(--glass); padding: 10px; text-align: center; border: 1px solid #444; }
        .crew-member img { width: 100%; border-bottom: 3px solid var(--red); }
        .crew-name { font-family: 'Syncopate', sans-serif; display: block; margin-top: 10px; font-size: 0.8rem; }

        #clock { font-family: 'Syncopate', sans-serif; font-size: 3.5rem; text-align: center; margin-bottom: 30px; text-shadow: 0 0 25px var(--red); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <header><img src="assets/branding/logo.png" alt="ROCK.SCOT"></header>

    <nav>
        <button onclick="tab('live')" id="btn-live" class="active">Gigs</button>
        <button onclick="tab('wire')" id="btn-wire">Wire</button>
        <button onclick="tab('team')" id="btn-team">Crew</button>
        <button onclick="tab('ads')" id="btn-ads">Ads</button>
    </nav>

    <main>
        <section id="live" class="section active">
            <div id="clock">00:00:00</div>
            <a href="https://www.skiddle.com/whats-on/scotland/gigs/" target="_blank" class="glow-btn">SKIDDLE SCOTLAND</a>
            <a href="https://www.ticketmaster.co.uk/browse/rock-and-pop-catid-73/music-atid-10001/scotland-rid-10005" target="_blank" class="glow-btn">TICKETMASTER ROCK</a>
        </section>

        <section id="wire" class="section">
            <div id="wire-content"></div>
        </section>

        <section id="team" class="section">
            <div class="crew-grid" id="crew-list"></div>
        </section>

        <section id="ads" class="section">
            <div id="ads-list">LOADING ADVERTISING DATA...</div>
        </section>
    </main>

    <script>
        const _sb = supabase.createClient('https://figcmwjdbeurhjopxknp.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpZ2Ntd2pkYmV1cmhqb3B4a25wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4ODI5MDYsImV4cCI6MjA4NDQ1ODkwNn0.iiE65zB0lAsEkJE6lotNU1lORpL94oxZ7-ebHhJ3FgY');

        function tab(t) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.getElementById('btn-'+t).classList.add('active');
            if(t==='wire') loadWire(); if(t==='team') loadCrew(); if(t==='ads') loadAds();
        }

        async function loadAds() {
            const { data, error } = await _sb.from('ads').select('*');
            const target = document.getElementById('ads-list');
            if (error) { 
                console.error(error);
                target.innerHTML = `<div class="card">DATABASE ERROR: CHECK TABLE NAME</div>`;
                return;
            }
            target.innerHTML = data.map(a => `
                <div class="card">
                    <h3 style="color:var(--cyan); font-family:'Syncopate'; margin:0;">${a.title || 'Promotion'}</h3>
                    <p>${a.description || ''}</p>
                    <div style="color:var(--red); font-weight:bold; font-size:1.2rem; font-family:'Syncopate';">${a.price || ''}</div>
                </div>`).join('');
        }

        async function loadWire() {
            const { data } = await _sb.from('news_wire').select('*').order('created_at', {ascending:false}).limit(10);
            document.getElementById('wire-content').innerHTML = data ? data.map(n => `
                <div class="card" onclick="window.open('${n.source_url}', '_blank')" style="cursor:pointer;">
                    <small style="color:var(--red); font-weight:bold;">${n.source_name}</small>
                    <h3 style="margin:5px 0 0 0; font-family:'Syncopate'; font-size:0.9rem;">${n.headline}</h3>
                </div>`).join('') : "";
        }

        function loadCrew() {
            const crew = ["Andy","Alex","Stevie","Mhairi","Jude","Chris","Cal","Blue"];
            document.getElementById('crew-list').innerHTML = crew.map((c, i) => `
                <div class="crew-member">
                    <img src="assets/crew/dj${i+1}.jpg" onerror="this.src='assets/branding/logo.png'">
                    <span class="crew-name">${c}</span>
                </div>`).join('');
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0]; }, 1000);
        tab('live');
    </script>
</body>
</html>
