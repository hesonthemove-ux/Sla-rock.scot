<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rock.Scot | Central Scotland's Rock Authority</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #ff5500; 
            --bg: #000000; 
            --card-bg: #0d0d0d;
            --border: #222;
            --glow: 0 0 20px rgba(255, 85, 0, 0.3);
            --nav-h: 70px;
        }

        /* STRUCTURE & CORE STYLES */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        html, body { background: var(--bg); height: 100%; width: 100%; font-family: 'Inter', sans-serif; color: #fff; overflow-x: hidden; }

        /* HEADER: CINEMATIC LOGO (Full Width Logic) */
        header { background: #000; text-align: center; border-bottom: 2px solid #111; }
        .hdr-logo { width: 100%; height: auto; display: block; margin: 0 auto; object-fit: contain; max-height: 350px; }
        .tagline { 
            font-family: 'Bebas Neue'; letter-spacing: 4px; color: #aaa; font-size: 1.2rem; 
            padding: 10px 0; text-transform: uppercase; background: #000;
        }

        /* METALLIC NAVIGATION (SPA Controls) */
        nav { 
            display: flex; background: #000; border-top: 2px solid var(--border); border-bottom: 2px solid var(--border);
            height: var(--nav-h); justify-content: center; overflow-x: auto; scrollbar-width: none;
        }
        .nav-btn { 
            flex: 1; min-width: 90px; max-width: 200px; background: transparent; border: none; 
            color: #555; font-family: 'Bebas Neue'; font-size: 1.6rem; cursor: pointer; transition: 0.3s;
            border-right: 1px solid #111;
        }
        .nav-btn.active { 
            color: #fff; background: linear-gradient(0deg, rgba(255,85,0,0.15) 0%, transparent 100%);
            box-shadow: inset 0 -4px 0 var(--primary);
        }

        /* WIRE TICKER (Central Scotland News Feed) */
        .wire-ticker-box { 
            background: #000; padding: 12px 20px; border-bottom: 1px solid var(--border);
            font-family: 'Oswald'; text-transform: uppercase; font-size: 0.85rem; display: flex;
        }
        .wire-label { color: var(--primary); margin-right: 15px; font-weight: 900; }
        .ticker-scroll { overflow: hidden; white-space: nowrap; width: 100%; }
        .ticker-text { display: inline-block; animation: scroll 60s linear infinite; color: #cc6600; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* MAIN CONTENT AREA */
        main { max-width: 1400px; margin: 0 auto; padding: 30px 20px; }
        .view { display: none; animation: fadeUp 0.4s ease forwards; }
        .view.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        /* CREW DOSSIER: FANCY PERSONNEL FILES */
        .crew-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 30px; }
        .crew-card { 
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 4px;
            display: grid; grid-template-columns: 200px 1fr; overflow: hidden; position: relative;
            transition: 0.3s; box-shadow: var(--glow);
        }
        .crew-card:hover { border-color: var(--primary); transform: scale(1.01); }
        .crew-img-box { width: 100%; height: 100%; overflow: hidden; border-right: 2px solid var(--primary); background: #000; }
        .crew-img-box img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 0.5s; }
        .crew-card:hover img { filter: grayscale(0%); }
        
        .crew-content { padding: 20px; display: flex; flex-direction: column; }
        .crew-header { border-bottom: 1px solid #222; margin-bottom: 15px; padding-bottom: 5px; }
        .crew-name { font-family: 'Bebas Neue'; font-size: 2.2rem; color: #fff; line-height: 1; }
        .crew-role { font-family: 'Oswald'; font-size: 0.8rem; color: var(--primary); letter-spacing: 2px; text-transform: uppercase; }
        .crew-bio { font-size: 0.85rem; line-height: 1.5; color: #bbb; margin-bottom: 15px; font-style: italic; }
        
        .crew-stats { font-family: 'Oswald'; font-size: 0.75rem; text-transform: uppercase; display: grid; grid-template-columns: 1fr; gap: 5px; }
        .stat-item { color: #fff; }
        .stat-label { color: var(--primary); margin-right: 5px; font-weight: 900; }

        /* DASHBOARD GRID (Live View) */
        .dash-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .widget { background: var(--card-bg); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
        .widget-header { 
            background: linear-gradient(90deg, #1a1a1a, #0a0a0a); padding: 12px 20px;
            font-family: 'Bebas Neue'; font-size: 1.4rem; color: var(--primary); border-bottom: 1px solid var(--border);
        }
        .form-box { padding: 20px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; margin-bottom: 10px; font-family: 'Inter'; border-radius: 2px; }
        .btn-action { 
            background: linear-gradient(180deg, #cc4400 0%, #662200 100%); color: #fff; border: 1px solid #ff5500;
            padding: 15px; font-family: 'Bebas Neue'; font-size: 1.5rem; width: 100%; cursor: pointer; text-transform: uppercase;
        }

        /* CASSETTE PLAYER WIDGET */
        .cassette-box { padding: 25px; display: flex; flex-direction: column; align-items: center; }
        .cassette { width: 260px; height: 130px; background: #111; border: 3px solid #222; border-radius: 10px; position: relative; cursor: pointer; }
        .spool { width: 45px; height: 45px; background: #fff; border: 8px solid #000; border-radius: 50%; position: absolute; bottom: 15px; }
        .spool.left { left: 40px; } .spool.right { right: 40px; }
        .playing .spool { animation: spin 3s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 900px) {
            .dash-layout { grid-template-columns: 1fr; }
            .crew-grid { grid-template-columns: 1fr; }
            .crew-card { grid-template-columns: 1fr; }
            .crew-img-box { height: 350px; border-right: none; border-bottom: 2px solid var(--primary); }
            .hdr-logo { max-height: 200px; }
            .nav-btn { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<header>
    <img src="top_banner.jpg" class="hdr-logo" alt="Rock.Scot Authority">
    <div class="tagline">CENTRAL SCOTLAND'S ROCK AUTHORITY — 100% ROCK NO POP</div>
</header>

<nav>
    <button class="nav-btn active" onclick="showTab('live', this)">LIVE</button>
    <button class="nav-btn" onclick="showTab('wire', this)">WIRE</button>
    <button class="nav-btn" onclick="showTab('crew', this)">CREW</button>
    <button class="nav-btn" onclick="showTab('submit', this)">SUBMIT</button>
    <button class="nav-btn" onclick="showTab('partners', this)">PARTNERS</button>
</nav>

<div class="wire-ticker-box">
    <span class="wire-label">AUTHORITY WIRE:</span>
    <div class="ticker-scroll">
        <span class="ticker-text" id="news-ticker">// CONNECTING TO CENTRAL SCOTLAND WIRE... // SIGNAL ACTIVE... // </span>
    </div>
</div>

<main>
    <section id="v-live" class="view active">
        <div class="dash-layout">
            <div class="widget">
                <div style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('studio1.jpg'); background-size: cover; padding: 70px 20px; text-align: center; border-bottom: 4px solid var(--primary);">
                    <h2 style="font-family:'Bebas Neue'; font-size:4.5rem; color:var(--primary); text-shadow: var(--glow);">SIGNAL ACTIVE</h2>
                    <p style="font-family:'Oswald'; letter-spacing:5px;">WE ARE THE AUTHORITY</p>
                </div>
            </div>
            <div class="widget">
                <div class="widget-header">LISTEN LIVE</div>
                <div class="cassette-box">
                    <div class="cassette" id="tape" onclick="toggleAudio()"><div class="spool left"></div><div class="spool right"></div></div>
                    <button class="btn-action" style="margin-top:20px;" onclick="toggleAudio()" id="play-btn">START SIGNAL</button>
                </div>
            </div>
        </div>
    </section>

    <section id="v-crew" class="view">
        <div class="crew-grid" id="crew-list"></div>
    </section>

    <section id="v-wire" class="view">
        <div class="crew-grid" id="wire-news-list"></div>
    </section>

    <section id="v-submit" class="view">
        <div class="widget" style="max-width:700px; margin:0 auto;">
            <div class="widget-header">TRANSMIT TO STUDIO</div>
            <div class="form-box">
                <input type="text" placeholder="Band Name">
                <input type="text" placeholder="Music Link (Spotify/Soundcloud)">
                <textarea rows="6" placeholder="Pitch your sound to the Authority..."></textarea>
                <button class="btn-action">TRANSMIT TO STUDIO</button>
            </div>
        </div>
    </section>

    <section id="v-partners" class="view">
        <div class="widget" style="max-width:700px; margin:0 auto;">
            <div class="widget-header">AUTHORITY PARTNERSHIPS</div>
            <div class="form-box">
                <div style="font-family:'Oswald'; font-size:0.95rem; margin-bottom:20px;">
                    <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #222;"><span>Regional Authority</span><span>£299</span></div>
                    <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #222;"><span>Multi-Regional Authority</span><span>£449</span></div>
                    <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #222;"><span>Creative Lab</span><span>£195</span></div>
                </div>
                <select id="price-selector" onchange="document.getElementById('calc-display').innerText='£'+this.value">
                    <option value="299">Regional (£299)</option>
                    <option value="449">Multi-Regional (£449)</option>
                    <option value="195">Creative Lab (£195)</option>
                </select>
                <div style="text-align:center; font-family:'Bebas Neue'; font-size:5rem; color:var(--primary); margin:20px 0;" id="calc-display">£299</div>
                <button class="btn-action" onclick="window.location.href='mailto:andy@rock.scot'">SECURE PARTNERSHIP</button>
            </div>
        </div>
    </section>
</main>

<script>
    const stream = new Audio("https://uksoutha.streaming.broadcast.radio/stream/16641/caledonia-tx-ltd");

    const crewData = [
        { name: "Andy", file: "dj_andy.jpg", role: "Rock Rebel", bio: "Andy grew up blasting Biffy Clyro from his bedroom in East Kilbride. Rock had him for life after seeing a cover band nail Simple Minds in a local pub. Now hosting high-energy shows, he's keeping the rock spirit alive across Inverclyde and the Lanarkshires.", band: "Biffy Clyro", gig: "Franz Ferdinand @ Barrowlands", venue: "King Tut's", fact: "Once lost a shoe crowd-surfing in a kilt." },
        { name: "Alex", file: "dj_alex.jpg", role: "Vinyl Viking", bio: "Hailing from Johnstone, Alex’s journey started with his uncle’s record collection. One spin of Nazareth’s 'Hair of the Dog' and he was hooked. He brings pure Renfrewshire grit to the airwaves with a mix of deep cuts and local shoutouts.", band: "Nazareth", gig: "Texas @ SEC Armadillo", venue: "The Barrowlands", fact: "Owns a Deacon Blue vinyl signed at a secret Paisley afterparty." },
        { name: "Stevie", file: "dj_stevie.jpg", role: "Headbanger", bio: "Straight from the shipbuilding heart of Port Glasgow, Stevie grew up on AC/DC and Clyde rock tales. He fronted a garage band before turning to DJing, and now his late-night shows keep Inverclyde headbanging from Greenock to Gourock.", band: "Big Country", gig: "Mogwai @ Òran Mór", venue: "Beacon Arts Centre", fact: "Claims he high-fived Angus Young at a secret pub gig." },
        { name: "Mhairi", file: "dj_mhairi.jpg", role: "Hard Rock Queen", bio: "From Hamilton, Mhairi’s first rock moment was a battle of the bands covering The Jesus and Mary Chain. Her infectious energy and fearless playlists make her a Rock.Scot favourite, spinning the best of Scotland’s loudest legends.", band: "The Jesus and Mary Chain", gig: "Teenage Fanclub @ King Tut's", venue: "The Grand Hall, Kilmarnock", fact: "Tattoo artist specialising in rock band logos." },
        { name: "Jude", file: "dj_jude.jpg", role: "Indie Icon", bio: "Irvine-born and Ayrshire-proud, Jude found her rock roots walking the beach with Travis on repeat. She champions the next generation of Scottish artists alongside the classics for the Authority.", band: "Travis", gig: "Idlewild @ Barrowlands", venue: "Harbour Arts Centre", fact: "Once hitchhiked to a Franz Ferdinand gig and ended up backstage." },
        { name: "Chris", file: "dj_chris.jpg", role: "Guitar Guru", bio: "A Greenock native, Chris grew up on stories of shipyard shifts and Primal Scream. His first gig—Biffy Clyro—set the tone for a career of loud riffs and deep cuts. Chris brings serious rock knowledge to every show.", band: "Primal Scream", gig: "Simple Minds @ OVO Hydro", venue: "Cathouse Rock Club", fact: "Owns every Big Country album on vinyl." },
        { name: "Cal", file: "dj_cal.jpg", role: "Classic Rocker", bio: "Born in Kilmarnock, Cal grew up on hometown heroes Biffy Clyro and The Sensational Alex Harvey Band. He's delivering pure rock nostalgia and new energy to Ayrshire’s airwaves every week.", band: "Biffy Clyro", gig: "The Fratellis @ Grand Hall", venue: "Palace Theatre, Kilmarnock", fact: "Nicknamed 'Cal the Rocker' after winning an air guitar contest." },
        { name: "Blue", file: "dj_blue.jpg", role: "Bluesy Maverick", bio: "From Gourock’s seaside soul, Blue got hooked via his grandad’s Nazareth records. He fused blues swagger with rock grit, DJing beach parties before finding his home here at the Authority.", band: "Nazareth", gig: "Texas @ Paisley Arts Centre", venue: "Coats Paisley", fact: "Mistaken for a Mogwai roadie due to his trademark blue hair." }
    ];

    function initCrew() {
        document.getElementById('crew-list').innerHTML = crewData.map(dj => `
            <div class="crew-card">
                <div class="crew-img-box"><img src="${dj.file}" onerror="this.src='studio1.jpg'"></div>
                <div class="crew-content">
                    <div class="crew-header">
                        <div class="crew-name">${dj.name}</div>
                        <div class="crew-role">${dj.role}</div>
                    </div>
                    <p class="crew-bio">${dj.bio}</p>
                    <div class="crew-stats">
                        <div class="stat-item"><span class="stat-label">BAND:</span> ${dj.band}</div>
                        <div class="stat-item"><span class="stat-label">GIG:</span> ${dj.gig}</div>
                        <div class="stat-item"><span class="stat-label">STAGE:</span> ${dj.venue}</div>
                        <div class="stat-item"><span class="stat-label">INTEL:</span> ${dj.fact}</div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function showTab(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('v-' + id).classList.add('active');
        btn.classList.add('active');
    }

    function toggleAudio() {
        const tape = document.getElementById('tape');
        const btn = document.getElementById('play-btn');
        if(stream.paused) { stream.play(); tape.classList.add('playing'); btn.innerText = "KILL SIGNAL"; }
        else { stream.pause(); tape.classList.remove('playing'); btn.innerText = "START SIGNAL"; }
    }

    async function fetchRockNews() {
        const feed = "https://news.google.com/rss/search?q=Rock+Music+Scotland+Glasgow&hl=en-GB&gl=GB&ceid=GB:en";
        try {
            const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(feed));
            const data = await res.json();
            const headlines = data.items.map(i => i.title.split(' - ')[0]).join(' // ');
            document.getElementById('news-ticker').innerText = headlines + " // " + headlines;
            document.getElementById('wire-news-list').innerHTML = data.items.slice(0,6).map(item => `
                <div class="widget"><div class="widget-header">WIRE REPORT</div><div class="form-box"><h3>${item.title.split(' - ')[0]}</h3><p style="color:#666; font-size:0.8rem; margin-top:10px;">${item.pubDate}</p></div></div>
            `).join('');
        } catch(e) { console.warn("Wire offline"); }
    }

    window.onload = () => { initCrew(); fetchRockNews(); };
</script>
</body>
                        </html>
