<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rock.Scot | Central Scotland's Rock Authority</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --authority-orange: #ff5500; 
            --ultra-glass: rgba(0, 0, 0, 0.25); 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* HEADER & OVERLAP - MOVED DOWN TWO LINES */
        header { position: sticky; top: 0; z-index: 1000; display: flex; flex-direction: column; align-items: center; }
        
        .hdr-logo { 
            width: 90%; max-width: 520px; height: auto; 
            margin-bottom: -80px; /* Lowered by two lines worth of spacing */
            z-index: 1020; position: relative;
            filter: drop-shadow(0 20px 20px rgba(0,0,0,0.9));
        }

        .nav-strip { 
            width: 100%; background: rgba(0,0,0,0.98); backdrop-filter: blur(20px);
            border-bottom: 4px solid var(--authority-orange);
            display: flex; height: 90px; padding-top: 45px; /* Deeper buffer for the logo overlap */
            z-index: 1010; position: relative;
        }

        .nav-btn { flex: 1; background: transparent; border: none; color: #555; font-family: 'Bebas Neue'; font-size: 1.3rem; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: var(--authority-orange); background: rgba(255,85,0,0.15); }

        /* ULTRA-TRANSPARENT PANELS */
        .glass-panel { 
            background: var(--ultra-glass); backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
            padding: 50px; width: 95%; max-width: 700px; border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 40px 80px rgba(0,0,0,0.8); margin-top: 60px;
        }

        /* VIEW ENGINE */
        .view { display: none; min-height: 100vh; width: 100%; padding: 120px 20px 80px 20px; background-size: cover; background-position: center; background-attachment: fixed; }
        .view.active { display: flex; flex-direction: column; align-items: center; }

        /* CREW ROLODEX (Expanded for 8 DJs) */
        .crew-container { display: flex; gap: 25px; overflow-x: auto; width: 100%; padding: 60px 40px; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .crew-card {
            min-width: 320px; height: 480px; background: #0a0a0a; border: 1px solid #222;
            scroll-snap-align: center; position: relative; cursor: pointer;
            filter: grayscale(100%); transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .crew-card.active-color { filter: grayscale(0%); border: 4px solid var(--authority-orange); transform: scale(1.08) translateY(-10px); }
        .crew-img { width: 100%; height: 100%; object-fit: cover; }
        .crew-label { position: absolute; bottom: 0; width: 100%; background: linear-gradient(0deg, #000 20%, transparent 100%); padding: 30px; font-family: 'Bebas Neue'; font-size: 2.5rem; text-align: center; line-height: 1; }

        /* MAG MODAL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.99); z-index: 5000; display: none; overflow-y: auto; padding: 20px; }
        .modal-overlay.open { display: flex; align-items: center; justify-content: center; }
        .mag-layout { max-width: 800px; border: 15px solid #fff; padding: 60px; background: #000; position: relative; width: 100%; }

        .btn-authority { width: 100%; padding: 25px; background: var(--authority-orange); border: none; color: #fff; font-family: 'Bebas Neue'; font-size: 2rem; cursor: pointer; }

        /* NEWS WIRE FEED */
        .news-item { background: rgba(0,0,0,0.9); border: 1px solid #222; transition: 0.3s; position: relative; overflow: hidden; }
        .news-item:hover { border-color: var(--authority-orange); }
        .news-art { width: 100%; height: 220px; object-fit: cover; background: #111; }
        .news-no-img { height: 220px; display: flex; align-items: center; justify-content: center; background: #111; color: #333; font-family: 'Bebas Neue'; font-size: 2rem; border-bottom: 2px solid #222; }
    </style>
</head>
<body>

    <div id="mag-modal" class="modal-overlay" onclick="this.classList.remove('open')">
        <div class="mag-layout" onclick="event.stopPropagation()">
            <div style="font-family:'Bebas Neue'; color:var(--authority-orange); font-size:1.5rem;">ROCK.SCOT EXCLUSIVE ISSUE</div>
            <h2 id="mag-name" style="font-family:'Oswald'; font-size:5.5rem; line-height:0.8; margin:30px 0; text-transform:uppercase;"></h2>
            <p id="mag-text" style="font-size:1.3rem; line-height:1.8; color:#ccc; border-top:1px solid #444; padding-top:30px; font-weight:300;"></p>
            <div style="margin-top:50px; font-family:'Bebas Neue'; font-size:1.8rem;">DOSS_ROLE: <span id="mag-stats" style="color:var(--authority-orange);"></span></div>
        </div>
    </div>

    <header>
        <img src="top_banner.png" class="hdr-logo" alt="Rock.Scot Authority">
        <nav class="nav-strip">
            <button class="nav-btn active" onclick="showTab('live')">LIVE</button>
            <button class="nav-btn" onclick="showTab('wire')">WIRE</button>
            <button class="nav-btn" onclick="showTab('crew')">CREW</button>
            <button class="nav-btn" onclick="showTab('rates')">RATES</button>
            <button class="nav-btn" onclick="showTab('submit')">SUBMIT</button>
        </nav>
    </header>

    <main>
        <section id="v-live" class="view active">
            <div class="glass-panel" style="text-align:center;">
                <div id="live-clock" style="font-family:'Bebas Neue'; font-size:7rem; line-height:0.85;">00:00</div>
                <div id="clock-tag" style="font-family:'Oswald'; color:var(--authority-orange); letter-spacing:6px; margin-bottom:15px; font-weight:900;">ROCKIN' SCOTLAND</div>
                <div id="power-statement" style="font-family:'Oswald'; font-size:1.1rem; color:#666; height:50px; margin-bottom:30px; text-transform:uppercase;">CENTRAL SCOTLAND AUTHORITY</div>
                <button class="btn-authority" onclick="toggleAudio()" id="play-btn">ENGAGE SIGNAL</button>
            </div>
        </section>

        <section id="v-wire" class="view">
            <div id="rss-feed" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:30px; width:100%; max-width:1300px;"></div>
        </section>

        <section id="v-crew" class="view">
            <div class="crew-container" id="crew-rolodex"></div>
        </section>

        <section id="v-rates" class="view">
            <div class="glass-panel">
                <h2 style="font-family:'Bebas Neue'; font-size:4rem; color:var(--authority-orange);">CAMPAIGN RATES</h2>
                <div style="margin:30px 0; font-family:'Oswald'; font-size:1.5rem;">
                    <p style="margin-bottom:15px;">REGIONAL: <span style="color:var(--authority-orange);">£299/28D</span></p>
                    <p>MULTI-REGIONAL: <span style="color:var(--authority-orange);">£449/28D</span></p>
                </div>
                <button class="btn-authority">REQUEST INTEL</button>
            </div>
        </section>

        <section id="v-submit" class="view">
            <div class="glass-panel">
                <h2 style="font-family:'Bebas Neue'; font-size:4rem; color:var(--authority-orange);">TRANSMIT MUSIC</h2>
                <input type="text" placeholder="BAND NAME" class="std-input">
                <textarea placeholder="PITCH THE SIGNAL..." class="std-input" style="height:150px;"></textarea>
                <button class="btn-authority">SEND TO AUTHORITY</button>
            </div>
        </section>
    </main>

<script>
    const stream = new Audio("https://uksoutha.streaming.broadcast.radio/stream/16641/caledonia-tx-ltd");
    
    // FULL CREW - 8 DJs RETAINED
    const crewData = [
        { id: "andy", name: "ANDY", role: "Rock Rebel", bio: "Hailing from East Kilbride, Andy brings the heaviest riffs and Lanarkshire grit.", img: "dj_andy.jpg", clicks: 0 },
        { id: "alex", name: "ALEX", role: "Vinyl Viking", bio: "Johnstone's primary collector. If it's rare and loud, Alex spins it.", img: "dj_alex.jpg", clicks: 0 },
        { id: "mhairi", name: "MHAIRI", role: "Hard Rock Queen", bio: "Tattoo artist and rock authority. Knows the scene from the inside out.", img: "dj_mhairi.jpg", clicks: 0 },
        { id: "stevie", name: "STEVIE", role: "Headbanger", bio: "Port Glasgow shipbuilding spirit. Loud, proud, and 100% Rock and Roll.", img: "dj_stevie.jpg", clicks: 0 },
        { id: "jude", name: "JUDE", role: "Indie Icon", bio: "Irvine's melodic rock expert. Bridging the gap between indie and metal.", img: "dj_jude.jpg", clicks: 0 },
        { id: "chris", name: "CHRIS", role: "Guitar Guru", bio: "Greenock born master of the fretboard and the airwaves.", img: "dj_chris.jpg", clicks: 0 },
        { id: "lewis", name: "LEWIS", role: "Grunge King", bio: "90s Seattle sound by way of Paisley. The grunge specialist.", img: "dj_lewis.jpg", clicks: 0 },
        { id: "sarah", name: "SARAH", role: "Metal Maiden", bio: "Power metal authority. Bringing the thunder to Central Scotland.", img: "dj_sarah.jpg", clicks: 0 }
    ];

    const powerStatements = ["SCOTLAND'S ROCK AUTHORITY", "CENTRAL SCOTLAND'S LOUDEST SIGNAL", "24/7 INDUSTRIAL ROCK INTELLIGENCE", "UNFILTERED SCOTTISH ROCK"];

    function showTab(name) {
        document.querySelectorAll('.view').forEach(v => { v.classList.remove('active'); v.style.display = 'none'; });
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        const activeView = document.getElementById('v-' + name);
        activeView.style.display = 'flex';
        activeView.classList.add('active');
        activeView.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('news${Math.floor(Math.random()*7)+1}.jpg')`;
        event.currentTarget.classList.add('active');
        if(name === 'wire') fetchRSS();
        if(name === 'crew') renderCrew();
    }

    // HIGH-BUFFER RSS ENGINE (NO LOCAL FALLBACKS FOR ARTWORK)
    async function fetchRSS() {
        const feedContainer = document.getElementById('rss-feed');
        feedContainer.innerHTML = "<p style='grid-column:1/-1; text-align:center;'>CONNECTING TO WIRE...</p>";
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.theskinny.co.uk/rss/music&t=${Date.now()}`);
            const data = await res.json();
            feedContainer.innerHTML = data.items.map(item => {
                const img = item.enclosure.link || (item.description.match(/<img[^>]+src="([^">]+)"/) ? item.description.match(/<img[^>]+src="([^">]+)"/)[1] : null);
                return `
                    <div class="news-item" onclick="window.open('${item.link}')">
                        ${img ? `<img src="${img}" class="news-art">` : `<div class="news-no-img">SIGNAL LOST</div>`}
                        <div style="padding:20px;">
                            <h3 style="font-family:'Oswald'; font-size:1.1rem; line-height:1.2;">${item.title}</h3>
                            <div style="color:var(--authority-orange); font-family:'Bebas Neue'; margin-top:10px;">SOURCE: THE SKINNY WIRE</div>
                        </div>
                    </div>`;
            }).join('');
        } catch(e) { feedContainer.innerHTML = "<p style='text-align:center;'>SIGNAL INTERFERENCE: RELOADING...</p>"; }
    }

    function renderCrew() {
        const container = document.getElementById('crew-rolodex');
        container.innerHTML = crewData.map(dj => `
            <div class="crew-card" id="card-${dj.id}" onclick="handleCrewClick('${dj.id}')">
                <img src="${dj.img}" class="crew-img">
                <div class="crew-label">${dj.name}</div>
            </div>`).join('');
    }

    function handleCrewClick(id) {
        const dj = crewData.find(d => d.id === id);
        dj.clicks++;
        const card = document.getElementById('card-' + id);
        if(dj.clicks === 1) {
            document.querySelectorAll('.crew-card').forEach(c => c.classList.remove('active-color'));
            card.classList.add('active-color');
            setTimeout(() => { if(dj.clicks === 1) dj.clicks = 0; }, 3000);
        } else if(dj.clicks === 2) {
            document.getElementById('mag-name').innerText = dj.name;
            document.getElementById('mag-text').innerText = dj.bio;
            document.getElementById('mag-stats').innerText = dj.role;
            document.getElementById('mag-modal').classList.add('open');
            dj.clicks = 0;
            card.classList.remove('active-color');
        }
    }

    function updateLiveUI() {
        const now = new Date();
        const hrs = now.getHours();
        document.getElementById('live-clock').innerText = hrs.toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        let tag = "ROCKIN' SCOTLAND";
        if(hrs >= 6 && hrs < 12) tag = "MORNING ROCKIN'";
        else if(hrs >= 12 && hrs < 18) tag = "AFTERNOON ROCKIN'";
        else if(hrs >= 18 && hrs < 24) tag = "EVENING ROCKIN'";
        else tag = "LATE NIGHT ROCKIN'";
        document.getElementById('clock-tag').innerText = tag;
        document.getElementById('power-statement').innerText = powerStatements[Math.floor(Math.random() * powerStatements.length)];
    }

    function toggleAudio() {
        if(stream.paused) { stream.play(); document.getElementById('play-btn').innerText = "DISENGAGE SIGNAL"; }
        else { stream.pause(); document.getElementById('play-btn').innerText = "ENGAGE SIGNAL"; }
    }

    setInterval(updateLiveUI, 5000);
    window.onload = updateLiveUI;
</script>
</body>
</html>
