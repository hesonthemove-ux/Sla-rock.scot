<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Sla-rock.scot | Rockin' Scotland | Glasgow & Online Rock Radio</title>
    <meta name="description" content="Sla-rock.scot: Glasgow and Central Scotland's premier rock station. Streaming pure rock online worldwide. 100% Independent.">
    <meta property="og:title" content="Sla-rock.scot | Rockin' Scotland">
    <meta property="og:image" content="logo.png">
    <meta name="theme-color" content="#ff3e00">

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">

    <style>
        :root { --primary: #ff3e00; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }

        #app-shell { display: flex; flex-direction: column; height: 100vh; }
        
        /* Suggestion 2: Dynamic Background (Max Effect) */
        #dynamic-bg { position: fixed; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle at 50% 50%, #111 0%, #050505 100%); z-index: -1; animation: bgShift 15s infinite alternate; }
        @keyframes bgShift { 0% { opacity: 0.5; } 100% { opacity: 1; } }

        header { background: #000; padding: 50px 20px; text-align: center; border-bottom: 4px solid var(--primary); flex-shrink: 0; position: relative; }
        #logo { width: 100%; max-width: 650px; height: auto; transition: 0.3s; }
        
        /* Suggestion 7: Audio Ident Button */
        #ident-trigger { position: absolute; right: 20px; bottom: 10px; background: none; border: 1px solid var(--primary); color: var(--primary); font-size: 0.6rem; padding: 5px 10px; cursor: pointer; text-transform: uppercase; border-radius: 4px; font-weight: 900; }

        .tagline { font-size: 2.2rem; color: var(--primary); font-weight: 900; text-transform: uppercase; letter-spacing: 12px; margin-top: 15px; animation: pulse-glow 2s infinite; }
        @keyframes pulse-glow { 0%, 100% { opacity: 1; text-shadow: 0 0 20px rgba(255,62,0,0.6); } 50% { opacity: 0.5; text-shadow: 0 0 40px rgba(255,62,0,0.9); } }

        nav { background: #0a0a0a; padding: 20px; text-align: center; border-bottom: 1px solid #222; flex-shrink: 0; z-index: 100; }
        nav a { color: #fff; margin: 0 25px; text-decoration: none; font-weight: 700; text-transform: uppercase; cursor: pointer; font-size: 0.9rem; letter-spacing: 2px; transition: 0.3s all; padding: 10px 15px; border-radius: 8px; }
        nav a:hover { color: var(--primary); background: var(--glass); text-shadow: 0 0 10px var(--primary); }

        #content-window { flex-grow: 1; overflow-y: auto; padding: 50px; padding-bottom: 140px; scroll-behavior: smooth; }

        footer#master-player { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; border-top: 3px solid var(--primary); padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; z-index: 9999; }
        .player-frame { width: 450px; height: 70px; border: none; }
        .now-playing-meta { flex: 1; padding-left: 40px; border-left: 1px solid #222; margin-left: 40px; min-width: 0; display: flex; align-items: center; justify-content: space-between; }
        
        #track-info-container { flex: 1; min-width: 0; }
        #track-info { font-size: 0.9rem; font-weight: bold; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        
        .recent-track { background: var(--glass); border-left: 3px solid var(--primary); padding: 10px 20px; margin-bottom: 10px; font-size: 0.9rem; }
        .fresh-stamp { font-size: 0.7rem; color: var(--primary); text-transform: uppercase; margin-bottom: 10px; display: block; }

        #pwa-banner { display:none; background:var(--primary); color:#fff; padding:15px; text-align:center; font-weight:bold; cursor:pointer; text-transform:uppercase; font-size:0.8rem; }

        @media (max-width: 768px) {
            header { padding: 30px 15px; }
            #logo { max-width: 280px; }
            .tagline { font-size: 1.1rem; letter-spacing: 4px; }
            nav a { margin: 0 5px; font-size: 0.75rem; padding: 8px 10px; }
            #content-window { padding: 25px; }
            footer#master-player { flex-direction: column; height: auto; padding: 15px; }
            .player-frame { width: 100%; height: 60px; }
            .now-playing-meta { border-left: none; margin-top: 10px; width: 100%; flex-direction: column; }
        }
    </style>
</head>
<body>

<div id="dynamic-bg"></div>
<div id="pwa-banner" onclick="installPWA()">Add Sla-Rock to Home Screen</div>

<div id="app-shell">
    <header>
        <button id="ident-trigger" onclick="playIdent()">Rock.Scot ID</button>
        <img src="logo.png" alt="Sla-rock.scot - Glasgow Rock Radio" id="logo">
        <div class="tagline">Rockin' Scotland</div>
    </header>

    <nav>
        <a onclick="spa.load('home')">On Air</a>
        <a onclick="spa.load('gigs')">Gigs</a>
        <a onclick="spa.load('ads')">Advertise</a>
        <a onclick="spa.load('submit')">Submit Music</a>
    </nav>

    <div id="content-window">
        <div id="page-content"></div>
    </div>

    <footer id="master-player">
        <iframe class="player-frame" src="https://player.broadcast.radio/caledonia-tx-ltd" allow="autoplay"></iframe>
        <div class="now-playing-meta">
            <div id="track-info-container">
                <strong id="status-label" style="color:var(--primary); display:block; text-transform:uppercase; font-size: 1.1rem;">Live Now</strong>
                <span id="track-info">SLA-ROCK.SCOT | GLASGOW & ONLINE</span>
            </div>
            <a id="amazon-btn" href="#" target="_blank" style="display:none; background:#ff9900; color:#000; padding:8px 15px; border-radius:4px; text-decoration:none; font-weight:900; font-size:0.7rem; text-transform:uppercase; margin-left:20px;">Get it on Amazon</a>
        </div>
    </footer>
</div>

<script>
    // Registration of Service Worker (Suggestion 10)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js');
        });
    }

    const spa = {
        pages: {
            home: `
                <h2 style="text-transform:uppercase; font-size:3rem; margin-bottom:40px;">The <span style="color:var(--primary)">Frontline</span></h2>
                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px;">
                    <section>
                        <h3 style="text-transform:uppercase; border-bottom: 2px solid var(--primary); padding-bottom:10px;">Music News</h3>
                        <div id="news-feed">Loading...</div>
                    </section>
                    <section>
                        <h3 style="text-transform:uppercase; border-bottom: 2px solid var(--primary); padding-bottom:10px;">Recently Played</h3>
                        <div id="recent-tracks">Searching logs...</div>
                    </section>
                </div>
            `,
            gigs: `
                <h2 style="text-transform:uppercase; font-size:3rem; margin-bottom:40px;">Gig <span style="color:var(--primary)">Calendar</span></h2>
                <div style="background:var(--glass); border:1px solid #222; padding:30px; margin-bottom:20px;">
                    <span id="fresh-tag" class="fresh-stamp">Live Feed Active</span>
                    <h3 style="color:var(--primary); margin:0; text-transform:uppercase;">Glasgow & Central circuit</h3>
                </div>
                <div id="gig-list">Loading live data...</div>
            `,
            ads: `
                <h2 style="text-transform:uppercase; font-size:3rem; margin-bottom:40px;">Broadcast <span style="color:var(--primary)">Rates</span></h2>
                <div style="background:var(--glass); border:1px solid #222; padding:40px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:900;">REGIONAL AIRTIME</span><span style="font-size:2.5rem; font-weight:900; color:var(--primary);">£299</span>
                </div>
                <div style="background:var(--glass); border:1px solid #222; padding:40px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:900;">MULTI-REGIONAL</span><span style="font-size:2.5rem; font-weight:900; color:var(--primary);">£449</span>
                </div>
                <div style="background:var(--glass); border:1px solid #222; padding:40px; display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:900;">CREATIVE PRODUCTION</span><span style="font-size:2.5rem; font-weight:900; color:var(--primary);">£195</span>
                </div>
            `,
            submit: `
                <h2 style="text-transform:uppercase; font-size:3rem; margin-bottom:40px;">Submit <span style="color:var(--primary)">Music</span></h2>
                <div id="form-response"></div>
                <form id="band-form" onsubmit="spa.submitForm(event)">
                    <input type="text" name="band" placeholder="Band Name" required>
                    <input type="email" name="email" placeholder="Contact Email" required>
                    <input type="url" name="link" placeholder="Amazon/Spotify Link" required>
                    <textarea name="message" placeholder="Track details..." rows="4"></textarea>
                    <button type="submit">Submit to Studio</button>
                </form>
            `
        },
        load: function(id) {
            if(!this.pages[id]) id = 'home'; 
            document.getElementById('page-content').innerHTML = this.pages[id];
            if(id === 'home') { fetchNews(); updateRecentList(); }
            if(id === 'gigs') { fetchGigs(); }
            window.location.hash = id;
        },
        submitForm: async function(e) {
            e.preventDefault();
            const responseDiv = document.getElementById('form-response');
            try {
                const response = await fetch('submit.php', { method: 'POST', body: new FormData(e.target) });
                const result = await response.json();
                responseDiv.innerHTML = `<p style="color:var(--primary);">${result.message}</p>`;
            } catch (error) { responseDiv.innerHTML = `<p style="color:red;">Error.</p>`; }
        }
    };

    // Suggestion 7: Audio Ident Player
    const ident = new Audio('ident.mp3');
    function playIdent() { ident.play(); }

    // Suggestion 4: Web Notifications with Fallback
    function notifyTrack(title) {
        if (!("Notification" in window)) return;
        if (Notification.permission === "granted") {
            new Notification("Now Playing on Sla-Rock", { body: title, icon: 'logo.png' });
        } else if (Notification.permission !== "denied") {
            Notification.requestPermission();
        }
    }

    async function fetchGigs() {
        try {
            const res = await fetch('gigs.txt?v=' + Date.now());
            const text = await res.text();
            const list = document.getElementById('gig-list');
            if(!list) return;
            const lines = text.split('\n');
            list.innerHTML = lines.map(line => `<div class="recent-track"><strong>${line}</strong></div>`).join('');
            // Suggestion 6: Auto Update Time
            const freshTag = document.getElementById('fresh-tag');
            if(freshTag) freshTag.innerText = "Updated: " + new Date().toLocaleTimeString();
        } catch(e) { document.getElementById('gig-list').innerHTML = "No upcoming gigs."; }
    }

    let trackHistory = [];
    async function updateMetadata() {
        const trackEl = document.getElementById('track-info');
        try {
            const response = await fetch('https://api.broadcast.radio/v1/nowplaying/caledonia-tx-ltd');
            const data = await response.json();
            if (data && data.nowPlaying && data.nowPlaying.artist) {
                const currentTrack = `${data.nowPlaying.artist} - ${data.nowPlaying.title}`.toUpperCase();
                if (trackEl.innerText !== currentTrack) {
                    trackEl.innerText = currentTrack;
                    notifyTrack(currentTrack); // Suggestion 4 Trigger
                    if(!trackHistory.includes(currentTrack)) {
                        trackHistory.unshift(currentTrack);
                        if(trackHistory.length > 5) trackHistory.pop();
                        updateRecentList();
                    }
                }
            }
        } catch (error) { trackEl.innerText = "SLA-ROCK.SCOT | ROCKIN' SCOTLAND"; }
    }

    function updateRecentList() {
        const listContainer = document.getElementById('recent-tracks');
        if (!listContainer) return;
        listContainer.innerHTML = trackHistory.map(track => `<div class="recent-track"><strong>${track}</strong></div>`).join('') || "Rockin' Scotland Continuous...";
    }

    async function fetchNews() {
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.scottishmusicnetwork.co.uk/feed/`);
            const data = await res.json();
            const feed = document.getElementById('news-feed');
            if(!feed) return;
            feed.innerHTML = data.items.slice(0, 4).map(item => `
                <div style="background:var(--glass); padding:20px; margin-bottom:15px; border:1px solid #222;">
                    <h4 style="margin:0 0 10px 0; text-transform:uppercase;">${item.title}</h4>
                    <a href="${item.link}" target="_blank" style="color:var(--primary); font-size:0.7rem; text-decoration:none; font-weight:900;">READ MORE</a>
                </div>
            `).join('');
        } catch(e) { if(document.getElementById('news-feed')) document.getElementById('news-feed').innerHTML = "Offline."; }
    }

    window.onload = () => {
        spa.load(window.location.hash.replace('#', '') || 'home');
        updateMetadata();
        setInterval(updateMetadata, 30000);
    };
    window.onhashchange = () => spa.load(window.location.hash.replace('#', ''));
</script>
</body>
</html>
