<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sla-rock.scot | Rockin' Scotland | Central Scotland Rock Radio</title>
    <style>
        :root { --primary: #ff3e00; --bg: #050505; --glass: rgba(255, 255, 255, 0.08); }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        
        #app-shell { display: flex; flex-direction: column; height: 100vh; }
        
        header { 
            background: #000; padding: 40px 20px; text-align: center; border-bottom: 4px solid var(--primary); 
            flex-shrink: 0; position: relative; display: flex; flex-direction: column; align-items: center; 
        }
        #logo { width: 100%; max-width: 600px; height: auto; }

        /* Glowing Pulse Tagline */
        .tagline { 
            font-size: 1.8rem; color: var(--primary); font-weight: 900; text-transform: uppercase; 
            letter-spacing: 8px; margin-top: 15px;
            text-shadow: 0 0 5px rgba(255, 62, 0, 0.2);
            animation: pulse-glow 2s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0% { text-shadow: 0 0 5px rgba(255, 62, 0, 0.4); opacity: 0.9; }
            50% { text-shadow: 0 0 20px rgba(255, 62, 0, 0.8), 0 0 30px rgba(255, 62, 0, 0.4); opacity: 1; }
            100% { text-shadow: 0 0 5px rgba(255, 62, 0, 0.4); opacity: 0.9; }
        }
        
        #next-show-timer { 
            position: absolute; bottom: -15px; background: var(--primary); color: #fff; 
            padding: 6px 20px; font-size: 0.75rem; font-weight: 900; text-transform: uppercase; 
            border-radius: 20px; z-index: 100; white-space: nowrap; box-shadow: 0 4px 15px rgba(0,0,0,0.6); 
        }

        nav { 
            background: #0a0a0a; padding: 20px 0 10px; text-align: center; border-bottom: 1px solid #222; 
            flex-shrink: 0; overflow-x: auto; white-space: nowrap; scrollbar-width: none; 
        }
        nav::-webkit-scrollbar { display: none; }
        nav a { 
            display: inline-block; color: #fff; margin: 0 12px; text-decoration: none; font-weight: 800; 
            text-transform: uppercase; cursor: pointer; font-size: 0.8rem; letter-spacing: 1px; 
            padding: 12px 16px; border-radius: 4px; transition: 0.2s; 
        }
        nav a.active { background: var(--glass); color: var(--primary); }

        #content-window { flex-grow: 1; overflow-y: auto; padding: 40px 20px; padding-bottom: 100px; }

        /* PLAYER STYLES - Desktop Bar */
        footer#master-player { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: #000; 
            border-top: 3px solid var(--primary); padding: 15px 30px; display: flex; 
            align-items: center; justify-content: space-between; z-index: 9999; 
            transition: 0.3s ease;
        }
        #play-btn { 
            background: var(--primary); border: none; color: #fff; padding: 10px 25px; 
            font-weight: 900; cursor: pointer; text-transform: uppercase; border-radius: 4px; 
        }
        .status-dot { width: 8px; height: 8px; background: #555; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-dot.active { background: #00ff00; box-shadow: 0 0 8px #00ff00; }

        /* MOBILE FLOATING DOCK */
        @media (max-width: 768px) {
            #logo { max-width: 250px; }
            .tagline { font-size: 1rem; letter-spacing: 4px; }
            
            footer#master-player { 
                width: auto; bottom: 20px; right: 20px; left: auto; 
                border-radius: 50px; border: 2px solid var(--primary); 
                padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
                background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            }
            #track-info { display: none; } /* Hide text on mobile player to save space */
            #play-btn { 
                padding: 15px; min-width: 60px; height: 60px; border-radius: 50%; 
                font-size: 0.6rem; display: flex; align-items: center; justify-content: center;
            }
            .controls { flex-direction: column; gap: 5px; }
        }
    </style>
</head>
<body>

<div id="app-shell">
    <header>
        <img src="logo.png" alt="Sla-rock.scot" id="logo">
        <div class="tagline">Rockin' Scotland</div>
        <div id="next-show-timer">On Air: Rockin' Scotland</div>
    </header>

    <nav id="main-nav">
        <a onclick="spa.load('home')" id="nav-home">On Air</a>
        <a onclick="spa.load('news')" id="nav-news">News</a>
        <a onclick="spa.load('venues')" id="nav-venues">Rock Radar</a>
        <a onclick="spa.load('ads')" id="nav-ads">Advertise</a>
    </nav>

    <div id="content-window">
        <div id="page-content"></div>
    </div>

    <footer id="master-player">
        <div class="controls" style="display:flex; align-items:center;">
            <button id="play-btn" onclick="toggleStream()">Play</button>
            <div id="stream-info-box" style="margin-left:15px; font-size: 0.7rem; text-transform: uppercase; font-weight: 800; color: #aaa;">
                <span id="stream-dot" class="status-dot"></span> <span id="stream-status">Offline</span>
            </div>
        </div>
        <div id="track-info" style="color:#888; font-weight:bold; font-size:0.8rem;">SLA-ROCK.SCOT | THE CALEDONIA FEED</div>
    </footer>
</div>

<script>
    const primaryStream = "https://uksoutha.streaming.broadcast.radio/stream/16641/caledonia-tx-ltd";
    const audio = new Audio();
    audio.src = primaryStream;
    let isPlaying = false;

    function toggleStream() {
        if (!isPlaying) {
            audio.play().then(() => {
                isPlaying = true;
                document.getElementById('play-btn').innerText = "Stop";
                document.getElementById('stream-status').innerText = "Live";
                document.getElementById('stream-dot').classList.add('active');
            }).catch(err => console.error("Stream failed"));
        } else {
            audio.pause();
            isPlaying = false;
            document.getElementById('play-btn').innerText = "Play";
            document.getElementById('stream-status').innerText = "Paused";
            document.getElementById('stream-dot').classList.remove('active');
        }
    }

    const spa = {
        pages: {
            home: `<h2>Scotland's <span style="color:var(--primary)">Loudest</span> Feed</h2><p>Broadcasting to the Central Belt, Ayrshire, and Inverclyde.</p>`,
            news: `<h2>Local News</h2><p>Music updates from the heart of Scotland.</p>`,
            venues: `<h2>Rock Radar</h2><p>Gig guides for Hamilton, Greenock, Ayr, and Glasgow.</p>`,
            ads: `<h2>Airtime</h2><p>Regional: £299 | Multi: £449 | Creative: £195</p>`
        },
        load: function(id) {
            const pageId = id || 'home';
            document.getElementById('page-content').innerHTML = this.pages[pageId];
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            if(document.getElementById('nav-' + pageId)) document.getElementById('nav-' + pageId).classList.add('active');
            window.location.hash = pageId;
            document.getElementById('content-window').scrollTop = 0;
        }
    };

    window.onload = () => spa.load(window.location.hash.replace('#', '') || 'home');
</script>
</body>
</html>
