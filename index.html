<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Sla-rock.scot | Rockin' Scotland | Glasgow & Online Rock Radio</title>
    <meta name="description" content="Sla-rock.scot: Glasgow and Central Scotland's premier rock station. Streaming pure rock online worldwide. 100% Independent.">
    <meta name="keywords" content="Rock Radio Scotland, Glasgow Rock Station, Central Scotland Music, Rockin Scotland Online, Sla-rock">
    
    <meta property="og:title" content="Sla-rock.scot | Rockin' Scotland">
    <meta property="og:description" content="Glasgow's Pure Rock Feed. Streaming Online.">
    <meta property="og:image" content="logo.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="theme-color" content="#ff3e00">

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "RadioStation",
      "name": "Sla-rock.scot",
      "alternateName": "Rockin' Scotland",
      "url": "https://sla-rock.scot",
      "logo": "https://sla-rock.scot/logo.png",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Glasgow",
        "addressRegion": "Central Scotland",
        "addressCountry": "GB"
      }
    }
    </script>

    <style>
        :root { --primary: #ff3e00; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }

        #app-shell { display: flex; flex-direction: column; height: 100vh; }
        
        header { background: #000; padding: 50px 20px; text-align: center; border-bottom: 4px solid var(--primary); flex-shrink: 0; }
        
        /* Suggestion 9: Logo Alt handling via CSS for screen readers */
        #logo { width: 100%; max-width: 650px; height: auto; transition: 0.3s; }
        
        .tagline { 
            font-size: 2.2rem; color: var(--primary); font-weight: 900; 
            text-transform: uppercase; letter-spacing: 12px; margin-top: 15px; 
            animation: pulse-glow 2s infinite; 
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 1; text-shadow: 0 0 20px rgba(255,62,0,0.6); }
            50% { opacity: 0.5; text-shadow: 0 0 40px rgba(255,62,0,0.9); }
        }

        /* Suggestion 3: Glassmorphism Hover Effects */
        nav { background: #0a0a0a; padding: 20px; text-align: center; border-bottom: 1px solid #222; flex-shrink: 0; z-index: 100; }
        nav a { 
            color: #fff; margin: 0 25px; text-decoration: none; font-weight: 700; 
            text-transform: uppercase; cursor: pointer; font-size: 0.9rem; 
            letter-spacing: 2px; transition: 0.3s all ease-in-out;
            padding: 10px 15px; border-radius: 8px;
        }
        nav a:hover { 
            color: var(--primary); 
            background: var(--glass);
            box-shadow: 0 0 15px rgba(255, 62, 0, 0.2);
            text-shadow: 0 0 10px var(--primary);
        }

        #content-window { flex-grow: 1; overflow-y: auto; padding: 50px; padding-bottom: 140px; scroll-behavior: smooth; }

        footer#master-player {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #000; border-top: 3px solid var(--primary);
            padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; z-index: 9999;
        }
        .player-frame { width: 450px; height: 70px; border: none; }
        .now-playing-meta { flex: 1; padding-left: 40px; border-left: 1px solid #222; margin-left: 40px; min-width: 0; display: flex; align-items: center; justify-content: space-between; }
        
        #track-info-container { flex: 1; min-width: 0; }
        #track-info { font-size: 0.9rem; font-weight: bold; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        
        .buy-link { background: #ff9900; color: #000; padding: 8px 15px; border-radius: 4px; text-decoration: none; font-weight: 900; font-size: 0.7rem; text-transform: uppercase; margin-left: 20px; display: none; white-space: nowrap; transition: 0.2s; }
        .buy-link:hover { transform: scale(1.05); background: #ffcc00; }

        .recent-track { background: var(--glass); border-left: 3px solid var(--primary); padding: 10px 20px; margin-bottom: 10px; font-size: 0.9rem; }

        /* Form Styling (Suggestion 10 VIP List integrated into Contact/Submit) */
        form input, form textarea { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 15px; margin-bottom: 15px; font-family: inherit; box-sizing: border-box; }
        form button { background: var(--primary); color: #fff; border: none; padding: 15px 30px; font-weight: 900; text-transform: uppercase; cursor: pointer; width: 100%; transition: 0.3s; }
        form button:hover { background: #fff; color: var(--primary); }

        @media (max-width: 768px) {
            header { padding: 30px 15px; }
            #logo { max-width: 280px; }
            .tagline { font-size: 1.1rem; letter-spacing: 4px; }
            nav { padding: 15px 5px; overflow-x: auto; white-space: nowrap; }
            nav a { margin: 0 5px; font-size: 0.75rem; padding: 8px 10px; }
            #content-window { padding: 25px; }
            footer#master-player { flex-direction: column; height: auto; padding: 15px; text-align: center; }
            .player-frame { width: 100%; height: 60px; }
            .now-playing-meta { border-left: none; margin-left: 0; padding-left: 0; margin-top: 10px; width: 100%; flex-direction: column; }
            .buy-link { margin-left: 0; margin-top: 10px; width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

<div id="app-shell">
    <header>
        <img src="logo.png" alt="Sla-rock.scot - Glasgow and Central Scotland Rock Radio Logo" id="logo">
        <div class="tagline">Rockin' Scotland</div>
    </header>

    <nav>
        <a onclick="spa.load('home')">On Air</a>
        <a onclick="spa.load('gigs')">Gigs</a>
        <a onclick="spa.load('ads')">Advertise</a>
        <a onclick="spa.load('submit')">Submit Music</a>
    </nav>

    <div id="content-window">
        <div id="page-content"></div>
    </div>

    <footer id="master-player">
        <iframe class="player-frame" src="https://player.broadcast.radio/caledonia-tx-ltd" allow="autoplay"></iframe>
        <div class="now-playing-meta">
            <div id="track-info-container">
                <strong id="status-label" style="color:var(--primary); display:block; text-transform:uppercase; font-size: 1.1rem;">Live Now</strong>
                <span id="track-info">SLA-ROCK.SCOT | GLASGOW & ONLINE ROCK</span>
            </div>
            <a id="amazon-btn" href="#" target="_blank" class="buy-link">Get it on Amazon</a>
        </div>
    </footer>
</div>

<script>
    const spa = {
        pages: {
            home: `
                <h2 style="text-transform:uppercase; font-size:3rem; margin-bottom:40px;">The <span style="color:var(--primary)">Frontline</span></h2>
                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px;">
                    <section>
                        <h3 style="text-transform:uppercase; border-bottom: 2px solid var(--primary); padding-bottom:10px;">Music News</h3>
                        <div id="news-feed">Loading Scottish music circuit news...</div>
                    </section>
                    <section>
                        <h3 style="text-transform:uppercase; border-bottom: 2px solid var(--primary); padding-bottom:10px;">Recently Played</h3>
                        <div id="recent-tracks">Searching broadcast logs...</div>
                    </section>
                </div>
            `,
            gigs: `
                <h2 style="text-transform:uppercase; font-size:3rem; margin-bottom:40px;">Gig <span style="color:var(--primary)">Calendar</span></h2>
                <div style="background:var(--glass); border:1px solid #222; padding:30px; margin-bottom:20px;">
                    <h3 style="color:var(--primary); margin:0; text-transform:uppercase;">Glasgow & Central circuit</h3>
                    <p style="color:#888;">Checking latest listings for the Central Belt...</p>
                </div>
                <div id="gig-list">
                    <div class="recent-track"><strong>Glasgow | Barrowland Ballroom</strong><br><small>See venue site for Jan 2026 dates.</small></div>
                </div>
            `,
            ads: `
                <h2 style="text-transform:uppercase; font-size:3rem; margin-bottom:40px;">Broadcast <span style="color:var(--primary)">Rates</span></h2>
                <div style="background:var(--glass); border:1px solid #222; padding:40px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:900;">REGIONAL AIRTIME</span><span style="font-size:2.5rem; font-weight:900; color:var(--primary);">£299</span>
                </div>
                <div style="background:var(--glass); border:1px solid #222; padding:40px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:900;">MULTI-REGIONAL</span><span style="font-size:2.5rem; font-weight:900; color:var(--primary);">£449</span>
                </div>
                <div style="background:var(--glass); border:1px solid #222; padding:40px; display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:900;">CREATIVE PRODUCTION</span><span style="font-size:2.5rem; font-weight:900; color:var(--primary);">£195</span>
                </div>
                <p style="font-size:0.8rem; color:#444; margin-top:30px; text-transform:uppercase; letter-spacing:1px;">Non-VAT Registered. Jan 2026 Policy.</p>
            `,
            submit: `
                <h2 style="text-transform:uppercase; font-size:3rem; margin-bottom:40px;">Submit <span style="color:var(--primary)">Music</span></h2>
                <p style="margin-bottom:20px;">Local bands: Send us your Amazon or Spotify links. (Joining this list adds you to our VIP Studio Updates).</p>
                <div id="form-response"></div>
                <form id="band-form" onsubmit="spa.submitForm(event)">
                    <input type="text" name="band" placeholder="Band Name" required>
                    <input type="email" name="email" placeholder="Contact Email" required>
                    <input type="url" name="link" placeholder="Amazon/Spotify Link" required>
                    <textarea name="message" placeholder="Tell us about the track..." rows="4"></textarea>
                    <button type="submit">Send to Studio & Join VIP List</button>
                </form>
            `
        },
        load: function(id) {
            // Suggestion 7: Fallback logic for non-existent pages
            if(!this.pages[id]) id = 'home'; 
            
            document.getElementById('page-content').innerHTML = this.pages[id];
            if(id === 'home') {
                fetchNews();
                updateRecentList();
            }
            document.getElementById('content-window').scrollTop = 0;
            // Update URL hash without reload for SEO/Sharing
            window.location.hash = id;
        },
        submitForm: async function(e) {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            const responseDiv = document.getElementById('form-response');
            responseDiv.innerHTML = "Processing...";
            try {
                const response = await fetch('submit.php', { method: 'POST', body: formData });
                const result = await response.json();
                if(result.status === 'success') {
                    responseDiv.innerHTML = `<p style="color:var(--primary); font-weight:bold;">${result.message}</p>`;
                    form.reset();
                } else {
                    responseDiv.innerHTML = `<p style="color:red;">${result.message}</p>`;
                }
            } catch (error) {
                responseDiv.innerHTML = `<p style="color:red;">Submission failed. Check your connection.</p>`;
            }
        }
    };

    let trackHistory = [];

    async function updateMetadata() {
        const trackEl = document.getElementById('track-info');
        const amazonBtn = document.getElementById('amazon-btn');
        try {
            const response = await fetch('https://api.broadcast.radio/v1/nowplaying/caledonia-tx-ltd');
            const data = await response.json();
            if (data && data.nowPlaying && data.nowPlaying.artist) {
                const artist = data.nowPlaying.artist.toUpperCase();
                const title = data.nowPlaying.title.toUpperCase();
                const currentTrack = `${artist} - ${title}`;
                if (trackEl.innerText !== currentTrack) {
                    trackEl.innerText = currentTrack;
                    amazonBtn.href = `https://www.amazon.co.uk/s?k=${encodeURIComponent(currentTrack)}&tag=YOUR_AFFILIATE_TAG_HERE`;
                    amazonBtn.style.display = "inline-block";
                    if(!trackHistory.includes(currentTrack)) {
                        trackHistory.unshift(currentTrack);
                        if(trackHistory.length > 5) trackHistory.pop();
                        updateRecentList();
                    }
                }
            }
        } catch (error) {
            trackEl.innerText = "SLA-ROCK.SCOT | ROCKIN' SCOTLAND";
            amazonBtn.style.display = "none";
        }
    }

    function updateRecentList() {
        const listContainer = document.getElementById('recent-tracks');
        if (!listContainer) return;
        if (trackHistory.length === 0) {
            listContainer.innerHTML = "<p style='color:#666;'>Rockin' Scotland Continuous Feed...</p>";
            return;
        }
        listContainer.innerHTML = trackHistory.map(track => `<div class="recent-track"><strong>${track}</strong></div>`).join('');
    }

    async function fetchNews() {
        const rss = 'https://www.scottishmusicnetwork.co.uk/feed/';
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rss}`);
            const data = await res.json();
            const feed = document.getElementById('news-feed');
            if(!feed) return;
            // Suggestion 5: Explicitly lazy load news if images were present
            feed.innerHTML = data.items.slice(0, 4).map(item => `
                <div style="background:var(--glass); padding:20px; margin-bottom:15px; border:1px solid #222;">
                    <h4 style="margin:0 0 10px 0; text-transform:uppercase;">${item.title}</h4>
                    <a href="${item.link}" target="_blank" style="color:var(--primary); font-size:0.7rem; text-decoration:none; font-weight:900;">READ MORE</a>
                </div>
            `).join('');
        } catch(e) { 
            if(document.getElementById('news-feed')) document.getElementById('news-feed').innerHTML = "Feed offline.";
        }
    }

    window.onload = () => {
        // Suggestion 7: Handle deep-linking to specific tabs
        const initialPage = window.location.hash.replace('#', '') || 'home';
        spa.load(initialPage);
        updateMetadata();
        setInterval(updateMetadata, 30000);
    };
    
    // Handle browser back button within SPA
    window.onhashchange = () => {
        const page = window.location.hash.replace('#', '');
        spa.load(page);
    };
</script>
</body>
</html>
