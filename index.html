<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rock.Scot | Central Scotland's Rock Authority</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=New+Rocker&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #ff3e00; 
            --bg: #050505; 
            --header-h: 130px; 
            --nav-h: 60px;
            --footer-h: 80px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg) url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            color: #fff; font-family: 'Inter', sans-serif; height: 100dvh; 
            display: grid; grid-template-rows: var(--header-h) var(--nav-h) 1fr var(--footer-h);
            overflow: hidden;
        }

        /* 1. HEADER & ROCK NEON */
        header { 
            background: #000; border-bottom: 3px solid var(--primary);
            position: relative; overflow: hidden;
        }
        .hdr-logo { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        
        .neon-rock-guitar {
            position: absolute; right: 20px; top: 15px; height: 100px;
            filter: drop-shadow(0 0 10px var(--primary));
            animation: flicker 2s infinite; z-index: 10;
        }
        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; filter: brightness(1); }
            20%, 24%, 55% { opacity: 0.2; filter: brightness(0.5); }
        }

        /* 3. GLITCH CRACKLE FIX */
        nav { display: grid; grid-template-columns: repeat(4, 1fr); background: #000; gap: 2px; }
        .nav-btn {
            background: #111; border: none; color: #666; font-family: 'Oswald';
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
            transition: 0.2s; position: relative;
        }
        .nav-btn.active { color: #fff; background: #1a1a1a; box-shadow: inset 0 -4px 0 var(--primary); }
        
        .nav-btn:hover {
            animation: glitch-crack 0.2s infinite;
            color: var(--primary);
            text-shadow: 2px 0 #fff, -2px 0 #000;
        }
        @keyframes glitch-crack {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        /* CONTENT AREA */
        main { overflow-y: auto; padding: 20px; scrollbar-width: thin; scrollbar-color: var(--primary) #000; }
        .view { display: none; max-width: 1400px; margin: 0 auto; }
        .view.active { display: block; }

        /* LIVE CONSOLE */
        .console-row { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 15px; align-items: center; margin-bottom: 10px; }
        .console-panel { background: #111; border: 1px solid #333; padding: 20px; text-align: center; font-family: 'Oswald'; }
        .hero-img-box { height: 150px; display: flex; align-items: center; justify-content: center; }
        .hero-img-box img { max-height: 100%; width: auto; }

        /* DJ GRID (CREW) */
        .dj-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .dj-card { display: flex; background: rgba(20,20,20,0.8); border: 1px solid #333; overflow: hidden; }
        .dj-photo { width: 150px; height: 150px; object-fit: cover; border-right: 3px solid var(--primary); }
        .dj-info { padding: 15px; }

        /* HORIZONTAL NEWS WIRE */
        .wire-item { display: flex; background: #111; margin-bottom: 15px; border: 1px solid #222; }
        .wire-img { width: 200px; height: 120px; object-fit: cover; }
        .wire-body { padding: 15px; }

        footer { background: #000; border-top: 4px solid var(--primary); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .play-btn { background: var(--primary); color: #fff; font-family: 'Oswald'; padding: 12px 30px; border: none; cursor: pointer; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); }

        @media (max-width: 1024px) {
            .console-row { grid-template-columns: 1fr; }
            .console-panel, .neon-rock-guitar { display: none; }
            .dj-card { flex-direction: column; }
            .dj-photo { width: 100%; height: 250px; }
        }
    </style>
</head>
<body>

<header>
    <img src="logo.jpg" alt="Rock.Scot Banner" class="hdr-logo">
    <svg class="neon-rock-guitar" viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 10 L55 80 L90 140 L50 120 L10 140 L45 80 Z" stroke="#ff3e00" stroke-width="3" fill="none" />
        <line x1="50" y1="10" x2="50" y2="120" stroke="#ff3e00" stroke-width="1" />
        <rect x="42" y="80" width="16" height="20" stroke="#ff3e00" fill="none"/>
    </svg>
</header>

<nav>
    <button class="nav-btn active" onclick="tab('radio')">Live</button>
    <button class="nav-btn" onclick="tab('wire')">Wire</button>
    <button class="nav-btn" onclick="tab('crew')">Crew</button>
    <button class="nav-btn" onclick="tab('ads')">Ads</button>
</nav>

<main id="scroll-target">
    <section id="v-radio" class="view active">
        <div class="console-row">
            <div class="console-panel">
                <span style="color:var(--primary)">SIGNAL</span><br>CENTRAL BELT
            </div>
            <div class="hero-img-box">
                <img src="logo.png" alt="Rockin Scotland">
            </div>
            <div class="console-panel">
                <span style="color:var(--primary)">STATUS</span><br>LIVE & LOUD
            </div>
        </div>
        <div style="height: 40vh; background: url('studio-main.jpg') center/cover; border: 1px solid #333;"></div>
    </section>

    <section id="v-wire" class="view">
        <h2 style="font-family:'Oswald'; margin-bottom:20px;">MUSIC WIRE</h2>
        <div id="news-container"></div>
    </section>

    <section id="v-crew" class="view">
        <div class="dj-grid">
            <div class="dj-card">
                <img src="dj1.jpg" class="dj-photo" onerror="this.src='https://via.placeholder.com/150?text=DJ+1'">
                <div class="dj-info">
                    <h3 style="font-family:'Oswald'; color:var(--primary);">THE RAZOR</h3>
                    <p>6am - 10am Weekdays. Breakfast with a bite.</p>
                </div>
            </div>
            <div class="dj-card">
                <img src="dj2.jpg" class="dj-photo" onerror="this.src='https://via.placeholder.com/150?text=DJ+2'">
                <div class="dj-info">
                    <h3 style="font-family:'Oswald'; color:var(--primary);">SCOTTISH METAL MASS</h3>
                    <p>10pm Nightly. Pure heavy local talent.</p>
                </div>
            </div>
        </div>
        <div style="margin-top:20px; height:200px; background:url('filler1.jpg') center/cover; border:1px solid #222;"></div>
    </section>

    <section id="v-ads" class="view">
        <h2 style="font-family:'Oswald'; margin-bottom:20px;">ADVERTISING</h2>
        <div class="dj-grid">
            <div class="console-panel" style="text-align:left;">
                <h3 style="color:var(--primary)">REGIONAL PACK</h3>
                <p>£299/Week. High impact audio spots across Central Scotland.</p>
            </div>
            <div class="console-panel">
                <h3 style="color:var(--primary)">CALCULATOR</h3>
                <input type="number" id="wks" value="1" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid #333;" oninput="recalc()">
                <div style="font-size:2rem; margin-top:10px;">£<span id="tot">299</span></div>
            </div>
        </div>
    </section>
</main>

<footer>
    <button class="play-btn" onclick="toggleStream()" id="play-trigger">LISTEN LIVE</button>
    <div style="font-family:'New Rocker'; font-size:1.5rem;">Rock.Scot</div>
</footer>

<script>
    function tab(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('v-' + id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function recalc() { document.getElementById('tot').innerText = document.getElementById('wks').value * 299; }

    const stream = new Audio("https://uksoutha.streaming.broadcast.radio/stream/16641/caledonia-tx-ltd");
    let isP = false;
    function toggleStream() {
        const btn = document.getElementById('play-trigger');
        if(!isP) { stream.play(); btn.innerText = "STOP FEED"; isP = true; }
        else { stream.pause(); btn.innerText = "LISTEN LIVE"; isP = false; }
    }

    async function loadWire() {
        const api = "https://api.rss2json.com/v1/api.json?rss_url=https://www.theskinny.co.uk/rss/music";
        try {
            const res = await fetch(api);
            const data = await res.json();
            let h = '';
            data.items.slice(0, 6).forEach(item => {
                const img = item.thumbnail || 'https://via.placeholder.com/200x120?text=ROCK.SCOT';
                h += `<div class="wire-item">
                    <img src="${img}" class="wire-img">
                    <div class="wire-body">
                        <h4 style="font-family:'Oswald'; color:var(--primary);">${item.title}</h4>
                        <p style="font-size:0.8rem; color:#888;">${item.description.substring(0, 120).replace(/<[^>]*>?/gm, '')}...</p>
                    </div>
                </div>`;
            });
            document.getElementById('news-container').innerHTML = h;
        } catch(e) { console.log(e); }
    }
    window.onload = loadWire;
</script>
</body>
</html>
