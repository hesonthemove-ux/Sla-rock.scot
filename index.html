<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="meta-title">ROCK.SCOT | Rockin' Scotland</title>
    <meta name="description" id="meta-desc" content="Central Scotland's Rock Station. Regional airtime from £199. Multi-regional from £349.">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { background-color: #000; color: #fff; margin: 0; padding: 0; font-family: 'Oswald', sans-serif; overflow-x: hidden; }
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        
        /* PLAYER BAR */
        #master-player { background: #000; border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; z-index: 2000; width: 100%; }
        
        /* LOGO PUSH - 900px */
        .logo-main { 
            width: 100%; 
            max-width: 900px; 
            height: auto; 
            display: block; 
            margin: 0 auto; 
            filter: drop-shadow(0 0 10px rgba(255, 62, 0, 0.1));
        }
        
        /* NAV MENU PUSH - Larger to match 900px logo */
        .nav-menu { 
            margin-top: 25px; 
            display: flex; 
            justify-content: center; 
            flex-wrap: wrap; 
            gap: 40px; /* Increased gap */
            padding-bottom: 20px;
        }
        .nav-menu a { 
            color: #fff; 
            text-decoration: none; 
            text-transform: uppercase; 
            font-weight: 700; 
            font-size: 1.4rem; /* Pushed font size from 0.85rem */
            letter-spacing: 2px;
            cursor: pointer;
            border-bottom: 3px solid transparent; /* Thicker border */
            transition: 0.3s;
        }
        .nav-menu a.active { color: #ff3e00; border-bottom: 3px solid #ff3e00; }
        .nav-menu a:hover { color: #ff3e00; }

        #page-content { min-height: 60vh; padding-top: 20px; }

        /* PRICING FOOTER - FIXED TO £199 / £349 */
        .grid-ads { display: flex; gap: 15px; margin: 40px 0; width: 100%; }
        .grid-ads .card-ad { 
            flex: 1; 
            background: #0a0a0a; 
            border: 1px solid #1a1a1a; 
            padding: 20px 10px; 
            text-align: center; 
        }
        .ad-label { text-transform: uppercase; font-size: 0.8rem; color: #888; margin: 0; }
        .ad-price { font-size: 1.5rem; font-weight: 700; color: #ff3e00; margin: 5px 0; }
        
        button#play-btn { 
            background: #ff3e00; color: #000; border: none; padding: 10px 20px; 
            font-family: 'Oswald'; font-weight: 700; text-transform: uppercase; 
            cursor: pointer; font-size: 0.9rem; 
        }

        /* MOBILE FIX */
        @media (max-width: 768px) {
            .logo-main { max-width: 450px; }
            .nav-menu { gap: 15px; }
            .nav-menu a { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="master-player">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 12px 0;">
            <span style="font-weight: 700; text-transform: uppercase; font-size: 0.8rem; color: #ff3e00;">Rockin' Scotland</span>
            <button id="play-btn">Listen Live</button>
        </div>
    </div>

    <header style="padding: 30px 0 0 0;">
        <div class="container">
            <img src="logo.png" alt="ROCK.SCOT" class="logo-main">
            <nav class="nav-menu" id="main-nav">
                <a onclick="loadPage('home.html', this)" id="home-link">Home</a>
                <a onclick="loadPage('news.html', this)">News</a>
                <a onclick="loadPage('about.html', this)">About</a>
                <a onclick="loadPage('advertise.html', this)">Advertise</a>
                <a onclick="loadPage('submit.html', this)">Submit</a>
            </nav>
        </div>
    </header>

    <main id="page-content"></main>

    <footer class="container" style="padding: 40px 0; text-align: center;">
        <div class="grid-ads">
            <div class="card-ad"><p class="ad-label">Regional Airtime</p><p class="ad-price">£199</p></div>
            <div class="card-ad"><p class="ad-label">Multi-Regional</p><p class="ad-price">£349</p></div>
            <div class="card-ad"><p class="ad-label">Creative Production</p><p class="ad-price">£195</p></div>
        </div>
        <p style="color: #222; font-size: 0.7rem;">&copy; 2026 ROCK.SCOT | Rockin' Scotland</p>
    </footer>

    <script>
        async function loadPage(page, element) {
            try {
                const response = await fetch(page + '?v=' + Date.now());
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const newContent = doc.querySelector('main').innerHTML;
                document.getElementById('page-content').innerHTML = newContent;
                document.querySelectorAll('#main-nav a').forEach(a => a.classList.remove('active'));
                if(element) element.classList.add('active');
                window.scrollTo(0,0);
            } catch (err) { console.error(err); }
        }
        window.onload = () => loadPage('home.html', document.getElementById('home-link'));
    </script>
</body>
</html>
