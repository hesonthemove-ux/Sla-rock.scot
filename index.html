<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rock.Scot | Central Scotland's Rock Authority</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --authority-orange: #ff5500; 
            --ultra-glass: rgba(0, 0, 0, 0.3); /* Ultra-transparent for background visibility */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* HEADER & OVERLAP LOGIC */
        header { position: sticky; top: 0; z-index: 1000; display: flex; flex-direction: column; align-items: center; }
        
        .hdr-logo { 
            width: 85%; max-width: 480px; height: auto; 
            margin-bottom: -40px; /* Force overlap on menu */
            z-index: 1020; position: relative;
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.9));
        }

        .nav-strip { 
            width: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px);
            border-bottom: 3px solid var(--authority-orange);
            display: flex; height: 70px; padding-top: 25px; /* Offset for overlap */
            z-index: 1010; position: relative;
        }

        .nav-btn { flex: 1; background: transparent; border: none; color: #666; font-family: 'Bebas Neue'; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: var(--authority-orange); background: rgba(255,85,0,0.1); }

        /* ULTRA-TRANSPARENT PANELS */
        .glass-panel { 
            background: var(--ultra-glass); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            padding: 40px; width: 95%; max-width: 650px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6); margin-top: 40px;
        }

        /* VIEW ENGINE */
        .view { display: none; min-height: 100vh; width: 100%; padding: 100px 20px 60px 20px; background-size: cover; background-position: center; background-attachment: fixed; }
        .view.active { display: flex; flex-direction: column; align-items: center; }

        /* CREW ROLODEX interaction */
        .crew-container { display: flex; gap: 20px; overflow-x: auto; width: 100%; padding: 40px 20px; scroll-snap-type: x mandatory; }
        .crew-card {
            min-width: 280px; height: 420px; background: #111; border: 1px solid #333;
            scroll-snap-align: center; position: relative; cursor: pointer;
            filter: grayscale(100%); transition: 0.5s cubic-bezier(0.2, 1, 0.2, 1);
        }
        .crew-card.active-color { filter: grayscale(0%); border: 3px solid var(--authority-orange); transform: scale(1.05); }
        .crew-img { width: 100%; height: 100%; object-fit: cover; }
        .crew-label { position: absolute; bottom: 0; width: 100%; background: linear-gradient(0deg, #000 0%, transparent 100%); padding: 25px; font-family: 'Bebas Neue'; font-size: 2.2rem; text-align: center; }

        /* MAGAZINE MODAL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 5000; display: none; overflow-y: auto; padding: 40px 20px; }
        .modal-overlay.open { display: flex; align-items: center; justify-content: center; }
        .mag-layout { max-width: 700px; border: 12px solid #fff; padding: 60px; background: #000; position: relative; }

        /* INPUTS */
        .std-input { width: 100%; padding: 18px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-family: 'Oswald'; margin-bottom: 15px; border-radius: 4px; }
        .btn-authority { width: 100%; padding: 20px; background: var(--authority-orange); border: none; color: #fff; font-family: 'Bebas Neue'; font-size: 1.8rem; cursor: pointer; transition: 0.2s; }
        .btn-authority:hover { background: #ff7722; }

        /* TICKER */
        .ticker-wrap { width: 100%; background: #fff; color: #000; overflow: hidden; white-space: nowrap; padding: 10px 0; font-family: 'Oswald'; font-weight: 900; border-bottom: 3px solid var(--authority-orange); position: absolute; top: 0; left: 0; }
        .ticker-move { display: inline-block; animation: ticker 40s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div id="mag-modal" class="modal-overlay" onclick="this.classList.remove('open')">
        <div class="mag-layout" onclick="event.stopPropagation()">
            <div style="font-family:'Bebas Neue'; color:var(--authority-orange); letter-spacing:3px;">THE AUTHORITY DOSSIER</div>
            <h2 id="mag-name" style="font-family:'Oswald'; font-size:5rem; line-height:0.85; margin:25px 0; text-transform:uppercase;"></h2>
            <p id="mag-text" style="font-size:1.2rem; line-height:1.8; color:#eee; border-top:1px solid #333; padding-top:25px;"></p>
            <div style="margin-top:40px; font-family:'Bebas Neue'; font-size:1.4rem;">STATUS: <span id="mag-stats" style="color:var(--authority-orange);"></span></div>
        </div>
    </div>

    <header>
        <img src="top_banner.png" class="hdr-logo" alt="Rock.Scot">
        <nav class="nav-strip">
            <button class="nav-btn active" onclick="showTab('live')">LIVE</button>
            <button class="nav-btn" onclick="showTab('wire')">WIRE</button>
            <button class="nav-btn" onclick="showTab('crew')">CREW</button>
            <button class="nav-btn" onclick="showTab('rates')">RATES</button>
            <button class="nav-btn" onclick="showTab('submit')">SUBMIT</button>
        </nav>
    </header>

    <main>
        <section id="v-live" class="view active">
            <div class="glass-panel" style="text-align:center;">
                <div id="live-clock" style="font-family:'Bebas Neue'; font-size:6rem; line-height:0.9;">00:00</div>
                <div id="clock-tag" style="font-family:'Oswald'; color:var(--authority-orange); letter-spacing:4px; margin-bottom:10px;">ROCKIN' SCOTLAND</div>
                <div id="power-statement" style="font-family:'Oswald'; font-size:0.9rem; color:#888; height:40px; margin-bottom:30px; text-transform:uppercase;">CENTRAL SCOTLAND AUTHORITY</div>
                <button class="btn-authority" onclick="toggleAudio()" id="play-btn">ENGAGE SIGNAL</button>
            </div>
        </section>

        <section id="v-wire" class="view">
            <div class="ticker-wrap"><div class="ticker-move" id="album-ticker">LOADING ROCK INTEL...</div></div>
            <div id="rss-feed" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:25px; width:100%; max-width:1200px; padding-top:40px;"></div>
        </section>

        <section id="v-crew" class="view">
            <div style="text-align:center;"><h2 style="font-family:'Bebas Neue'; font-size:3.5rem;">THE CREW</h2><p style="font-family:'Oswald'; color:var(--authority-orange);">DOUBLE TAP FOR DOSSIER</p></div>
            <div class="crew-container" id="crew-rolodex"></div>
        </section>

        <section id="v-rates" class="view">
            <div class="glass-panel">
                <h2 style="font-family:'Bebas Neue'; font-size:3rem; color:var(--authority-orange);">ADVERTISING</h2>
                <select id="calc-package" class="std-input" onchange="calc()">
                    <option value="299">Regional (£299/28d)</option>
                    <option value="449">Multi-Regional (£449/28d)</option>
                </select>
                <div id="total-price" style="font-family:'Bebas Neue'; font-size:4rem; text-align:center;">£299.00</div>
                <button class="btn-authority">BOOK TRANSMISSION</button>
            </div>
        </section>

        <section id="v-submit" class="view">
            <div class="glass-panel">
                <h2 style="font-family:'Bebas Neue'; font-size:3rem; color:var(--authority-orange);">TRANSMIT TRACK</h2>
                <input type="text" placeholder="BAND" class="std-input">
                <textarea placeholder="PITCH..." class="std-input" style="height:120px;"></textarea>
                <button class="btn-authority">SUBMIT TO AUTHORITY</button>
            </div>
        </section>
    </main>

<script>
    const stream = new Audio("https://uksoutha.streaming.broadcast.radio/stream/16641/caledonia-tx-ltd");
    
    const crewData = [
        { id: "andy", name: "ANDY", role: "Rock Rebel", bio: "From the heart of EK, Andy brings the heaviest riffs and local knowledge.", img: "dj_andy.jpg", clicks: 0 },
        { id: "alex", name: "ALEX", role: "Vinyl Viking", bio: "Johnstone's finest record collector. If it's on vinyl, Alex has the story.", img: "dj_alex.jpg", clicks: 0 },
        { id: "mhairi", name: "MHAIRI", role: "Hard Rock Queen", bio: "Tattoo artist and rock authority. She knows the scene inside out.", img: "dj_mhairi.jpg", clicks: 0 }
    ];

    const powerStatements = [
        "SCOTLAND'S ROCK AUTHORITY", "CENTRAL SCOTLAND'S LOUDEST SIGNAL", "24/7 INDUSTRIAL ROCK INTELLIGENCE", "UNFILTERED SCOTTISH ROCK", "THE AUTHORITY IN INDEPENDENT SOUND"
    ];

    function showTab(name) {
        document.querySelectorAll('.view').forEach(v => { v.classList.remove('active'); v.style.display = 'none'; });
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        const activeView = document.getElementById('v-' + name);
        activeView.style.display = 'flex';
        activeView.classList.add('active');
        activeView.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('news${Math.floor(Math.random()*7)+1}.jpg')`;
        event.currentTarget.classList.add('active');
        if(name === 'wire') fetchRSS();
        if(name === 'crew') renderCrew();
    }

    // HYBRID NEWS ENGINE
    async function fetchRSS() {
        const feedContainer = document.getElementById('rss-feed');
        feedContainer.innerHTML = "<p style='grid-column:1/-1; text-align:center;'>SCANNING FREQUENCIES...</p>";
        try {
            const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.theskinny.co.uk/rss/music');
            const data = await res.json();
            feedContainer.innerHTML = data.items.slice(0,9).map((item, idx) => {
                const thumb = (item.enclosure && item.enclosure.link) ? item.enclosure.link : `news${(idx % 7) + 1}.jpg`;
                return `
                    <div style="background:rgba(0,0,0,0.85); border:1px solid #333; cursor:pointer;" onclick="window.open('${item.link}')">
                        <img src="${thumb}" style="width:100%; height:180px; object-fit:cover;" onerror="this.src='news${(idx % 7) + 1}.jpg'">
                        <div style="padding:15px;"><h3 style="font-family:'Oswald'; font-size:1rem;">${item.title}</h3></div>
                    </div>`;
            }).join('');
        } catch(e) {
            feedContainer.innerHTML = Array.from({length:6}, (_, i) => `
                <div style="background:rgba(0,0,0,0.85); border:1px solid #333;">
                    <img src="news${(i%7)+1}.jpg" style="width:100%; height:180px; object-fit:cover;">
                    <div style="padding:15px;"><h3 style="font-family:'Oswald';">SIGNAL RECOVERY: Authority Rock Update #${i+100}</h3></div>
                </div>`).join('');
        }
    }

    function renderCrew() {
        const container = document.getElementById('crew-rolodex');
        container.innerHTML = crewData.map(dj => `
            <div class="crew-card" id="card-${dj.id}" onclick="handleCrewClick('${dj.id}')">
                <img src="${dj.img}" class="crew-img" onerror="this.src='news1.jpg'">
                <div class="crew-label">${dj.name}</div>
            </div>`).join('');
    }

    function handleCrewClick(id) {
        const dj = crewData.find(d => d.id === id);
        dj.clicks++;
        const card = document.getElementById('card-' + id);
        if(dj.clicks === 1) {
            document.querySelectorAll('.crew-card').forEach(c => c.classList.remove('active-color'));
            card.classList.add('active-color');
            setTimeout(() => { if(dj.clicks === 1) dj.clicks = 0; }, 2000);
        } else if(dj.clicks === 2) {
            document.getElementById('mag-name').innerText = dj.name;
            document.getElementById('mag-text').innerText = dj.bio;
            document.getElementById('mag-stats').innerText = dj.role;
            document.getElementById('mag-modal').classList.add('open');
            dj.clicks = 0;
            card.classList.remove('active-color');
        }
    }

    function calc() {
        const val = document.getElementById('calc-package').value;
        document.getElementById('total-price').innerText = `£${val}.00`;
    }

    function updateLiveUI() {
        const now = new Date();
        const hrs = now.getHours();
        document.getElementById('live-clock').innerText = hrs.toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        
        let tag = "ROCKIN' SCOTLAND";
        if(hrs >= 6 && hrs < 12) tag = "MORNING ROCKIN'";
        else if(hrs >= 12 && hrs < 18) tag = "AFTERNOON ROCKIN'";
        else if(hrs >= 18 && hrs < 24) tag = "EVENING ROCKIN'";
        else tag = "LATE NIGHT ROCKIN'";
        document.getElementById('clock-tag').innerText = tag;
    }

    setInterval(() => {
        updateLiveUI();
        document.getElementById('power-statement').innerText = powerStatements[Math.floor(Math.random() * powerStatements.length)];
    }, 5000);

    function toggleAudio() {
        if(stream.paused) { stream.play(); document.getElementById('play-btn').innerText = "DISENGAGE SIGNAL"; }
        else { stream.pause(); document.getElementById('play-btn').innerText = "ENGAGE SIGNAL"; }
    }

    window.onload = () => {
        updateLiveUI();
        document.getElementById('v-live').style.backgroundImage = "linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('news1.jpg')";
        const launches = ["BIFFY CLYRO - NEW SINGLE OUT", "THE SNUTS - GLASGOW TICKETS LIVE", "MOGWAI - TOUR STARTING", "FRANZ FERDINAND - FEB 12 RELEASE"];
        document.getElementById('album-ticker').innerText = launches.join(" • ") + " • " + launches.join(" • ");
    };
</script>
</body>
</html>
