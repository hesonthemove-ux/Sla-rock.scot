<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock.Scot | Authority</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --orange: #FF6B00; }
        body { background: #000; color: #fff; font-family: 'Impact', sans-serif; margin: 0; }
        nav { position: sticky; top: 0; z-index: 100; background: #000; display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 5px solid var(--orange); }
        nav button { background: #000; color: #fff; border: 1px solid #222; padding: 15px 5px; text-transform: uppercase; font-family: 'Impact'; }
        nav button.active { background: var(--orange); color: #000; }
        .section { display: none; padding: 15px; position: relative; z-index: 10; }
        .section.active { display: block; }
        .card { background: #fff; color: #000; padding: 20px; border: 8px solid #000; box-shadow: 8px 8px 0 var(--orange); margin-bottom: 20px; }
        .wire-item { border-bottom: 2px solid #000; padding: 10px 0; cursor: pointer; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: var(--orange); color: #000; padding: 30px; border: 10px solid #000; width: 90%; max-width: 500px; }
    </style>
</head>
<body>
    <nav>
        <button onclick="tab('live')" id="btn-live" class="active">ON AIR</button>
        <button onclick="tab('wire')" id="btn-wire">WIRE</button>
        <button onclick="tab('crew')" id="btn-crew">TEAM</button>
        <button onclick="tab('ads')" id="btn-ads">ADS</button>
    </nav>

    <main>
        <section id="live" class="section active">
            <h1 id="clock" style="font-size:3rem; color:var(--orange); text-align:center;">00:00:00</h1>
            <div class="card"><h3>GIGS</h3><div id="gig-list"></div></div>
        </section>
        <section id="wire" class="section">
            <div class="card" style="background:var(--orange);">
                <h2>THE WIRE</h2>
                <div id="wire-content"></div>
            </div>
        </section>
        <section id="crew" class="section"><div id="crew-list" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div></section>
        <section id="ads" class="section"><div class="card" id="ads-list"></div></section>
    </main>

    <div id="modal" onclick="this.style.display='none'"><div class="modal-box" onclick="event.stopPropagation()">
        <h2 id="m-title"></h2>
        <p id="m-summary" style="font-family:sans-serif; font-weight:bold; line-height:1.4;"></p>
        <a id="m-link" href="#" target="_blank" style="display:block; background:#000; color:#fff; padding:10px; text-align:center; text-decoration:none; margin-top:20px;">READ SOURCE</a>
    </div></div>

    <script>
        const _sb = supabase.createClient('https://figcmwjdbeurhjopxknp.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpZ2Ntd2pkYmV1cmhqb3B4a25wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4ODI5MDYsImV4cCI6MjA4NDQ1ODkwNn0.iiE65zB0lAsEkJE6lotNU1lORpL94oxZ7-ebHhJ3FgY');
        
        function tab(t) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.getElementById('btn-'+t).classList.add('active');
            if(t === 'wire') loadWire();
            if(t === 'live') loadGigs();
            if(t === 'ads') loadAds();
        }

        async function loadWire() {
            const { data } = await _sb.from('news_wire').select('*').order('created_at', {ascending: false});
            const cont = document.getElementById('wire-content');
            cont.innerHTML = '';
            data.forEach(n => {
                const item = document.createElement('div');
                item.className = 'wire-item';
                item.innerHTML = `<strong>[${n.source_name}]</strong> ${n.headline}`;
                item.onclick = () => {
                    document.getElementById('m-title').innerText = n.headline;
                    document.getElementById('m-summary').innerText = n.summary || "No summary available.";
                    document.getElementById('m-link').href = n.source_url;
                    document.getElementById('modal').style.display = 'flex';
                };
                cont.appendChild(item);
            });
        }

        async function loadGigs() {
            const { data } = await _sb.from('gigs').select('*');
            document.getElementById('gig-list').innerHTML = data.map(g => `<p><strong>${g.date}</strong>: ${g.venue} - ${g.act}</p>`).join('');
        }

        async function loadAds() {
            const { data } = await _sb.from('ads').select('*');
            document.getElementById('ads-list').innerHTML = data.map(a => `<h3>${a.title}</h3><p>${a.description}</p><p><strong>${a.price}</strong></p>`).join('');
        }

        const crew = ["Andy","Alex","Stevie","Mhairi","Jude","Chris","Cal","Blue"];
        const crewList = document.getElementById('crew-list');
        crew.forEach(c => {
            crewList.innerHTML += `<div style="background:#fff; color:#000; padding:5px; text-align:center;"><img src="./assets/branding/logo.png" style="width:100%; filter:grayscale(1);"><p>${c}</p></div>`;
        });

        setInterval(() => { document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0]; }, 1000);
        loadGigs();
    </script>
</body>
</html>
