<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rock.Scot | Central Scotland's Rock Authority</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --authority-orange: #ff5500; 
            --fire-glow: rgba(255, 34, 0, 0.6);
            --panel-bg: #0a0a0a;
            --bezel: #1a1a1a;
            --scroll-speed: 12s;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        body.grit-mode { --scroll-speed: 5s; }

        /* HEADER & TOP WIRE POSITIONING */
        header { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; background: #000; }
        .hdr-banner { width: 100%; max-width: 1000px; height: auto; display: block; transition: 0.5s; z-index: 2; }
        
        @keyframes firePulse {
            0% { filter: drop-shadow(0 0 5px var(--authority-orange)); }
            50% { filter: drop-shadow(0 0 25px #ff2200); transform: scale(1.01); }
            100% { filter: drop-shadow(0 0 5px var(--authority-orange)); }
        }
        .playing-pulse { animation: firePulse 2s infinite ease-in-out; }

        .authority-wire { 
            width: 100%; background: #000; border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a; 
            padding: 10px 0; overflow: hidden; white-space: nowrap; 
            font-family: 'Oswald'; font-size: 0.85rem; color: var(--authority-orange);
            text-transform: uppercase; letter-spacing: 1px; z-index: 1;
        }
        .wire-content { display: inline-block; padding-left: 100%; animation: wireScroll 40s linear infinite; }
        @keyframes wireScroll { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        .grit-mode .authority-wire { text-shadow: 0 0 15px var(--authority-orange); border-color: var(--authority-orange); }

        /* NAVIGATION */
        nav { display: flex; justify-content: center; width: 100%; background: #050505; border-bottom: 1px solid #1a1a1a; }
        .nav-btn { flex: 1; padding: 18px 5px; background: transparent; border: none; color: #555; font-family: 'Bebas Neue'; font-size: 1.3rem; cursor: pointer; text-transform: uppercase; transition: 0.3s; letter-spacing: 1px; }
        .nav-btn.active { color: #fff; box-shadow: inset 0 -3px 0 var(--authority-orange); background: linear-gradient(to bottom, #111, #000); }

        /* CREW DOSSIERS - FILE NAME FIX */
        .crew-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .dossier-card { background: #080808; border: 1px solid #1a1a1a; padding: 20px; display: flex; gap: 15px; align-items: center; transition: 0.3s; }
        .dj-thumb { width: 100px; height: 100px; flex-shrink: 0; object-fit: cover; filter: grayscale(100%); border: 1px solid #333; transition: 0.4s; }
        .dj-name { font-family: 'Bebas Neue'; font-size: 2rem; line-height: 1; }
        
        .dossier-card:hover { border-color: var(--authority-orange); transform: translateY(-5px); }
        .dossier-card:hover .dj-thumb { filter: grayscale(0%); border-color: var(--authority-orange); box-shadow: 0 0 15px var(--fire-glow); }
        .dossier-card:hover .dj-name { color: var(--authority-orange); text-shadow: 0 0 10px var(--fire-glow); }

        /* CALCULATOR ENGINE */
        .calc-box { background: var(--panel-bg); border: 2px solid var(--bezel); padding: 30px; border-radius: 4px; font-family: 'Oswald'; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .calc-input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; color: #fff; margin-bottom: 15px; border-radius: 4px; font-family: 'Inter'; }
        .calc-result { font-size: 2.5rem; color: var(--authority-orange); font-family: 'Bebas Neue'; text-align: center; margin: 20px 0; border-top: 1px solid #222; padding-top: 20px; letter-spacing: 2px; }

        .btn-master { width: 100%; padding: 18px; background: linear-gradient(180deg, #ff6600, #992200); border: 1px solid #cc4400; color: #fff; font-family: 'Bebas Neue'; font-size: 1.6rem; cursor: pointer; border-radius: 4px; text-transform: uppercase; margin-bottom: 10px; transition: 0.2s; }
        .btn-master:active { transform: scale(0.98); }
        .btn-secondary { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #888; font-family: 'Oswald'; cursor: pointer; border-radius: 4px; text-transform: uppercase; }

        /* SUBMISSION GLASS */
        .submit-wrap { background: url('band_submission_sil.png') center/cover no-repeat; min-height: 600px; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .glass-terminal { background: rgba(0, 0, 0, 0.45); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; width: 100%; max-width: 500px; border-radius: 15px; text-align: center; }

        /* GRIT SWITCH */
        .grit-toggle { position: absolute; top: 10px; right: 20px; z-index: 100; font-family: 'Bebas Neue'; display: flex; align-items: center; gap: 8px; color: #333; }

        @media (max-width: 600px) {
            .dossier-card { flex-direction: column; text-align: center; }
            .nav-btn { font-size: 1rem; }
        }
    </style>
</head>
<body class="grit-mode">

<header>
    <div class="grit-toggle">
        <label>GRIT MODE</label>
        <input type="checkbox" checked onchange="document.body.classList.toggle('grit-mode')">
    </div>
    <img src="top_banner.png" id="main-logo" class="hdr-banner" alt="Rock.Scot Authority">
    <div class="authority-wire">
        <div class="wire-content" id="wire-ticker">AUTHORITY WIRE: // LOADING CENTRAL SCOTLAND ROCK INTEL... // SIGNAL ACQUIRED...</div>
    </div>
</header>

<nav>
    <button class="nav-btn active" onclick="showTab('live', this)">LIVE COMMAND</button>
    <button class="nav-btn" onclick="showTab('crew', this)">CREW</button>
    <button class="nav-btn" onclick="showTab('submit', this)">SUBMIT</button>
    <button class="nav-btn" onclick="showTab('partners', this)">ADVERTISE</button>
</nav>

<main style="padding: 10px;">
    <section id="v-live" class="view active">
        <div class="console-unit" style="max-width:900px; margin:20px auto; background:#0a0a0a; border:2px solid #1a1a1a; padding:25px;">
            <div style="background:#000; padding:25px; border:1px solid #222; overflow:hidden; text-align:center;">
                <div id="track-display" style="font-family:'Bebas Neue'; font-size: 3rem; color: var(--authority-orange); white-space:nowrap;">SIGNAL STANDBY</div>
            </div>
            <button class="btn-master" style="margin-top:20px;" onclick="toggleAudio()" id="play-btn">ENGAGE SIGNAL</button>
        </div>
    </section>

    <section id="v-crew" class="view" style="display:none;">
        <div class="crew-grid" id="crew-list"></div>
    </section>

    <section id="v-partners" class="view" style="display:none;">
        <div class="calc-box" style="max-width:550px; margin:20px auto;">
            <h2 style="font-family:'Bebas Neue'; font-size:2.5rem; color:var(--authority-orange); letter-spacing:1px;">CAMPAIGN CALCULATOR</h2>
            <p style="font-size:0.8rem; color:#666; margin-bottom:20px; text-transform:uppercase;">Standard Cycle: 28 Days. Surcharge applies to custom durations.</p>
            
            <select id="calc-region" class="calc-input" onchange="calculateRate()">
                <option value="299">Regional Airtime (£299/28 days)</option>
                <option value="449">Multi-Regional Airtime (£449/28 days)</option>
            </select>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label style="font-size:0.7rem; font-family:'Oswald';">CAMPAIGN START</label><input type="date" id="date-start" class="calc-input" onchange="calculateRate()"></div>
                <div><label style="font-size:0.7rem; font-family:'Oswald';">CAMPAIGN END</label><input type="date" id="date-end" class="calc-input" onchange="calculateRate()"></div>
            </div>

            <div style="display:flex; align-items:center; gap:12px; margin:15px 0; font-family:'Oswald'; font-size:0.9rem;">
                <input type="checkbox" id="creative-add" onchange="calculateRate()" style="width:18px; height:18px;">
                <label>ADD CREATIVE PRODUCTION (£195 FLAT)</label>
            </div>

            <div class="calc-result" id="total-price">TOTAL: £0.00</div>
            <div id="calc-summary" style="text-align:center; font-size:0.85rem; color:#888; margin-bottom:25px; line-height:1.6;">Select dates to initialize calculation.</div>
            
            <button class="btn-master" onclick="alert('Signal Request Sent.')">SECURE AIRTIME</button>
            <button class="btn-secondary" onclick="printQuote()">GENERATE QUOTE .TXT</button>
        </div>
    </section>

    <section id="v-submit" class="view" style="display:none;">
        <div class="submit-wrap">
            <div class="glass-terminal">
                <h2 style="font-family:'Bebas Neue'; font-size:2.8rem; color:var(--authority-orange);">TRANSMIT TRACK</h2>
                <input type="text" placeholder="BAND / ARTIST NAME" class="calc-input">
                <textarea placeholder="PITCH YOUR SIGNAL..." class="calc-input" style="height:120px;"></textarea>
                <button class="btn-master">UPLOAD TO AUTHORITY</button>
            </div>
        </div>
    </section>
</main>

<script>
    const stream = new Audio("https://uksoutha.streaming.broadcast.radio/stream/16641/caledonia-tx-ltd");
    
    // Corrected DJ ID format: dj_name.jpg
    const crewData = [
        { id: "dj_andy", name: "Andy", role: "Rock Rebel" },
        { id: "dj_alex", name: "Alex", role: "Vinyl Viking" },
        { id: "dj_stevie", name: "Stevie", role: "Headbanger" },
        { id: "dj_mhairi", name: "Mhairi", role: "Hard Rock Queen" },
        { id: "dj_jude", name: "Jude", role: "Indie Icon" },
        { id: "dj_chris", name: "Chris", role: "Guitar Guru" },
        { id: "dj_cal", name: "Cal", role: "Classic Rocker" },
        { id: "dj_blue", name: "Blue", role: "Bluesy Maverick" }
    ];

    function calculateRate() {
        const baseRate = parseFloat(document.getElementById('calc-region').value);
        const start = new Date(document.getElementById('date-start').value);
        const end = new Date(document.getElementById('date-end').value);
        const creative = document.getElementById('creative-add').checked ? 195 : 0;
        
        if (isNaN(start) || isNaN(end) || end <= start) return;

        const diffDays = Math.ceil(Math.abs(end - start) / (1000 * 60 * 60 * 24));
        let airtimeTotal = 0;
        let pricingModel = "";

        if (diffDays % 28 === 0) {
            airtimeTotal = (diffDays / 28) * baseRate;
            pricingModel = "Standard Monthly Multiplier Applied";
        } else {
            // Formula: (((package/28) * days) * 1.3)
            airtimeTotal = ((baseRate / 28) * diffDays) * 1.3;
            pricingModel = "Pro-Rata Rate + 30% Custom Duration Surcharge";
        }

        const grandTotal = airtimeTotal + creative;
        document.getElementById('total-price').innerText = `TOTAL: £${grandTotal.toFixed(2)}`;
        document.getElementById('calc-summary').innerHTML = `<strong>${diffDays} Days</strong> | Airtime: £${airtimeTotal.toFixed(2)}<br>${pricingModel}`;
    }

    function printQuote() {
        const summary = document.getElementById('calc-summary').innerText;
        const total = document.getElementById('total-price').innerText;
        const text = `ROCK.SCOT AUTHORITY - ADVERTISING QUOTE\n====================================\nSummary: ${summary.replace('<br>', ' ')}\nFinal Quote: ${total}\n====================================\nThis is an automated pro-rata calculation.`;
        const blob = new Blob([text], {type: "text/plain"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "RockScot_Authority_Quote.txt";
        link.click();
    }

    function init() {
        document.getElementById('crew-list').innerHTML = crewData.map(dj => `
            <div class="dossier-card">
                <img src="${dj.id}.jpg" class="dj-thumb" alt="${dj.name}">
                <div>
                    <div style="color:var(--authority-orange); font-family:'Oswald'; font-size:0.75rem; text-transform:uppercase;">${dj.role}</div>
                    <div class="dj-name">${dj.name}</div>
                </div>
            </div>
        `).join('');
        fetchWire();
    }

    async function fetchWire() {
        try {
            const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss/search?q=Rock+Music+Central+Scotland");
            const data = await res.json();
            const newsString = data.items.slice(0, 10).map(i => i.title.toUpperCase()).join(" // WIRE: // ");
            document.getElementById('wire-ticker').innerText = "AUTHORITY WIRE: // " + newsString;
        } catch(e) { document.getElementById('wire-ticker').innerText = "AUTHORITY WIRE: // SIGNAL INTERFERENCE - LOCAL ROCK INTEL PENDING..."; }
    }

    function showTab(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('v-' + id).style.display = 'block';
        btn.classList.add('active');
    }

    function toggleAudio() {
        const btn = document.getElementById('play-btn');
        const logo = document.getElementById('main-logo');
        const display = document.getElementById('track-display');
        if(stream.paused) { 
            stream.play(); btn.innerText = "TERMINATE SIGNAL"; 
            logo.classList.add('playing-pulse');
            display.innerText = "AUTHORITY LIVE BROADCAST // CENTRAL SCOTLAND'S ROCK AUTHORITY";
        } else { 
            stream.pause(); btn.innerText = "ENGAGE SIGNAL"; 
            logo.classList.remove('playing-pulse');
            display.innerText = "SIGNAL STANDBY";
        }
    }

    window.onload = init;
</script>
</body>
</html>
