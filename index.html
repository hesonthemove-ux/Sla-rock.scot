<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Rock.Scot | Central Scotland’s Rock Authority</title>
<link://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Bebas+Neue&family=Inter:wght@300;400;700;900&display=swap
<meta name="color-scheme" content="dark light">
top_banner.png

<style>
:root{
  --bg:#000; --fg:#fff; --muted:#9aa; --panel:#0b0b0b; --line:#222;
  --orange:#ff4d00; --nav:#050505; --accent:#ff4d0055;
  --ui:'Inter',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  --head:'Bebas Neue',Impact,Haettenschweiler,'Arial Narrow Bold',sans-serif;
  --sub:'Oswald','Inter',sans-serif;
}
body.light{
  --bg:#f8f8f8; --fg:#111; --muted:#444; --panel:#ffffff; --line:#ddd;
  --nav:#ffffff; --accent:#ff4d0015;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--ui);-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* Header + Ticker + Nav */
header{display:flex;flex-direction:column;align-items:center;gap:10px;padding:14px 10px 0}
.hdr{width:100%;max-width:1100px;height:auto;display:block}
.ticker{width:100%;border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:var(--bg);color:var(--orange);font-family:var(--sub);font-size:.9rem;letter-spacing:.08em;text-transform:uppercase;overflow:hidden;white-space:nowrap}
.ticker span{display:inline-block;padding-left:100%;animation:marq 20s linear infinite}
@keyframes marq{from{transform:translateX(0)}to{transform:translateX(-100%)}}
nav{display:flex;background:var(--nav);border-bottom:3px solid var(--orange)}
nav button{flex:1;border:0;background:transparent;color:#aaa;font-family:var(--head);font-size:1.35rem;padding:16px 8px;cursor:pointer;letter-spacing:.04em;transition:.2s}
nav button.active{color:var(--orange);background:var(--accent)}

/* Sections */
main{padding:16px}
section{display:none;max-width:1100px;margin:0 auto}
section.active{display:block}

/* Live player */
.live-panel{background:var(--panel);border:1px solid var(--line);padding:28px;text-align:center}
#trackTitle{font-family:var(--head);font-size:3rem;color:var(--orange);margin:8px 0 18px}
.btn{display:inline-block;width:100%;max-width:420px;border:0;border-radius:6px;padding:16px 22px;background:linear-gradient(180deg,var(--orange),#992200);color:#fff;font-family:var(--head);font-size:1.35rem;letter-spacing:.06em;cursor:pointer}
.btn-ghost{max-width:160px;background:linear-gradient(180deg,#333,#111)}
.range{width:220px;accent-color:var(--orange)}
#viz{width:100%;max-width:760px;height:120px;display:block;margin:16px auto 0;background:linear-gradient(180deg,#0a0a0a,#000);border:1px solid var(--line)}
.player-ctrls{display:flex;gap:12px;align-items:center;justify-content:center;margin-top:14px}

/* Crew */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media (max-width:700px){.grid{grid-template-columns:1fr}}
.card{position:relative;border:1px solid var(--line);background:#111;overflow:hidden;cursor:pointer}
.card img{width:100%;height:300px;object-fit:cover;display:block;filter:grayscale(100%);transition:.35s}
.card:hover img{filter:grayscale(0%) brightness(1.1);transform:scale(1.04)}
.card .label{position:absolute;left:0;right:0;bottom:0;padding:18px;background:linear-gradient(0deg,#000,transparent);color:#fff;font-family:var(--head);font-size:2rem}

/* Modals */
.modal-bg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);z-index:20}
.modal{width:92%;max-width:640px;background:var(--panel);border:1px solid var(--line);padding:26px}
.modal h2{font-family:var(--head);margin:0 0 6px;color:var(--orange);font-size:2.4rem}
.modal .x{float:right;font-family:var(--head);font-size:2rem;cursor:pointer;color:var(--muted)}

/* Panels + Inputs */
.panel{background:var(--panel);border:1px solid var(--line);padding:20px}
.input,textarea,select{width:100%;padding:12px 14px;margin:8px 0 12px;background:var(--bg);border:1px solid var(--line);color:var(--fg);font:16px var(--ui)}
small.muted{color:var(--muted)}

/* THE WIZZ */
.wizz-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:900px){.wizz-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.wizz-grid{grid-template-columns:1fr}}
.wizz-card{background:var(--panel);border:1px solid var(--line);overflow:hidden;cursor:pointer;display:flex;flex-direction:column}
.wizz-card img{width:100%;height:160px;object-fit:cover}
.wizz-card .w{padding:12px 14px}
.wizz-card h3{font-family:var(--sub);font-size:1rem;margin:0 0 6px}
.wizz-card small{color:var(--muted)}
.news-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:30}
.news-sheet{width:92%;max-width:900px;max-height:85vh;overflow:auto;background:rgba(10,10,10,.86);border:1px solid var(--line);padding:22px}
.news-sheet h2{font-family:var(--head);color:#ff4d00;margin:0 0 10px}
.news-close{float:right;font-size:2rem;font-family:var(--head);cursor:pointer;color:#9aa}
.news-sheet img.hero{width:100%;height:260px;object-fit:cover;border:1px solid var(--line);margin:10px 0 14px}
.news-sheet .content{line-height:1.6}
.news-actions{display:flex;gap:10px;margin-top:12px}
.news-actions a{color:#fff;text-decoration:none;border:1px solid var(--line);padding:8px 12px;background:var(--nav)}

/* Theme toggle */
.theme-toggle{position:fixed;right:16px;bottom:16px;background:var(--panel);border:1px solid var(--line);padding:10px 14px;border-radius:6px;font-family:var(--head);cursor:pointer}
</style>
</head>

<body>
<header>
  top_banner.png
</header>

<div class="ticker"><span>AUTHORITY WIRE // CENTRAL SCOTLAND ROCK // SIGNAL ONLINE // STANDBY…</span></div>

<nav>
  <button class="active" onclick="showPage('live', this)">LIVE</button>
  <button onclick="showPage('crew', this)">CREW</button>
  <button onclick="showPage('wizz', this)">THE WIZZ</button>
  <button onclick="showPage('submit', this)">SUBMIT</button>
  <button onclick="showPage('advert', this)">ADVERTISE</button>
  <button onclick="showPage('contact', this)">CONTACT</button>
</nav>

<main>
  <!-- LIVE -->
  <section id="live" class="active">
    <div class="live-panel">
      <div id="trackTitle">SIGNAL STANDBY</div>
      <canvas id="viz" width="1024" height="150" aria-label="Audio waveform"></canvas>
      <div class="player-ctrls">
        <button id="playBtn" class="btn" onclick="toggleStream()">ENGAGE SIGNAL</button>
        <button id="muteBtn" class="btn btn-ghost" onclick="toggleMute()">MUTE</button>
        <input id="vol" class="range" type="range" min="0" max="1" step="0.01" value="0.9" oninput="setVolume(this.value)" aria-label="Volume">
      </div>
    </div>
  </section>

  <!-- CREW -->
  <section id="crew">
    <div id="crewGrid" class="grid"></div>
  </section>

  <!-- THE WIZZ -->
  <section id="wizz">
    <div class="panel">
      <h2 style="font-family:'Bebas Neue';margin:0 0 8px;color:#ff4d00">THE WIZZ — SCOTLAND ROCK NEWS</h2>
      <div id="wizzGrid" class="wizz-grid"></div>
    </div>
  </section>

  <!-- SUBMIT -->
  <section id="submit">
    <div class="panel">
      <h2 style="font-family:'Bebas Neue';margin:0 0 8px;color:#ff4d00">SUBMIT YOUR TRACK</h2>
      <input class="input" id="subBand" type="text" placeholder="Band Name">
      <input class="input" id="subLink" type="text" placeholder="Streaming Link">
      <textarea class="input" id="subPitch" rows="4" placeholder="Tell us about your track…"></textarea>
      <button class="btn" onclick="alert('Transmission received — thanks!')">TRANSMIT</button>
    </div>
  </section>

  <!-- ADVERTISE -->
  <section id="advert">
    <div class="panel">
      <h2 style="font-family:'Bebas Neue';margin:0 0 8px;color:#ff4d00">ADVERTISING CALCULATOR</h2>
      <select id="pkg" class="input">
        <option value="299">Regional (£299 / 28 days)</option>
        <option value="449">Multi‑Regional (£449 / 28 days)</option>
      </select>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <input id="start" class="input" type="date">
        <input id="end" class="input" type="date">
      </div>
      <label style="display:flex;align-items:center;gap:8px;margin:8px 0 12px">
        <input id="creative" type="checkbox"> <span>Add creative production (£195)</span>
      </label>
      <button class="btn" onclick="calc()">CALCULATE</button>
      <p id="calcOut" style="margin:10px 0 0;font-weight:700"></p>
      <small class="muted" id="calcNote"></small>
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact">
    <div class="panel">
      <h2 style="font-family:'Bebas Neue';margin:0 0 8px;color:#ff4d00">CONTACT THE STUDIO</h2>
      <input class="input" id="cName" type="text" placeholder="Your Name">
      <input class="input" id="cEmail" type="email" placeholder="you@example.com">
      <textarea class="input" id="cMsg" rows="5" placeholder="Message…"></textarea>
      <button class="btn" onclick="sendContact()">SEND</button>
      <p id="cResp" style="margin-top:10px"></p>
    </div>
  </section>
</main>

<!-- Bio modal -->
<div id="bioModal" class="modal-bg" onclick="closeBio()">
  <div class="modal" onclick="event.stopPropagation()">
    <span class="x" onclick="closeBio()">×</span>
    <h2 id="mName"></h2>
    <div id="mRole" style="font-family:var(--sub);color:var(--muted);margin-bottom:8px"></div>
    <p id="mBio" style="margin:8px 0 16px"></p>
    <p><strong>BAND:</strong> <span id="mBand"></span></p>
    <p><strong>VENUE:</strong> <span id="mVenue"></span></p>
    <p><strong>FACT:</strong> <span id="mFact"></span></p>
  </div>
</div>

<!-- THE WIZZ reader -->
<div id="newsModal" class="news-bg" onclick="closeNews()">
  <div class="news-sheet" onclick="event.stopPropagation()">
    <span class="news-close" onclick="closeNews()">×</span>
    <h2 id="newsTitle"></h2>
    <img class="hero" id="newsImg" src="" alt="">
    <div class="content" id="newsBody">Loading…</div>
    <div class="news-actions">
      <a id="newsOpen" target="_blank" rel="noopener">Open original</a>
      #Close</a>
    </div>
  </div>
</div>

<button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">🌙/☀</button>

<script>
/* ---------- Tabs ---------- */
function showPage(id, btn){
  document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  window.scrollTo(0,0);
}

/* ---------- Stream + Analyser ---------- */
const stream = new Audio("https://uksoutha.streaming.broadcast.radio/stream/16641/caledonia-tx-ltd");
stream.crossOrigin = "anonymous";
let ctx, analyser, dataArray;

function initAudioGraph(){
  if(ctx) return;
  try{
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    const source = ctx.createMediaElementSource(stream);
    analyser = ctx.createAnalyser();
    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    source.connect(analyser);
    analyser.connect(ctx.destination);
    renderViz();
  }catch(e){}
}
function renderViz(){
  requestAnimationFrame(renderViz);
  if(!analyser) return;
  const c = document.getElementById('viz'); if(!c) return;
  const g = c.getContext('2d');
  const W = c.width, H = c.height;
  analyser.getByteFrequencyData(dataArray);
  g.clearRect(0,0,W,H);
  const bars = 64, step = Math.floor(dataArray.length/bars), bw = (W/bars)-2;
  for(let i=0;i<bars;i++){
    const v = dataArray[i*step]/255;
    const h = v * (H-10);
    const x = i * (W/bars);
    g.fillStyle = `rgba(255,77,0,${0.35+v*0.65})`;
    g.fillRect(x, H-h, bw, h);
  }
}
function toggleStream(){
  const t=document.getElementById('trackTitle');
  const b=document.getElementById('playBtn');
  if(stream.paused){
    stream.play().catch(()=>{});
    initAudioGraph();
    t.textContent="LIVE: CENTRAL SCOTLAND’S ROCK";
    b.textContent="TERMINATE SIGNAL";
  }else{
    stream.pause();
    t.textContent="SIGNAL STANDBY";
    b.textContent="ENGAGE SIGNAL";
  }
}
function setVolume(v){ stream.volume = Number(v) }
function toggleMute(){
  stream.muted = !stream.muted;
  document.getElementById('muteBtn').textContent = stream.muted ? 'UNMUTE' : 'MUTE';
}

/* ---------- Crew ---------- */
const crew=[
  {id:"dj_andy",name:"Andy",role:"Rock Rebel",bio:"High‑energy playlists across Inverclyde and beyond.",band:"Biffy Clyro",venue:"King Tut’s",fact:"Crowd‑surfed in a kilt."},
  {id:"dj_alex",name:"Alex",role:"Vinyl Viking",bio:"Nazareth deep cuts and Renfrewshire shout‑outs.",band:"Nazareth",venue:"Barrowland Ballroom",fact:"Rare Deacon Blue pressing."},
  {id:"dj_stevie",name:"Stevie",role:"Headbanger",bio:"Late‑night AC/DC purist from Port Glasgow.",band:"Big Country",venue:"Beacon Arts Centre",fact:"High‑fived Angus Young."},
  {id:"dj_mhairi",name:"Mhairi",role:"Hard Rock Queen",bio:"Champions Scottish indie and heavy anthems.",band:"The Jesus and Mary Chain",venue:"Kilmarnock Grand Hall",fact:"Pro tattoo artist."},
  {id:"dj_jude",name:"Jude",role:"Indie Icon",bio:"Emerging Ayrshire acts + classic bangers.",band:"Travis",venue:"Harbour Arts Centre",fact:"Hitched to a Franz show."},
  {id:"dj_chris",name:"Chris",role:"Guitar Guru",bio:"Primal Scream devotee — Firth of Clyde.",band:"Primal Scream",venue:"Cathouse",fact:"Air‑guitars ‘In a Big Country’ perfectly."},
  {id:"dj_cal",name:"Cal",role:"Classic Rocker",bio:"Timeless rock voice from Kilmarnock.",band:"Biffy Clyro",venue:"Palace Theatre",fact:"Won a major air‑guitar contest."},
  {id:"dj_blue",name:"Blue",role:"Bluesy Maverick",bio:"Coastal grooves with bite.",band:"Nazareth",venue:"Coats Paisley",fact:"Mistaken for a Mogwai roadie."}
];

function renderCrew(){
  const el=document.getElementById('crewGrid'); if(!el) return;
  el.innerHTML=crew.map(d=>{
    const jpg = `${d.id}.jpg`;
    const png = `${d.id}.png`;
    return `
      <div class="card" onclick="openBio('${d.id}')">
        <img src="${jpg}" alt="${htmlEsc(d.name)}"
             onerror="
               if(!this.dataset.alt){
                 this.dataset.alt='1';
                 this.src='${png}';
               }else{
                 this.onerror=null; this.src='top_banner.png';
              
  document.getElementById('mBio').textContent=d.bio;
  document.getElementById('mBand').textContent=d.band;
  document.getElementById('mVenue').textContent=d.venue;
  document.getElementById('mFact').textContent=d.fact;
  document.getElementById('bioModal').style.display='flex';
}
function closeBio(){ document.getElementById('bioModal').style.display='none'; }

/* ---------- Advert calculator ---------- */
function calc(){
  const base=parseFloat(document.getElementById('pkg').value||"0");
  const s=new Date(document.getElementById('start').value);
  const e=new Date(document.getElementById('end').value);
  const creative=document.getElementById('creative').checked?195:0;
  if(!(s instanceof Date)||!(e instanceof Date)||isNaN(s)||isNaN(e)||e<=s){
    document.getElementById('calcOut').textContent='Select valid dates.'; document.getElementById('calcNote').textContent=''; return;
  }
  const days=Math.ceil((e-s)/(1000*60*60*24));
  let airtime=(base/28)*days, note='Standard package rate';
  if(days<28){ airtime*=1.3; note='30% short‑stay surcharge applied'; }
  const total=airtime+creative;
  document.getElementById('calcOut').textContent=`Total: £${total.toFixed(2)} (${days} days)`;
  document.getElementById('calcNote').textContent=note;
}

/* ---------- Contact ---------- */
function sendContact(){
  const n=document.getElementById('cName').value.trim();
  const e=document.getElementById('cEmail').value.trim();
  const m=document.getElementById('cMsg').value.trim();
  if(!n||!e||!m){document.getElementById('cResp').textContent='Please complete all fields.';return;}
  const subj=encodeURIComponent('Rock.Scot Contact — '+n);
  const body=encodeURIComponent(`From: ${n}\nEmail: ${e}\n\n${m}`);
  window.location.href=`mailto:studio@rock.scot?subject=${subj}&body=${body}`;
  document.getElementById('cResp').textContent='Opening your email app…';
}

/* ---------- Theme ---------- */
(function(){ try{const saved=localStorage.getItem('rock.theme'); if(saved==='light') document.body.classList.add('light');}catch(e){}})();
function toggleTheme(){
  document.body.classList.toggle('light');
  try{localStorage.setItem('rock.theme',document.body.classList.contains('light')?'light':'dark');}catch(e){}
}

/* ---------- THE WIZZ (Merged Scottish feeds) ---------- */
const WIZZ_FEEDS = [
  // Core feeds
  "https://www.scotsman.com/arts-and-culture/music/rss",
  "https://www.glasgowlive.co.uk/whats-on/music-nightlife-news/?service=rss",
  "https://feeds.bbci.co.uk/news/scotland/rss.xml",
  "https://www.nme.com/feed",

  // Dedicated Scottish
  "https://www.isthismusic.com/feed",
  "https://news.google.com/rss/search?q=site:scottishmusicnetwork.co.uk&hl=en-GB&gl=GB&ceid=GB:en",
  "https://news.google.com/rss/search?q=site:jockrock.org&hl=en-GB&gl=GB&ceid=GB:en",
  "https://news.google.com/rss/search?q=site:theskinny.co.uk+music&hl=en-GB&gl=GB&ceid=GB:en",
  "https://news.google.com/rss/search?q=site:scotlandrocksradio.com&hl=en-GB&gl=GB&ceid=GB:en",

  // Newspapers’ music
  "https://www.thenational.scot/culture/music/rss/",
  "https://news.google.com/rss/search?q=site:thenational.scot+music&hl=en-GB&gl=GB&ceid=GB:en",
  "https://news.google.com/rss/search?q=site:glasgowtimes.co.uk+music&hl=en-GB&gl=GB&ceid=GB:en",
  "https://news.google.com/rss/search?q=site:pressandjournal.co.uk+music&hl=en-GB&gl=GB&ceid=GB:en",

  // Community
  "https://www.reddit.com/r/scottishmusic/.rss"
];

// show only 6 news items at any one time
const WIZZ_MAX_ITEMS = 6;
const WIZZ_KEYWORDS = /(rock|music|gig|gigs|venue|venues|Barrowland|Tut'?s|Hydro|SWG3|King Tut)/i;

const WIZZ_HARDCODED = [{
  title:"Scotland’s live rock scene — latest highlights",
  link:"https://news.google.com/search?q=Scotland%20rock%20music",
  pubDate: new Date().toUTCString(),
  img:"top_banner.png",
  source:"Rock.Scot Wire"
}];

async function loadWizz(){
  const grid = document.getElementById("wizzGrid");
  if (!grid) return;

  const cacheKey = "wizz.cache.v1";
  const cached = safeJSON(localStorage.getItem(cacheKey)) || [];
  if (cached.length) renderWizz(cached);

  try{
    const results = await Promise.allSettled(WIZZ_FEEDS.map(f => fetchFeedRobust(f)));
    const items = results
      .filter(r => r.status === "fulfilled" && Array.isArray(r.value))
      .flatMap(r => r.value);

    let finalList = items.length ? items : (cached.length ? cached : WIZZ_HARDCODED);
    finalList = dedupe(sortByDate(
      finalList.filter(x => WIZZ_KEYWORDS.test([x.title,x.summary,x.source].join(" ")))
    )).slice(0, WIZZ_MAX_ITEMS);

    if (!finalList.length) {
      const fallback = dedupe(sortByDate(items)).slice(0, WIZZ_MAX_ITEMS);
      finalList = fallback.length ? fallback : (cached.length ? cached : WIZZ_HARDCODED);
    }

    renderWizz(finalList);
    try { localStorage.setItem(cacheKey, JSON.stringify(finalList)); } catch(e){}
  } catch(e){
    if (!cached.length) renderWizz(WIZZ_HARDCODED);
  }
}

function sortByDate(arr){ return arr.sort((a,b)=> new Date(b.pubDate||0) - new Date(a.pubDate||0)); }
function dedupe(arr){
  const seen = new Set();
  return arr.filter(x => {
    const k = (x.link||x.title||"").trim().toLowerCase();
    if (seen.has(k)) return false; seen.add(k); return true;
  });
}
function safeJSON(s){ try{return JSON.parse(s);}catch(_){return null;} }

async function fetchFeedRobust(feedUrl){
  try{
    const r = await fetch("https://api.allorigins.win/get?url="+encodeURIComponent(feedUrl));
    if (r.ok){
      const {contents} = await r.json();
      const items = parseRSSXML(contents, feedUrl);
      if (items.length) return items;
    }
  }catch(_){}
  try{
    const r = await fetch("https://api.rss2json.com/v1/api.json?rss_url="+encodeURIComponent(feedUrl));
    if (r.ok){
      const j = await r.json();
      if (Array.isArray(j.items)) {
        return j.items.map(x => ({
          title: x.title || "",
          link: x.link || x.guid || "",
          pubDate: x.pubDate || x.pubdate || x.date || new Date().toUTCString(),
          img: (x.enclosure && x.enclosure.link) || x.thumbnail || pickFromDesc(x.description) || "top_banner.png",
          summary: stripHTML(x.description || x.content || ""),
          source: (j.feed && j.feed.title) || x.author || ""
        }));
      }
    }
  }catch(_){}
  return [];
}

function parseRSSXML(xmlString, feedUrl){
  const out = [];
  const parser = new DOMParser();
  const xml = parser.parseFromString(xmlString, "text/xml");
  const items = xml.querySelectorAll("item, entry");
  const feedTitle = (xml.querySelector("channel>title, feed>title")?.textContent || "").trim();

  items.forEach(it=>{
    const title = text(it, "title");
    let link = text(it, "link");
    const linkEl = it.querySelector("link");
    if(!link && linkEl){ link = linkEl.getAttribute("href") || ""; }
    const pubDate = text(it, "pubDate") || text(it, "updated") || text(it, "published") || new Date().toUTCString();
    const desc = text(it, "description") || text(it, "summary") || "";
    const enclosure = it.querySelector("enclosure")?.getAttribute("url") || it.querySelector("media\\:content, content")?.getAttribute("url") || "";
    out.push({
      title,
      link,
      pubDate,
      img: enclosure || pickFromDesc(desc) || "top_banner.png",
      summary: stripHTML(desc),
      source: feedTitle || safeHost(feedUrl)
    });
  });
  return out;
}

function text(root, sel){ const x=root.querySelector(sel); return (x && x.textContent || "").trim(); }
function stripHTML(s){ const d=document.createElement("div"); d.innerHTML=s; return d.textContent||d.innerText||""; }
function pickFromDesc(html){
  const d=document.createElement("div"); d.innerHTML=html||"";
  const img = d.querySelector("img");
  return img ? img.src : "";
}
function safeHost(u){ try{return new URL(u).hostname;}catch(_){return "";} }

function renderWizz(list){
  const grid = document.getElementById("wizzGrid"); if(!grid) return;
  grid.innerHTML = list.map(s => cardHTML(s)).join("");
  Array.from(grid.querySelectorAll(".wizz-card")).forEach(card=>{
    card.addEventListener("click", ()=>{
      const link = card.getAttribute("data-link");
      const title= card.getAttribute("data-title");
      const img  = card.getAttribute("data-img");
      openNews(encodeURIComponent(link), encodeURIComponent(title), encodeURIComponent(img));
    });
  });
}
function cardHTML(s){
  const img = s.img || "top_banner.png";
  const when = new Date(s.pubDate||Date.now()).toLocaleString();
  return `
    <div class="wizz-card" data-link="${htmlEsc(s.link)}" data-title="${htmlEsc(s.title)}" data-img="${htmlEsc(img)}">
      ${htmlEsc(img)}
      <div class="w">
        <h3>${htmlEsc(s.title)}</h3>
        <small>${htmlEsc(s.source||"")}${s.source?" • ":""}${when}</small>
      </div>
    </div>`;
}
function htmlEsc(s){return String(s||"").replace(/[&<>"']/g,c=>({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;" }[c]))}

async function openNews(encUrl, encTitle, encImg){
  const url = decodeURIComponent(encUrl);
  const title = decodeURIComponent(encTitle);
  const img = decodeURIComponent(encImg);
  document.getElementById('newsTitle').textContent = title;
  const hero = document.getElementById('newsImg');
  if(img){ hero.src=img; hero.style.display='block'; } else { hero.style.display='none'; }
  document.getElementById('newsBody').textContent = "Loading…";
  document.getElementById('newsOpen').href = url;
  document.getElementById('newsModal').style.display = 'flex';
  try{
    const r = await fetch('https://r.jina.ai/http/'+url);
    const text = await r.text();
    document.getElementById('newsBody').textContent = text.slice(0, 30000);
  }catch(e){
    document.getElementById('newsBody').innerHTML = 'Unable to load here. <a href="'+url+'" target="_blank" rel="noopener">Open original</a>.';
  }
}
function closeNews(){ document.getElementById('newsModal').style.display='none'; }

window.addEventListener('load', () => {
  renderCrew();
  loadWizz();
});
