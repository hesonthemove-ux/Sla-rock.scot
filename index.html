<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rock.Scot | Lead Authority</title>
    <link rel="stylesheet" href="style.css?v=1769106644">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="stage"></div>
    <div class="viewport">
        <header><img src="assets/branding/logo.png" alt="Rock.Scot"></header>
        <nav>
            <button onclick="tab('live')">On Air</button>
            <button onclick="tab('news')">The Wire</button>
            <button onclick="tab('rates')">Advertise</button>
        </nav>
        <main>
            <section id="live" class="section active">
                <div class="card">
                    <div id="clock">00:00:00</div>
                    <p style="letter-spacing:2px; color:#aaa;">CENTRAL SCOTLAND</p>
                    <div style="background:var(--accent); margin-top:20px; padding:15px; border-radius:8px; font-weight:bold;">LISTEN LIVE</div>
                </div>
            </section>
            
            <section id="rates" class="section">
                <h2>Advertising Authority</h2>
                <div class="card">
                    <div class="rate-box"><h3>The Authority</h3><p>Show Sponsor - £500 / Month</p></div>
                    <form id="leadForm" style="margin-top:20px; display:flex; flex-direction:column; gap:10px;">
                        <input type="text" id="bizName" placeholder="Business Name" required style="padding:12px; border-radius:8px; border:none; background:#222; color:#fff;">
                        <input type="email" id="bizEmail" placeholder="Email Address" required style="padding:12px; border-radius:8px; border:none; background:#222; color:#fff;">
                        <button type="submit" style="background:var(--accent); color:#fff; padding:15px; border:none; border-radius:8px; font-weight:bold;">REQUEST MEDIA PACK</button>
                    </form>
                    <div id="status" style="margin-top:10px; font-size:12px;"></div>
                </div>
            </section>
        </main>
        <footer><p>Build v10.27_1769106644 | Johnstone, Scotland</p></footer>
    </div>
    <script>
        function tab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function updateClock() {
            document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0];
            requestAnimationFrame(updateClock);
        }
        updateClock();

        // Supabase Integration (Placeholder credentials - replace with your keys in Supabase dashboard)
        const supabaseUrl = 'YOUR_SUPABASE_URL';
        const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('leadForm').onsubmit = async (e) => {
            e.preventDefault();
            const status = document.getElementById('status');
            status.innerText = "Sending...";
            
            const { error } = await _supabase.from('leads').insert([
                { name: document.getElementById('bizName').value, email: document.getElementById('bizEmail').value }
            ]);

            if (error) status.innerText = "Error. Please try again.";
            else {
                status.innerText = "Lead Secured. We will call you.";
                document.getElementById('leadForm').reset();
            }
        };
    </script>
</body>
</html>
