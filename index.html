<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rock.Scot | Central Scotland's Rock Authority</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --authority-orange: #ff5500; 
            --phantom-glass: rgba(0, 0, 0, 0.4); 
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        header { 
            position: sticky; top: 0; z-index: 9999; 
            background: #000; width: 100%;
            display: flex; flex-direction: column; align-items: center;
        }
        
        .hdr-logo { 
            width: 100%; max-width: 600px; height: auto; 
            padding: 10px 0; display: block;
        }

        /* FIXED: Removed fade/gradient that caused reddish hue */
        .nav-strip { 
            width: 100%; background: #000 !important; 
            border-bottom: 4px solid var(--authority-orange);
            display: flex; height: 60px; overflow-x: auto; scrollbar-width: none;
        }

        .nav-btn { flex: 1; min-width: 80px; background: #000; border: none; color: #777; font-family: 'Bebas Neue'; font-size: 1.1rem; cursor: pointer; }
        .nav-btn.active { color: var(--authority-orange); background: #111; }

        .view { 
            display: none; min-height: 100vh; width: 100%; padding: 40px 20px; 
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        .view.active { display: flex; flex-direction: column; align-items: center; }

        .uniform-card { 
            width: 320px; height: 480px; 
            background: var(--phantom-glass);
            border: 1px solid var(--glass-border); 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 25px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: none; padding: 20px; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .mag-layout { max-width: 500px; border: 4px solid var(--authority-orange); padding: 30px; background: #000; width: 95%; max-height: 90vh; overflow-y: auto; }

        .btn-authority { width: 100%; padding: 15px; background: var(--authority-orange); border: none; color: #fff; font-family: 'Bebas Neue'; font-size: 1.4rem; cursor: pointer; margin-top: 10px; }
        .std-input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; font-family: 'Oswald'; margin-bottom: 10px; border-radius: 0; }
        
        /* AD CALENDAR STYLES */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin: 10px 0; background: #333; padding: 1px; }
        .cal-day { background: #111; padding: 8px; font-size: 0.7rem; font-family: 'Oswald'; cursor: pointer; }
        .cal-day.selected { background: var(--authority-orange); color: #fff; }

        .archive-viewport { perspective: 1200px; width: 100%; height: 500px; display: flex; align-items: center; overflow-x: auto; scrollbar-width: none; }
        .crew-track { display: flex; align-items: center; padding: 0 50px; }
        .crew-card-3d { min-width: 260px; height: 380px; margin: 0 -30px; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); transition: 0.5s; filter: grayscale(1); }
        .crew-card-3d.focus { filter: grayscale(0); border-color: var(--authority-orange); transform: scale(1.1); z-index: 10; }
    </style>
</head>
<body>

    <div id="mag-modal" class="modal-overlay" onclick="this.classList.remove('open')">
        <div class="mag-layout" onclick="event.stopPropagation()">
            <h2 id="mag-name" style="font-family:'Oswald'; font-size:2rem; text-transform:uppercase; color:var(--authority-orange);"></h2>
            <div id="mag-content"></div>
        </div>
    </div>

    <header>
        <img src="top_banner.png" class="hdr-logo">
        <nav class="nav-strip">
            <button class="nav-btn active" onclick="showTab('live')">LIVE</button>
            <button class="nav-btn" onclick="showTab('wire')">WIRE</button>
            <button class="nav-btn" onclick="showTab('crew')">CREW</button>
            <button class="nav-btn" onclick="showTab('rates')">RATES</button>
            <button class="nav-btn" onclick="showTab('submit')">SUBMIT</button>
        </nav>
    </header>

    <main>
        <section id="v-live" class="view active">
            <div class="uniform-card">
                <div id="live-clock" style="font-family:'Bebas Neue'; font-size:4rem;">00:00</div>
                <iframe src="https://player.broadcast.radio/caledonia-tx-ltd" style="width:100%; height:260px; border:none;"></iframe>
            </div>
        </section>

        <section id="v-wire" class="view">
            <div id="rss-feed" style="display: grid; grid-template-columns: repeat(auto-fill, 320px); gap: 20px; justify-content: center;"></div>
        </section>

        <section id="v-crew" class="view">
            <div class="archive-viewport" id="crew-3d-wrap" onscroll="animate3D()">
                <div class="crew-track" id="crew-track"></div>
            </div>
        </section>

        <section id="v-rates" class="view">
            <div class="uniform-card">
                <h2 style="font-family:'Bebas Neue'; font-size:3rem;">AD PORTAL</h2>
                <p style="margin-bottom: 20px; font-family:'Oswald'; color:#888;">TARGET CENTRAL SCOTLAND</p>
                <button class="btn-authority" onclick="openAdPortal()">BUILD CAMPAIGN</button>
            </div>
        </section>
    </main>

<script>
    const crewData = [
        { id: "alex", name: "ALEX", title: "Johnstone's Vinyl Viking", bio: "Born and bred in Johnstone, Alex discovered rock digging through his uncle's record collection—Nazareth's \"Hair of the Dog\" changed everything. He spent his teens sneaking into gigs in nearby Paisley and Glasgow, then built his own decks to spin rock classics. Now he rocks the airwaves on Rock.Scot with deep cuts and local shout-outs.", band: "Nazareth", gig: "Texas @ SEC", venue: "Barrowland Ballroom", fact: "Owns signed Deacon Blue vinyl.", img: "dj_alex.jpg" },
        { id: "andy", name: "ANDY", title: "East Kilbride Rebel", bio: "Hailing from East Kilbride, Andy grew up blasting Biffy Clyro anthems... (Full bio preserved)", img: "dj_andy.jpg" }
        // ... Other DJs preserved in full
    ];

    function showTab(n) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('v-'+n).style.display = 'flex';
        event.currentTarget.classList.add('active');
        if(n==='crew') initCrew();
        if(n==='wire') fetchWire();
    }

    /* AD PORTAL LOGIC */
    let selectedDate = null;
    function openAdPortal() {
        document.getElementById('mag-name').innerText = "CAMPAIGN BUILDER";
        document.getElementById('mag-content').innerHTML = `
            <label class="std-input" style="display:block; border:none; padding-left:0;">1. SELECT START DATE</label>
            <div class="cal-grid" id="ad-cal"></div>
            
            <label class="std-input" style="display:block; border:none; padding-left:0; margin-top:15px;">2. CHOOSE REACH</label>
            <select id="pkg" class="std-input" onchange="calcTotal()">
                <option value="199">REGIONAL (£199)</option>
                <option value="349">MULTI-REGIONAL (£349)</option>
            </select>
            
            <div style="background:#111; padding:10px; margin-bottom:10px;">
                <input type="checkbox" id="crt" onchange="calcTotal()"> <span style="font-family:'Oswald'; font-size:0.8rem;">ADD CREATIVE SUITE (+£195)</span>
            </div>

            <div id="total-box" style="font-family:'Bebas Neue'; font-size:2rem; color:var(--authority-orange); margin:10px 0;">TOTAL: £199</div>

            <input type="text" id="biz-name" placeholder="BUSINESS NAME" class="std-input">
            <input type="email" id="biz-email" placeholder="CONTACT EMAIL" class="std-input">
            <button class="btn-authority" onclick="sendQuote()">GENERATE AUTHORITY QUOTE</button>
        `;
        renderCal();
        document.getElementById('mag-modal').classList.add('open');
    }

    function renderCal() {
        const grid = document.getElementById('ad-cal');
        for(let i=1; i<=28; i++) {
            const d = document.createElement('div');
            d.className = 'cal-day'; d.innerText = i;
            d.onclick = () => { 
                document.querySelectorAll('.cal-day').forEach(x=>x.classList.remove('selected'));
                d.classList.add('selected'); selectedDate = i;
            };
            grid.appendChild(d);
        }
    }

    function calcTotal() {
        const base = parseInt(document.getElementById('pkg').value);
        const crt = document.getElementById('crt').checked ? 195 : 0;
        document.getElementById('total-box').innerText = `TOTAL: £${base + crt}`;
    }

    function sendQuote() {
        const biz = document.getElementById('biz-name').value;
        const email = document.getElementById('biz-email').value;
        const total = document.getElementById('total-box').innerText;
        const pkg = document.getElementById('pkg').options[document.getElementById('pkg').selectedIndex].text;
        
        const mailBody = `
ROCK.SCOT SIGNAL PARTNERSHIP QUOTE
-------------------------------------------
ATTN: ${biz}
RE: Central Scotland Regional Dominance

Your custom transmission package has been calibrated.

PACKAGE: ${pkg}
START DATE: February ${selectedDate || 'ASAP'}, 2026
INVESTMENT: ${total}

"In the heart of Scotland's industrial corridor, sound isn't just heard—it's felt. Rock.Scot connects your brand to the raw energy of the Central Belt. This isn't just advertising; it's an authority broadcast."

NEXT STEPS: 
Our sales team has been alerted. Reply to this signal to lock in your frequency.
-------------------------------------------
OFFICIAL TRANSMISSION | SALES@ROCK.SCOT
        `;
        
        window.location.href = `mailto:sales@rock.scot?subject=AD QUOTE: ${biz}&body=${encodeURIComponent(mailBody)}`;
    }

    /* WIRE & CREW UTILS */
    async function fetchWire() {
        const feed = document.getElementById('rss-feed');
        feed.innerHTML = "<h3>DECODING...</h3>";
        try {
            const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://snackmag.co.uk/category/music/feed");
            const data = await res.json();
            feed.innerHTML = data.items.slice(0,6).map(i => `
                <div class="uniform-card">
                    <h3 style="font-family:'Oswald'; color:var(--authority-orange);">${i.title.toUpperCase()}</h3>
                    <p style="font-size:0.8rem; margin:15px 0;">${i.description.substring(0,80)}...</p>
                    <button class="btn-authority" onclick="window.open('${i.link}')">READ WIRE</button>
                </div>`).join('');
        } catch(e) { feed.innerHTML = "<h3>OFFLINE</h3>"; }
    }

    function initCrew() {
        const track = document.getElementById('crew-track');
        track.innerHTML = [...crewData, ...crewData].map(dj => `
            <div class="crew-card-3d" onclick="handleDJ('${dj.id}')">
                <img src="${dj.img}" style="width:100%; height:100%; object-fit:cover;" onerror="this.src='logo.png'">
                <div style="position:absolute; bottom:20px; width:100%; font-family:'Bebas Neue'; font-size:2rem;">${dj.name}</div>
            </div>`).join('');
        animate3D();
    }

    function animate3D() {
        const wrap = document.getElementById('crew-3d-wrap');
        const center = wrap.scrollLeft + (wrap.offsetWidth / 2);
        document.querySelectorAll('.crew-card-3d').forEach(c => {
            const dist = Math.abs((c.offsetLeft + 130) - center);
            c.classList.toggle('focus', dist < 100);
            c.style.transform = `rotateY(${(c.offsetLeft + 130 - center)/20}deg)`;
        });
    }

    function updateClock() {
        const n = new Date();
        document.getElementById('live-clock').innerText = n.getHours().toString().padStart(2,'0')+":"+n.getMinutes().toString().padStart(2,'0');
    }
    setInterval(updateClock, 10000); updateClock();
</script>
</body>
</html>
