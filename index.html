<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rock.Scot | Central Scotland's Rock Authority</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --authority-orange: #ff5500; --ultra-glass: rgba(0, 0, 0, 0.25); }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* HEADER - MOVED DOWN 4 ROWS */
        header { position: sticky; top: 0; z-index: 1000; display: flex; flex-direction: column; align-items: center; }
        .hdr-logo { 
            width: 90%; max-width: 520px; height: auto; 
            margin-bottom: -120px; z-index: 1020; position: relative;
            filter: drop-shadow(0 20px 20px rgba(0,0,0,0.9));
        }
        .nav-strip { 
            width: 100%; background: rgba(0,0,0,0.98); backdrop-filter: blur(20px);
            border-bottom: 4px solid var(--authority-orange);
            display: flex; height: 160px; padding-top: 100px; /* Fully cleared for 4 rows */
            z-index: 1010; position: relative;
        }
        .nav-btn { flex: 1; background: transparent; border: none; color: #666; font-family: 'Bebas Neue'; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: var(--authority-orange); background: rgba(255,85,0,0.1); }

        /* TICKER TAPE */
        .ticker-wrap { width: 100%; background: #fff; color: #000; overflow: hidden; white-space: nowrap; padding: 12px 0; font-family: 'Oswald'; font-weight: 900; border-bottom: 3px solid var(--authority-orange); }
        .ticker-move { display: inline-block; animation: ticker 50s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* VIEWS */
        .view { display: none; min-height: 100vh; width: 100%; padding: 160px 20px 60px 20px; background-size: cover; background-position: center; background-attachment: fixed; }
        .view.active { display: flex; flex-direction: column; align-items: center; }
        .glass-panel { background: var(--ultra-glass); backdrop-filter: blur(50px); padding: 40px; width: 95%; max-width: 700px; border: 1px solid rgba(255,255,255,0.1); }

        /* CREW */
        .crew-container { display: flex; gap: 20px; overflow-x: auto; width: 100%; padding: 40px 20px; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .crew-card { min-width: 300px; height: 460px; background: #0f0f0f; border: 1px solid #333; scroll-snap-align: center; position: relative; cursor: pointer; filter: grayscale(100%); transition: 0.5s; }
        .crew-card.active-color { filter: grayscale(0%); border: 3px solid var(--authority-orange); transform: scale(1.05); }
        .crew-img { width: 100%; height: 100%; object-fit: cover; }
        .crew-label { position: absolute; bottom: 0; width: 100%; background: linear-gradient(0deg, #000 0%, transparent 100%); padding: 25px; font-family: 'Bebas Neue'; font-size: 2.2rem; text-align: center; }

        /* MODAL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.99); z-index: 5000; display: none; overflow-y: auto; padding: 20px; }
        .modal-overlay.open { display: flex; align-items: center; justify-content: center; }
        .mag-layout { max-width: 800px; border: 12px solid #fff; padding: 50px; background: #000; position: relative; width: 100%; }
        .btn-authority { width: 100%; padding: 25px; background: var(--authority-orange); border: none; color: #fff; font-family: 'Bebas Neue'; font-size: 2rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="mag-modal" class="modal-overlay" onclick="this.classList.remove('open')">
        <div class="mag-layout" onclick="event.stopPropagation()">
            <div style="font-family:'Bebas Neue'; color:var(--authority-orange); font-size:1.5rem;">THE AUTHORITY DOSSIER</div>
            <h2 id="mag-name" style="font-family:'Oswald'; font-size:5rem; line-height:0.85; margin:20px 0; text-transform:uppercase;"></h2>
            <div id="mag-text" style="font-size:1.2rem; line-height:1.7; color:#eee; border-top:1px solid #333; padding-top:20px;"></div>
            <div id="mag-stats" style="margin-top:30px; display:grid; grid-template-columns: 1fr 1fr; gap:10px; font-family:'Oswald'; color:var(--authority-orange);"></div>
        </div>
    </div>

    <header>
        <img src="top_banner.png" class="hdr-logo" alt="Rock.Scot">
        <nav class="nav-strip">
            <button class="nav-btn active" onclick="showTab('live')">LIVE</button>
            <button class="nav-btn" onclick="showTab('wire')">WIRE</button>
            <button class="nav-btn" onclick="showTab('crew')">CREW</button>
            <button class="nav-btn" onclick="showTab('rates')">RATES</button>
            <button class="nav-btn" onclick="showTab('submit')">SUBMIT</button>
        </nav>
    </header>

    <main>
        <section id="v-live" class="view active">
            <div class="glass-panel" style="text-align:center;">
                <div id="live-clock" style="font-family:'Bebas Neue'; font-size:6.5rem; line-height:0.9;">00:00</div>
                <div id="clock-tag" style="font-family:'Oswald'; color:var(--authority-orange); letter-spacing:5px; margin-bottom:10px;">ROCKIN' SCOTLAND</div>
                <div id="power-statement" style="font-family:'Oswald'; font-size:1rem; color:#666; height:40px; margin-bottom:30px; text-transform:uppercase;">CENTRAL SCOTLAND AUTHORITY</div>
                <button class="btn-authority" onclick="toggleAudio()" id="play-btn">ENGAGE SIGNAL</button>
            </div>
        </section>

        <section id="v-wire" class="view">
            <div class="ticker-wrap"><div class="ticker-move" id="album-ticker">LOADING ROCK INTEL...</div></div>
            <div id="rss-feed" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:25px; width:100%; max-width:1200px; padding-top:40px;"></div>
        </section>

        <section id="v-crew" class="view">
            <div class="crew-container" id="crew-rolodex"></div>
        </section>

        <section id="v-rates" class="view">
            <div class="glass-panel">
                <h2 style="font-family:'Bebas Neue'; font-size:4rem; color:var(--authority-orange);">ADVERTISING</h2>
                <div id="total-price" style="font-family:'Bebas Neue'; font-size:5rem; text-align:center;">£299.00</div>
                <button class="btn-authority">BOOK TRANSMISSION</button>
            </div>
        </section>

        <section id="v-submit" class="view">
            <div class="glass-panel">
                <h2 style="font-family:'Bebas Neue'; font-size:4rem; color:var(--authority-orange);">TRANSMIT TRACK</h2>
                <input type="text" placeholder="BAND" class="std-input">
                <textarea placeholder="PITCH THE SIGNAL..." class="std-input" style="height:150px;"></textarea>
                <button class="btn-authority">SUBMIT TO AUTHORITY</button>
            </div>
        </section>
    </main>

<script>
    const stream = new Audio("https://uksoutha.streaming.broadcast.radio/stream/16641/caledonia-tx-ltd");
    
    // AUTHENTIC CREW ROSTER (8 DJs)
    const crewData = [
        { id: "andy", name: "ANDY", role: "Rock Rebel", bio: "Hailing from East Kilbride, Andy grew up blasting Biffy Clyro anthems. He brings high-energy playlists across Lanarkshire and Ayrshire.", band: "Biffy Clyro", gig: "Franz Ferdinand @ Barrowlands", venue: "King Tut's", fact: "Lost a shoe crowd-surfing in Hamilton.", img: "dj_andy.jpg", clicks: 0 },
        { id: "alex", name: "ALEX", role: "Vinyl Viking", bio: "Johnstone's spirit. Alex discovered rock via Nazareth and built his own decks to spin rock classics across the airwaves.", band: "Nazareth", gig: "Texas @ SEC Armadillo", venue: "Barrowland Ballroom", fact: "Has a signed Deacon Blue vinyl.", img: "dj_alex.jpg", clicks: 0 },
        { id: "stevie", name: "STEVIE", role: "Headbanger", bio: "From Port Glasgow's shipbuilding heart. Stevie keeps Inverclyde headbanging from Greenock to Gourock.", band: "Big Country", gig: "Mogwai @ Òran Mór", venue: "Beacon Arts Centre", fact: "High-fived Angus Young (allegedly).", img: "dj_stevie.jpg", clicks: 0 },
        { id: "mhairi", name: "MHAIRI", role: "Hard Rock Queen", bio: "Hamilton born and bred. Instantly obsessed with distortion pedals and killer playlists for South Lanarkshire.", band: "Jesus and Mary Chain", gig: "Teenage Fanclub @ King Tut's", venue: "Grand Hall Kilmarnock", fact: "Moonlights as a tattoo artist.", img: "dj_mhairi.jpg", clicks: 0 },
        { id: "jude", name: "JUDE", role: "Indie Icon", bio: "North Ayrshire's own. Jude climbed the ranks from local open mics to championing emerging Scottish acts.", band: "Travis", gig: "Idlewild @ Barrowlands", venue: "Harbour Arts Irvine", fact: "Hitchhiked to a Franz Ferdinand gig.", img: "dj_jude.jpg", clicks: 0 },
        { id: "chris", name: "CHRIS", role: "Guitar Guru", bio: "Greenock bred on Primal Scream. Chris joined Rock.Scot to blast the Firth of Clyde with pure rock energy.", band: "Primal Scream", gig: "Simple Minds @ OVO Hydro", venue: "Cathouse Rock Club", fact: "Owns every Big Country album.", img: "dj_chris.jpg", clicks: 0 },
        { id: "cal", name: "CAL", role: "Classic Rocker", bio: "Kilmarnock heartlands specialist. Delivers timeless rock to fans across Irvine and North Ayrshire.", band: "Biffy Clyro", gig: "The Fratellis @ Grand Hall", venue: "Palace Theatre Killie", fact: "Won an air guitar contest.", img: "dj_cal.jpg", clicks: 0 },
        { id: "blue", name: "BLUE", role: "Bluesy Maverick", bio: "Gourock seaside charm. Blue blends bluesy riffs with rock energy for listeners from Gourock to Wemyss Bay.", band: "Nazareth", gig: "Texas @ Paisley Arts", venue: "Coats Paisley", fact: "Blue hair is his trademark.", img: "dj_blue.jpg", clicks: 0 }
    ];

    const powerStatements = ["SCOTLAND'S ROCK AUTHORITY", "CENTRAL SCOTLAND'S LOUDEST SIGNAL", "24/7 INDUSTRIAL ROCK INTELLIGENCE", "UNFILTERED SCOTTISH ROCK"];

    function showTab(name) {
        document.querySelectorAll('.view').forEach(v => { v.classList.remove('active'); v.style.display = 'none'; });
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        const activeView = document.getElementById('v-' + name);
        activeView.style.display = 'flex';
        activeView.classList.add('active');
        activeView.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('news${Math.floor(Math.random()*7)+1}.jpg')`;
        event.currentTarget.classList.add('active');
        if(name === 'wire') fetchRSS();
        if(name === 'crew') renderCrew();
    }

    async function fetchRSS() {
        const container = document.getElementById('rss-feed');
        container.innerHTML = "<p style='grid-column:1/-1; text-align:center;'>CONNECTING TO THE WIRE...</p>";
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.theskinny.co.uk/rss/music&t=${Date.now()}`);
            const data = await res.json();
            container.innerHTML = data.items.map(item => {
                const img = item.enclosure.link || (item.description.match(/src="([^"]+)"/) ? item.description.match(/src="([^"]+)"/)[1] : null);
                return `
                    <div style="background:rgba(0,0,0,0.9); border:1px solid #333; cursor:pointer;" onclick="window.open('${item.link}')">
                        ${img ? `<img src="${img}" style="width:100%; height:200px; object-fit:cover;">` : `<div style="height:200px; background:#111; display:flex; align-items:center; justify-content:center;">SIGNAL RECOVERED</div>`}
                        <div style="padding:20px;">
                            <h3 style="font-family:'Oswald'; font-size:1.1rem; line-height:1.2;">${item.title}</h3>
                            <span style="color:var(--authority-orange); font-family:'Bebas Neue'; font-size:0.9rem;">SOURCE: THE SKINNY</span>
                        </div>
                    </div>`;
            }).join('');
        } catch(e) { container.innerHTML = "<p style='grid-column:1/-1; text-align:center;'>INTERFERENCE DETECTED. RETRYING...</p>"; }
    }

    function renderCrew() {
        const container = document.getElementById('crew-rolodex');
        container.innerHTML = crewData.map(dj => `
            <div class="crew-card" id="card-${dj.id}" onclick="handleCrewClick('${dj.id}')">
                <img src="${dj.img}" class="crew-img" onerror="this.src='news1.jpg'">
                <div class="crew-label">${dj.name}</div>
            </div>`).join('');
    }

    function handleCrewClick(id) {
        const dj = crewData.find(d => d.id === id);
        dj.clicks++;
        const card = document.getElementById('card-' + id);
        if(dj.clicks === 1) {
            document.querySelectorAll('.crew-card').forEach(c => c.classList.remove('active-color'));
            card.classList.add('active-color');
            setTimeout(() => { if(dj.clicks === 1) dj.clicks = 0; }, 3000);
        } else if(dj.clicks === 2) {
            document.getElementById('mag-name').innerText = dj.name;
            document.getElementById('mag-text').innerText = dj.bio;
            document.getElementById('mag-stats').innerHTML = `
                <div>BAND: ${dj.band}</div><div>GIG: ${dj.gig}</div>
                <div>VENUE: ${dj.venue}</div><div>FACT: ${dj.fact}</div>`;
            document.getElementById('mag-modal').classList.add('open');
            dj.clicks = 0;
            card.classList.remove('active-color');
        }
    }

    function updateLiveUI() {
        const now = new Date();
        const hrs = now.getHours();
        document.getElementById('live-clock').innerText = hrs.toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        let tag = "ROCKIN' SCOTLAND";
        if(hrs >= 6 && hrs < 12) tag = "MORNING ROCKIN'";
        else if(hrs >= 12 && hrs < 18) tag = "AFTERNOON ROCKIN'";
        else if(hrs >= 18 && hrs < 24) tag = "EVENING ROCKIN'";
        else tag = "LATE NIGHT ROCKIN'";
        document.getElementById('clock-tag').innerText = tag;
        document.getElementById('power-statement').innerText = powerStatements[Math.floor(Math.random() * powerStatements.length)];
    }

    function toggleAudio() {
        if(stream.paused) { stream.play(); document.getElementById('play-btn').innerText = "DISENGAGE SIGNAL"; }
        else { stream.pause(); document.getElementById('play-btn').innerText = "ENGAGE SIGNAL"; }
    }

    setInterval(updateLiveUI, 5000);
    window.onload = () => {
        updateLiveUI();
        const launches = ["BIFFY CLYRO - NEW SINGLE OUT MON", "THE SNUTS - GLASGOW TICKETS LIVE", "MOGWAI - TOUR STARTING", "FRANZ FERDINAND - NEW ALBUM FEB 12", "GUN - LIVE AT THE BARROWLANDS FEB 20", "TRAVIS - HIGHLAND DATES ADDED"];
        document.getElementById('album-ticker').innerText = launches.join(" • ") + " • " + launches.join(" • ");
    };
</script>
</body>
</html>
