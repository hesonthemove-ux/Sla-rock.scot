<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCK.SCOT | Central Scotland's Loudest</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* GLOBAL LAYOUT LOCK */
        * { box-sizing: border-box; }
        body { 
            background-color: #000; 
            color: #fff; 
            margin: 0; 
            padding: 0; 
            font-family: 'Oswald', sans-serif; 
            overflow-x: hidden; 
        }
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        
        /* PLAYER BAR - FIXED POSITION */
        #master-player { 
            background: #000; 
            border-bottom: 1px solid #1a1a1a; 
            position: sticky; 
            top: 0; 
            z-index: 2000; 
            width: 100%; 
        }
        
        /* CORPORATE IDENTITY - FIXED SIZE/POSITION */
        .logo-main { 
            width: 100%; 
            max-width: 500px; 
            height: auto; 
            display: block; 
            margin: 0 auto; 
        }
        
        .nav-menu { 
            margin-top: 15px; 
            display: flex; 
            justify-content: center; 
            flex-wrap: wrap; 
            gap: 12px; 
            padding-bottom: 10px;
        }
        .nav-menu a { 
            color: #fff; 
            text-decoration: none; 
            text-transform: uppercase; 
            font-weight: 700; 
            font-size: 0.85rem; 
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .nav-menu a.active { color: #ff3e00; border-bottom: 2px solid #ff3e00; }

        /* CONTENT SWAP AREA */
        #page-content { min-height: 60vh; padding-top: 20px; }

        /* PRICING TIERS - LOCKED IN FOOTER */
        .grid-ads { display: flex; gap: 8px; margin: 40px 0; width: 100%; }
        .grid-ads .card-ad { 
            flex: 1; 
            background: #0a0a0a; 
            border: 1px solid #1a1a1a; 
            padding: 10px 5px; 
            text-align: center; 
        }
        .ad-label { text-transform: uppercase; font-size: 0.6rem; color: #888; margin: 0; }
        .ad-price { font-size: 1rem; font-weight: 700; color: #ff3e00; margin: 2px 0; }
        
        button#play-btn { 
            background: #ff3e00; color: #000; border: none; padding: 6px 12px; 
            font-family: 'Oswald'; font-weight: 700; text-transform: uppercase; 
            cursor: pointer; font-size: 0.7rem; 
        }
    </style>
</head>
<body>

    <div id="master-player">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span id="track-title" style="font-weight: 700; text-transform: uppercase; font-size: 0.65rem;">Ready to Rock</span>
            </div>
            <button id="play-btn">Listen</button>
        </div>
    </div>

    <header style="padding: 15px 0 0 0;">
        <div class="container">
            <img src="logo.png" alt="ROCK.SCOT" class="logo-main">
            <nav class="nav-menu" id="main-nav">
                <a onclick="loadPage('home.html', this)" class="active">Listen</a>
                <a onclick="loadPage('news.html', this)">News</a>
                <a onclick="loadPage('about.html', this)">About</a>
                <a onclick="loadPage('advertise.html', this)">Advertise</a>
                <a onclick="loadPage('submit.html', this)">Submit</a>
            </nav>
        </div>
    </header>

    <main id="page-content">
        </main>

    <footer class="container" style="padding: 20px 0; text-align: center; color: #222; font-size: 0.6rem;">
        <div class="grid-ads">
            <div class="card-ad"><p class="ad-label">Regional</p><p class="ad-price">£199</p></div>
            <div class="card-ad"><p class="ad-label">Multi</p><p class="ad-price">£349</p></div>
            <div class="card-ad"><p class="ad-label">Creative</p><p class="ad-price">£195</p></div>
        </div>
        &copy; 2026 ROCK.SCOT | All Rights Reserved.
    </footer>

    <script src="player.js"></script>
    <script>
        async function loadPage(page, element) {
            try {
                const response = await fetch(page);
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // Extract ONLY the <main> content from the target file
                const newContent = doc.querySelector('main').innerHTML;
                document.getElementById('page-content').innerHTML = newContent;
                
                // Update active state
                document.querySelectorAll('#main-nav a').forEach(a => a.classList.remove('active'));
                if(element) element.classList.add('active');

                // Re-init any scripts (like the News Ticker/Feeds)
                doc.querySelectorAll('script').forEach(oldScript => {
                    const newScript = document.createElement("script");
                    if (oldScript.src) newScript.src = oldScript.src;
                    else newScript.textContent = oldScript.textContent;
                    document.body.appendChild(newScript);
                });
                
                window.scrollTo(0,0);
            } catch (err) {
                console.error("Navigation error:", err);
            }
        }
        // Load the home view immediately
        loadPage('home.html');
    </script>
</body>
</html>
