<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rock.Scot | Scottish Rock Authority</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --orange: #FF6B00; }
        * { box-sizing: border-box; border-radius: 0 !important; }
        body { background: #000; color: #fff; font-family: 'Impact', sans-serif; margin: 0; overflow-x: hidden; }

        /* Desktop Optimization */
        @media (min-width: 1024px) {
            header img { width: 60% !important; opacity: 0.2 !important; }
            main { max-width: 900px; margin: 0 auto; }
            nav button { font-size: 1.5rem !important; }
        }

        header { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; opacity: 0.1; display: flex; align-items: center; justify-content: center; }
        header img { width: 120%; filter: grayscale(1); }

        nav { position: sticky; top: 0; z-index: 1000; background: #000; border-bottom: 6px solid var(--orange); display: grid; grid-template-columns: repeat(4, 1fr); }
        nav button { background: #000; color: #fff; border: 1px solid #111; padding: 20px 2px; font-size: 0.9rem; cursor: pointer; text-transform: uppercase; font-family: 'Impact'; }
        nav button.active { background: var(--orange); color: #000; }

        main { position: relative; z-index: 10; padding: 15px; }
        .section { display: none; }
        .section.active { display: block; }
        
        .card { background: #fff; color: #000; padding: 20px; border: 8px solid #000; box-shadow: 12px 12px 0px var(--orange); margin-bottom: 30px; }
        
        .wire-item { cursor: pointer; border-bottom: 3px solid #000; padding: 15px 0; transition: 0.2s; }
        .wire-item:hover { transform: translateX(5px); color: var(--orange); }

        /* The Newspaper Modal */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--orange); color: #000; width: 100%; max-width: 500px; border: 10px solid #000; display: flex; flex-direction: column; max-height: 80vh; }
        .modal-body-scroll { padding: 20px; overflow-y: auto; font-family: sans-serif; font-weight: bold; line-height: 1.4; font-size: 1.1rem; }
        
        .crew-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .crew-card { background: #fff; border: 4px solid #000; padding: 5px; color: #000; text-align: center; font-size: 1.2rem; }
        .crew-card img { width: 100%; filter: grayscale(1); aspect-ratio: 1/1; object-fit: cover; }
    </style>
</head>
<body>
    <header><img src="./assets/branding/logo.png"></header>
    <nav>
        <button onclick="tab('live')" id="btn-live" class="active">ON AIR</button>
        <button onclick="tab('wire')" id="btn-wire">WIRE</button>
        <button onclick="tab('crew')" id="btn-crew">TEAM</button>
        <button onclick="tab('ads')" id="btn-ads">ADS</button>
    </nav>

    <main>
        <section id="live" class="section active">
            <h1 id="clock" style="font-size: 4.5rem; text-align: center; margin: 10px 0; color: var(--orange);">00:00:00</h1>
            <div class="card">
                <h2 style="margin-top:0; border-bottom:4px solid #000;">SCOTTISH GIGS</h2>
                <div id="gig-list">SYNCING...</div>
            </div>
        </section>

        <section id="wire" class="section">
            <div class="card" style="background:var(--orange);">
                <h2 style="margin-top:0; border-bottom:4px solid #000;">ROCK WIRE</h2>
                <div id="wire-content">LISTENING...</div>
            </div>
        </section>

        <section id="crew" class="section"><div class="crew-grid" id="crew-list"></div></section>

        <section id="ads" class="section">
            <div id="ads-list"></div>
            <div class="card" style="background:#000; color:#fff;">
                <h3 style="color:var(--orange);">GET LISTED</h3>
                <p>Submit your rock intel or advertising requests to the authority.</p>
                <button onclick="tab('crew')" style="width:100%; padding:15px; background:var(--orange); border:none; font-family:'Impact';">CONTACT CREW</button>
            </div>
        </section>
    </main>

    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div style="padding:20px; background:#000; color:var(--orange);">
                <h2 id="m-head" style="margin:0; font-size:1.5rem; line-height:1.1;"></h2>
            </div>
            <div class="modal-body-scroll" id="m-body"></div>
            <div id="m-footer" style="padding:20px; border-top:4px solid #000;"></div>
            <button onclick="closeModal()" style="padding:20px; background:#000; color:#fff; border:none; font-family:'Impact'; cursor:pointer;">CLOSE</button>
        </div>
    </div>

    <script>
        const _sb = supabase.createClient('https://figcmwjdbeurhjopxknp.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpZ2Ntd2pkYmV1cmhqb3B4a25wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4ODI5MDYsImV4cCI6MjA4NDQ1ODkwNn0.iiE65zB0lAsEkJE6lotNU1lORpL94oxZ7-ebHhJ3FgY');

        function tab(t) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.getElementById('btn-'+t).classList.add('active');
            if(t==='live') loadGigs(); if(t==='wire') loadWire(); if(t==='crew') loadCrew(); if(t==='ads') loadAds();
        }

        async function loadGigs() {
            const { data } = await _sb.from('gigs').select('*').order('date', {ascending:true});
            document.getElementById('gig-list').innerHTML = data ? data.map(g => `<div style="margin-bottom:15px;"><strong>${g.date}</strong><br><span style="color:var(--orange); font-size:1.5rem;">${g.act}</span><br>@ ${g.venue}</div>`).join('') : "SEARCHING...";
        }

        async function loadWire() {
            const { data } = await _sb.from('news_wire').select('*').order('created_at', {ascending:false}).limit(20);
            document.getElementById('wire-content').innerHTML = data ? data.map(n => `
                <div class="wire-item" onclick="openModal('${n.source_name}', '${n.headline.replace(/'/g, "\\'")}', '${n.summary ? n.summary.replace(/'/g, "\\'") : "Full details at source."}', '${n.source_url}')">
                    <small style="background:#000; color:#fff; padding:2px 5px;">${n.source_name}</small><br>
                    ${n.headline}
                </div>
            `).join('') : "WIRE OFFLINE";
        }

        async function loadAds() {
            const { data } = await _sb.from('ads').select('*');
            document.getElementById('ads-list').innerHTML = data ? data.map(a => `
                <div class="card">
                    <h2 style="margin:0; color:var(--orange);">${a.title}</h2>
                    <p style="font-family:sans-serif; font-weight:bold;">${a.description}</p>
                    <div style="background:#000; color:var(--orange); display:inline-block; padding:5px 15px; font-size:1.5rem;">${a.price}</div>
                </div>
            `).join('') : "";
        }

        function loadCrew() {
            const crew = ["Andy","Alex","Stevie","Mhairi","Jude","Chris","Cal","Blue"];
            document.getElementById('crew-list').innerHTML = crew.map(c => `
                <div class="crew-card">
                    <img src="./assets/crew/${c.toLowerCase()}.jpg" onerror="this.src='./assets/branding/logo.png'">
                    <p style="margin:5px 0;">${c}</p>
                </div>
            `).join('');
        }

        function openModal(title, head, body, link) {
            document.getElementById('m-head').innerText = title + ": " + head;
            document.getElementById('m-body').innerText = body;
            document.getElementById('m-footer').innerHTML = `<a href="${link}" target="_blank" style="color:#000; text-decoration:underline; font-weight:bold;">OPEN ORIGINAL STORY</a>`;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0]; }, 1000);
        loadGigs();
    </script>
</body>
</html>
