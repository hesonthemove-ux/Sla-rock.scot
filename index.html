<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rock.Scot | Authority</title>
    <link rel="stylesheet" href="style.css?v=1769106644">
</head>
<body>
    <div id="stage"></div>
    <div class="viewport">
        <header><img src="assets/branding/logo.png" alt="Rock.Scot"></header>
        <nav>
            <button onclick="nav('live')" id="btn-live" class="active-tab">Live</button>
            <button onclick="nav('wire')" id="btn-wire">The Wire</button>
            <button onclick="nav('crew')" id="btn-crew">Crew</button>
            <button onclick="nav('rates')" id="btn-rates">Advertise</button>
        </nav>

        <main>
            <section id="live" class="section active">
                <div class="rate-card" style="border:none; background:rgba(0,0,0,0.6);">
                    <div id="clock" style="font-size:3rem; font-weight:900; color:var(--accent);">00:00:00</div>
                    <h2 style="text-transform:uppercase; letter-spacing:4px;">Broadcasting Live</h2>
                    <p>Johnstone, Scotland</p>
                </div>
            </section>

            <section id="wire" class="section">
                <h2 style="margin-bottom:20px; color:var(--accent);">Central Scotland Wire</h2>
                <div class="wire-grid" id="rss-feed">
                    </div>
            </section>

            <section id="crew" class="section">
                <h2>The Team</h2>
                <div class="crew-grid">
                    <div class="crew-member" onclick="openModal('DJ Gary', 'Head of Production. 20 years in the mix.')">
                        <img src="assets/crew/dj1.jpg" class="crew-img" onerror="this.src='assets/branding/logo.png'">
                        <p>Gary</p>
                    </div>
                    <div class="crew-member" onclick="openModal('DJ Steve', 'The voice of Friday nights.')">
                        <img src="assets/crew/dj2.jpg" class="crew-img" onerror="this.src='assets/branding/logo.png'">
                        <p>Steve</p>
                    </div>
                     <div class="crew-member" onclick="openModal('Guest Slot', 'Rotating special guests from Glasgow.')">
                        <img src="assets/branding/logo.png" class="crew-img">
                        <p>Guest</p>
                    </div>
                </div>
            </section>

            <section id="rates" class="section">
                <h2>Advertising Packages</h2>
                <div class="rate-card">
                    <h3>The Blast</h3>
                    <p>30-Second Rotation</p>
                    <div class="price" id="display-price-blast">£150</div>
                    <button style="width:100%; padding:15px; background:var(--accent); border:none; color:#fff; font-weight:bold;">BOOK NOW</button>
                </div>
                <div class="rate-card" style="border-color:#fff;">
                    <h3>The Authority</h3>
                    <p>Full Show Sponsorship</p>
                    <div class="price" id="display-price-auth">£500</div>
                    <button style="width:100%; padding:15px; background:#fff; color:#000; font-weight:bold;">SECURE LEAD</button>
                </div>
                <p style="font-size:10px; text-align:center; color:#888; margin-top:20px;">
                    <span onclick="toggleAdmin()">Admin Access</span> | GDPR Compliant
                </p>
            </section>

            <section id="admin" class="section">
                <div class="rate-card" style="background:#222;">
                    <h2 style="color:red;">CONTROL PANEL</h2>
                    <div class="input-group">
                        <label>Base Rate: The Blast (£)</label>
                        <input type="number" id="admin-base-blast" value="150">
                    </div>
                    <div class="input-group">
                        <label>Base Rate: Authority (£)</label>
                        <input type="number" id="admin-base-auth" value="500">
                    </div>
                    <div class="input-group">
                        <label>Surcharge (%)</label>
                        <input type="number" id="admin-surcharge" value="0">
                    </div>
                    <button onclick="saveSettings()" style="width:100%; padding:15px; background:green; color:#fff; border:none;">SAVE & UPDATE SITE</button>
                </div>
            </section>
        </main>
        
        <div style="height:100px;"></div> <div id="player-bar">
            <button onclick="togglePlay()" style="background:var(--accent); width:50px; height:50px; border-radius:50%; border:none; color:#fff;">▶</button>
            <div style="flex:1;">
                <div style="font-size:12px; color:#aaa;">NOW PLAYING</div>
                <div style="font-weight:bold;">Rock.Scot Authority Stream</div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modal-title" style="color:var(--accent);"></h2>
            <p id="modal-desc" style="margin-top:10px; line-height:1.5;"></p>
            <button onclick="document.getElementById('modal').style.display='none'" style="margin-top:20px; padding:10px 20px; background:#333; border:none; color:#fff;">CLOSE</button>
        </div>
    </div>

    <script>
        // --- ROUTING ---
        function nav(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById('btn-'+id).classList.add('active-tab');
            window.scrollTo(0,0);
        }

        // --- CLOCK ---
        function updateClock() {
            document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0];
            requestAnimationFrame(updateClock);
        }
        updateClock();

        // --- RSS WIRE (8 Slots Mockup) ---
        const newsData = [
            "Glasgow King Tut's: Sold Out Show", "Stirling Music Festival Announced", 
            "Local Band 'The Reverbs' Hit #1", "Barrowlands Renovation Update",
            "Paisley Arts Centre Re-opens", "Central Belt Tour Dates Released",
            "Rock.Scot Launches New App", "Weekend Gig Guide: Edinburgh"
        ];
        const feedContainer = document.getElementById('rss-feed');
        newsData.forEach(item => {
            feedContainer.innerHTML += `<div class="news-card"><h4>${item}</h4><p style="font-size:0.8rem; color:#ccc;">Read the full story on the wire...</p></div>`;
        });

        // --- CREW MODAL ---
        function openModal(title, desc) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal').style.display = 'flex';
        }

        // --- ADMIN & RATES LOGIC ---
        function toggleAdmin() {
            const pass = prompt("Enter Admin PIN:");
            if(pass === "1234") nav('admin'); // Simple PIN for demo
        }

        function saveSettings() {
            const blast = parseFloat(document.getElementById('admin-base-blast').value);
            const auth = parseFloat(document.getElementById('admin-base-auth').value);
            const surcharge = parseFloat(document.getElementById('admin-surcharge').value);
            
            // Calc
            const finalBlast = blast + (blast * (surcharge/100));
            const finalAuth = auth + (auth * (surcharge/100));

            localStorage.setItem('rate_blast', finalBlast.toFixed(0));
            localStorage.setItem('rate_auth', finalAuth.toFixed(0));
            
            applyRates();
            alert("Rates Updated! Check the Advertise tab.");
            nav('rates');
        }

        function applyRates() {
            const b = localStorage.getItem('rate_blast') || "150";
            const a = localStorage.getItem('rate_auth') || "500";
            document.getElementById('display-price-blast').innerText = "£" + b;
            document.getElementById('display-price-auth').innerText = "£" + a;
        }
        applyRates(); // Run on load

        // --- AUDIO ---
        let playing = false;
        function togglePlay() {
            playing = !playing;
            document.querySelector('#player-bar button').innerText = playing ? "❚❚" : "▶";
            // Audio integration goes here
        }
    </script>
</body>
</html>
