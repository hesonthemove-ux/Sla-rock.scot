<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rock.Scot | Central Scotland's Rock Authority</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #ff5500; 
            --bg: #000; 
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; transition: 0.5s; }

        /* HEADER & TOP GAP FIX */
        header { width: 100%; display: flex; flex-direction: column; align-items: center; position: relative; padding: 5px 0; }
        .hdr-banner { width: 100%; max-width: 1000px; height: auto; display: block; }
        
        .theme-toggle-box { position: absolute; top: 10px; right: 20px; z-index: 1000; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--glass-border); }
        .switch { width: 40px; height: 20px; position: relative; display: inline-block; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: var(--primary); transition: .4s; border-radius: 50%; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* NAV */
        nav { display: flex; justify-content: center; gap: 10px; padding: 15px; background: #050505; border-bottom: 1px solid #111; flex-wrap: wrap; }
        .nav-btn { background: transparent; border: 1px solid transparent; color: #666; padding: 10px 20px; font-family: 'Bebas Neue'; font-size: 1.3rem; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        /* MODERN SLICK PLAYER */
        .slick-unit {
            max-width: 900px; margin: 20px auto; background: linear-gradient(180deg, #0f0f0f 0%, #050505 100%);
            border: 1px solid #1a1a1a; border-radius: 20px; padding: 40px; position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        .viz-box { display: flex; align-items: flex-end; justify-content: center; gap: 4px; height: 100px; margin: 20px 0; }
        .v-bar { width: 8px; background: var(--primary); height: 2px; transition: 0.15s; border-radius: 4px; box-shadow: 0 0 10px rgba(255, 85, 0, 0.2); }
        .playing .v-bar { box-shadow: 0 0 15px var(--primary); }

        /* FANCY CREW SECTION */
        .crew-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; padding: 40px 20px; max-width: 1400px; margin: 0 auto; }
        .crew-card { 
            width: 380px; background: #0a0a0a; border: 1px solid #151515; border-radius: 12px; padding: 30px;
            transition: 0.4s; position: relative; overflow: hidden;
        }
        .crew-card:hover { transform: scale(1.02); border-color: var(--primary); background: #0f0f0f; }
        .crew-card::after { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,85,0,0.05) 0%, transparent 70%); pointer-events: none; }

        /* SUBMIT OVERLAY */
        .submit-bg { 
            width: 100%; max-width: 1000px; margin: 20px auto; min-height: 500px; border-radius: 15px; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('band_submission_sil.png') center/cover;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .glass-form { background: rgba(10,10,10,0.9); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); padding: 40px; border-radius: 15px; width: 100%; max-width: 500px; }

        /* MOBILE OVERFLOW FIX */
        @media (max-width: 600px) {
            .crew-card { width: 100%; }
            .slick-unit { padding: 20px; margin: 10px; }
            .v-bar { width: 5px; }
        }
    </style>
</head>
<body>

<header>
    <div class="theme-toggle-box">
        <span style="font-family:'Oswald'; font-size:0.6rem; color:#444;">GRIT</span>
        <label class="switch">
            <input type="checkbox" onchange="document.body.classList.toggle('grit-mode')">
            <span class="slider"></span>
        </label>
    </div>
    <img src="top_banner.png" class="hdr-banner" alt="Rock.Scot Authority">
</header>

<nav>
    <button class="nav-btn active" onclick="showTab('live', this)">LIVE SIGNAL</button>
    <button class="nav-btn" onclick="showTab('crew', this)">THE CREW</button>
    <button class="nav-btn" onclick="showTab('submit', this)">SUBMIT TRACK</button>
</nav>

<main>
    <section id="v-live" class="view active">
        <div class="slick-unit" id="player-container">
            <div style="text-align:center;">
                <h2 id="now-playing-title" style="font-family:'Bebas Neue'; font-size:3.5rem; color:var(--primary); text-shadow: 0 0 20px rgba(255,85,0,0.3);">CONNECTING...</h2>
                <p id="now-playing-artist" style="font-family:'Oswald'; letter-spacing:5px; color:#888; text-transform:uppercase;">CENTRAL SCOTLAND AUTHORITY</p>
            </div>

            <div class="viz-box" id="viz-container"></div>

            <div style="max-width:400px; margin:0 auto; text-align:center;">
                <input type="range" min="0" max="1" step="0.01" value="0.8" id="vol-fader" oninput="adjustVolume(this.value)" style="width:100%; accent-color:var(--primary); margin-bottom:20px;">
                <button onclick="toggleAudio()" id="play-btn" style="width:100%; padding:20px; background:var(--primary); border:none; color:#fff; font-family:'Bebas Neue'; font-size:2rem; cursor:pointer; border-radius:8px; box-shadow: 0 10px 30px rgba(255, 85, 0, 0.3);">ENGAGE BROADCAST</button>
            </div>
        </div>
    </section>

    <section id="v-crew" class="view">
        <div class="crew-container" id="crew-list"></div>
    </section>

    <section id="v-submit" class="view">
        <div class="submit-bg">
            <div class="glass-form">
                <h2 style="font-family:'Bebas Neue'; font-size:2.5rem; color:var(--primary);">SUBMIT SIGNAL</h2>
                <p style="font-family:'Oswald'; font-size:0.8rem; color:#666; margin-bottom:25px;">Upload your track for airplay consideration across the authority.</p>
                <input type="text" placeholder="BAND / ARTIST NAME" style="width:100%; padding:15px; background:#000; border:1px solid #222; color:#fff; margin-bottom:15px; font-family:'Oswald';">
                <input type="text" placeholder="TRACK TITLE" style="width:100%; padding:15px; background:#000; border:1px solid #222; color:#fff; margin-bottom:15px; font-family:'Oswald';">
                <button style="width:100%; padding:20px; background:var(--primary); color:#fff; font-family:'Bebas Neue'; font-size:1.5rem; border:none; cursor:pointer;">SELECT AUDIO FILE</button>
            </div>
        </div>
    </section>
</main>

<script>
    const stream = new Audio("https://uksoutha.streaming.broadcast.radio/stream/16641/caledonia-tx-ltd");
    let isPlaying = false;

    const crewData = [
        { name: "Andy", role: "Rock Rebel", bio: "Born and raised in East Kilbride, Andy grew up blasting Biffy Clyro in his bedroom. His show is a high-octane mix of local legends and emerging talent from the Glasgow scene. If it's loud and from the West, Andy is playing it.", fact: "Lost a shoe in a kilt mosh pit." },
        { name: "Alex", role: "Vinyl Viking", bio: "Hailing from Johnstone, Alex’s rock journey started with a dusty Nazareth record found in his dad's attic. A walking encyclopedia of Scottish rock history, Alex specializes in the deep cuts that built the Central Scotland sound.", fact: "Owns a signed Deacon Blue vinyl from 1987." },
        { name: "Stevie", role: "Headbanger", bio: "From the shipbuilding heart of Port Glasgow, Stevie was raised on the heavy stuff. He brings a raw, industrial energy to the airwaves, championing the hardest riffs from across the Central Belt.", fact: "Once high-fived Angus Young at the SEC." },
        { name: "Mhairi", role: "Hard Rock Queen", bio: "Hamilton-born Mhairi was converted to rock by a high-school battle of the bands. She’s a powerhouse behind the mic, known for her sharp wit and her unwavering support for female-fronted rock acts in Scotland.", fact: "Is a fully licensed tattoo artist." },
        { name: "Jude", role: "Indie Icon", bio: "Irvine-born Jude found her roots walking Irvine beach with Travis in her headphones. Her show blends the melodic side of indie-rock with the grit of the local alternative scene.", fact: "Hitchhiked to the Barrowlands with no ticket." },
        { name: "Chris", role: "Guitar Guru", bio: "A Greenock native, Chris grew up on shipyard shifts and Primal Scream. He’s the technical mind of the crew, often breaking down the gear and the genius behind Scotland's most iconic guitar solos.", fact: "Owns every Big Country album on cassette." },
        { name: "Cal", role: "Classic Rocker", bio: "Straight out of Kilmarnock, Cal grew up on hometown heroes Biffy Clyro. He keeps the flame of classic rock alive, bridging the gap between the stadium anthems of the 80s and today’s festival headliners.", fact: "Air guitar champion of Ayrshire 2022." },
        { name: "Blue", role: "Bluesy Maverick", bio: "From Gourock’s seaside soul, Blue got hooked via his grandad’s Nazareth records. He brings a blues-rock swagger to the station, focusing on the soulful grit and storytelling of the Scottish rock landscape.", fact: "Actually has a blue hair streak." }
    ];

    function init() {
        // Visualizer Setup
        const viz = document.getElementById('viz-container');
        for(let i=0; i<40; i++) {
            let b = document.createElement('div');
            b.className = 'v-bar';
            viz.appendChild(b);
        }
        // Crew Setup
        document.getElementById('crew-list').innerHTML = crewData.map(dj => `
            <div class="crew-card">
                <div style="font-family:'Bebas Neue'; font-size:2.5rem; line-height:1;">${dj.name}</div>
                <div style="color:var(--primary); font-family:'Oswald'; font-size:0.8rem; letter-spacing:2px; margin-bottom:15px;">${dj.role}</div>
                <p style="font-size:0.9rem; color:#aaa; line-height:1.6; margin-bottom:15px;">${dj.bio}</p>
                <div style="font-size:0.7rem; color:#666; font-style:italic;">ROCK FACT: ${dj.fact}</div>
            </div>
        `).join('');
        
        updateTrackInfo();
        setInterval(updateTrackInfo, 15000);
    }

    async function updateTrackInfo() {
        try {
            const res = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent("https://uksoutha.streaming.broadcast.radio/stream/16641/metadata"));
            const data = await res.json();
            // Note: Real metadata parsing usually requires a server-side proxy for icy-headers, 
            // but we'll simulate the slick display update here.
            document.getElementById('now-playing-title').innerText = "AUTHORITY LIVE";
        } catch(e) {
            document.getElementById('now-playing-title').innerText = "ROCK.SCOT LIVE";
        }
    }

    function toggleAudio() {
        const btn = document.getElementById('play-btn');
        if(stream.paused) { 
            stream.play(); isPlaying = true; 
            btn.innerText = "TERMINATE SIGNAL"; 
            document.getElementById('player-container').classList.add('playing');
            animateViz();
        } else { 
            stream.pause(); isPlaying = false; 
            btn.innerText = "ENGAGE BROADCAST"; 
            document.getElementById('player-container').classList.remove('playing');
        }
    }

    function animateViz() {
        if(!isPlaying) return;
        document.querySelectorAll('.v-bar').forEach(b => {
            let h = Math.random() * 90 + 5;
            b.style.height = h + 'px';
        });
        setTimeout(animateViz, 100);
    }

    function adjustVolume(val) { stream.volume = val; }

    function showTab(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('v-' + id).classList.add('active');
        btn.classList.add('active');
    }

    window.onload = init;
</script>
</body>
</html>
