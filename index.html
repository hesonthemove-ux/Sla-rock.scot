<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rock.Scot | Central Scotland's Rock Authority</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=New+Rocker&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #ff3e00; 
            --bg: #050505; 
            --header-h: 70px; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body { 
            background: var(--bg);
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            height: 100dvh; 
            overflow: hidden; 
        }

        #app-shell { display: flex; flex-direction: column; height: 100%; }

        /* HEADER OPTIMIZED FOR LOGO.JPG */
        header { 
            flex-shrink: 0;
            height: var(--header-h);
            background: #000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 2px solid var(--primary);
            z-index: 1000;
        }

        #logo-header { 
            height: 48px; /* Perfectly sized for 400x100 ratio */
            width: auto; 
            display: block;
        }

        .live-indicator {
            font-family: 'Oswald';
            font-size: 0.6rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid var(--primary);
            padding: 4px 10px;
        }

        nav { 
            flex-shrink: 0;
            display: flex; 
            background: #0a0a0a; 
            border-bottom: 1px solid #222;
        }
        nav button {
            background: transparent;
            color: #666;
            border: none;
            padding: 15px 0;
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            font-size: 0.75rem;
            flex: 1;
            cursor: pointer;
        }
        nav button.active { 
            color: #fff;
            background: rgba(255, 62, 0, 0.1);
            border-bottom: 2px solid var(--primary);
        }

        #content-window { flex: 1; overflow-y: auto; padding-bottom: 120px; }
        .view { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .view.active { display: block; animation: powerOn 0.4s ease-out; }

        @keyframes powerOn {
            0% { opacity: 0; filter: brightness(2); }
            100% { opacity: 1; filter: brightness(1); }
        }

        .pro-card {
            background: rgba(15, 15, 15, 0.95);
            padding: 25px;
            border-left: 4px solid var(--primary);
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
        }

        footer { 
            position: fixed; bottom: 0; width: 100%; 
            background: #000; padding: 15px 25px; 
            border-top: 4px solid var(--primary);
            display: flex; align-items: center; justify-content: space-between;
            z-index: 1000;
        }

        #play-btn {
            background: var(--primary);
            border: none; color: #fff;
            padding: 10px 25px;
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            cursor: pointer;
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
        }

        .neon-brand {
            font-family: 'New Rocker', cursive;
            color: #fff;
            font-size: 1.2rem;
            text-shadow: 0 0 10px var(--primary);
        }

        @media (min-width: 1024px) {
            header { height: 90px; padding: 0 60px; }
            #logo-header { height: 58px; }
            .pro-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        }
    </style>
</head>
<body>

<div id="app-shell">
    <header>
        <img src="logo.jpg" alt="Rock.Scot" id="logo-header">
        <div class="live-indicator">Central Scotland Live</div>
    </header>

    <nav>
        <button onclick="show('onair')" id="b-onair" class="active">Radio</button>
        <button onclick="show('news')" id="b-news">Wire</button>
        <button onclick="show('crew')" id="b-crew">Crew</button>
        <button onclick="show('ads')" id="b-ads">Ads</button>
    </nav>

    <div id="content-window">
        <section id="p-onair" class="view active">
            <div style="background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('studio-main.jpg'); height: 400px; background-size: cover; border: 1px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
                <h2 style="font-family: 'Oswald'; font-size: 4rem; line-height: 0.9;">STAY<br>LOUD</h2>
                <div style="height: 4px; width: 60px; background: var(--primary); margin: 20px 0;"></div>
                <p style="font-family: 'Oswald'; letter-spacing: 5px; color: #888;">THE CENTRAL BELT AUTHORITY</p>
            </div>
        </section>

        <section id="p-news" class="view">
            <h2 style="font-family: 'Oswald'; margin-bottom: 20px; font-size: 2rem;">THE WIRE</h2>
            <div id="news-feed" class="pro-grid"></div>
        </section>

        <section id="p-crew" class="view">
            <div class="pro-card">
                <h3 style="font-family: 'Oswald'; font-size: 1.8rem; color: var(--primary);">THE CREW</h3>
                <p style="margin-top: 10px; color: #888;">Broadcasting live from studios across the Central Belt.</p>
            </div>
            </section>

        <section id="p-ads" class="view">
            <h2 style="font-family: 'Oswald'; margin-bottom: 20px; font-size: 2rem;">MEDIA RATES</h2>
            <div class="pro-card">
                <h3 style="font-family:'Oswald'; color:var(--primary);">REGIONAL - £299</h3>
                <p>Targeted Central Scotland coverage.</p>
            </div>
            <div class="pro-card">
                <h3 style="font-family:'Oswald'; color:var(--primary);">CREATIVE - £195</h3>
                <p>Full station-grade production.</p>
            </div>
        </section>
    </div>

    <footer>
        <button id="play-btn" onclick="toggle()">LISTEN LIVE</button>
        <div class="neon-brand">Rockin' Scotland</div>
    </footer>
</div>

<script>
    function show(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('p-' + id).classList.add('active');
        document.getElementById('b-' + id).classList.add('active');
        document.getElementById('content-window').scrollTop = 0;
    }

    const stream = new Audio("https://uksoutha.streaming.broadcast.radio/stream/16641/caledonia-tx-ltd");
    let playing = false;
    function toggle() {
        if(!playing) { stream.play(); document.getElementById('play-btn').innerText = "STOP FEED"; playing = true; }
        else { stream.pause(); document.getElementById('play-btn').innerText = "LISTEN LIVE"; playing = false; }
    }

    async function loadNews() {
        const proxyUrl = "https://api.rss2json.com/v1/api.json?rss_url=";
        const feed = "https://www.theskinny.co.uk/rss/music";
        try {
            const res = await fetch(proxyUrl + encodeURIComponent(feed));
            const data = await res.json();
            let html = '';
            data.items.slice(0, 6).forEach(item => {
                html += `
                <div class="pro-card">
                    <h4 style="font-family:'Oswald'; color:var(--primary);">${item.title}</h4>
                    <p style="font-size:0.8rem; color:#888; margin-top:5px;">${item.description.substring(0, 100).replace(/<[^>]*>?/gm, '')}...</p>
                </div>`;
            });
            document.getElementById('news-feed').innerHTML = html;
        } catch(e) { document.getElementById('news-feed').innerHTML = 'Wire Active.'; }
    }
    window.onload = loadNews;
</script>
</body>
</html>
