<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rock.Scot | Central Scotland's Rock Authority</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=New+Rocker&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #ff3e00; 
            --bg: #050505; 
            --nav-h: 65px; 
            --footer-h: 95px; 
            --glass-bg: rgba(12, 12, 12, 0.9);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(25px) saturate(180%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        html, body { overflow: hidden; background: var(--bg); height: 100%; width: 100%; overscroll-behavior: none; }
        body { display: grid; grid-template-rows: auto auto var(--nav-h) 1fr var(--footer-h); }

        #loader {
            position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.9);
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            display: none; align-items: center; justify-content: center; flex-direction: column;
        }
        .vinyl { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #111; background: repeating-radial-gradient(#222, #000 8px); animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        header { background: #000; border-bottom: 4px solid var(--primary); display: flex; justify-content: center; padding: 25px; z-index: 10; }
        .hdr-logo { width: 100%; max-width: 900px; max-height: 280px; object-fit: contain; filter: drop-shadow(0 0 20px rgba(255,62,0,0.4)); }
        
        .ticker-wrap { background: #080808; border-bottom: 1px solid var(--glass-border); height: 35px; overflow: hidden; display: flex; align-items: center; }
        .ticker { display: inline-block; white-space: nowrap; animation: ticker 80s linear infinite; font-family: 'Oswald'; color: var(--primary); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        nav { 
            display: flex; overflow-x: auto; background: var(--glass-bg); 
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            height: var(--nav-h); z-index: 100; border-bottom: 1px solid var(--glass-border);
            scrollbar-width: none;
        }
        nav::-webkit-scrollbar { display: none; }
        .nav-btn { 
            flex: 0 0 auto; width: 130px; background: transparent; border: none; color: #555; 
            font-family: 'Oswald'; text-transform: uppercase; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--glass-border);
        }
        .nav-btn.active { color: #fff; background: rgba(255, 62, 0, 0.1); box-shadow: inset 0 -4px 0 var(--primary); }

        main { overflow-y: auto; -webkit-overflow-scrolling: touch; background: radial-gradient(circle at center, #111 0%, #050505 100%); }
        .view { display: none; padding: 40px 20px; max-width: 1400px; margin: 0 auto; animation: viewIn 0.3s ease-out; }
        .view.active { display: block; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .card { background: #0c0c0c; border: 1px solid #1a1a1a; border-bottom: 5px solid var(--primary); transition: 0.3s ease; cursor: pointer; overflow: hidden; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); background: #111; }
        .card-img-wrap { width: 100%; aspect-ratio: 16/9; overflow: hidden; border-bottom: 1px solid #222; }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card-body { padding: 20px; flex-grow: 1; }
        .card h3 { font-family: 'Oswald'; font-size: 1.1rem; color: #fff; text-transform: uppercase; margin-bottom: 10px; }
        .card-meta { font-family: 'Oswald'; font-size: 0.7rem; color: var(--primary); letter-spacing: 1px; }

        /* CREW MODAL STYLE */
        #bio-modal { position: fixed; inset: 0; z-index: 2000; display: none; background: rgba(0,0,0,0.95); backdrop-filter: blur(40px); }
        .bio-container { display: grid; grid-template-columns: 1fr 1fr; width: 100%; height: 100%; max-width: 1600px; margin: 0 auto; }
        .bio-left { background: #000; border-right: 2px solid var(--primary); }
        .bio-left img { width: 100%; height: 100%; object-fit: cover; }
        .bio-right { padding: 60px; overflow-y: auto; }
        .mag-header { font-family: 'New Rocker'; font-size: 6rem; color: var(--primary); line-height: 0.8; margin-bottom: 20px; }
        .close-btn { background: var(--primary); color: #fff; border: none; padding: 10px 30px; font-family: 'Oswald'; cursor: pointer; float: right; }

        footer { background: #000; border-top: 4px solid var(--primary); height: var(--footer-h); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .play-btn { 
            background: var(--primary); color: #fff; font-family: 'Oswald'; padding: 18px 55px; 
            border: none; cursor: pointer; clip-path: polygon(8% 0, 100% 0, 92% 100%, 0 100%); 
            text-transform: uppercase; font-size: 1.25rem; font-weight: 900;
            display: flex; align-items: center; gap: 20px; transition: 0.2s;
        }
        .visualizer { display: none; align-items: flex-end; gap: 4px; height: 25px; }
        .play-btn.playing .visualizer { display: flex; }
        .bar { width: 4px; background: #fff; animation: eq 0.6s infinite alternate; }
        @keyframes eq { 0% { height: 30%; } 100% { height: 100%; } }

        @media (max-width: 900px) {
            .hdr-logo { max-height: 120px; }
            .bio-container { grid-template-columns: 1fr; }
            .bio-left { height: 40vh; border-right: none; border-bottom: 2px solid var(--primary); }
            .mag-header { font-size: 3rem; }
        }
        @keyframes viewIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="loader"><div class="vinyl"></div><p style="font-family:'Oswald'; color:var(--primary); margin-top:20px; letter-spacing:6px; font-size:0.8rem;">REFRESHING AUTHORITY...</p></div>

<header><img src="logo.png" class="hdr-logo" alt="Rock.Scot Authority" onerror="this.src='studio.jpg'"></header>

<div class="ticker-wrap">
    <div class="ticker">ROCK AUTHORITY // INVERCLYDE BROADCAST // LANARKSHIRE BROADCAST // AYRSHIRE BROADCAST // CENTRAL SCOTLAND MUSIC NEWS //</div>
</div>

<nav id="nav-rail">
    <button class="nav-btn" onclick="tab('radio', this)">Live</button>
    <button class="nav-btn" onclick="tab('wire', this)">Wire</button>
    <button class="nav-btn active" onclick="tab('crew', this)">Crew</button>
    <button class="nav-btn" onclick="tab('sub', this)">Submits</button>
    <button class="nav-btn" onclick="tab('ads', this)">Ads</button>
</nav>

<main>
    <section id="v-crew" class="view active">
        <h2 style="font-family:'Oswald'; color:var(--primary); margin-bottom:30px; text-transform:uppercase; letter-spacing:2px;">The Authority Crew</h2>
        <div class="grid" id="crew-list"></div>
    </section>

    <section id="v-wire" class="view"><div class="grid" id="wire-list"></div></section>
</main>

<div id="bio-modal"><div class="bio-container" id="bio-target"></div></div>

<footer>
    <button class="play-btn" id="stream-trigger" onclick="toggleAudio()">
        <span id="btn-text">Listen Live</span>
        <div class="visualizer"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
    </button>
</footer>

<script>
    const stream = new Audio("https://uksoutha.streaming.broadcast.radio/stream/16641/caledonia-tx-ltd");
    
    // CREW DATA
    const crew = [
        { name: "Andy", role: "Daytime Authority", loc: "East Kilbride", bio: "The lead voice for Rock.Scot, bringing the heaviest hits to the Central Belt every afternoon." },
        { name: "Inverclyde Boss", role: "Evening Authority", loc: "Greenock", bio: "Dominating the airwaves with pure Scottish rock heritage." }
    ];

    function initCrew() {
        document.getElementById('crew-list').innerHTML = crew.map((dj, i) => `
            <div class="card" onclick="openBio(${i})">
                <div class="card-img-wrap"><img src="dj_${dj.name.toLowerCase().replace(' ', '_')}.jpg" onerror="this.src='studio.jpg'"></div>
                <div class="card-body"><h3>${dj.name}</h3><div class="card-meta">${dj.role} // ${dj.loc}</div></div>
            </div>
        `).join('');
    }

    function openBio(i) {
        const dj = crew[i];
        document.getElementById('bio-target').innerHTML = `
            <div class="bio-left"><img src="dj_${dj.name.toLowerCase().replace(' ', '_')}.jpg" onerror="this.src='studio.jpg'"></div>
            <div class="bio-right">
                <button class="close-btn" onclick="closeBio()">CLOSE X</button>
                <div class="mag-header">${dj.name}</div>
                <p style="color:var(--primary); font-family:'Oswald'; font-size:1.2rem; margin-bottom:20px;">${dj.role} // ${dj.loc} AUTHORITY</p>
                <p style="font-family:'Inter'; line-height:1.6; color:#ccc; font-size:1.1rem;">${dj.bio}</p>
            </div>
        `;
        document.getElementById('bio-modal').style.display = 'block';
    }

    function closeBio() { document.getElementById('bio-modal').style.display = 'none'; }

    // SPA NAVIGATION & AUDIO Logic
    function tab(id, btn) {
        document.getElementById('loader').style.display = 'flex';
        setTimeout(() => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('v-' + id).classList.add('active');
            btn.classList.add('active');
            document.getElementById('loader').style.display = 'none';
        }, 400);
    }

    function toggleAudio() {
        const btn = document.getElementById('stream-trigger');
        if (stream.paused) { stream.play(); btn.classList.add('playing'); } 
        else { stream.pause(); btn.classList.remove('playing'); }
    }

    window.onload = () => { initCrew(); };
</script>
</body>
</html>
