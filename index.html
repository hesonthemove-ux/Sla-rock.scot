<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sla-rock.scot | Rockin' Scotland | Central Scotland Rock Radio</title>
    <style>
        :root { --primary: #ff3e00; --bg: #050505; --glass: rgba(255, 255, 255, 0.08); }
        
        /* Core Reset & Performance */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        
        #app-shell { display: flex; flex-direction: column; height: 100vh; }
        
        /* Header - Desktop Emphasis on Logo & Positioning */
        header { 
            background: #000; 
            padding: 40px 20px; 
            text-align: center; 
            border-bottom: 4px solid var(--primary); 
            flex-shrink: 0; 
            position: relative; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #logo { width: 100%; max-width: 600px; height: auto; transition: transform 0.3s ease; }
        .tagline { font-size: 1.8rem; color: var(--primary); font-weight: 900; text-transform: uppercase; letter-spacing: 8px; margin-top: 15px; }
        
        /* On-Air Countdown Sticker */
        #next-show-timer { 
            position: absolute; 
            bottom: -15px; 
            background: var(--primary); 
            color: #fff; 
            padding: 6px 20px; 
            font-size: 0.75rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            border-radius: 20px; 
            z-index: 100; 
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        /* Refined Mobile-First Navigation */
        nav { 
            background: #0a0a0a; 
            padding: 20px 0 10px; 
            text-align: center; 
            border-bottom: 1px solid #222; 
            flex-shrink: 0; 
            overflow-x: auto; 
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; 
        }
        nav::-webkit-scrollbar { display: none; }

        nav a { 
            display: inline-block;
            color: #fff; 
            margin: 0 12px; 
            text-decoration: none; 
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer; 
            font-size: 0.8rem; 
            letter-spacing: 1px; 
            padding: 12px 16px; 
            border-radius: 4px; 
            transition: 0.2s;
        }
        nav a:hover, nav a.active { background: var(--glass); color: var(--primary); }

        /* Main Content Window */
        #content-window { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 40px 20px; 
            padding-bottom: 160px; 
            scroll-behavior: smooth;
        }

        /* Content UI Components */
        .news-card { background: var(--glass); border-left: 4px solid #333; padding: 25px; margin-bottom: 20px; border-radius: 0 4px 4px 0; }
        .news-tag { color: var(--primary); font-size: 0.7rem; font-weight: 900; text-transform: uppercase; }
        
        .venue-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .venue-card { background: var(--glass); border-left: 4px solid var(--primary); padding: 20px; text-decoration: none; color: inherit; display: block; transition: 0.2s; }
        .venue-card:hover { background: rgba(255,255,255,0.12); transform: translateX(5px); }

        .price-card { background: var(--glass); border: 1px solid #222; padding: 25px; margin-bottom: 20px; border-top: 4px solid var(--primary); }
        .price-tag { font-size: 2rem; font-weight: 900; color: var(--primary); display: block; margin: 10px 0; }

        /* Dynamic Ad Units - Hidden by default */
        .ad-unit { display: none; background: #111; border: 1px solid var(--primary); padding: 20px; margin: 20px 0; border-radius: 4px; text-align: center; }
        .partner-bar { display: none; flex-wrap: wrap; gap: 20px; justify-content: center; align-items: center; padding: 20px; background: #000; border: 1px solid #222; margin-top: 20px; }

        /* Master Player Footer */
        footer#master-player { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: #000; 
            border-top: 3px solid var(--primary); 
            padding: 15px 30px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            z-index: 9999; 
        }
        .player-frame { width: 420px; height: 65px; border: none; }

        /* Mobile Layout Compatibility */
        @media (max-width: 768px) {
            header { padding: 25px 15px; }
            #logo { max-width: 280px; }
            .tagline { font-size: 1rem; letter-spacing: 4px; margin-top: 8px; }
            #next-show-timer { font-size: 0.65rem; padding: 4px 12px; }
            nav a { font-size: 0.75rem; margin: 0 5px; padding: 10px 12px; }
            footer#master-player { flex-direction: column; padding: 10px; height: auto; }
            .player-frame { width: 100%; height: 80px; }
            #track-info { margin: 10px 0 0 0 !important; font-size: 0.7rem; text-align: center; }
        }
    </style>
</head>
<body>

<div id="app-shell">
    <header>
        <img src="logo.png" alt="Sla-rock.scot" id="logo">
        <div class="tagline">Rockin' Scotland</div>
        <div id="next-show-timer">Syncing Stream...</div>
    </header>

    <nav id="main-nav">
        <a onclick="spa.load('home')" id="nav-home">On Air</a>
        <a onclick="spa.load('news')" id="nav-news">Local News</a>
        <a onclick="spa.load('venues')" id="nav-venues">Rock Radar</a>
        <a onclick="spa.load('ads')" id="nav-ads">Advertise</a>
        <a onclick="spa.load('djs')" id="nav-djs">The Crew</a>
    </nav>

    <div id="content-window">
        <div id="page-content"></div>
    </div>

    <footer id="master-player">
        <iframe class="player-frame" src="https://player.broadcast.radio/caledonia-tx-ltd" allow="autoplay"></iframe>
        <div id="track-info" style="color:#888; font-weight:bold; font-size:0.8rem; margin-left:20px;">SLA-ROCK.SCOT | LIVE FROM CENTRAL SCOTLAND</div>
    </footer>
</div>

<script>
    // --- Configuration & Data ---
    const activeAds = []; // Populate to show ads
    const activePartners = []; // Populate to show partners
    
    const schedule = [
        { hr: 7, name: "Morning Chaos", dj: "Cal" },
        { hr: 10, name: "The Wall of Sound", dj: "Alex" },
        { hr: 14, name: "EK Rock Voyager", dj: "Andy" },
        { hr: 18, name: "Friday Night Rock", dj: "Tom" },
        { hr: 22, name: "Highland Hammer", dj: "Mhairi" }
    ];

    const localNews = [
        { region: "North Ayrshire", title: "Irvine Beach Park Festival Rumours", excerpt: "Local promoters hint at a major rock weekend returning to the coast this summer.", date: "Jan 14, 2026" },
        { region: "Inverclyde", title: "New Greenock Waterfront Studio", excerpt: "A high-end rehearsal space for local bands is set to open near the Quay.", date: "Jan 13, 2026" },
        { region: "South Lanarkshire", title: "Wishaw Metal Night Sells Out", excerpt: "Girdwoods sees record attendance for regional rock showcase.", date: "Jan 12, 2026" },
        { region: "Central Scotland", title: "Glasgow Venue Expansion", excerpt: "Legendary spots announce new 'Underground' sessions for 2026.", date: "Jan 11, 2026" }
    ];

    const spa = {
        pages: {
            home: `
                <h2 style="text-transform:uppercase; font-size:2rem;">Broadcasting <span style="color:var(--primary)">Live</span></h2>
                <div id="dynamic-ad-container"></div>
                <p>Pure Energy. Pure Rock. Serving Central Scotland, Ayrshire, Inverclyde, and Lanarkshire.</p>
                <div id="dynamic-partner-container" class="partner-bar"></div>
            `,
            news: `
                <h2 style="text-transform:uppercase;">The <span style="color:var(--primary)">Wire</span></h2>
                <div id="news-feed-container"></div>
            `,
            venues: `
                <h2 style="text-transform:uppercase;">Rock <span style="color:var(--primary)">Radar</span></h2>
                <div class="venue-grid">
                    <a href="#" class="venue-card"><span>Glasgow</span><h4>King Tut's</h4></a>
                    <a href="#" class="venue-card"><span>North Ayrshire</span><h4>Harleys Ayr</h4></a>
                    <a href="#" class="venue-card"><span>South Lanarkshire</span><h4>Girdwoods Wishaw</h4></a>
                    <a href="#" class="venue-card"><span>Inverclyde</span><h4>Beacon Arts Greenock</h4></a>
                </div>
            `,
            ads: `
                <h2 style="text-transform:uppercase;">Grow with <span style="color:var(--primary)">Us</span></h2>
                <div class="price-card"><h3>Regional Airtime</h3><span class="price-tag">£199</span></div>
                <div class="price-card"><h3>Multi-Regional Airtime</h3><span class="price-tag">£349</span></div>
                <div class="price-card"><h3>Creative Production</h3><span class="price-tag">£195</span></div>
            `,
            djs: `
                <h2 style="text-transform:uppercase;">The <span style="color:var(--primary)">Crew</span></h2>
                <p>Cal | Alex | Andy | Tom | Mhairi</p>
            `
        },
        load: function(id) {
            const pageId = id || 'home';
            document.getElementById('page-content').innerHTML = this.pages[pageId];
            
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            const activeNav = document.getElementById('nav-' + pageId);
            if(activeNav) activeNav.classList.add('active');

            if(pageId === 'home') this.initDynamicContent();
            if(pageId === 'news') this.renderNews();

            window.location.hash = pageId;
            document.getElementById('content-window').scrollTop = 0;
        },
        renderNews: function() {
            document.getElementById('news-feed-container').innerHTML = localNews.map(item => `
                <div class="news-card">
                    <span class="news-tag">${item.region}</span>
                    <h3>${item.title}</h3>
                    <p>${item.excerpt}</p>
                    <div style="font-size:0.7rem; color:#666; margin-top:10px;">${item.date}</div>
                </div>
            `).join('');
        },
        initDynamicContent: function() {
            const adCont = document.getElementById('dynamic-ad-container');
            if (activeAds.length > 0) {
                adCont.style.display = "block";
                adCont.className = "ad-unit";
                adCont.innerHTML = activeAds.map(ad => `<h4>${ad.title}</h4>`).join('');
            }
            const partCont = document.getElementById('dynamic-partner-container');
            if (activePartners.length > 0) {
                partCont.style.display = "flex";
                partCont.innerHTML = activePartners.map(p => `<div style="font-weight:900; color:#444;">${p}</div>`).join('');
            }
        }
    };

    function updateCountdown() {
        const now = new Date();
        const currentHr = now.getHours();
        const currentMin = now.getMinutes();
        const currentSec = now.getSeconds();
        let nextShow = schedule.find(s => s.hr > currentHr) || schedule[0];
        let targetHr = nextShow.hr <= currentHr ? nextShow.hr + 24 : nextShow.hr;
        let diffSec = ((targetHr * 3600) - (currentHr * 3600 + currentMin * 60 + currentSec));
        const h = Math.floor(diffSec / 3600), m = Math.floor((diffSec % 3600) / 60), s = diffSec % 60;
        document.getElementById('next-show-timer').innerHTML = `Next: ${nextShow.name} w/ ${nextShow.dj} in ${h}h ${m}m ${s}s`;
    }

    window.onload = () => {
        spa.load(window.location.hash.replace('#', '') || 'home');
        setInterval(updateCountdown, 1000);
        updateCountdown();
    };
</script>
</body>
</html>
