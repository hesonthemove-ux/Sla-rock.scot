<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rock.Scot | Central Scotland's Rock Authority</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --authority-orange: #ff5500; 
            --phantom-glass: rgba(0, 0, 0, 0.08); 
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        header { 
            position: sticky; top: 0; z-index: 9999; 
            background: #000; width: 100%;
            display: flex; flex-direction: column; align-items: center;
        }
        
        .hdr-logo { 
            width: 100%; max-width: 450px; height: auto; 
            padding: 15px 0; display: block;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.8));
        }

        .nav-strip { 
            width: 100%; background: rgba(0,0,0,0.95); 
            border-bottom: 4px solid var(--authority-orange);
            display: flex; height: 60px;
        }

        .nav-btn { flex: 1; background: transparent; border: none; color: #777; font-family: 'Bebas Neue'; font-size: 1.2rem; cursor: pointer; }
        .nav-btn.active { color: var(--authority-orange); background: rgba(255,85,0,0.1); }

        .view { 
            display: none; min-height: 100vh; width: 100%; padding: 40px 20px; 
            background-size: cover; background-position: center; background-attachment: fixed;
            transition: background-image 0.8s ease-in-out;
        }
        .view.active { display: flex; flex-direction: column; align-items: center; }

        .uniform-card { 
            width: 320px; height: 480px; 
            background: var(--phantom-glass);
            border: 1px solid var(--glass-border); 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            position: relative;
            text-shadow: var(--text-shadow);
        }

        .on-air {
            display: inline-block; width: 10px; height: 10px;
            background: #ff0000; border-radius: 50%;
            margin-right: 8px; vertical-align: middle;
            box-shadow: 0 0 10px #ff0000;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .player-portal { width: 100%; height: 260px; border: none; background: transparent !important; margin-top: 10px; }

        #rss-feed { 
            display: grid; grid-template-columns: repeat(auto-fill, 320px); gap: 25px; 
            width: 100%; max-width: 1400px; padding: 40px; justify-content: center; 
        }
        .wire-item { background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); cursor: pointer; text-shadow: var(--text-shadow); }

        /* CREW STYLES RESTORED */
        .crew-container { 
            display: flex; gap: 20px; overflow-x: auto; width: 100%; 
            padding: 20px 50px; scrollbar-width: none; 
            -webkit-overflow-scrolling: touch;
        }
        .crew-card { min-width: 320px; height: 480px; background: #000; border: 1px solid #222; position: relative; cursor: pointer; filter: grayscale(100%); transition: 0.5s; }
        .crew-card.active-color { filter: grayscale(0%); border: 3px solid var(--authority-orange); transform: scale(1.05); z-index: 5; }
        .crew-label { position: absolute; bottom: 0; width: 100%; background: linear-gradient(0deg, #000 20%, transparent 100%); padding: 30px; font-family: 'Bebas Neue'; font-size: 2.2rem; text-align: center; text-shadow: var(--text-shadow); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10000; display: none; padding: 20px; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .mag-layout { max-width: 500px; border: 10px solid #fff; padding: 30px; background: rgba(0,0,0,0.95); width: 95%; max-height: 85vh; overflow-y: auto; text-shadow: none; }

        .btn-authority { width: 100%; padding: 18px; background: var(--authority-orange); border: none; color: #fff; font-family: 'Bebas Neue'; font-size: 1.6rem; cursor: pointer; text-shadow: none; }
        .std-input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; font-family: 'Oswald'; margin-bottom: 10px; }
        .std-label { display: block; font-family: 'Oswald'; font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="mag-modal" class="modal-overlay" onclick="this.classList.remove('open')">
        <div class="mag-layout" onclick="event.stopPropagation()">
            <div style="font-family:'Bebas Neue'; color:var(--authority-orange); letter-spacing:2px;">AUTHORITY DOSSIER</div>
            <h2 id="mag-name" style="font-family:'Oswald'; font-size:2.2rem; text-transform:uppercase;"></h2>
            <div id="mag-content" style="border-top:1px solid #333; padding-top:15px; word-wrap: break-word;"></div>
        </div>
    </div>

    <header>
        <img src="top_banner.png" class="hdr-logo" alt="Rock.Scot">
        <nav class="nav-strip">
            <button class="nav-btn active" onclick="showTab('live')">LIVE</button>
            <button class="nav-btn" onclick="showTab('wire')">WIRE</button>
            <button class="nav-btn" onclick="showTab('crew')">CREW</button>
            <button class="nav-btn" onclick="showTab('rates')">RATES</button>
            <button class="nav-btn" onclick="showTab('submit')">SUBMIT</button>
        </nav>
    </header>

    <main>
        <section id="v-live" class="view active">
            <div class="uniform-card">
                <div id="live-clock" style="font-family:'Bebas Neue'; font-size:4.5rem; line-height:0.9;">00:00</div>
                <div id="clock-tag" style="font-family:'Oswald'; color:var(--authority-orange); letter-spacing:5px; margin-bottom:15px;">
                    <span class="on-air"></span>ROCKIN' SCOTLAND
                </div>
                <iframe src="https://player.broadcast.radio/caledonia-tx-ltd" class="player-portal" allow="autoplay" allowtransparency="true"></iframe>
                <p style="font-family:'Oswald'; font-size:0.8rem; margin-top:10px; color:#aaa; letter-spacing:1px;">AUTHORITY SIGNAL ACTIVE</p>
            </div>
        </section>

        <section id="v-wire" class="view">
            <div id="rss-feed"></div>
        </section>

        <section id="v-crew" class="view">
            <div class="crew-container" id="crew-rolodex"></div>
        </section>

        <section id="v-rates" class="view">
            <div class="uniform-card">
                <h2 style="font-family:'Bebas Neue'; font-size:3.5rem; color:var(--authority-orange);">RATES</h2>
                <p style="font-family:'Oswald'; letter-spacing:1px; margin-bottom:20px;">ADVERTISING DOSSIER</p>
                <button class="btn-authority" onclick="openRates()">VIEW PACKS</button>
            </div>
        </section>

        <section id="v-submit" class="view">
            <div class="uniform-card" id="submit-card-content">
                <h2 style="font-family:'Bebas Neue'; font-size:3.5rem; color:var(--authority-orange);">SUBMIT</h2>
                <button class="btn-authority" onclick="openSubmit()">OPEN PORTAL</button>
            </div>
        </section>
    </main>

<script>
    const feeds = ["https://www.theskinny.co.uk/rss/music", "https://podcart.co/feed/", "https://discoverymusicscotland.com/feed/", "https://jockrock.org/feed/"];
    
    /* CREW DATA RESTORED */
    const crewData = [
        { id: "andy", name: "ANDY", bio: "Hailing from East Kilbride. Biffy Clyro fanatic.", band: "Biffy Clyro", gig: "Franz Ferdinand @ Barrowlands", venue: "King Tut's", fact: "Lost a shoe crowd-surfing.", img: "dj_andy.jpg", clicks: 0 },
        { id: "alex", name: "ALEX", bio: "Johnstone spirit. Nazareth collector.", band: "Nazareth", gig: "Texas @ SEC Armadillo", venue: "Barrowland", fact: "Has a signed Deacon Blue vinyl.", img: "dj_alex.jpg", clicks: 0 },
        { id: "stevie", name: "STEVIE", bio: "Port Glasgow shipbuilding heart.", band: "Big Country", gig: "Mogwai @ Òran Mór", venue: "Beacon Arts", fact: "High-fived Angus Young.", img: "dj_stevie.jpg", clicks: 0 },
        { id: "mhairi", name: "MHAIRI", bio: "Hamilton born and bred. Pedal obsessed.", band: "Jesus and Mary Chain", gig: "Teenage Fanclub @ King Tut's", venue: "Grand Hall", fact: "Qualified tattoo artist.", img: "dj_mhairi.jpg", clicks: 0 },
        { id: "jude", name: "JUDE", bio: "North Ayrshire stomp.", band: "Travis", gig: "Idlewild @ Barrowlands", venue: "Harbour Arts", fact: "Hitchhiked for Franz Ferdinand.", img: "dj_jude.jpg", clicks: 0 },
        { id: "chris", name: "CHRIS", bio: "Greenock bred on Primal Scream.", band: "Primal Scream", gig: "Simple Minds @ OVO Hydro", venue: "Cathouse", fact: "Owns every Big Country album.", img: "dj_chris.jpg", clicks: 0 },
        { id: "cal", name: "CAL", bio: "Kilmarnock heartlands specialist.", band: "Biffy Clyro", gig: "The Fratellis @ Grand Hall", venue: "Palace Theatre", fact: "Air guitar champion 2018.", img: "dj_cal.jpg", clicks: 0 },
        { id: "blue", name: "BLUE", bio: "Gourock seaside charm.", band: "Nazareth", gig: "Texas @ Paisley Arts", venue: "Coats Paisley", fact: "Once mistaken for a roadie.", img: "dj_blue.jpg", clicks: 0 }
    ];

    function showTab(name) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        const activeView = document.getElementById('v-' + name);
        activeView.style.display = 'flex';
        activeView.style.backgroundImage = `url('news${Math.floor(Math.random()*7)+1}.jpg')`;
        event.currentTarget.classList.add('active');
        if(name === 'wire') fetchMultiRSS();
        if(name === 'crew') renderCrew();
    }

    async function fetchMultiRSS() {
        const container = document.getElementById('rss-feed');
        container.innerHTML = "<p>SYNCING WIRE...</p>";
        let allItems = [];
        for (const url of feeds) {
            try {
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&t=${Date.now()}`);
                const data = await res.json();
                if(data.items) allItems = [...allItems, ...data.items];
            } catch(e) {}
        }
        allItems.sort(() => Math.random() - 0.5);
        container.innerHTML = allItems.slice(0,12).map(item => {
            let thumb = item.thumbnail || item.enclosure.link || (item.description.match(/<img[^>]+src="([^">]+)"/) ? item.description.match(/<img[^>]+src="([^">]+)"/)[1] : "logo.png");
            return `<div class="wire-item" onclick="window.open('${item.link}')">
                <img src="${thumb}" style="width:100%; height:200px; object-fit:cover; border-bottom:1px solid #222;" onerror="this.src='logo.png'">
                <div style="padding:15px;"><h3 style="font-family:'Oswald'; font-size:1rem; line-height:1.2;">${item.title}</h3></div>
            </div>`;
        }).join('');
    }

    /* CREW LOGIC RESTORED */
    function renderCrew() {
        const container = document.getElementById('crew-rolodex');
        container.innerHTML = crewData.map(dj => `
            <div class="crew-card" id="card-${dj.id}" onclick="handleCrewClick('${dj.id}')">
                <img src="${dj.img}" style="width:100%; height:100%; object-fit:cover;" onerror="this.src='logo.png'">
                <div class="crew-label">${dj.name}</div>
            </div>`).join('');
    }

    function handleCrewClick(id) {
        const dj = crewData.find(d => d.id === id);
        dj.clicks++;
        const card = document.getElementById('card-' + id);
        if(dj.clicks === 1) {
            document.querySelectorAll('.crew-card').forEach(c => c.classList.remove('active-color'));
            card.classList.add('active-color');
            setTimeout(() => { if(dj.clicks === 1) dj.clicks = 0; }, 2500);
        } else if(dj.clicks === 2) {
            document.getElementById('mag-name').innerText = dj.name;
            document.getElementById('mag-content').innerHTML = `<p style="color:#ccc;">${dj.bio}</p>
                <div style="margin-top:15px; font-family:Oswald; color:var(--authority-orange); text-transform:uppercase; font-size:0.9rem;">
                <p>BAND: ${dj.band}</p><p>GIG: ${dj.gig}</p><p>VENUE: ${dj.venue}</p><p>FACT: ${dj.fact}</p></div>`;
            document.getElementById('mag-modal').classList.add('open');
            dj.clicks = 0; card.classList.remove('active-color');
        }
    }

    /* RATES & SUBMIT LOGIC MAINTAINED */
    const pricing = { regional: 299, multi: 449, creative: 195 };
    function openRates() {
        document.getElementById('mag-name').innerText = "ADVERTISING PORTAL";
        document.getElementById('mag-content').innerHTML = `
            <div style="margin-bottom:20px; border-bottom:1px solid #333; padding-bottom:15px;">
                <label class="std-label">Select Package</label>
                <select id="rate-select" class="std-input" onchange="updateCalc()">
                    <option value="regional">REGIONAL (£299)</option>
                    <option value="multi">MULTI-REGIONAL (£449)</option>
                    <option value="creative">CREATIVE (£195)</option>
                </select>
                <div style="display:flex; gap:10px;">
                    <div style="flex:1;"><label class="std-label">Start Date</label><input type="date" id="rate-date" class="std-input"></div>
                    <div style="flex:1;"><label class="std-label">Weeks</label><input type="number" id="rate-weeks" class="std-input" value="1" min="1" onchange="updateCalc()"></div>
                </div>
            </div>
            <div style="margin-bottom:20px;">
                <label class="std-label">Your Details</label>
                <input type="text" id="rate-cust-name" placeholder="CONTACT NAME" class="std-input">
                <input type="email" id="rate-cust-email" placeholder="EMAIL ADDRESS" class="std-input">
            </div>
            <div style="background:rgba(255,85,0,0.1); padding:15px; border:1px solid var(--authority-orange); margin-bottom:20px; text-align:right;">
                <span style="font-family:'Bebas Neue'; color:#888;">TOTAL ESTIMATE:</span>
                <h3 id="calc-total" style="font-family:'Oswald'; font-size:2rem; color:var(--authority-orange);">£299</h3>
            </div>
            <button class="btn-authority" onclick="sendSalesSignal()">SEND BOOKING SIGNAL</button>`;
        document.getElementById('mag-modal').classList.add('open');
    }

    function updateCalc() {
        const type = document.getElementById('rate-select').value;
        const weeks = document.getElementById('rate-weeks').value || 1;
        document.getElementById('calc-total').innerText = `£${pricing[type] * weeks}`;
    }

    function sendSalesSignal() {
        const name = document.getElementById('rate-cust-name').value;
        const email = document.getElementById('rate-cust-email').value;
        const date = document.getElementById('rate-date').value;
        const weeks = document.getElementById('rate-weeks').value;
        const total = document.getElementById('calc-total').innerText;
        if(!name || !email || !date) { alert("All signal parameters must be entered."); return; }
        window.location.href = `mailto:sales@rock.scot?subject=Ad Booking: ${name}&body=Client: ${name}%0AEmail: ${email}%0ADate: ${date}%0ADuration: ${weeks}w%0ATotal: ${total}`;
        document.getElementById('mag-modal').classList.remove('open');
    }

    function openSubmit() {
        document.getElementById('mag-name').innerText = "TRANSMIT";
        document.getElementById('mag-content').innerHTML = `
            <input type="text" id="sub-name" placeholder="BAND NAME" class="std-input">
            <input type="text" id="sub-link" placeholder="TRACK LINK" class="std-input">
            <textarea id="sub-pitch" placeholder="PITCH..." class="std-input" style="height:100px;"></textarea>
            <button class="btn-authority" onclick="handleSubmission()">SEND SIGNAL</button>`;
        document.getElementById('mag-modal').classList.add('open');
    }

    function handleSubmission() {
        const n = document.getElementById('sub-name').value;
        const l = document.getElementById('sub-link').value;
        if(!n || !l) { alert("Required data missing."); return; }
        document.getElementById('mag-modal').classList.remove('open');
        document.getElementById('submit-card-content').innerHTML = `
            <div style="animation: pulse 1s infinite;"><h2 style="font-family:'Bebas Neue'; font-size:2.5rem; color:var(--authority-orange);">SIGNAL RECEIVED</h2></div>
            <button class="btn-authority" style="margin-top:20px; font-size:1rem;" onclick="location.reload()">SEND ANOTHER</button>`;
    }

    function updateLiveUI() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
    }
    setInterval(updateLiveUI, 5000);
    window.onload = updateLiveUI;
</script>
</body>
</html>
