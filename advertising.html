<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advertise | Sla-rock.scot</title>
    <style>
        :root { --primary: #ff3e00; --bg: #050505; }
        body { font-family: 'Inter', Arial, sans-serif; margin: 0; background-color: var(--bg); color: #fff; }
        header { background: #000; padding: 30px; text-align: center; border-bottom: 4px solid var(--primary); }
        #logo { width: 250px; }
        .tagline { font-size: 1.8rem; color: var(--primary); font-weight: 900; text-transform: uppercase; letter-spacing: 4px; }
        nav { background: #0a0a0a; text-align: center; padding: 15px; }
        nav a { color: #888; margin: 0 15px; text-decoration: none; font-weight: 700; text-transform: uppercase; }
        .container { max-width: 1000px; margin: 0 auto; padding: 60px 20px; }
        
        /* AD PACKAGES TABLE */
        .price-table { width: 100%; border-collapse: collapse; margin-top: 40px; background: #0a0a0a; }
        .price-table th { text-align: left; padding: 20px; border-bottom: 2px solid var(--primary); color: var(--primary); text-transform: uppercase; }
        .price-table td { padding: 20px; border-bottom: 1px solid #222; }
        .price-tag { font-family: monospace; font-size: 1.5rem; font-weight: 900; }
        
        footer { text-align: center; padding: 60px; color: #444; }
    </style>
</head>
<body>
<header>
    <img src="logo.png" alt="Sla-rock.scot" id="logo">
    <div class="tagline">Rockin' Scotland</div>
</header>
<nav>
    <a href="index.html">Music</a>
    <a href="advertising.html" style="color: var(--primary);">Advertising</a>
</nav>
<div class="container">
    <h1>Partner with <span style="color: var(--primary);">Rockin' Scotland</span></h1>
    <table class="price-table">
        <thead>
            <tr><th>Package</th><th>Investment</th><th>Coverage</th></tr>
        </thead>
        <tbody>
            <tr><td>Regional Airtime</td><td class="price-tag">£199</td><td>Central Belt FM/Web Slots</td></tr>
            <tr><td>Multi-Regional</td><td class="price-tag">£349</td><td>Full Network Saturation</td></tr>
            <tr><td>Creative Production</td><td class="price-tag">£195</td><td>Pro Script & Voiceover</td></tr>
        </tbody>
    </table>

    <div id="pricing-component" style="margin-top: 80px;"></div>
</div>
<footer>&copy; 2026 Sla-rock.scot | Rockin' Scotland</footer>
<script src="pricing.js"></script>
</body>
</html>
