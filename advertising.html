<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advertise | Sla-rock.scot</title>
    <style>
        :root { --primary: #ff3e00; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); }
        body { font-family: 'Inter', Arial, sans-serif; margin: 0; background-color: var(--bg); color: #fff; line-height: 1.6; }
        header { background: #000; padding: 30px; text-align: center; border-bottom: 4px solid var(--primary); }
        #logo { width: 250px; height: auto; }
        .tagline { font-size: 1.8rem; color: var(--primary); font-weight: 900; text-transform: uppercase; letter-spacing: 4px; margin-top: 10px; }
        nav { background: #0a0a0a; text-align: center; padding: 15px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #1a1a1a; }
        nav a { color: #888; margin: 0 15px; text-decoration: none; font-weight: 700; text-transform: uppercase; transition: 0.3s; font-size: 0.85rem; }
        nav a:hover { color: var(--primary); }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .specs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 30px 0; }
        .spec-item { background: rgba(255,255,255,0.05); padding: 20px; border-left: 3px solid var(--primary); }
        .spec-item h4 { margin: 0; color: var(--primary); text-transform: uppercase; font-size: 0.8rem; }
        footer { text-align: center; padding: 80px 20px; color: #444; border-top: 1px solid #111; }
    </style>
</head>
<body>
<header>
    <img src="logo.png" alt="Sla-rock.scot" id="logo">
    <div class="tagline">Rockin' Scotland</div>
</header>
<nav>
    <a href="index.html">On Air</a>
    <a href="gig-calendar.html">Gigs</a>
    <a href="submit.html">Submit</a>
    <a href="advertising.html" style="color: var(--primary);">Advertise</a>
    <a href="contact.html">Contact</a>
</nav>
<div class="container">
    <h1 style="font-size: 3rem; text-transform: uppercase;">Media <span style="color: var(--primary);">Specs</span></h1>
    <div class="specs-grid">
        <div class="spec-item"><h4>Format</h4><p>WAV / MP3 320kbps</p></div>
        <div class="spec-item"><h4>Regional</h4><p>£299 Airtime</p></div>
        <div class="spec-item"><h4>Multi-Reg</h4><p>£449 Airtime</p></div>
        <div class="spec-item"><h4>Creative</h4><p>£195 Production</p></div>
    </div>
    <div id="pricing-component"></div>
</div>
<footer><p>&copy; 2026 Sla-rock.scot | Rockin' Scotland</p></footer>
<script src="pricing.js"></script>
</body>
</html>
